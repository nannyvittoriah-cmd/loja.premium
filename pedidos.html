<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Store VZ - Meus Pedidos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#141414;--input:#1e1e1e;--text:#fff;--muted:#888;--purple:#8b5cf6;--border:#2a2a2a;--green:#4ade80;--orange:#fb923c;--red:#f87171}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px}
.header{display:flex;align-items:center;gap:16px;padding:16px 20px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.header svg{width:24px;height:24px;stroke:var(--text);stroke-width:2;cursor:pointer}
.header-title{font-size:18px;font-weight:700;flex:1}
.tabs{display:flex;gap:8px;padding:16px 20px;background:var(--bg);position:sticky;top:57px;z-index:9;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.2s}
.tab.active{background:var(--purple);border-color:var(--purple);color:#fff}
.section{padding:20px}
.pedido{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.2s}
.pedido:hover{border-color:var(--purple)}
.pedido-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pedido-id{font-size:13px;font-weight:700;font-family:monospace;color:var(--purple)}
.pedido-status{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.pedido-status.concluido{background:rgba(74,222,128,.15);color:var(--green)}
.pedido-status.pendente{background:rgba(251,146,60,.15);color:var(--orange)}
.pedido-status.cancelado{background:rgba(248,113,113,.15);color:var(--red)}
.pedido-items{display:flex;gap:8px;margin-bottom:12px}
.pedido-item-icon{width:48px;height:48px;background:var(--input);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px}
.pedido-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.pedido-data{font-size:12px;color:var(--muted)}
.pedido-total{font-size:16px;font-weight:700;color:var(--purple)}
.empty{text-align:center;padding:60px 20px}
.empty svg{width:64px;height:64px;stroke:var(--muted);stroke-width:1.5;margin:0 auto 16px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-text{font-size:14px;color:var(--muted)}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 0;z-index:20}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);text-decoration:none;font-size:11px;cursor:pointer}
.nav-item.active{color:var(--purple)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none}
</style>
</head>
<body>
<div class="header">
  <svg fill="none" viewBox="0 0 24 24" onclick="history.back()">
    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 18l-6-6 6-6"/>
  </svg>
  <div class="header-title">Meus Pedidos</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="filtrarStatus('todos')">Todos</div>
  <div class="tab" onclick="filtrarStatus('pendente')">Pendentes</div>
  <div class="tab" onclick="filtrarStatus('aprovado')">Concluídos</div>
  <div class="tab" onclick="filtrarStatus('cancelado')">Cancelados</div>
</div>

<div class="section" id="listaPedidos">
  <div style="text-align:center;padding:40px;color:var(--muted)">Carregando...</div>
</div>

<div class="nav-bottom">
  <a class="nav-item" onclick="window.location.href='home.html'">
    <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Início
  </a>
  <a class="nav-item" onclick="window.location.href='home.html'">
    <svg viewBox="0 0 24 24"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
    Categorias
  </a>
  <a class="nav-item" onclick="window.location.href='carrinho.html'">
    <svg viewBox="0 0 24 24"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
    Carrinho
  </a>
  <a class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Pedidos
  </a>
  <a class="nav-item" onclick="window.location.href='perfil.html'">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Perfil
  </a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let usuario=null;
let todosPedidos=[];
let filtroAtual='todos';

auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href='index.html';
  }else{
    usuario=user;
    carregarPedidos();
  }
});

function carregarPedidos(){
  db.ref('pedidos').orderByChild('usuarioId').equalTo(usuario.uid).on('value',snap=>{
    const lista=document.getElementById('listaPedidos');
    
    if(!snap.exists()){
      lista.innerHTML=`
        <div class="empty">
          <svg fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <div class="empty-title">Nenhum pedido ainda</div>
          <div class="empty-text">Seus pedidos aparecerão aqui</div>
        </div>
      `;
      return;
    }
    
    todosPedidos=[];
    snap.forEach(child=>{
      const p=child.val();
      p.key=child.key;
      todosPedidos.push(p);
    });
    
    todosPedidos.sort((a,b)=>b.criadoEm-a.criadoEm);
    renderizarPedidos();
  });
}

function filtrarStatus(status){
  filtroAtual=status;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderizarPedidos();
}

function renderizarPedidos(){
  const lista=document.getElementById('listaPedidos');
  const filtrados=filtroAtual==='todos'?todosPedidos:todosPedidos.filter(p=>p.status===filtroAtual);
  
  if(filtrados.length===0){
    lista.innerHTML=`
      <div class="empty">
        <div class="empty-title">Nenhum pedido</div>
        <div class="empty-text">Não há pedidos com esse status</div>
      </div>
    `;
    return;
  }
  
  let html='';
  filtrados.forEach(p=>{
    const data=new Date(p.criadoEm).toLocaleDateString('pt-BR');
    const hora=new Date(p.criadoEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    
    let statusClass='pendente';
    let statusText='Pendente';
    if(p.status==='aprovado'){statusClass='concluido';statusText='Concluído'}
    else if(p.status==='cancelado'){statusClass='cancelado';statusText='Cancelado'}
    
    const icons=p.itens.slice(0,3).map(item=>{
      const img=item.imagem?`<img src="${item.imagem}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">`:'🎁';
      return `<div class="pedido-item-icon">${img}</div>`;
    }).join('');
    
    html+=`
      <div class="pedido" onclick="verPedido('${p.key}')">
        <div class="pedido-header">
          <div class="pedido-id">#${p.id}</div>
          <div class="pedido-status ${statusClass}">${statusText}</div>
        </div>
        <div class="pedido-items">${icons}</div>
        <div class="pedido-footer">
          <div class="pedido-data">${data} às ${hora}</div>
          <div class="pedido-total">R$ ${parseFloat(p.total).toFixed(2).replace('.',',')}</div>
        </div>
      </div>
    `;
  });
  
  lista.innerHTML=html;
}

function verPedido(id){
  window.location.href='comprovante.html?id='+id;
}
</script>
</body>
</html>
