<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Store VZ - Produto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#141414;--input:#1e1e1e;--text:#fff;--muted:#888;--purple:#8b5cf6;--purple2:#7c3aed;--border:#2a2a2a;--green:#4ade80;--red:#f87171}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding-bottom:90px}
.header{display:flex;align-items:center;gap:16px;padding:16px 20px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.header svg{width:24px;height:24px;stroke:var(--text);stroke-width:2;cursor:pointer}
.header-title{font-size:18px;font-weight:700;flex:1}
.produto-img{width:100%;aspect-ratio:1;background:var(--card);position:relative}
.produto-img img{width:100%;height:100%;object-fit:cover}
.produto-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;background:var(--card)}
.badge-categoria{position:absolute;top:16px;left:16px;background:rgba(139,92,246,.9);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700}
.produto-info{padding:20px}
.produto-nome{font-size:24px;font-weight:800;margin-bottom:8px}
.produto-preco{font-size:32px;font-weight:800;color:var(--purple);margin-bottom:16px}
.produto-preco span{font-size:16px;font-weight:500;color:var(--muted)}
.divider{height:1px;background:var(--border);margin:20px 0}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px}
.produto-desc{font-size:15px;line-height:1.6;color:var(--muted);margin-bottom:20px}
.estoque{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:20px}
.estoque.ok{color:var(--green)}
.estoque.erro{color:var(--red)}
.estoque svg{width:18px;height:18px;stroke-width:2.5}
.qtd-box{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.qtd-label{font-size:14px;font-weight:600}
.qtd-controls{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px}
.qtd-btn{width:36px;height:36px;border:none;background:transparent;color:var(--text);font-size:20px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center}
.qtd-btn:hover{background:var(--input)}
.qtd-btn:disabled{opacity:.3;cursor:not-allowed}
.qtd-valor{font-size:16px;font-weight:700;min-width:30px;text-align:center}
.btn-fixed{position:fixed;bottom:0;left:0;right:0;padding:16px 20px;background:var(--bg);border-top:1px solid var(--border);z-index:20}
.btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border:none;padding:16px;border-radius:14px;font-weight:700;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(139,92,246,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn svg{width:20px;height:20px;stroke-width:2.5}
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.error{text-align:center;padding:60px 20px;color:var(--red)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:#fff;padding:12px 24px;border-radius:12px;font-weight:600;z-index:100;transition:.3s;box-shadow:0 8px 20px rgba(74,222,128,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <svg fill="none" viewBox="0 0 24 24" onclick="history.back()">
    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 18l-6-6 6-6"/>
  </svg>
  <div class="header-title">Produto</div>
  <svg fill="none" viewBox="0 0 24 24" onclick="irCarrinho()">
    <circle cx="8" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
    <circle cx="19" cy="21" r="1" stroke="currentColor" stroke-width="2"/>
    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
  </svg>
</div>

<div id="conteudo">
  <div class="loading">Carregando produto...</div>
</div>

<div class="btn-fixed" id="btnContainer" style="display:none">
  <button class="btn" id="btnAdd" onclick="adicionarCarrinho()">
    <svg fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-8 2a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/>
    </svg>
    Adicionar ao Carrinho
  </button>
</div>

<div class="toast" id="toast">Produto adicionado ao carrinho!</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let produtoAtual=null;
let qtd=1;
let usuario=null;

auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href='index.html';
  }else{
    usuario=user;
    carregarProduto();
  }
});

function carregarProduto(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  
  if(!id){
    document.getElementById('conteudo').innerHTML='<div class="error">Produto não encontrado</div>';
    return;
  }
  
  db.ref('produtos/'+id).once('value',snap=>{
    if(!snap.exists()){
      document.getElementById('conteudo').innerHTML='<div class="error">Produto não encontrado</div>';
      return;
    }
    
    produtoAtual=snap.val();
    produtoAtual.id=id;
    renderizarProduto();
  });
}

function renderizarProduto(){
  const img=produtoAtual.imagemBase64||produtoAtual.imagem;
  const imgHtml=img?`<img src="${img}" alt="${produtoAtual.nome}">`:`<div class="produto-img-placeholder">🎁</div>`;
  const estoqueOk=produtoAtual.estoque>0;
  
  document.getElementById('conteudo').innerHTML=`
    <div class="produto-img">
      ${imgHtml}
      <div class="badge-categoria">${produtoAtual.categoria||'Produto'}</div>
    </div>
    <div class="produto-info">
      <div class="produto-nome">${produtoAtual.nome}</div>
      <div class="produto-preco">
        R$ ${parseFloat(produtoAtual.preco).toFixed(2).replace('.',',')}
        <span>/ unidade</span>
      </div>
      
      <div class="divider"></div>
      
      <div class="section-title">Descrição</div>
      <div class="produto-desc">${produtoAtual.descricao||'Sem descrição disponível'}</div>
      
      <div class="estoque ${estoqueOk?'ok':'erro'}">
        <svg fill="none" viewBox="0 0 24 24">
          ${estoqueOk?
            '<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>'
            :
            '<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>'
          }
        </svg>
        ${estoqueOk?`${produtoAtual.estoque} unidades em estoque`:'Produto esgotado'}
      </div>
      
      ${estoqueOk?`
        <div class="qtd-box">
          <div class="qtd-label">Quantidade:</div>
          <div class="qtd-controls">
            <button class="qtd-btn" onclick="alterarQtd(-1)">−</button>
            <div class="qtd-valor" id="qtdValor">1</div>
            <button class="qtd-btn" onclick="alterarQtd(1)">+</button>
          </div>
        </div>
      `:''}
    </div>
  `;
  
  document.getElementById('btnContainer').style.display=estoqueOk?'block':'none';
  document.getElementById('btnAdd').disabled=!estoqueOk;
}

function alterarQtd(delta){
  const novaQtd=qtd+delta;
  if(novaQtd<1||novaQtd>produtoAtual.estoque)return;
  qtd=novaQtd;
  document.getElementById('qtdValor').textContent=qtd;
}

function adicionarCarrinho(){
  if(!produtoAtual||produtoAtual.estoque<=0)return;
  
  const btn=document.getElementById('btnAdd');
  btn.disabled=true;
  btn.innerHTML='Adicionando...';
  
  const item={
    produtoId:produtoAtual.id,
    nome:produtoAtual.nome,
    preco:produtoAtual.preco,
    imagem:produtoAtual.imagemBase64||produtoAtual.imagem||'',
    quantidade:qtd,
    adicionadoEm:Date.now()
  };
  
  db.ref('carrinho/'+usuario.uid+'/'+produtoAtual.id).set(item).then(()=>{
    mostrarToast();
    btn.disabled=false;
    btn.innerHTML=`
      <svg fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-8 2a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/>
      </svg>
      Adicionar ao Carrinho
    `;
    qtd=1;
    document.getElementById('qtdValor').textContent=qtd;
  }).catch(e=>{
    alert('Erro ao adicionar: '+e.message);
    btn.disabled=false;
    btn.innerHTML=`
      <svg fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-8 2a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/>
      </svg>
      Adicionar ao Carrinho
    `;
  });
}

function mostrarToast(){
  const toast=document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

function irCarrinho(){
  window.location.href='carrinho.html';
}
</script>
</body>
</html>
