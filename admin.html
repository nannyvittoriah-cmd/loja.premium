<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Store - ADM</title>
<style>
:root{--bg:#0a0a12;--sidebar:#0f0f1a;--card:#16161f;--input:#1e1e2a;--border:#2f2f42;--purple:#8b5cf6;--purple-dark:#7c3aed;--text:#fff;--text-dim:#8b8ba1;--green:#10b981;--red:#ef4444;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-size:11px}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--sidebar);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;z-index:100;transition:transform 0.3s}
.sidebar.mobile{transform:translateX(-100%)}
.sidebar.mobile.open{transform:translateX(0)}
.logo-area{text-align:center;padding:0 16px 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo-star{color:var(--purple);font-size:20px;margin-bottom:6px}
.logo-text{font-size:16px;font-weight:800;margin-bottom:2px}
.logo-sub{font-size:9px;color:var(--purple);letter-spacing:1px}
.menu-label{font-size:9px;color:var(--text-dim);padding:0 16px;margin-bottom:8px;font-weight:600;letter-spacing:0.5px}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;border-radius:10px;color:var(--text-dim);font-size:11px;font-weight:500;cursor:pointer}
.menu-item:hover{background:var(--input);color:var(--text)}
.menu-item.active{background:linear-gradient(135deg,var(--purple) 0%,var(--purple-dark) 100%);color:#fff;box-shadow:0 4px 12px rgba(139,92,246,0.3)}
.menu-icon{font-size:16px;width:18px;text-align:center}
.main{margin-left:220px;min-height:100vh;padding:16px;transition:margin 0.3s}
.main.mobile{margin-left:0}
.header{height:50px;background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;margin-bottom:16px}
.header-left{display:flex;align-items:center;gap:10px}
.menu-btn{width:32px;height:32px;background:var(--input);border:1px solid var(--border);border-radius:8px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.header-title{font-size:13px;font-weight:800}
.icon-btn{width:32px;height:32px;background:var(--input);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.screen{display:none}
.screen.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:800;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px}
.stat-card{background:var(--input);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-value{font-size:18px;font-weight:900;color:var(--purple);margin-bottom:2px}
.stat-label{font-size:9px;color:var(--text-dim)}
.btn{width:100%;height:40px;background:linear-gradient(135deg,var(--purple) 0%,var(--purple-dark) 100%);border:none;border-radius:10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;margin-bottom:8px}
.btn-red{background:linear-gradient(135deg,var(--red) 0%,#dc2626 100%)}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-btn{display:flex}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="logo-area">
    <div class="logo-star">★</div>
    <div class="logo-text">PRIME</div>
    <div class="logo-sub">STORE</div>
  </div>
  <div class="menu-label">PAINEL ADMIN</div>
  <div class="menu-item active"><span class="menu-icon">💼</span>Dashboard</div>
  <div class="menu-item"><span class="menu-icon">📦</span>Produtos</div>
  <div class="menu-item"><span class="menu-icon">📁</span>Categorias</div>
  <div class="menu-item"><span class="menu-icon">🛒</span>Pedidos</div>
  <div class="menu-item"><span class="menu-icon">👥</span>Usuários</div>
  <div class="menu-item" onclick="logout()"><span class="menu-icon">🚪</span>Sair</div>
</div>

<div class="main" id="main">
  <div class="header">
    <div class="header-left">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="header-title">Dashboard</div>
    </div>
    <button class="icon-btn" onclick="logout()">🚪</button>
  </div>
  
  <div class="screen active">
    <div class="stats">
      <div class="stat-card"><div class="stat-value" id="statVendas">R$ 0</div><div class="stat-label">Vendas Hoje</div></div>
      <div class="stat-card"><div class="stat-value" id="statPedidos">0</div><div class="stat-label">Pedidos</div></div>
      <div class="stat-card"><div class="stat-value" id="statClientes">0</div><div class="stat-label">Clientes</div></div>
      <div class="stat-card"><div class="stat-value" id="statProdutos">0</div><div class="stat-label">Produtos</div></div>
    </div>
    <div class="card">
      <div class="card-title">⚡ Ações Rápidas</div>
      <button class="btn" onclick="alert('Adicionar produto')">➕ Novo Produto</button>
      <button class="btn btn-red" onclick="logout()">🚪 Sair</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",authDomain:"premium-store-aa58b.firebaseapp.com",databaseURL:"https://premium-store-aa58b-default-rtdb.firebaseio.com",projectId:"premium-store-aa58b",storageBucket:"premium-store-aa58b.firebasestorage.app",messagingSenderId:"462239500057",appId:"1:462239500057:web:f1b7cea162ed308a866788"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();const db=firebase.database();
const ADMIN_EMAIL='vittoriahvahz@gmail.com';

auth.onAuthStateChanged(user=>{
  if(!user||user.email!==ADMIN_EMAIL){window.location.href='index.html';return}
  carregarDashboard();
});

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function logout(){auth.signOut().then(()=>window.location.href='index.html')}
function carregarDashboard(){
  db.ref('produtos').once('value',s=>document.getElementById('statProdutos').textContent=Object.keys(s.val()||{}).length);
  db.ref('usuarios').once('value',s=>document.getElementById('statClientes').textContent=Object.keys(s.val()||{}).length);
  db.ref('pedidos').once('value',s=>{
    const p=s.val()||{};const hoje=new Date().setHours(0,0,0,0);let totalVendas=0,totalPedidos=0;
    Object.values(p).forEach(ped=>{if(ped.criadoEm>=hoje&&ped.status!=='cancelado'){totalVendas+=ped.total||0;totalPedidos++}});
    document.getElementById('statVendas').textContent='R$ '+totalVendas.toFixed(2);
    document.getElementById('statPedidos').textContent=totalPedidos;
  });
}
</script>
</body>
</html>
