<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Store VZ - Carrinho</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#141414;--input:#1e1e1e;--text:#fff;--muted:#888;--purple:#8b5cf6;--purple2:#7c3aed;--border:#2a2a2a;--green:#4ade80;--red:#f87171}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding-bottom:180px}
.header{display:flex;align-items:center;gap:16px;padding:16px 20px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.header svg{width:24px;height:24px;stroke:var(--text);stroke-width:2;cursor:pointer}
.header-title{font-size:18px;font-weight:700;flex:1}
.section{padding:20px}
.item-carrinho{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;gap:12px}
.item-img{width:80px;height:80px;background:var(--input);border-radius:10px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-nome{font-size:15px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-preco{font-size:16px;font-weight:700;color:var(--purple);margin-bottom:8px}
.item-controls{display:flex;align-items:center;gap:12px}
.qtd-controls{display:flex;align-items:center;gap:8px;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:4px}
.qtd-btn{width:28px;height:28px;border:none;background:transparent;color:var(--text);font-size:18px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center}
.qtd-btn:hover{background:var(--card)}
.qtd-btn:disabled{opacity:.3;cursor:not-allowed}
.qtd-valor{font-size:14px;font-weight:700;min-width:24px;text-align:center}
.btn-remover{margin-left:auto;padding:8px;border:none;background:transparent;cursor:pointer;border-radius:8px}
.btn-remover svg{width:18px;height:18px;stroke:var(--red);stroke-width:2}
.btn-remover:hover{background:rgba(248,113,113,.1)}
.empty{text-align:center;padding:60px 20px}
.empty svg{width:64px;height:64px;stroke:var(--muted);stroke-width:1.5;margin:0 auto 16px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-text{font-size:14px;color:var(--muted);margin-bottom:24px}
.btn-outline{width:100%;background:transparent;color:var(--purple);border:2px solid var(--purple);padding:14px;border-radius:12px;font-weight:700;cursor:pointer;font-size:15px;transition:.2s}
.btn-outline:hover{background:rgba(139,92,246,.1)}
.resumo-fixed{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:20px;z-index:20}
.resumo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:14px}
.resumo-row.total{font-size:18px;font-weight:800;padding-top:12px;border-top:1px solid var(--border);margin-bottom:16px}
.resumo-label{color:var(--muted)}
.resumo-valor{font-weight:700}
.resumo-valor.total{color:var(--purple);font-size:22px}
.btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border:none;padding:16px;border-radius:14px;font-weight:700;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(139,92,246,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn svg{width:20px;height:20px;stroke-width:2.5}
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:#fff;padding:12px 24px;border-radius:12px;font-weight:600;z-index:100;transition:.3s;box-shadow:0 8px 20px rgba(74,222,128,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.erro{background:var(--red);box-shadow:0 8px 20px rgba(248,113,113,.4)}
</style>
</head>
<body>
<div class="header">
  <svg fill="none" viewBox="0 0 24 24" onclick="history.back()">
    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 18l-6-6 6-6"/>
  </svg>
  <div class="header-title">Carrinho</div>
</div>

<div class="section" id="conteudo">
  <div class="loading">Carregando carrinho...</div>
</div>

<div class="resumo-fixed" id="resumo" style="display:none">
  <div class="resumo-row">
    <div class="resumo-label">Subtotal</div>
    <div class="resumo-valor" id="subtotal">R$ 0,00</div>
  </div>
  <div class="resumo-row total">
    <div class="resumo-label">Total</div>
    <div class="resumo-valor total" id="total">R$ 0,00</div>
  </div>
  <button class="btn" onclick="finalizarCompra()">
    <svg fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    Finalizar Compra
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let usuario=null;
let itensCarrinho={};

auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href='index.html';
  }else{
    usuario=user;
    carregarCarrinho();
  }
});

function carregarCarrinho(){
  db.ref('carrinho/'+usuario.uid).on('value',snap=>{
    const conteudo=document.getElementById('conteudo');
    
    if(!snap.exists()){
      conteudo.innerHTML=`
        <div class="empty">
          <svg fill="none" viewBox="0 0 24 24">
            <circle cx="8" cy="21" r="1" stroke="currentColor"/>
            <circle cx="19" cy="21" r="1" stroke="currentColor"/>
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          </svg>
          <div class="empty-title">Carrinho vazio</div>
          <div class="empty-text">Adicione produtos para começar suas compras</div>
          <button class="btn-outline" onclick="window.location.href='home.html'">Ver produtos</button>
        </div>
      `;
      document.getElementById('resumo').style.display='none';
      return;
    }
    
    itensCarrinho={};
    let html='';
    let subtotal=0;
    
    snap.forEach(child=>{
      const item=child.val();
      item.key=child.key;
      itensCarrinho[child.key]=item;
      
      const totalItem=item.preco*item.quantidade;
      subtotal+=totalItem;
      
      const img=item.imagem?`<img src="${item.imagem}" alt="${item.nome}">`:'🎁';
      
      html+=`
        <div class="item-carrinho">
          <div class="item-img">${img}</div>
          <div class="item-info">
            <div class="item-nome">${item.nome}</div>
            <div class="item-preco">R$ ${parseFloat(item.preco).toFixed(2).replace('.',',')}</div>
            <div class="item-controls">
              <div class="qtd-controls">
                <button class="qtd-btn" onclick="alterarQtd('${item.key}',-1)">−</button>
                <div class="qtd-valor">${item.quantidade}</div>
                <button class="qtd-btn" onclick="alterarQtd('${item.key}',1)">+</button>
              </div>
              <button class="btn-remover" onclick="removerItem('${item.key}')">
                <svg fill="none" viewBox="0 0 24 24">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12.562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      `;
    });
    
    conteudo.innerHTML=html;
    document.getElementById('subtotal').textContent='R$ '+subtotal.toFixed(2).replace('.',',');
    document.getElementById('total').textContent='R$ '+subtotal.toFixed(2).replace('.',',');
    document.getElementById('resumo').style.display='block';
  });
}

function alterarQtd(key,delta){
  const item=itensCarrinho[key];
  const novaQtd=item.quantidade+delta;
  
  if(novaQtd<1){
    removerItem(key);
    return;
  }
  
  db.ref('carrinho/'+usuario.uid+'/'+key+'/quantidade').set(novaQtd);
}

function removerItem(key){
  db.ref('carrinho/'+usuario.uid+'/'+key).remove().then(()=>{
    mostrarToast('Item removido do carrinho');
  });
}

function finalizarCompra(){
  const btn=event.target;
  btn.disabled=true;
  btn.innerHTML='Processando...';
  
  const itens=Object.values(itensCarrinho);
  const total=itens.reduce((sum,item)=>sum+item.preco*item.quantidade,0);
  
  const pedido={
    usuarioId:usuario.uid,
    usuarioNome:usuario.displayName||usuario.email,
    usuarioEmail:usuario.email,
    itens:itens,
    total:total,
    status:'pendente',
    criadoEm:Date.now()
  };
  
  db.ref('pedidos').push(pedido).then(ref=>{
    // Limpa carrinho
    db.ref('carrinho/'+usuario.uid).remove().then(()=>{
      mostrarToast('Pedido realizado com sucesso!',false);
      setTimeout(()=>{
        window.location.href='pedidos.html';
      },1500);
    });
  }).catch(e=>{
    mostrarToast('Erro ao finalizar: '+e.message,true);
    btn.disabled=false;
    btn.innerHTML=`
      <svg fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Finalizar Compra
    `;
  });
}

function mostrarToast(msg,erro=false){
  const toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.className='toast '+(erro?'erro':'');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}
</script>
</body>
</html>
