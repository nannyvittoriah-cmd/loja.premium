<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login / Cadastro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0a0f2c, #121a40);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CAIXA PRINCIPAL */
.container {
    background: #0f1740;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
}

/* TITULO */
h2 {
    color: white;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #1c255c;
    color: white;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #ff4da6;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1a8c;
}

/* LINK */
.toggle {
    color: #ff4da6;
    margin-top: 15px;
    cursor: pointer;
    display: block;
}

/* ESCONDER */
.hidden {
    display: none;
}
</style>

</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="login">
        <h2>Login</h2>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button>Entrar</button>
        <span class="toggle" onclick="mostrarCadastro()">Não tem conta? Cadastre-se</span>
    </div>

    <!-- CADASTRO -->
    <div id="cadastro" class="hidden">
        <h2>Cadastro</h2>
        <input type="text" placeholder="Usuário">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Senha">
        <button>Cadastrar</button>
        <span class="toggle" onclick="mostrarLogin()">Já tem conta? Entrar</span>
    </div>

</div>

<script>
function mostrarCadastro() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("cadastro").classList.remove("hidden");
}

function mostrarLogin() {
    document.getElementById("cadastro").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}
</script>

</body>
</html>
