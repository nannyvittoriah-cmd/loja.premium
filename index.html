<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonys Story</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#0b0f2a;
font-weight:bold;
}

.menuBtn{cursor:pointer;font-size:22px}

/* MENU */
.menu{
position:absolute;
right:10px;
top:50px;
background:#fff;
color:#000;
display:none;
flex-direction:column;
width:180px;
border-radius:10px;
}

.menu button{
padding:10px;
border:none;
background:none;
cursor:pointer;
}

/* LOJA */
.container{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
padding:20px;
}

.card{
width:260px;
background:#111;
border:2px solid #00c3ff;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
cursor:pointer;
}

/* CHECKOUT */
.checkout{
display:none;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

/* ADM */
.admin{
display:none;
padding:20px;
}

.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:1px solid #555;
border-radius:6px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.modalBox{
background:#111;
padding:20px;
max-width:500px;
border-radius:10px;
}

/* ITEM ADM */
.item{
border:1px solid #333;
padding:10px;
margin:5px 0;
}

.nao{border-left:5px solid red;}
.visto{border-left:5px solid green;}

.stats{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.stat{
flex:1;
background:#222;
padding:10px;
border-radius:8px;
text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
<div>BONYS STORY</div>
<div class="menuBtn" onclick="toggleMenu()">⋮</div>
</div>

<div id="menu" class="menu">
<button onclick="home()">Home</button>
<button onclick="openAdmin()">ADM</button>
</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout">
<div class="box">
<h3>ENVIO DE COMPROVANTE</h3>

<input id="nome" placeholder="Nome">
<input id="whats" placeholder="WhatsApp">
<input id="produto" readonly>
<input id="link" placeholder="Link do comprovante">

<button onclick="enviar()">ENVIAR</button>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modalBox">
<h3 id="mTitulo"></h3>
<p id="mPreco"></p>
<p id="mDesc" style="white-space:pre-line"></p>
<button onclick="fechar()" style="width:100%;padding:10px;background:#00c3ff;border:none">FECHAR</button>
</div>
</div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>📊 STATS</h3>
<div class="stats">
<div class="stat">Cliques<br><span id="cliques"></span></div>
<div class="stat">Vendas<br><span id="vendas"></span></div>
<div class="stat">Pedidos<br><span id="pedidos"></span></div>
</div>

<hr>

<h3>➕ PRODUTO</h3>

<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem">
<textarea id="pdesc" placeholder="Descrição completa"></textarea>
<button onclick="add()">Adicionar</button>

<hr>

<h3>📦 PRODUTOS</h3>
<div id="produtosADM"></div>

<hr>

<h3>📩 DM (Mensagens)</h3>
<div id="msgs"></div>

<hr>

<h3>📄 PEDIDOS</h3>
<div id="hist"></div>

</div>
</div>
</div>

<script>

let selected="";

/* PRODUTOS */
let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
[
"Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png",
"✔ Acesso básico\n✔ Funções limitadas\n✔ Ideal para iniciantes"
],
[
"Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png",
"✔ Mais funções\n✔ Melhor desempenho\n✔ Suporte prioritário"
],
[
"Passe Elite","80","https://i.imgur.com/3Q9Z1ZQ.png",
"✔ Tudo desbloqueado\n✔ Acesso total\n✔ Premium máximo"
]
];

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function render(){
loja.innerHTML="";

produtos.forEach((p,i)=>{
let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>

<button onclick="buy('${p[0]}')">COMPRAR</button>
<button onclick="detalhe(${i})">DETALHES</button>
`;

loja.appendChild(d);
});
}
render();

/* DETALHES */
function detalhe(i){
modal.style.display="flex";
mTitulo.innerText=produtos[i][0];
mPreco.innerText="R$ "+produtos[i][1];
mDesc.innerText=produtos[i][3];
}

function fechar(){modal.style.display="none";}

/* COMPRA */
function buy(p){
selected=p;
loja.style.display="none";
checkout.style.display="block";
produto.value=p;
}

/* ENVIO */
function enviar(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
nome:nome.value,
produto:selected,
link:link.value,
status:"nao"
});

localStorage.setItem("dados",JSON.stringify(dados));

let v=Number(localStorage.getItem("vendas")||0);
localStorage.setItem("vendas",v+1);

alert("Enviado!");
home();
}

/* HOME */
function home(){
loja.style.display="flex";
checkout.style.display="none";
admin.style.display="none";
}

/* MENU */
function toggleMenu(){
menu.style.display=menu.style.display==="flex"?"none":"flex";
}

/* ADM */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

/* LOGIN */
function login(){
if(u.value==="admin" && p.value==="123"){
painel.style.display="block";
loadADM();
}else alert("erro");
}

/* ADD */
function add(){
produtos.push([
pnome.value,
ppreco.value,
pimg.value,
pdesc.value
]);

save();
render();
loadADM();
}

/* ADM PROD */
function loadADM(){
produtosADM.innerHTML="";

produtos.forEach((p,i)=>{
let d=document.createElement("div");
d.className="item";

d.innerHTML=`
<input value="${p[0]}" onchange="produtos[${i}][0]=this.value;save();render()">
<input value="${p[1]}" onchange="produtos[${i}][1]=this.value;save();render()">
<input value="${p[2]}" onchange="produtos[${i}][2]=this.value;save();render()">
<textarea onchange="produtos[${i}][3]=this.value;save();render()">${p[3]}</textarea>
<button onclick="produtos.splice(${i},1);save();render();loadADM()">Excluir</button>
`;

produtosADM.appendChild(d);
});
}

/* DM */
function loadDM(){
let msgs=JSON.parse(localStorage.getItem("msgs")||"[]");
msgsDiv.innerHTML="";

msgs.forEach(m=>{
let d=document.createElement("div");
d.className="item";
d.innerHTML=`<b>${m.nome}</b><br>${m.msg}`;
msgsDiv.appendChild(d);
});
}

/* HIST */
function loadHist(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");
hist.innerHTML="";

dados.forEach(d=>{
hist.innerHTML+=`
<div class="item ${d.status}">
<b>${d.nome}</b><br>
${d.produto}<br>
<a href="${d.link}" target="_blank">ver</a>
</div>
`;
});
}

/* STATS */
function stats(){
cliques.innerText=localStorage.getItem("clicks")||0;
vendas.innerText=localStorage.getItem("vendas")||0;
pedidos.innerText=(JSON.parse(localStorage.getItem("dados")||"[]")).length;
}

setInterval(()=>{
stats();
loadHist();
},1000);

/* CLIQUE */
let c=Number(localStorage.getItem("clicks")||0);
localStorage.setItem("clicks",c+1);

</script>

</body>
</html>
