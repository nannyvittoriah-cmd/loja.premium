<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
:root{
--border:#00c3ff;
--border2:#ffd400;
}

body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
transition:0.3s;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
font-size:28px;
font-weight:bold;
background:#0b0f2a;
border-bottom:2px solid var(--border);
}

/* MENU */
.menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
z-index:9999;
border-left:2px solid var(--border);
}

.menu button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
cursor:pointer;
background:#222;
color:#fff;
border-radius:6px;
}

/* LOJA */
.container{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:12px;
padding:15px;
}

.card{
background:#111;
border:2px solid var(--border);
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

/* BOTÕES */
.buyBtn{
width:100%;
padding:10px;
margin-top:5px;
background:#00ff66;
border:none;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

.detailBtn{
width:100%;
padding:10px;
margin-top:5px;
background:#f5f5dc;
border:none;
color:#000;
font-weight:bold;
border:2px solid var(--border2);
border-radius:6px;
cursor:pointer;
}

/* ADM */
.admin{display:none;padding:15px;}

.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
border:2px solid var(--border);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border-radius:6px;
border:1px solid #555;
}

.item{
border:1px solid #333;
padding:10px;
margin:5px 0;
}

/* GRÁFICO */
.bar{
height:10px;
background:#00c3ff;
margin:5px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div>BONY STORE</div>
<div onclick="toggleMenu()" style="cursor:pointer;font-size:26px">☰</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">

<h3>MENU</h3>

<button onclick="home()">🏠 Home</button>
<button onclick="openAdmin()">⚙ ADM</button>

<h4>🌙 TEMAS</h4>
<button onclick="theme('azul')">🔵 Azul</button>
<button onclick="theme('amarelo')">🟡 Amarelo</button>

</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>📊 VENDAS</h3>
<div class="item">Total: <span id="vendas"></span></div>
<div class="item">Mais vendido: <span id="maisvendido"></span></div>

<h3>📈 GRÁFICO</h3>
<div id="grafico"></div>

<h3>🟢 STATUS</h3>
<div class="item" id="status">ONLINE</div>

<h3>📩 COMPROVANTES</h3>
<div id="hist"></div>

<h3>➕ PRODUTOS</h3>
<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<input id="pestoque" placeholder="Estoque">
<input id="pcat" placeholder="Categoria">
<button onclick="add()">Adicionar</button>

<hr>

<div id="produtosADM"></div>

</div>
</div>
</div>

<script>

const ADMIN_USER="Lorrannyh.170";
const ADMIN_PASS="Lorrannyh.170";

let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png","Acesso básico",10,"passe"],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png","Premium",5,"passe"]
];

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function render(){
loja.innerHTML="";
produtos.forEach((p,i)=>{
loja.innerHTML+=`
<div class="card">
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>
<p>${p[3]}</p>
<p>Estoque: ${p[4]}</p>
<button class="detailBtn">DETALHES</button>
<button class="buyBtn">COMPRAR</button>
</div>`;
});
}

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.right = (m.style.right==="0px")?"-260px":"0px";
}

/* FECHAR MENU FORA */
document.addEventListener("click",function(e){
let m=document.getElementById("menu");
let b=document.querySelector(".topbar div:last-child");

if(!m.contains(e.target) && !b.contains(e.target)){
m.style.right="-260px";
}
});

/* TEMAS */
function theme(t){
if(t==="azul"){
document.documentElement.style.setProperty("--border","#00c3ff");
document.documentElement.style.setProperty("--border2","#ffd400");
document.body.style.background="#000";
document.body.style.color="#fff";
}

if(t==="amarelo"){
document.documentElement.style.setProperty("--border","#ffd400");
document.documentElement.style.setProperty("--border2","#00c3ff");
document.body.style.background="#1a1a00";
document.body.style.color="#fff";
}
}

/* HOME */
function home(){
document.getElementById("admin").style.display="none";
document.getElementById("loja").style.display="grid";
render();
}

/* ADM */
function openAdmin(){
document.getElementById("admin").style.display="block";
document.getElementById("loja").style.display="none";
}

/* LOGIN */
function login(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){
painel.style.display="block";
stats();
load();
}else alert("erro login");
}

/* STATS */
function stats(){
let v=localStorage.getItem("vendas")||0;
vendas.innerText=v;

let count={};
produtos.forEach(p=>count[p[0]]=0);

let d=JSON.parse(localStorage.getItem("dados")||"[]");
d.forEach(x=>{
if(count[x.produto]!=undefined) count[x.produto]++;
});

let top="nenhum",max=0;
for(let k in count){
if(count[k]>max){
max=count[k];
top=k;
}
}

maisvendido.innerText=top;

/* gráfico */
grafico.innerHTML="";
for(let k in count){
grafico.innerHTML+=`<div>${k}</div><div class="bar" style="width:${count[k]*20}px"></div>`;
}

/* histórico */
hist.innerHTML="";
d.forEach(x=>{
hist.innerHTML+=`<div class="item">${x.nome} - ${x.produto}</div>`;
});
}

/* ADD PRODUTO */
function add(){
produtos.push([
pnome.value,
ppreco.value,
pimg.value,
pdesc.value,
Number(pestoque.value),
pcat.value
]);

save();
render();
}

/* INICIAR */
home();

</script>

</body>
</html>
