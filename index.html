<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prime Store Vz - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a12;
  --card:#16161f;
  --border:#262630;
  --text:#fff;
  --text-2:#8a8a9e;
  --primary:#7c3aed;
  --primary-2:#a855f7;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

.login-box{width:100%;max-width:340px;}
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--primary-2));border-radius:14px;display:grid;place-items:center;margin-bottom:12px;box-shadow:0 8px 30px rgba(124,58,237,0.35);}
.logo-icon svg{width:26px;height:26px;color:#fff;}
.logo h1{font-size:16px;font-weight:700;color:var(--text);letter-spacing:0.5px;}
.logo span{font-size:11px;color:var(--text-2);letter-spacing:1.5px;margin-top:2px;}

h2{font-size:18px;font-weight:700;color:var(--text);text-align:center;margin-bottom:6px;}
.subtitle{font-size:12px;color:var(--text-2);text-align:center;margin-bottom:28px;}

.input-group{position:relative;margin-bottom:14px;}
.input-group svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#6b7280;}
.input-group input{width:100%;height:46px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0 44px 0 44px;color:var(--text);font-size:13px;outline:none;transition:0.2s;}
.input-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
.input-group input::placeholder{color:#6b7280;}

.toggle-pass{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;color:#6b7280;}

.forgot{text-align:right;margin-bottom:20px;}
.forgot a{font-size:12px;color:var(--text-2);text-decoration:none;}

.btn{width:100%;height:46px;background:linear-gradient(135deg,var(--primary),var(--primary-2));border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:0.2s;}
.btn:active{transform:scale(0.98);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}

.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--text-2);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.footer{text-align:center;margin-top:24px;font-size:12px;color:var(--text-2);}
.footer a{color:var(--primary);text-decoration:none;font-weight:600;}

.error{background:#ef444420;border:1px solid #ef4444;color:#ef4444;padding:10px;border-radius:10px;font-size:12px;margin-bottom:14px;display:none;}
.error.success{background:#10b98120;border-color:#10b981;color:#10b981;}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">
      <svg fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>PRIME STORE</h1>
    <span>VZ</span>
  </div>

  <h2>Bem-vindo de volta!</h2>
  <p class="subtitle">Faça login para continuar</p>
  
  <div class="error" id="errorMsg"></div>

  <div class="input-group">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M4 4h16c1.1 0 2 0.9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  </div>

  <div class="input-group">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
    <button type="button" class="toggle-pass" onclick="togglePass()">
      <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="forgot">
    <a href="#" onclick="forgotPass()">Esqueci minha senha</a>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Entrar</button>

  <div class="divider">ou continue com</div>

  <div class="footer">
    Ainda não tem conta? <a href="#" onclick="register()">Criar conta</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.togglePass = function(){
  const pass = document.getElementById('password');
  pass.type = pass.type === 'password' ? 'text' : 'password';
}

window.login = async function(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  if(!email || !pass){showError('Preencha email e senha');return;}
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerText = 'Entrando...';
  
  try{
    await signInWithEmailAndPassword(auth, email, pass);
    showError('Login realizado com sucesso!', 'success');
    // Troca aqui para a página da home
    setTimeout(()=>{window.location.href = 'home.html';}, 800);
  }catch(e){
    showError('Email ou senha incorretos');
    btn.disabled = false;
    btn.innerText = 'Entrar';
  }
}

window.register = async function(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  if(!email || !pass){showError('Preencha email e senha');return;}
  if(pass.length < 6){showError('Senha mínimo 6 caracteres');return;}
  
  try{
    await createUserWithEmailAndPassword(auth, email, pass);
    showError('Conta criada com sucesso!', 'success');
    setTimeout(()=>{window.location.href = 'home.html';}, 800);
  }catch(e){
    showError('Erro ao criar conta. Email já existe?');
  }
}

window.forgotPass = async function(){
  const email = document.getElementById('email').value.trim();
  if(!email){showError('Digite seu email primeiro');return;}
  try{
    await sendPasswordResetEmail(auth, email);
    showError('Email de recuperação enviado!', 'success');
  }catch(e){
    showError('Erro ao enviar email');
  }
}

function showError(msg, type='error'){
  const e = document.getElementById('errorMsg');
  e.innerText = msg;
  e.className = 'error' + (type === 'success' ? ' success' : '');
  e.style.display = 'block';
  if(type !== 'success') setTimeout(()=>{e.style.display='none';}, 3000);
}
</script>
</body>
</html>
