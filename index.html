<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BONYX.SH</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url('https://i.imgur.com/8Km9tLL.png') no-repeat center/cover;
}

.overlay{
  background:rgba(0,0,0,0.75);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CAIXA PRINCIPAL */
.box{
  width:90%;
  max-width:350px;
  background:#0a0f2c;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px #ff00ff;
}

/* TITULO */
h1{
  text-align:center;
  color:#ff00ff;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#020617;
  color:white;
}

/* BOTÃO NEON */
.btn{
  width:100%;
  padding:12px;
  background:#ff00ff;
  color:black;
  font-weight:bold;
  border:none;
  border-radius:10px;
  margin-top:10px;
  box-shadow:0 0 10px #ff00ff;
}

/* HOME */
.home{
  padding:20px;
}

/* CARD */
.card{
  background:#111a44;
  padding:15px;
  border-radius:15px;
  margin:10px 0;
  box-shadow:0 0 10px #000;
}

/* MENU */
.menu{
  position:fixed;
  right:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#0a0f2c;
  padding:20px;
  transition:0.3s;
}

.menu.active{
  right:0;
}

.menu div{
  padding:15px;
  border-bottom:1px solid #333;
}

</style>

</head>

<body>

<div class="overlay">
  <div id="app"></div>
</div>

<div class="menu" id="menu">
  <div onclick="minhaConta()">Minha conta</div>
  <div onclick="compras()">Minhas compras</div>
  <div onclick="contato()">Contato</div>
  <div onclick="admin()">Admin</div>
</div>

<script>

const ADMIN = "nannyvittoriah@gmail.com";

// LOGIN
function loginTela(){
  app.innerHTML = `
    <div class="box">
      <h1>BONYX.SH 💎</h1>
      <input id="email" placeholder="Email">
      <input id="senha" placeholder="Senha">
      <button class="btn" onclick="login()">Entrar</button>
      <button class="btn" onclick="cadastro()">Cadastrar</button>
    </div>
  `;
}

// CADASTRO
function cadastro(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({
    email:email.value,
    senha:senha.value,
    compras:[]
  });

  localStorage.setItem("users", JSON.stringify(users));
  alert("Conta criada!");
}

// LOGIN
function login(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u=>u.email==email.value && u.senha==senha.value);

  if(user){
    localStorage.setItem("user", user.email);
    home();
  }else{
    alert("Erro no login");
  }
}

// HOME
function home(){
  document.body.innerHTML += ""; // mantém fundo

  app.innerHTML = `
    <div class="home">
      <button onclick="abrirMenu()">☰</button>

      <h2>Categorias</h2>

      <div class="card" onclick="produtos()">
        💎 Dimas Free Fire
      </div>
    </div>
  `;
}

// PRODUTOS
function produtos(){
  app.innerHTML = `
    <div class="home">
      <button onclick="home()">Voltar</button>

      <div class="card">
        200 Dimas - R$14
        <button class="btn" onclick="comprar('200 Dimas',14)">Comprar</button>
      </div>

      <div class="card">
        620 Dimas - R$25
        <button class="btn" onclick="comprar('620 Dimas',25)">Comprar</button>
      </div>
    </div>
  `;
}

// COMPRAR
function comprar(nome,preco){
  alert("PIX: (98) 98485-3563\nLorrane Vitória Alves Vaz");
}

// MENU
function abrirMenu(){
  menu.classList.toggle("active");
}

// CONTA
function minhaConta(){
  app.innerHTML = `<h2>Conta: ${localStorage.getItem("user")}</h2>`;
}

// COMPRAS
function compras(){
  app.innerHTML = `<h2>Compras (em breve)</h2>`;
}

// CONTATO
function contato(){
  app.innerHTML = `<h2>Fale com a gerente</h2>`;
}

// ADMIN
function admin(){
  if(localStorage.getItem("user") !== ADMIN){
    alert("Acesso negado");
    return;
  }
  app.innerHTML = `<h2>PAINEL ADMIN 👑</h2>`;
}

// INIT
if(localStorage.getItem("user")){
  home();
}else{
  loginTela();
}

</script>

</body>
</html>
