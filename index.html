<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Vz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Poppins:wght@300;400;600;700&display=swap');

  :root{
    --preto:#000000;
    --rosa-neon:#ff00ff;
    --roxo-neon:#8b00ff;
    --rosa-glow:rgba(255,0,255,0.7);
    --roxo-glow:rgba(139,0,255,0.7);
    --card-bg:#0d0d0d;
    --texto:#ffffff;
    --cinza:#1a1a1a;
  }

  *{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}

  body{
    background:var(--preto);
    color:var(--texto);
    font-size:13px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(139,0,255,0.2) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(255,0,255,0.2) 0%, transparent 40%);
    min-height:100vh;
  }

.login-screen{
    position:fixed;
    inset:0;
    background:var(--preto);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
  }

.login-card{
    background:var(--card-bg);
    border:2px solid var(--rosa-neon);
    border-radius:15px;
    padding:35px 30px;
    width:90%;
    max-width:350px;
    box-shadow:0 0 40px var(--rosa-glow), inset 0 0 25px rgba(255,0,255,0.1);
  }

.login-card h3{
    font-family:'Orbitron',sans-serif;
    color:var(--rosa-neon);
    text-align:center;
    font-size:20px;
    margin-bottom:25px;
    text-shadow:0 0 15px var(--rosa-neon), 0 0 30px var(--rosa-neon);
    font-weight:900;
  }

.login-card input{
    width:100%;
    padding:13px;
    margin-bottom:14px;
    background:var(--preto);
    border:1px solid #333;
    color:var(--texto);
    border-radius:8px;
    font-size:13px;
  }

.login-card input:focus{
    outline:none;
    border-color:var(--rosa-neon);
    box-shadow:0 0 15px var(--rosa-glow);
  }

.btn-rosa{
    width:100%;
    background:linear-gradient(135deg,var(--rosa-neon),var(--roxo-neon));
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
    margin-bottom:12px;
    box-shadow:0 0 20px var(--rosa-glow);
    text-transform:uppercase;
    font-family:'Orbitron',sans-serif;
  }

.btn-google{
    width:100%;
    background:white;
    color:#000;
    border:none;
    padding:12px;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    font-size:13px;
    margin-bottom:12px;
  }

.link-text{
    text-align:center;
    color:var(--rosa-neon);
    cursor:pointer;
    font-size:12px;
    display:block;
    margin-top:10px;
  }

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:var(--card-bg);
    border-bottom:2px solid var(--roxo-neon);
    box-shadow:0 2px 25px var(--roxo-glow);
  }

.menu-btn{
    font-size:24px;
    background:none;
    border:none;
    color:var(--rosa-neon);
    cursor:pointer;
    text-shadow:0 0 15px var(--rosa-neon);
  }

.heart{
    color:var(--rosa-neon);
    font-size:26px;
    filter:drop-shadow(0 0 10px var(--rosa-neon));
  }

.user-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--cinza);
    padding:12px 20px;
    font-size:11px;
    border-bottom:1px solid var(--roxo-neon);
  }

.container{
    padding:20px;
    max-width:1400px;
    margin:auto;
  }

.top-info h2{
    font-family:'Orbitron',sans-serif;
    color:var(--rosa-neon);
    font-size:18px;
    margin-bottom:8px;
    text-shadow:0 0 15px var(--rosa-neon), 0 0 30px var(--rosa-neon);
    font-weight:700;
  }

.top-info p{
    font-size:12px;
    margin-bottom:4px;
    opacity:0.9;
  }

.saudacao{
    margin:25px 0;
    padding:18px;
    background:linear-gradient(135deg, var(--card-bg), #1a0a1a);
    border-left:4px solid var(--rosa-neon);
    border-radius:10px;
    box-shadow:0 0 25px rgba(255,0,255,0.3);
  }

.saudacao h3{
    font-size:15px;
    color:var(--rosa-neon);
    margin-bottom:5px;
    font-weight:700;
    text-shadow:0 0 10px var(--rosa-neon);
  }

.saudacao p{
    font-size:12px;
    opacity:.85;
  }

.btn-impulsionar{
    background:var(--cinza);
    color:#555;
    border:1px solid #333;
    padding:14px;
    width:100%;
    border-radius:10px;
    margin-bottom:30px;
    cursor:not-allowed;
    font-weight:600;
    font-size:13px;
    font-family:'Orbitron',sans-serif;
  }

.section-title{
    color:var(--texto);
    font-size:16px;
    margin-bottom:18px;
    font-weight:700;
    font-family:'Orbitron',sans-serif;
  }

.grid-categorias{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-bottom:35px;
  }

.cat-card{
    background:var(--card-bg);
    border:2px solid var(--roxo-neon);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(139,0,255,0.4);
  }

.cat-card:active{
    transform:scale(0.97);
  }

.cat-card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 35px var(--rosa-glow);
    border-color:var(--rosa-neon);
  }

.cat-card img{
    width:100%;
    height:110px;
    object-fit:cover;
    display:block;
    background:var(--preto);
  }

.cat-card h4{
    padding:12px 8px;
    font-size:10px;
    text-align:center;
    font-weight:700;
    text-transform:uppercase;
    background:linear-gradient(135deg, var(--roxo-neon), var(--rosa-neon));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-family:'Orbitron',sans-serif;
  }

.produtos-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:18px;
  }

.product-card{
    background:var(--card-bg);
    border:2px solid var(--roxo-neon);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(139,0,255,0.5);
  }

.product-header{
    padding:14px;
    border-bottom:1px solid var(--roxo-neon);
    background:linear-gradient(135deg, rgba(139,0,255,0.2), rgba(255,0,255,0.1));
  }

.product-header h4{
    font-size:13px;
    color:var(--texto);
    font-weight:700;
  }

.product-body{
    padding:16px;
  }

.price-select{
    width:100%;
    padding:10px;
    background:var(--preto);
    border:1px solid var(--rosa-neon);
    color:var(--texto);
    border-radius:8px;
    margin-bottom:12px;
    font-size:12px;
  }

.btn-comprar{
    width:100%;
    background:linear-gradient(135deg,var(--rosa-neon),var(--roxo-neon));
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    font-weight:900;
    cursor:pointer;
    font-size:13px;
    box-shadow:0 0 25px var(--rosa-glow);
    text-transform:uppercase;
    font-family:'Orbitron',sans-serif;
  }

.btn-favorito{
    width:100%;
    background:transparent;
    border:1px solid var(--rosa-neon);
    color:var(--rosa-neon);
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
    font-size:11px;
    font-weight:600;
  }

.hidden{display:none!important}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;align-items:center;justify-content:center}
.modal.active{display:flex}

.admin-bar{
    background:linear-gradient(135deg,var(--roxo-neon),var(--rosa-neon));
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    box-shadow:0 0 30px var(--roxo-glow);
    border-radius:10px;
  }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h3>⚡ PREMIUM VZ</h3>
    <div id="formLogin">
      <input type="text" id="loginEmail" placeholder="Email">
      <input type="password" id="loginSenha" placeholder="Senha">
      <button class="btn-rosa" onclick="fazerLogin()">Entrar</button>
      <button class="btn-google" onclick="loginGoogle()">Entrar com Google</button>
      <p class="link-text" onclick="mostrarCadastro()">Criar conta</p>
      <p class="link-text" onclick="abrirAdmin()">Acesso Admin</p>
    </div>
    <div id="formCadastro" class="hidden">
      <input type="text" id="cadNome" placeholder="Nome completo">
      <input type="text" id="cadEmail" placeholder="Email">
      <input type="password" id="cadSenha" placeholder="Senha">
      <button class="btn-rosa" onclick="cadastrar()">Criar Conta</button>
      <p class="link-text" onclick="mostrarLogin()">Voltar pro Login</p>
    </div>
  </div>
</div>

<div id="adminModal" class="modal">
  <div class="login-card">
    <h3>⚡ PAINEL ADMIN</h3>
    <input type="text" id="adminUser" placeholder="Usuário">
    <input type="password" id="adminPass" placeholder="Senha">
    <button class="btn-rosa" onclick="loginAdmin()">Entrar</button>
    <p class="link-text" onclick="fecharAdmin()">Voltar</p>
  </div>
</div>

<div id="app" class="hidden">
  <div class="user-bar">
    <span id="userLogado"></span>
    <span class="link-text" onclick="sair()">Sair</span>
  </div>

  <div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <span class="heart">♥</span>
  </div>

  <div class="container">
    <div class="top-info">
      <h2>Contatos do site</h2>
      <p>@chanelff__ | WhatsApp: 98984753563</p>
    </div>

    <div class="saudacao">
      <h3 id="saudacaoNome">Oie, cliente!</h3>
      <p>Seu painel está otimizado</p>
    </div>

    <button class="btn-impulsionar" disabled>Impulsionar</button>

    <div id="categoriasView">
      <h3 class="section-title">Categorias</h3>
      <div class="grid-categorias" id="gridCategorias"></div>
    </div>

    <div id="produtosView" class="hidden">
      <button onclick="voltarCategorias()" style="margin-bottom:18px;background:var(--cinza);border:1px solid var(--roxo
