<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonyx Store - Loja de Itens Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        font-family: 'Inter', sans-serif;
        background: #0a0a0f;
        color: #fff;
      }
      .loja {
        max-width: 1300px;
        margin: 0 auto;
        padding: 24px;
      }
      header {
        text-align: center;
        margin-bottom: 50px;
        padding: 40px 0;
        background: linear-gradient(180deg, #1a1a22 0%, #0a0a0f 100%);
        border-radius: 16px;
      }
      header h1 {
        font-size: 3rem;
        font-weight: 900;
        letter-spacing: -2px;
      }
      header h1 span {
        color: #00ff88;
      }
      header p {
        color: #888;
        margin: 12px 0 24px;
      }
      .tags {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .tags span {
        background: #1a1a22;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 0.85rem;
        border: 1px solid #2a2a35;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 24px;
      }
      .card {
        background: #13131a;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #2a2a35;
        transition: 0.3s;
        display: flex;
        flex-direction: column;
      }
      .card:hover {
        transform: translateY(-8px);
        border-color: #00ff88;
        box-shadow: 0 10px 30px #00ff8820;
      }
      .card.invertido {
        flex-direction: row-reverse;
      }
      .card.invertido .img-box {
        width: 45%;
      }
      .card.invertido .info {
        width: 55%;
      }
      .img-box {
        position: relative;
        height: 200px;
      }
      .card.invertido .img-box {
        height: auto;
      }
      .img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .jogo {
        position: absolute;
        top: 12px;
        left: 12px;
        font-size: 0.75rem;
        color: #00ff88;
        background: #0a0a0fcc;
        padding: 6px 12px;
        border-radius: 6px;
        font-weight: 700;
        backdrop-filter: blur(10px);
      }
      .info {
        padding: 20px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .info h3 {
        font-size: 1.3rem;
        margin-bottom: 8px;
      }
      .desc {
        color: #888;
        font-size: 0.9rem;
        flex: 1;
        margin-bottom: 16px;
      }
      .compra {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .preco {
        font-size: 1.6rem;
        font-weight: 900;
        color: #00ff88;
      }
      button {
        background: #00ff88;
        color: #0a0a0f;
        border: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover {
        background: #00e67a;
        transform: scale(1.05);
      }
      footer {
        text-align: center;
        margin-top: 60px;
        padding: 30px;
        color: #555;
        font-size: 0.8rem;
        border-top: 1px solid #1a1a22;
      }
      @media (max-width: 768px) {
        .card.invertido {
          flex-direction: column;
        }
        .card.invertido .img-box, .card.invertido .info {
          width: 100%;
        }
        .img-box {
          height: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React from 'https://esm.sh/react@18.2.0'
      import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client'

      function App() {
        return React.createElement('div', { className: 'loja' },
          React.createElement('header', null,

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App))

  </body>
</html>
