<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - Premium Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0f0f0f;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1a1a1a;border:1px solid #333;border-radius:16px;padding:32px;width:100%;max-width:400px}
h1{text-align:center;margin-bottom:24px;background:linear-gradient(135deg,#d4af37,#b8960f);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.input-box{background:#242424;border:1px solid #333;border-radius:12px;padding:12px 16px;margin-bottom:16px}
.input-box input{width:100%;background:transparent;border:none;outline:none;color:#fff;font-size:15px}
.btn{width:100%;background:linear-gradient(135deg,#d4af37,#b8960f);color:#000;border:none;padding:14px;border-radius:12px;font-weight:600;cursor:pointer;font-size:15px}
.btn:disabled{opacity:.5}
.error{color:#f44336;font-size:14px;margin-top:8px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>Premium Store</h1>
  <div class="input-box"><input type="email" id="email" placeholder="E-mail"></div>
  <div class="input-box"><input type="password" id="senha" placeholder="Senha"></div>
  <button type="button" class="btn" onclick="login()">ENTRAR</button>
  <div id="erro" class="error"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain:"premium-store-aa58b.firebaseapp.com",
  databaseURL:"https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId:"premium-store-aa58b",
  storageBucket:"premium-store-aa58b.appspot.com",
  messagingSenderId:"462239500057",
  appId:"1:462239500057:web:f1b7cea162ed308a866788"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
  if(user&&user.email==='vittoriahvahz@gmail.com'){
    window.location.href='admin.html';
  }
});

async function login(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=event.target;btn.disabled=true;btn.textContent='ENTRANDO...';
  document.getElementById('erro').textContent='';
  try{
    await auth.signInWithEmailAndPassword(email,senha);
  }catch(e){
    document.getElementById('erro').textContent=e.message;
    btn.disabled=false;
    btn.textContent='ENTRAR';
  }
}
</script>
</body>
</html>
