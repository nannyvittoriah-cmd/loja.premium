<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Store</title>
<style>
:root{--bg:#0A0A0F;--card:#1A1A24;--rosa:#FF2D75;--texto:#FFF;--texto2:#B4B4C0}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:var(--bg);color:var(--texto)}
.hidden{display:none!important}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--rosa)}
.header h1{font-size:20px}.header h1 span{color:var(--rosa)}
.header button{background:none;border:1px solid var(--rosa);color:var(--rosa);padding:6px 12px;border-radius:8px;cursor:pointer}
.hero{text-align:center;padding:40px 20px}
.hero h2{font-size:24px;margin-bottom:8px}.hero p{color:var(--texto2);margin-bottom:24px}
.btn-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--rosa);border:none;color:#fff;padding:12px 24px;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-outline{background:none;border:1px solid var(--rosa);color:var(--rosa);padding:12px 24px;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-whatsapp{background:#25D366;border:none;color:#fff;padding:12px 24px;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;margin-top:8px}
.container{padding:20px;max-width:600px;margin:0 auto}
.title{font-size:22px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.card{background:var(--card);border:1px solid var(--rosa);border-radius:12px;padding:16px;text-align:center;cursor:pointer}
.card img{width:60px;height:60px;margin-bottom:8px;border:2px solid var(--rosa);border-radius:8px;padding:4px;object-fit:cover}
.card h3{font-size:16px;margin-bottom:4px}.card p{color:var(--rosa);font-weight:bold}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:100}
.modal-content{background:var(--card);border:1px solid var(--rosa);padding:20px;border-radius:12px;width:90%;max-width:400px;position:relative}
.modal-content img{width:100%;border-radius:8px;margin-bottom:12px;max-height:200px;object-fit:cover}
.close{position:absolute;top:10px;right:15px;font-size:24px;cursor:pointer;color:var(--rosa)}
.screen{min-height:100vh}
.login-box{max-width:320px;margin:100px auto;background:var(--card);padding:24px;border:1px solid var(--rosa);border-radius:12px}
.login-box input,.admin-section input,.admin-section textarea,.admin-section select{width:100%;padding:10px;margin:8px 0;background:var(--bg);border:1px solid var(--rosa);border-radius:8px;color:#fff}
.admin-section{background:var(--card);border:1px solid var(--rosa);border-radius:12px;padding:16px;margin-bottom:20px}
.item-admin{display:flex;gap:8px;align-items:center;background:var(--bg);padding:8px;margin:6px 0;border-radius:6px}
.item-admin img{width:40px;height:40px;border-radius:6px;object-fit:cover;border:1px solid var(--rosa)}
.item-admin button{background:var(--rosa);border:none;color:#fff;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:auto}
.badge{display:inline-block;background:var(--card);border:1px solid var(--rosa);padding:4px 8px;border-radius:6px;font-size:12px;margin:4px}
</style>
</head>
<body>
<div id="app">
<!-- TELA INICIAL -->
<div id="login-screen" class="screen">
<header class="header">
<h1>PREMIUM <span>STORE</span></h1>
<button onclick="location.hash='#admin'">Admin</button>
</header>
<div class="hero">
<h2>Compras manualmente e com segurança</h2>
<p>100% seguro - sem precisar de nem um acesso</p>
<div class="btn-group">
<button class="btn-primary" onclick="entrarSite()" style="width:200px">ENTRAR</button>
</div>
<div style="margin-top:20px">
<span class="badge">✓ 100% seguro</span>
<span class="badge">✓ Envio instantâneo</span>
</div>
</div>
</div>

<!-- TELA CATEGORIAS -->
<div id="categorias-screen" class="screen hidden">
<header class="header">
<h1>PREMIUM <span>STORE</span></h1>
<div>
<button onclick="location.hash='#admin'">Admin</button>
<button onclick="sair()">Sair</button>
</div>
</header>
<div class="container">
<h2 class="title">Categorias</h2>
<div id="categorias-grid" class="grid"></div>
</div>
</div>

<!-- TELA PRODUTOS -->
<div id="produtos-screen" class="screen hidden">
<header class="header">
<button onclick="voltarCategorias()">← Voltar</button>
<h1 id="categoria-titulo"></h1>
</header>
<div class="container">
<div id="produtos-grid" class="grid"></div>
</div>
</div>

<!-- MODAL PRODUTO -->
<div id="modal" class="modal hidden">
<div class="modal-content">
<span class="close" onclick="fecharModal()">&times;</span>
<img id="modal-img" src="" alt="">
<h3 id="modal-nome"></h3>
<p id="modal-desc" style="color:var(--texto2);margin:8px 0"></p>
<h4 id="modal-preco" style="color:var(--rosa);font-size:20px;margin:12px 0"></h4>
<button class="btn-primary" onclick="pagarPix()" style="width:100%">Pagar via Pix</button>
<button class="btn-whatsapp" onclick="finalizarWhatsApp()">Finalizar no WhatsApp</button>
</div>
</div>

<!-- TELA ADMIN LOGIN -->
<div id="admin-login-screen" class="screen hidden">
<div class="login-box">
<h2 style="text-align:center;margin-bottom:16px">Login Admin</h2>
<input type="text" id="admin-user" placeholder="Usuário">
<input type="password" id="admin-pass" placeholder="Senha">
<button class="btn-primary" style="width:100%" onclick="loginAdmin()">Entrar</button>
<button class="btn-outline" style="width:100%;margin-top:8px" onclick="location.hash=''">Voltar ao site</button>
</div>
</div>

<!-- TELA PAINEL ADMIN -->
<div id="admin-panel-screen" class="screen hidden">
<header class="header">
<h1>PAINEL <span>ADMIN</span></h1>
<button onclick="logoutAdmin()">Sair</button>
</header>
<div class="container">
<div class="admin-section">
<h3>Categorias</h3>
<input type="text" id="nova-categoria" placeholder="Nome da categoria">
<input type="file" id="img-categoria" accept="image/*">
<button class="btn-primary" style="width:100%" onclick="addCategoria()">Adicionar Categoria</button>
<div id="lista-categorias" style="margin-top:12px"></div>
</div>
<div class="admin-section">
<h3>Produtos</h3>
<select id="select-categoria"></select>
<input type="text" id="nome-produto" placeholder="Nome do produto">
<input type="number" id="preco-produto" placeholder="Preço" step="0.01">
<textarea id="desc-produto" placeholder="Descrição do produto" rows="3"></textarea>
<input type="file" id="img-produto" accept="image/*">
<button class="btn-primary" style="width:100%" onclick="addProduto()">Adicionar Produto</button>
<div id="lista-produtos" style="margin-top:12px"></div>
</div>
</div>
</div>
</div>

<script>
// CONFIGURAÇÕES DA LORRANE
const CHAVE_PIX = "98984853563";
const WHATSAPP = "5598984853563";
const NOME_LOJA = "Premium Store";
const NOME_DONA = "Lorrane Vitória Alves Vaz";
const SENHA_ADMIN = "Lorrannyh.101225";

let dados = JSON.parse(localStorage.getItem('loja') || '{"categorias":[],"produtos":[]}');
let produtoAtual = null;

function salvar(){ localStorage.setItem('loja', JSON.stringify(dados)); }
function mostrar(tela){ document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); document.getElementById(tela).classList.remove('hidden'); }
function entrarSite(){ mostrar('categorias-screen'); renderCategorias(); }
function sair(){ mostrar('login-screen'); }
function voltarCategorias(){ mostrar('categorias-screen'); }

function renderCategorias(){
  const grid = document.getElementById('categorias-grid');
  grid.innerHTML = dados.categorias.map((c,i)=>`
    <div class="card" onclick="abrirCategoria(${i})">
      <img src="${c.img}" alt="${c.nome}">
      <h3>${c.nome}</h3>
      <p>${dados.produtos.filter(p=>p.categoria==i).length} itens</p>
    </div>
  `).join('');
}

function abrirCategoria(i){
  document.getElementById('categoria-titulo').textContent = dados.categorias[i].nome;
  const grid = document.getElementById('produtos-grid');
  grid.innerHTML = dados.produtos.filter(p=>p.categoria==i).map(p=>`
    <div class="card" onclick='abrirModal(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      <img src="${p.img}" alt="${p.nome}">
      <h3>${p.nome}</h3>
      <p>R$ ${p.preco.toFixed(2)}</p>
    </div>
  `).join('');
  mostrar('produtos-screen');
}

function abrirModal(p){
  produtoAtual = p;
  document.getElementById('modal-img').src = p.img;
  document.getElementById('modal-nome').textContent = p.nome;
  document.getElementById('modal-desc').textContent = p.desc;
  document.getElementById('modal-preco').textContent = `R$ ${p.preco.toFixed(2)}`;
  document.getElementById('modal').classList.remove('hidden');
}

function fecharModal(){ document.getElementById('modal').classList.add('hidden'); }

function pagarPix(){
  const texto = `Chave Pix: ${CHAVE_PIX}\nNome: ${NOME_DONA}\nValor: R$ ${produtoAtual.preco.toFixed(2)}\nProduto: ${produtoAtual.nome}\n\nEnvie o comprovante no WhatsApp após pagar!`;
  navigator.clipboard.writeText(CHAVE_PIX);
  alert(`PIX COPIADO!\n\n${texto}`);
}

function finalizarWhatsApp(){
  const msg = `Olá ${NOME_LOJA}! Quero comprar:\n\n*${produtoAtual.nome}*\nValor: R$ ${produtoAtual.preco.toFixed(2)}\n\nChave Pix: ${CHAVE_PIX}`;
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`,'_blank');
}

function loginAdmin(){
  const pass = document.getElementById('admin-pass').value;
  if(pass === SENHA_ADMIN){
    mostrar('admin-panel-screen');
    renderAdmin();
  } else {
    alert('Senha incorreta!');
  }
}

function logoutAdmin(){ mostrar('login-screen'); }

function renderAdmin(){
  document.getElementById('lista-categorias').innerHTML = dados.categorias.map((c,i)=>`
    <div class="item-admin"><img src="${c.img}"><span>${c.nome}</span> <button onclick="delCategoria(${i})">Excluir</button></div>
  `).join('');
  document.getElementById('select-categoria').innerHTML = dados.categorias.map((c,i)=>`<option value="${i}">${c.nome}</option>`).join('');
  document.getElementById('lista-produtos').innerHTML = dados.produtos.map((p,i)=>`
    <div class="item-admin"><img src="${p.img}"><span>${p.nome} - R$ ${p.preco}</span> <button onclick="delProduto(${i})">Excluir</button></div>
  `).join('');
}

function addCategoria(){
  const nome = document.getElementById('nova-categoria').value;
  const file = document.getElementById('img-categoria').files[0];
  if(!nome ||!file) return alert('Preenche nome e imagem');
  const reader = new FileReader();
  reader.onload = e => {
    dados.categorias.push({nome:nome, img:e.target.result});
    salvar(); renderAdmin();
    document.getElementById('nova-categoria').value='';
    document.getElementById('img-categoria').value='';
  };
  reader.readAsDataURL(file);
}

function delCategoria(i){
  dados.produtos = dados.produtos.filter(p=>p.categoria!=i);
  dados.categorias.splice(i,1);
  salvar(); renderAdmin();
}

function addProduto(){
  const file = document.getElementById('img-produto').files[0];
  if(!file) return alert('Coloca uma imagem');
  const reader = new FileReader();
  reader.onload = e => {
    dados.produtos.push({
      categoria: document.getElementById('select-categoria').value,
      nome: document.getElementById('nome-produto').value,
      preco: parseFloat(document.getElementById('preco-produto').value),
      desc: document.getElementById('desc-produto').value,
      img: e.target.result
    });
    salvar(); renderAdmin();
    document.getElementById('nome-produto').value='';
    document.getElementById('preco-produto').value='';
    document.getElementById('desc-produto').value='';
    document.getElementById('img-produto').value='';
  };
  reader.readAsDataURL(file);
}

function delProduto(i){ dados.produtos.splice(i,1); salvar(); renderAdmin(); }

// Router
window.addEventListener('hashchange', ()=>{
  if(location.hash=='#admin') mostrar('admin-login-screen');
  else mostrar('login-screen');
});

// Dados iniciais com imagem nas categorias
if(dados.categorias.length==0){
  dados.categorias = [
    {nome:'Free Fire', img:'https://i.imgur.com/3ZQZQZQ.png'},
    {nome:'Instagram', img:'https://i.imgur.com/3ZQZQZQ.png'},
    {nome:'TikTok', img:'https://i.imgur.com/3ZQZQZQ.png'}
  ];
  dados.produtos = [
    {categoria:0,nome:'500 Diamantes',preco:15.99,desc:'Entrega na hora',img:'https://i.imgur.com/3ZQZQZQ.png'},
    {categoria:1,nome:'1000 Seguidores',preco:9.99,desc:'Reais e brasileiros',img:'https://i.imgur.com/3ZQZQZQ.png'},
    {categoria:2,nome:'10000 Views',preco:4.99,desc:'Entrega rápida',img:'https://i.imgur.com/3ZQZQZQ.png'}
  ];
  salvar();
}
</script>
</body>
</html>
