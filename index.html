<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS STORE Vz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0c0c14;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

.auth-box{width:100%;max-width:360px;}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:48px;}
.logo-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,#a855f7,#6366f1);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
.logo-icon svg{width:24px;height:24px;color:#fff;}
.logo-text h2{font-size:18px;font-weight:700;letter-spacing:0.5px;}
.logo-text span{font-size:11px;color:#9ca3af;letter-spacing:2px;}

h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px;}
.subtitle{font-size:14px;color:#9ca3af;text-align:center;margin-bottom:36px;}

.input-group{position:relative;margin-bottom:16px;}
.input-group svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:#6b7280;}
.input-group input{
  width:100%;height:52px;background:#1a1a24;border:1px solid #2a2a35;
  border-radius:12px;padding:0 50px;color:#fff;font-size:15px;outline:none;
}
.input-group input:focus{border-color:#7c3aed;}
.input-group input::placeholder{color:#6b7280;}
.eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;color:#6b7280;}

.forgot{text-align:right;margin-bottom:24px;}
.forgot a{color:#7c3aed;font-size:13px;text-decoration:none;font-weight:500;}

.btn{
  width:100%;height:52px;background:#7c3aed;border:none;border-radius:12px;
  color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:0.2s;margin-bottom:16px;
}
.btn:active{transform:scale(0.98);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}

.toggle-text{text-align:center;color:#9ca3af;font-size:14px;}
.toggle-text a{color:#7c3aed;text-decoration:none;font-weight:600;}
.error{color:#ef4444;font-size:13px;margin-bottom:16px;text-align:center;}
.success{color:#22c55e;font-size:13px;margin-bottom:16px;text-align:center;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="auth-box">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7L12 12L22 7L12 2Z"/>
        <path d="M2 17L12 22L22 17"/>
        <path d="M2 12L12 17L22 12"/>
      </svg>
    </div>
    <div class="logo-text">
      <h2>NEXUS</h2>
      <span>STORE</span>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <h1>Bem-vindo de volta!</h1>
    <p class="subtitle">Faça login para continuar</p>

    <div id="loginError" class="error"></div>
    <div id="loginSuccess" class="success"></div>

    <div class="input-group">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 4h16c1.1 0 2 2 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>

    <div class="input-group">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="loginPassword" placeholder="Senha">
      <svg class="eye" onclick="togglePass('loginPassword', this)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>

    <div class="forgot">
      <a href="#" onclick="resetPassword()">Esqueci minha senha</a>
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Entrar</button>

    <p class="toggle-text">Não tem conta? <a href="#" onclick="showRegister()">Criar conta</a></p>
  </div>

  <!-- CADASTRO -->
  <div id="registerForm" class="hidden">
    <h1>Criar conta</h1>
    <p class="subtitle">Preencha seus dados para começar</p>

    <div id="registerError" class="error"></div>
    <div id="registerSuccess" class="success"></div>

    <div class="input-group">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 4h16c1.1 0 2 2 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <input type="email" id="registerEmail" placeholder="seu@email.com">
    </div>

    <div class="input-group">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="registerPassword" placeholder="Senha min. 6 caracteres">
      <svg class="eye" onclick="togglePass('registerPassword', this)" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>

    <div class="input-group">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="confirmPassword" placeholder="Confirmar senha">
    </div>

    <button class="btn" id="registerBtn" onclick="register()">Cadastrar</button>

    <p class="toggle-text">Já tem conta? <a href="#" onclick="showLogin()">Fazer login</a></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Trocar entre login e cadastro
window.showRegister = function(){
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('registerForm').classList.remove('hidden');
}

window.showLogin = function(){
  document.getElementById('registerForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
}

// Mostrar/ocultar senha
window.togglePass = function(id, el){
  let pass = document.getElementById(id);
  pass.type = pass.type === 'password'? 'text' : 'password';
}

// LOGIN
window.login = async function(){
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('loginError');

  errorMsg.innerText = '';

  if(!email ||!pass){
    errorMsg.innerText = 'Preenche email e senha';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Entrando...';

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = 'home.html';
  }catch(error){
    btn.disabled = false;
    btn.innerText = 'Entrar';
    if(error.code === 'auth/user-not-found'){
      errorMsg.innerText = 'Usuário não encontrado';
    }else if(error.code === 'auth/wrong-password'){
      errorMsg.innerText = 'Senha incorreta';
    }else{
      errorMsg.innerText = 'Erro ao fazer login';
    }
  }
}

// CADASTRO
window.register = async function(){
  const email = document.getElementById('registerEmail').value;
  const pass = document.getElementById('registerPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('registerBtn');
  const errorMsg = document.getElementById('registerError');
  const successMsg = document.getElementById('registerSuccess');

  errorMsg.innerText = '';
  successMsg.innerText = '';

  if(!email ||!pass){
    errorMsg.innerText = 'Preenche todos os campos';
    return;
  }
  if(pass !== confirm){
    errorMsg.innerText = 'As senhas não coincidem';
    return;
  }
  if(pass.length < 6){
    errorMsg.innerText = 'A senha deve ter no mínimo 6 caracteres';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Criando conta...';

  try{
    await createUserWithEmailAndPassword(auth, email, pass);
    successMsg.innerText = 'Conta criada com sucesso! Faça login agora.';
    setTimeout(() => showLogin(), 1500);
  }catch(error){
    btn.disabled = false;
    btn.innerText = 'Cadastrar';
    if(error.code === 'auth/email-already-in-use'){
      errorMsg.innerText = 'Este email já está em uso';
    }else if(error.code === 'auth/invalid-email'){
      errorMsg.innerText = 'Email inválido';
    }else{
      errorMsg.innerText = 'Erro ao criar conta';
    }
  }
}

// RESET SENHA
window.resetPassword = async function(){
  const email = document.getElementById('loginEmail').value;
  if(!email){
    document.getElementById('loginError').innerText = 'Digite seu email primeiro';
    return;
  }
  try{
    await sendPasswordResetEmail(auth, email);
    alert('Link de redefinição enviado pro seu email');
  }catch(error){
    document.getElementById('loginError').innerText = 'Erro ao enviar email';
  }
}
</script>
</body>
</html>
