<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja</title>

<style>
body {
  font-family: Arial;
  background: #0a0f2c;
  color: white;
  text-align: center;
}

.card {
  background: #11183f;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  background: #00c3ff;
  border: none;
}
</style>
</head>

<body>

<h1>🔥 MINHA LOJA</h1>

<div id="produtos"></div>

<h3>Carrinho</h3>
<div id="carrinho"></div>
<p>Total: R$ <span id="total">0</span></p>

<script>
let total = 0;

let produtos = [
  {nome:"Token FF", preco:10},
  {nome:"Conta FF", preco:50},
  {nome:"Skin Rara", preco:30}
];

let html = "";

produtos.forEach(p => {
  html += `
    <div class="card">
      <h3>${p.nome}</h3>
      <p>R$ ${p.preco}</p>
      <button onclick="comprar('${p.nome}', ${p.preco})">Comprar</button>
    </div>
  `;
});

document.getElementById("produtos").innerHTML = html;

function comprar(nome, preco){
  total += preco;
  document.getElementById("carrinho").innerHTML += `<p>${nome} - R$ ${preco}</p>`;
  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
