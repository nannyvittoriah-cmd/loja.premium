<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendas Premium</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin:0;
  font-family: Arial;
  background:#0a192f; /* AZUL ROYAL */
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:30px;
  color:gold;
  text-shadow:0 0 10px gold;
}

/* GRID 2 COLUNAS FORÇADO */
.container{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:#112240;
  border:2px solid gold;
  border-radius:15px;
  padding:12px;
  text-align:center;
  box-shadow:0 0 20px rgba(255,215,0,0.2);
  transition:.3s;
}
.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px gold;
}

.card img{
  width:100%;
  height:110px;
  border-radius:10px;
  object-fit:cover;
}

.card h2{
  color:gold;
  font-size:16px;
  margin:8px 0;
}

.estoque{
  color:#00ffcc;
  font-weight:bold;
  font-size:14px;
}

.desc{
  font-size:11px;
  color:#ccc;
  text-align:left;
  margin-top:8px;
  line-height:1.3;
}

/* BOTÕES COM BORDA DOURADA */
.botoes{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:10px 5px;
  border-radius:8px;
  font-weight:bold;
  text-decoration:none;
  text-align:center;
  cursor:pointer;
  font-size:13px;
  border: 2px solid gold; /* BORDA DOURADA */
  transition:.2s;
}

/* BOTÃO COMPRAR */
.comprar{
  background:linear-gradient(180deg, #ffd700, #b89600);
  color:#0a192f;
  box-shadow:0 4px #7a5d00;
}
.comprar:active{
  transform:translateY(2px);
  box-shadow:0 2px #7a5d00;
}

/* BOTÃO PIX COM BORDA DOURADA */
.pix{
  background:transparent;
  color:gold;
  border: 2px solid gold;
}
.pix:hover{
  background:rgba(255,215,0,0.1);
  box-shadow:0 0 15px rgba(255,215,0,0.4);
}

/* MODAL PIX */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#112240;
  border:2px solid gold;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

.modal-content input{
  width:90%;
  margin:5px;
  padding:8px;
  border-radius:5px;
  border:1px solid gold;
  background:#0a192f;
  color:white;
}

.modal-content button{
  background:linear-gradient(180deg, #ffd700, #b89600);
  color:#0a192f;
  border:2px solid gold;
  padding:10px 20px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

.pix-chave{
  color:gold;
  font-weight:bold;
  font-size:18px;
}

/* BOTÃO FLUTUANTE */
.whats{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  font-size:20px;
  border: 2px solid gold;
  box-shadow:0 0 15px rgba(255,215,0,0.5);
}
</style>
</head>

<body>

<header>🎮 Vendas Premium</header>

<div class="container" id="produtos"></div>

<!-- MODAL PIX -->
<div class="modal" id="pixModal">
  <div class="modal-content">
    <h3>Pagamento via Pix</h3>
    <p class="pix-chave">(98)984853563</p>

    <input type="text" id="nome" placeholder="Seu nome">
    <input type="text" id="comprovante" placeholder="Link do comprovante">

    <button onclick="enviarPix()">Enviar</button>
    <br><br>
    <button onclick="fechar()">Fechar</button>
  </div>
</div>

<script>
let produtoAtual="";
let precoAtual="";

function gerarProduto(nome, preco, imagem){
  return `
  <div class="card">
    <img src="${imagem}">
    <h2>${nome}</h2>

    <p><strong>Preço:</strong> ${preco}</p>
    <p class="estoque">Estoque: 12</p>

    <div class="desc">
    O usuário informado receberá o item na caixa de correio.<br><br>

    <strong>AVISO:</strong><br>
    1. Certifique-se de que a caixa está vazia<br>
    2. Apague mensagens da aba AVISO<br>
    3. Isso garante o recebimento correto<br>
    4. Entrega instantânea<br>
    5. Envie seu ID no WhatsApp
    </div>

    <div class="botoes">
      <a class="btn comprar" target="_blank"
      href="https://wa.me/5598984853563?text=Quero%20comprar%20${encodeURIComponent(nome)}%20(${preco})%0AID:%20">
      Comprar
      </a>

      <div class="btn pix" onclick="abrirPix('${nome}','${preco}')">
      Pix
      </div>
    </div>
  `;
}

function abrirPix(nome,preco){
  produtoAtual=nome;
  precoAtual=preco;
  document.getElementById("pixModal").style.display="flex";
}

function fechar(){
  document.getElementById("pixModal").style.display="none";
}

function enviarPix(){
  let nome=document.getElementById("nome").value;
  let comp=document.getElementById("comprovante").value;

  let msg=`Paguei via Pix\nProduto: ${produtoAtual}\nValor: ${precoAtual}\nNome: ${nome}\nComprovante: ${comp}`;

  window.open(`https://wa.me/5598984853563?text=${encodeURIComponent(msg)}`);
}
</script>

<script>
let produtos=[
["Passe Premium","R$10","https://i.imgur.com/Bud0zyu.png"],
["Tokens 25","R$15","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 50","R$20","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 100","R$25","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 200","R$45","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 300","R$70","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 400","R$90","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 500","R$120","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 600","R$140","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 700","R$150","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 800","R$172","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 900","R$182","https://i.imgur.com/OFmm8PI.jpeg"],
["Tokens 1000","R$200","https://i.imgur.com/OFmm8PI.jpeg"]
];

let html="";
produtos.forEach(p=>{
  html+=gerarProduto(p[0],p[1],p[2]);
});
document.getElementById("produtos").innerHTML=html;
</script>

<!-- BOTÃO FLUTUANTE -->
<a class="whats" target="_blank"
href="https://wa.me/5598984853563?text=Olá quero comprar">
💬
</a>

</body>
</html>
