<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Store VC</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
font-size:13px;
}

/* HEADER */
header{
text-align:center;
padding:12px;
border-bottom:1px solid #3b1b5c;
}

header h1{
margin:0;
font-size:18px;
color:#b18cff;
}

header img{
width:70px;
margin-top:8px;
border-radius:10px;
border:1px solid #3b1b5c;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
padding:20px;
gap:8px;
}

/* INPUTS */
input, select{
padding:10px;
background:#111;
border:1px solid #3b1b5c;
color:#fff;
border-radius:8px;
font-size:12px;
}

button{
padding:10px;
background:#b18cff;
border:none;
color:#000;
font-weight:bold;
border-radius:8px;
font-size:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:#111;
border:1px solid #3b1b5c;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:90px;
object-fit:cover;
}

.card .content{
padding:8px;
}

.small{
font-size:11px;
opacity:0.8;
}

.price{
font-weight:bold;
color:#b18cff;
margin-top:5px;
}

/* ADMIN */
#admin{
display:none;
padding:10px;
border-top:1px solid #3b1b5c;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-box{
background:#111;
margin:20% 10px;
padding:15px;
border-radius:10px;
border:1px solid #b18cff;
}
</style>
</head>

<body>

<header>
<h1>Prime Store VC</h1>
<img src="https://i.postimg.cc/PJ2Vcty8/e1befe8d-0630-444f-aea5-9b0a96d5f84b.jpg">
</header>

<!-- LOGIN -->
<div id="login">
<input id="email" placeholder="E-mail">
<input id="senha" type="password" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>

<!-- LOJA -->
<div id="loja" style="display:none">

<select id="cat" onchange="loadSub()"></select>
<select id="sub" onchange="render()"></select>

<div class="grid" id="grid"></div>

</div>

<!-- ADMIN -->
<div id="admin">

<h3 style="color:#b18cff">Painel Admin</h3>

<input id="catName" placeholder="Nova Categoria">
<button onclick="addCat()">Adicionar Categoria</button>

<input id="subName" placeholder="Nova Subcategoria">
<button onclick="addSub()">Adicionar Subcategoria</button>

<hr>

<input id="pname" placeholder="Nome produto">
<input id="pdesc" placeholder="Descrição curta">
<input id="pinfo" placeholder="Informações completas">
<input id="pprice" placeholder="Preço">
<input id="pstock" placeholder="Estoque">
<input type="file" id="pimg">

<button onclick="addProduct()">Adicionar Produto</button>

</div>

<!-- MODAL INFO -->
<div id="modal" onclick="closeModal()">
<div class="modal-box" onclick="event.stopPropagation()">
<div id="modalContent"></div>
<button onclick="closeModal()">Fechar</button>
</div>
</div>

<script>

let db = JSON.parse(localStorage.getItem("prime_vc")) || {
cats:{},
products:[]
};

/* LOGIN */
function entrar(){
let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

if(email==="nannyvittoriah@gmail.com" && senha==="Lorrannyh.101225"){
login.style.display="none";
loja.style.display="block";
admin.style.display="block";
loadCats();
}else{
alert("Acesso negado");
}
}

/* SAVE */
function save(){
localStorage.setItem("prime_vc",JSON.stringify(db));
}

/* CAT */
function addCat(){
db.cats[catName.value]=[];
save();
loadCats();
}

/* SUB */
function addSub(){
db.cats[cat.value].push(subName.value);
save();
loadCats();
}

/* LOAD */
function loadCats(){
cat.innerHTML = Object.keys(db.cats).map(c=>`<option>${c}</option>`).join("");
loadSub();
}

function loadSub(){
sub.innerHTML = (db.cats[cat.value]||[]).map(s=>`<option>${s}</option>`).join("");
render();
}

/* ADD PRODUCT */
function addProduct(){
let file = pimg.files[0];
let reader = new FileReader();

reader.onload = function(){
db.products.push({
id:Date.now(),
cat:cat.value,
sub:sub.value,
name:pname.value,
desc:pdesc.value,
info:pinfo.value,
price:pprice.value,
stock:pstock.value,
img:reader.result
});

save();
render();
};

reader.readAsDataURL(file);
}

/* RENDER */
function render(){
grid.innerHTML="";

db.products
.filter(p=>p.cat===cat.value && p.sub===sub.value)
.forEach(p=>{
grid.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="content">
<b>${p.name}</b>
<div class="small">${p.desc}</div>
<div class="price">R$ ${p.price}</div>
<div class="small">Estoque: ${p.stock}</div>
<button onclick="openInfo(${p.id})">Informações</button>
</div>
</div>
`;
});
}

/* MODAL INFO */
function openInfo(id){
let p = db.products.find(x=>x.id===id);

modalContent.innerHTML = `
<b>${p.name}</b><br><br>
<div class="small">${p.desc}</div><br>
<div>${p.info}</div><br>
<strong>Preço:</strong> R$ ${p.price}<br>
<strong>Estoque:</strong> ${p.stock}<br>
<strong>ID:</strong> ${p.id}<br><br>

<button onclick="buy('${p.name}','${p.price}')">Comprar no WhatsApp</button>
`;

modal.style.display="block";
}

function closeModal(){
modal.style.display="none";
}

/* BUY */
function buy(name,price){
let msg = `Quero comprar:\n${name}\nR$ ${price}`;
window.open("https://wa.me/5599999999999?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
