<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanel Store - Seguidores e Diamantes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0f0f0f; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Login */
        .auth-box { background: #1a1a1a; padding: 30px; border-radius: 12px; margin-top: 50px; }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: #00ff88; }
        .auth-box input { width: 100%; padding: 12px; margin: 8px 0; background: #2a2a2a; border: 1px solid #333; border-radius: 8px; color: #fff; }
        .auth-box button { width: 100%; padding: 12px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .auth-toggle { text-align: center; margin-top: 15px; color: #00ff88; cursor: pointer; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { color: #00ff88; font-size: 24px; }
        .sair { background: #ff3b3b; padding: 8px 15px; border-radius: 8px; border: none; color: #fff; cursor: pointer; }
        
        /* Categorias */
        .categorias { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .categoria-card { background: #1a1a1a; padding: 25px 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid #2a2a2a; }
        .categoria-card.ativa { border-color: #00ff88; }
        .categoria-card h3 { font-size: 16px; }
        
        /* Produtos */
        .produtos { display: grid; gap: 15px; }
        .produto-card { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #2a2a2a; }
        .produto-card h3 { margin-bottom: 8px; }
        .produto-card p { color: #00ff88; font-size: 20px; font-weight: bold; margin-bottom: 12px; }
        .produto-card button { width: 100%; padding: 12px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Admin */
        .admin-panel { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-top: 30px; }
        .admin-panel h3 { color: #00ff88; margin-bottom: 15px; }
        .admin-panel input, .admin-panel select { width: 100%; padding: 10px; margin: 5px 0 10px 0; background: #2a2a2a; border: 1px solid #333; border-radius: 8px; color: #fff; }
        .admin-panel button { padding: 10px 15px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        
        .voltar { background: #333; padding: 10px 15px; border-radius: 8px; border: none; color: #fff; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <!-- TELA LOGIN -->
        <div id="tela-login">
            <div class="auth-box">
                <h2 id="auth-titulo">Login</h2>
                <input type="text" id="auth-nome" placeholder="Nome completo" class="hidden">
                <input type="email" id="auth-email" placeholder="Email">
                <input type="password" id="auth-senha" placeholder="Senha">
                <button onclick="fazerAuth()">Entrar</button>
                <div class="auth-toggle" onclick="toggleAuth()">Não tem conta? Cadastre-se</div>
            </div>
        </div>

        <!-- TELA PRINCIPAL -->
        <div id="tela-dashboard" class="hidden">
            <div class="header">
                <h1>Chanel Store</h1>
                <button class="sair" onclick="sair()">Sair</button>
            </div>

            <div id="lista-categorias" class="categorias"></div>
            
            <div id="lista-produtos" class="hidden">
                <button class="voltar" onclick="voltarCategorias()">← Voltar</button>
                <div class="produtos" id="produtos-container"></div>
            </div>

            <!-- PAINEL ADMIN -->
            <div id="admin-panel" class="admin-panel hidden">
                <h3>Painel Admin</h3>
                <input type="text" id="nova-categoria" placeholder="Nome da nova categoria">
                <button onclick="criarCategoria()">Criar Categoria</button>
                <hr style="margin: 15px 0; border-color: #333;">
                <select id="select-categoria"></select>
                <input type="text" id="novo-produto-nome" placeholder="Nome do produto">
                <input type="number" id="novo-produto-preco" placeholder="Preço">
                <button onclick="criarProduto()">Criar Produto</button>
            </div>
        </div>
    </div>

    <script>
        let modoCadastro = false;
        let usuarioLogado = null;
        let categoriaAtual = null;
        const NUMERO_WHATSAPP = '5599999999999'; // TROCA PELO TEU NÚMERO

        // DADOS INICIAIS
        function iniciarDados() {
            if(!localStorage.getItem('chanel_categorias')) {
                const categoriasIniciais = [
                    { id: 1, nome: 'Free Fire' },
                    { id: 2, nome: 'Instagram' }
                ];
                const produtosIniciais = [
                    { id: 1, categoriaId: 2, nome: '100 seguidores', preco: 5 },
                    { id: 2, categoriaId: 2, nome: '200 seguidores', preco: 9 }
                ];
                localStorage.setItem('chanel_categorias', JSON.stringify(categoriasIniciais));
                localStorage.setItem('chanel_produtos', JSON.stringify(produtosIniciais));
            }
            if(!localStorage.getItem('chanel_usuarios')) {
                localStorage.setItem('chanel_usuarios', JSON.stringify([]));
            }
        }

        // LOGIN - CORRIGIDO O BUG
        function checarLogin() {
            try {
                const user = JSON.parse(localStorage.getItem('chanel_user_logado'));
                if(user && user.nome) {
                    usuarioLogado = user;
                    mostrarDashboard();
                }
            } catch(e) {
                console.log('Sem usuário logado');
                localStorage.removeItem('chanel_user_logado');
            }
        }

        function toggleAuth() {
            modoCadastro = !modoCadastro;
            document.getElementById('auth-titulo').innerText = modoCadastro ? 'Cadastro' : 'Login';
            document.getElementById('auth-nome').classList.toggle('hidden', !modoCadastro);
            document.querySelector('#tela-login button').innerText = modoCadastro ? 'Cadastrar' : 'Entrar';
            document.querySelector('.auth-toggle').innerText = modoCadastro ? 'Já tem conta? Fazer login' : 'Não tem conta? Cadastre-se';
        }

        function fazerAuth() {
            const nome = document.getElementById('auth-nome').value;
            const email = document.getElementById('auth-email').value;
            const senha = document.getElementById('auth-senha').value;
            
            let usuarios = JSON.parse(localStorage.getItem('chanel_usuarios'));
            
            if(modoCadastro) {
                if(usuarios.find(u => u.email === email)) {
                    alert('Email já cadastrado');
                    return;
                }
                const novoUser = { nome, email, senha, admin: email === 'admin@admin.com' };
                usuarios.push(novoUser);
                localStorage.setItem('chanel_usuarios', JSON.stringify(usuarios));
                localStorage.setItem('chanel_user_logado', JSON.stringify(novoUser));
                usuarioLogado = novoUser;
            } else {
                const user = usuarios.find(u => u.email === email && u.senha === senha);
                if(!user) {
                    alert('Email ou senha incorretos');
                    return;
                }
                localStorage.setItem('chanel_user_logado', JSON.stringify(user));
                usuarioLogado = user;
            }
            mostrarDashboard();
        }

        function sair() {
            localStorage.removeItem('chanel_user_logado');
            usuarioLogado = null;
            document.getElementById('tela-dashboard').classList.add('hidden');
            document.getElementById('tela-login').classList.remove('hidden');
        }

        // DASHBOARD
        function mostrarDashboard() {
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-dashboard').classList.remove('hidden');
            carregarCategorias();
            
            if(usuarioLogado.admin) {
                document.getElementById('admin-panel').classList.remove('hidden');
                carregarSelectCategorias();
            }
        }

        function carregarCategorias() {
            const categorias = JSON.parse(localStorage.getItem('chanel_categorias'));
            const container = document.getElementById('lista-categorias');
            container.innerHTML = '';
            categorias.forEach(cat => {
                container.innerHTML += `
                    <div class="categoria-card" onclick="abrirCategoria(${cat.id})">
                        <h3>${cat.nome}</h3>
                    </div>
                `;
            });
        }

        function abrirCategoria(id) {
            categoriaAtual = id;
            const produtos = JSON.parse(localStorage.getItem('chanel_produtos')).filter(p => p.categoriaId === id);
            const container = document.getElementById('produtos-container');
            
            document.getElementById('lista-categorias').classList.add('hidden');
            document.getElementById('lista-produtos').classList.remove('hidden');
            
            container.innerHTML = '';
            produtos.forEach(prod => {
                container.innerHTML += `
                    <div class="produto-card">
                        <h3>${prod.nome}</h3>
                        <p>R$ ${prod.preco.toFixed(2)}</p>
                        <button onclick="comprar(${prod.id})">COMPRAR ${prod.nome}</button>
                    </div>
                `;
            });
        }

        function voltarCategorias() {
            document.getElementById('lista-produtos').classList.add('hidden');
            document.getElementById('lista-categorias').classList.remove('hidden');
        }

        function comprar(produtoId) {
            const produtos = JSON.parse(localStorage.getItem('chanel_produtos'));
            const produto = produtos.find(p => p.id === produtoId);
            const msg = `Olá! Quero comprar: ${produto.nome} - R$ ${produto.preco.toFixed(2)}`;
            window.open(`https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // ADMIN
        function carregarSelectCategorias() {
            const categorias = JSON.parse(localStorage.getItem('chanel_categorias'));
            const select = document.getElementById('select-categoria');
            select.innerHTML = '';
            categorias.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.nome}</option>`;
            });
        }

        function criarCategoria() {
            const nome = document.getElementById('nova-categoria').value;
            if(!nome) return;
            let categorias = JSON.parse(localStorage.getItem('chanel_categorias'));
            const novoId = categorias.length ? Math.max(...categorias.map(c => c.id)) + 1 : 1;
            categorias.push({ id: novoId, nome });
            localStorage.setItem('chanel_categorias', JSON.stringify(categorias));
            document.getElementById('nova-categoria').value = '';
            carregarCategorias();
            carregarSelectCategorias();
        }

        function criarProduto() {
            const categoriaId = parseInt(document.getElementById('select-categoria').value);
            const nome = document.getElementById('novo-produto-nome').value;
            const preco = parseFloat(document.getElementById('novo-produto-preco').value);
            if(!nome || !preco) return;
            
            let produtos = JSON.parse(localStorage.getItem('chanel_produtos'));
            const novoId = produtos.length ? Math.max(...produtos.map(p => p.id)) + 1 : 1;
            produtos.push({ id: novoId, categoriaId, nome, preco });
            localStorage.setItem('chanel_produtos', JSON.stringify(produtos));
            
            document.getElementById('novo-produto-nome').value = '';
            document.getElementById('novo-produto-preco').value = '';
            alert('Produto criado!');
        }

        // INICIAR
        iniciarDados();
        checarLogin();
    </script>
</body>
</html>
