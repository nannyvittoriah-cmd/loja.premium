<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Admin - Prime Game Vz</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getDatabase, ref, set, onValue, push, remove, update, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
    authDomain: "premium-store-aa58b.firebaseapp.com",
    databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
    projectId: "premium-store-aa58b",
    storageBucket: "premium-store-aa58b.firebasestorage.app",
    messagingSenderId: "462239500057",
    appId: "1:462239500057:web:f1b7cea162ed308a866788"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  window.fb = { auth, db, onAuthStateChanged, signOut, ref, set, onValue, push, remove, update, serverTimestamp };
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#000000;
  --roxo-escuro:#4C1D95;
  --roxo-medio:#5B21B6;
  --roxo:#6D28D9;
  --roxo-glass:rgba(76,29,149,.25);
  --branco:#FFFFFF;
  --cinza:#9CA3AF;
  --card:rgba(15,15,20,.8);
  --borda:rgba(76,29,149,.4);
  --verde:#10B981;
  --vermelho:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--branco);
  font-size:11px;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  top:-20%;
  right:-10%;
  width:450px;
  height:450px;
  background:radial-gradient(circle,var(--roxo-escuro) 0%,transparent 70%);
  opacity:.35;
  z-index:-1;
  pointer-events:none;
  filter:blur(90px);
}
.container{padding:14px 10px;max-width:600px;margin:0 auto;position:relative;z-index:10}
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}
.logo{
  font-size:14px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:5px;
}
.logo i{width:16px;height:16px;stroke:var(--branco);fill:var(--branco)}
.btn-sair{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--roxo-glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--borda);
  border-radius:8px;
  padding:6px 10px;
  font-size:8px;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-sair i{width:12px;height:12px}
.card{
  background:var(--card);
  backdrop-filter:blur(30px);
  border:1.5px solid var(--borda);
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 8px 32px rgba(76,29,149,.3);
}
.card-tit{
  font-size:11px;
  font-weight:800;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:6px;
}
.card-tit i{width:14px;height:14px}
.input{
  background:rgba(0,0,0,.5);
  border:1px solid var(--borda);
  border-radius:8px;
  padding:10px;
  font-size:16px;
  color:var(--branco);
  width:100%;
  outline:none;
  margin-bottom:10px;
}
.input:focus{border-color:var(--roxo-medio);box-shadow:0 0 20px rgba(76,29,149,.5)}
textarea.input{resize:vertical;min-height:80px;font-size:8px}
.btn{
  width:100%;
  background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));
  color:var(--branco);
  border:1px solid var(--borda);
  border-radius:10px;
  padding:12px;
  font-weight:700;
  font-size:9px;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2), 0 4px 30px rgba(76,29,149,.6);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.btn:active{transform:scale(.96)}
.btn-verde{background:linear-gradient(135deg,var(--verde),#059669);box-shadow:inset 0 1px 0 rgba(255,255,255,.2), 0 4px 25px rgba(16,185,129,.4)}
.btn-vermelho{background:linear-gradient(135deg,var(--vermelho),#DC2626);box-shadow:inset 0 1px 0 rgba(255,255,255,.2), 0 4px 25px rgba(239,68,68,.4)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.label{font-size:7px;color:var(--cinza);margin-bottom:4px;display:block}
.lista-item{
  background:rgba(0,0,0,.5);
  border:1px solid var(--borda);
  border-radius:8px;
  padding:10px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.lista-info{flex:1}
.lista-nome{font-size:9px;font-weight:700;margin-bottom:2px}
.lista-desc{font-size:7px;color:var(--cinza)}
.lista-acoes{display:flex;gap:6px}
.btn-icon{
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-icon i{width:14px;height:14px;fill:var(--branco)}
.stats-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:12px;
}
.stat-card{
  background:var(--roxo-glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--borda);
  border-radius:10px;
  padding:12px;
  text-align:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
}
.stat-valor{
  font-size:18px;
  font-weight:900;
  color:var(--branco);
  margin-bottom:2px;
}
.stat-label{font-size:7px;color:var(--cinza)}
select.input{cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="header">
  <div class="btn-sair" onclick="sair()"><i data-lucide="log-out"></i> Sair</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-valor" id="totalUsuarios">0</div>
      <div class="stat-label">Usuários</div>
    </div>
    <div class="stat-card">
      <div class="stat-valor" id="totalProdutos">0</div>
      <div class="stat-label">Produtos</div>
    </div>
    <div class="stat-card">
      <div class="stat-valor" id="totalVendas">0</div>
      <div class="stat-label">Vendas</div>
    </div>
    <div class="stat-card">
      <div class="stat-valor" id="totalFaturamento">R$ 0</div>
      <div class="stat-label">Faturamento</div>
    </div>
  </div>

  <div class="card">
    <div class="card-tit"><i data-lucide="package-plus"></i> Cadastrar Produto</div>
    <label class="label">Nome do Produto</label>
    <input type="text" class="input" id="prodNome" placeholder="Ex: YOUTUBE PREMIUM 30 DIAS">

    <label class="label">Categoria</label>
    <select class="input" id="prodCat">
      <option value="">Selecione</option>
      <option value="premium">Assinaturas e Premium</option>
      <option value="freefire">Free Fire</option>
      <option value="roblox">Roblox</option>
      <option value="valorant">Valorant</option>
      <option value="minecraft">Minecraft</option>
      <option value="lol">League of Legends</option>
      <option value="servicos">Serviços</option>
    </select>

    <div class="grid-3">
      <div>
        <label class="label">Preço R$</label>
        <input type="number" class="input" id="prodPreco" placeholder="4.20" step="0.01">
      </div>
      <div>
        <label class="label">Preço Antigo R$</label>
        <input type="number" class="input" id="prodPrecoAntigo" placeholder="9.99" step="0.01">
      </div>
      <div>
        <label class="label">Ícone Lucide</label>
        <input type="text" class="input" id="prodIcone" placeholder="youtube">
      </div>
    </div>

    <div class="grid-2">
      <div>
        <label class="label">Badge</label>
        <select class="input" id="prodBadge">
          <option value="">Nenhum</option>
          <option value="NOVO">NOVO</option>
          <option value="PROMO">PROMO</option>
          <option value="ESGOTADO">ESGOTADO</option>
        </select>
      </div>
      <div>
        <label class="label">URL da Imagem</label>
        <input type="text" class="input" id="prodImagem" placeholder="https://...">
      </div>
    </div>

    <label class="label">Descrição</label>
    <textarea class="input" id="prodDesc" placeholder="Descrição completa do produto..."></textarea>

    <button class="btn" onclick="addProduto()"><i data-lucide="plus"></i> ADICIONAR PRODUTO</button>
  </div>

  <div class="card">
    <div class="card-tit"><i data-lucide="package"></i> Produtos Cadastrados</div>
    <div id="listaProdutos"></div>
  </div>
</div>

<script>
window.addEventListener('load',()=>{
  const { auth, onAuthStateChanged } = window.fb;
  onAuthStateChanged(auth, (user) => {
    if(!user){
      window.location.href = 'index.html';
      return;
    }
    carregarDados();
    lucide.createIcons();
  });
});

function carregarDados(){
  const { db, ref, onValue } = window.fb;

  onValue(ref(db, 'produtos'), (snap) => {
    const prods = snap.val() || {};
    const lista = document.getElementById('listaProdutos');
    const total = Object.keys(prods).length;
    document.getElementById('totalProdutos').textContent = total;

    if(total === 0){
      lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--cinza);font-size:8px">Nenhum produto cadastrado</div>';
      return;
    }

    lista.innerHTML = '';
    Object.entries(prods).forEach(([id, prod]) => {
      lista.innerHTML += `
        <div class="lista-item">
          <div class="lista-info">
            <div class="lista-nome">${prod.nome}</div>
            <div class="lista-desc">${prod.categoria.toUpperCase()} - R$ ${prod.preco.toFixed(2)} - ${prod.badge || 'Sem badge'}</div>
          </div>
          <div class="lista-acoes">
            <button class="btn-icon btn-vermelho" onclick="delProduto('${id}')"><i data-lucide="trash-2"></i></button>
          </div>
        </div>
      `;
    });
    lucide.createIcons();
  });

  onValue(ref(db, 'usuarios'), (snap) => {
    const users = snap.val() || {};
    document.getElementById('totalUsuarios').textContent = Object.keys(users).length;
  });
}

async function addProduto(){
  const { db, ref, push } = window.fb;
  const nome = document.getElementById('prodNome').value.trim();
  const categoria = document.getElementById('prodCat').value;
  const preco = parseFloat(document.getElementById('prodPreco').value);
  const precoAntigo = parseFloat(document.getElementById('prodPrecoAntigo').value) || null;
  const icone = document.getElementById('prodIcone').value.trim() || 'package';
  const badge = document.getElementById('prodBadge').value || null;
  const imagem = document.getElementById('prodImagem').value.trim() || null;
  const descricao = document.getElementById('prodDesc').value.trim();

  if(!nome || !categoria || !preco){
    alert('Preencha Nome, Categoria e Preço');
    return;
  }

  await push(ref(db, 'produtos'), {
    nome,
    categoria,
    preco,
    precoAntigo,
    icone,
    badge,
    imagem,
    descricao,
    views: 0,
    vendas: 0
  });

  document.getElementById('prodNome').value = '';
  document.getElementById('prodCat').value = '';
  document.getElementById('prodPreco').value = '';
  document.getElementById('prodPrecoAntigo').value = '';
  document.getElementById('prodIcone').value = '';
  document.getElementById('prodBadge').value = '';
  document.getElementById('prodImagem').value = '';
  document.getElementById('prodDesc').value = '';

  alert('Produto adicionado com sucesso!');
}

async function delProduto(id){
  if(!confirm('Deletar produto?')) return;
  const { db, ref, remove } = window.fb;
  await remove(ref(db, `produtos/${id}`));
  alert('Produto deletado!');
}

async function sair(){
  const { auth, signOut } = window.fb;
  if(confirm('Sair do admin?')){
    await signOut(auth);
    window.location.href = 'index.html';
  }
}

lucide.createIcons();
</script>
</body>
</html>
