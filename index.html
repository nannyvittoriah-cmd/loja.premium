<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Builder Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
height:100vh;
display:flex;
overflow:hidden;
color:white;
}

/* MENU */

.menu{
width:370px;
background:#0d0d0d;
border-right:1px solid #1d1d1d;
padding:14px;
overflow:auto;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
color:#4da3ff;
}

.box{
background:#111;
border:1px solid #1f1f1f;
padding:14px;
border-radius:18px;
margin-bottom:15px;
}

.label{
font-size:12px;
color:#888;
margin-bottom:8px;
}

input,
select,
textarea{
width:100%;
padding:12px;
border-radius:14px;
border:none;
outline:none;
background:#1a1a1a;
color:white;
font-size:13px;
margin-top:8px;
}

textarea{
height:80px;
resize:none;
}

input[type="color"]{
padding:4px;
height:50px;
}

button{
width:100%;
height:50px;
border:none;
border-radius:14px;
background:#4da3ff;
color:white;
font-weight:bold;
margin-top:10px;
font-size:14px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* LISTA */

.lista{
display:flex;
flex-direction:column;
gap:12px;
margin-top:10px;
}

.item{
background:#181818;
border-radius:16px;
padding:12px;
border:1px solid #242424;
}

.item img{
width:100%;
border-radius:14px;
margin-top:10px;
}

/* PREVIEW */

.previewArea{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:auto;
background:#050505;
}

.phone{
width:390px;
height:800px;
background:white;
border-radius:42px;
overflow:hidden;
border:10px solid #111;
position:relative;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.notch{
width:150px;
height:28px;
background:#111;
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
border-radius:0 0 20px 20px;
z-index:10;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modalBox{
width:100%;
max-width:900px;
height:90%;
background:#111;
border-radius:22px;
padding:18px;
display:flex;
flex-direction:column;
}

.codigo{
flex:1;
margin-top:15px;
background:#050505;
border:none;
outline:none;
padding:14px;
border-radius:14px;
color:#66ff99;
font-size:12px;
font-family:monospace;
}

/* MOBILE */

@media(max-width:900px){

body{
flex-direction:column;
height:auto;
overflow:auto;
}

.menu{
width:100%;
border-right:none;
border-bottom:1px solid #1d1d1d;
}

.previewArea{
padding:14px;
}

.phone{
width:100%;
max-width:390px;
height:700px;
}

}

</style>

</head>

<body>

<!-- MENU -->

<div class="menu">

<div class="logo">
Builder Studio
</div>

<div class="box">

<div class="label">
TIPO DE ELEMENTO
</div>

<select id="tipo">

<option value="titulo">
Título
</option>

<option value="texto">
Texto
</option>

<option value="botao">
Botão
</option>

<option value="imagem">
Imagem
</option>

<option value="card">
Card
</option>

</select>

<input
type="text"
id="texto"
placeholder="Digite aqui..."
oninput="previewTempoReal()"
>

<input
type="color"
id="cor"
value="#4da3ff"
oninput="previewTempoReal()"
>

<input
type="number"
id="tamanho"
placeholder="Tamanho da fonte"
value="18"
oninput="previewTempoReal()"
>

<input
type="file"
id="imagem"
accept="image/*"
onchange="previewTempoReal()"
>

<button onclick="adicionarElemento()">
ADICIONAR ELEMENTO
</button>

</div>

<div class="box">

<div class="label">
ESTRUTURA DO SITE
</div>

<div class="lista" id="lista"></div>

<button onclick="gerarCodigo()">
GERAR CÓDIGO
</button>

</div>

</div>

<!-- PREVIEW -->

<div class="previewArea">

<div class="phone">

<div class="notch"></div>

<iframe id="preview"></iframe>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modalBox">

<button onclick="fecharCodigo()">
FECHAR
</button>

<textarea class="codigo" id="codigo"></textarea>

</div>

</div>

<script>

let elementos = [];

function adicionarElemento(){

const tipo = document.getElementById("tipo").value;

const texto = document.getElementById("texto").value;

const cor = document.getElementById("cor").value;

const tamanho = document.getElementById("tamanho").value;

const imagemInput = document.getElementById("imagem");

if(tipo === "imagem"){

const file = imagemInput.files[0];

if(!file){
alert("Selecione uma imagem");
return;
}

const reader = new FileReader();

reader.onload = function(e){

elementos.push({
tipo,
texto,
cor,
tamanho,
imagem:e.target.result
});

renderLista();

atualizarPreview();

}

reader.readAsDataURL(file);

}else{

elementos.push({
tipo,
texto,
cor,
tamanho
});

renderLista();

atualizarPreview();

}

}

function renderLista(){

const lista = document.getElementById("lista");

lista.innerHTML = "";

elementos.forEach((item,index)=>{

const div = document.createElement("div");

div.className = "item";

div.innerHTML = `

<b style="color:#4da3ff;">
${item.tipo.toUpperCase()}
</b>

<p style="
margin-top:8px;
font-size:${item.tamanho}px;
color:${item.cor};
">
${item.texto}
</p>

${item.imagem ? `<img src="${item.imagem}">` : ""}

<button onclick="remover(${index})">
REMOVER
</button>

`;

lista.appendChild(div);

});

}

function remover(index){

elementos.splice(index,1);

renderLista();

atualizarPreview();

}

function gerarHTML(){

let estrutura = "";

elementos.forEach(item=>{

if(item.tipo === "titulo"){

estrutura += `

<h1 style="
font-size:${item.tamanho}px;
color:${item.cor};
margin-bottom:16px;
">
${item.texto}
</h1>

`;

}

if(item.tipo === "texto"){

estrutura += `

<p style="
font-size:${item.tamanho}px;
color:${item.cor};
margin-bottom:16px;
line-height:1.5;
">
${item.texto}
</p>

`;

}

if(item.tipo === "botao"){

estrutura += `

<button style="
width:100%;
height:52px;
background:${item.cor};
border:none;
border-radius:16px;
color:white;
font-size:${item.tamanho}px;
margin-bottom:16px;
">
${item.texto}
</button>

`;

}

if(item.tipo === "imagem"){

estrutura += `

<img 
src="${item.imagem}"
style="
width:100%;
border-radius:18px;
margin-bottom:16px;
"
>

`;

}

if(item.tipo === "card"){

estrutura += `

<div style="
padding:18px;
border-radius:18px;
background:${item.cor};
margin-bottom:16px;
color:white;
">

<h2 style="
font-size:${item.tamanho}px;
">
${item.texto}
</h2>

</div>

`;

}

});

return `

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
padding:14px;
background:white;
}

</style>

</head>

<body>

${estrutura}

</body>

</html>

`;

}

function atualizarPreview(){

const html = gerarHTML();

document.getElementById("preview").srcdoc = html;

}

function gerarCodigo(){

const html = gerarHTML();

document.getElementById("codigo").value = html;

document.getElementById("modal").style.display = "flex";

}

function fecharCodigo(){

document.getElementById("modal").style.display = "none";

}

function previewTempoReal(){

atualizarPreview();

}

</script>

</body>
</html>
