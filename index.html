<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#fff;padding-bottom:70px}
.tela{display:none;min-height:100vh}
.tela.ativa{display:block}
.header{background:#0a0a0a;border-bottom:1px solid #2a2a2a;padding:10px 12px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
.menu-btn{width:36px;height:36px;background:#141414;border:1px solid #2a2a2a;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.logo-top{display:flex;align-items:center;justify-content:center;flex:1}
.logo-top img{height:32px;object-fit:contain}
.search{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;color:#fff;font-size:13px;outline:none}
.secao{padding:12px}
.titulo{font-size:14px;font-weight:700;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:12px;text-align:center;cursor:pointer}
.card:active{transform:scale(.97)}
.card-img{width:100%;aspect-ratio:1;background:#1e1e1e;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-nome{font-size:11px;font-weight:600;line-height:1.2;margin-bottom:4px}
.card-preco{font-size:12px;font-weight:700;color:#8b5cf6}
.nav{position:fixed;bottom:0;left:0;right:0;background:#141414;border-top:1px solid #2a2a2a;display:grid;grid-template-columns:repeat(2,1fr);padding:6px 0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;cursor:pointer;color:#888;font-size:9px;font-weight:600}
.nav-item.ativo{color:#8b5cf6}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:#141414;border-right:1px solid #2a2a2a;z-index:200;transition:left.3s;padding:16px}
.sidebar.ativo{left:0}
.sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:199;display:none}
.sidebar-overlay.ativo{display:block}
.sidebar-item{padding:10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:#888;margin-bottom:6px}
.sidebar-item:hover{background:#1e1e1e;color:#fff}
.btn-voltar{width:36px;height:36px;background:#141414;border:1px solid #2a2a2a;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.input{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;color:#fff;font-size:13px;outline:none;margin-bottom:10px}
.btn{width:100%;background:#8b5cf6;color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:8px}
.btn-red{background:#ef4444}
.lista-item{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.lista-img{width:50px;height:50px;background:#1e1e1e;border-radius:8px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lista-img img{width:100%;height:100%;object-fit:cover}
.lista-info{flex:1}
.lista-nome{font-size:13px;font-weight:700;margin-bottom:2px}
.lista-desc{font-size:11px;color:#888}
.breadcrumb{font-size:11px;color:#888;margin-bottom:10px}
.breadcrumb span{color:#8b5cf6;cursor:pointer}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal.ativo{display:flex}
.modal-box{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.upload{width:100%;aspect-ratio:1;background:#1e1e1e;border:2px dashed #2a2a2a;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;cursor:pointer;overflow:hidden}
.upload img{width:100%;height:100%;object-fit:cover}
.empty{text-align:center;padding:40px 20px;color:#888;font-size:12px}
.add{position:fixed;bottom:80px;right:16px;width:50px;height:50px;background:#8b5cf6;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(139,92,246,.4);z-index:90;font-size:24px;font-weight:700}
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="fecharMenu()"></div>
<div class="sidebar" id="sidebar">
  <div style="font-size:15px;font-weight:800;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #2a2a2a">PREMIUM <span style="color:#8b5cf6">STORE</span></div>
  <div class="sidebar-item" onclick="ir('home');fecharMenu()">Início</div>
  <div class="sidebar-item" onclick="abrirAdmin();fecharMenu()">Admin</div>
</div>

<div id="home" class="tela ativa">
  <div class="header">
    <div class="header-top">
      <div class="menu-btn" onclick="abrirMenu()">☰</div>
      <div class="logo-top">
        <img src="https://i.postimg.cc/Qd8mVjvG/logo.png" alt="Premium Store">
      </div>
      <div style="width:36px"></div>
    </div>
    <input type="text" class="search" placeholder="Buscar produtos..." id="busca" oninput="buscar()">
  </div>
  <div class="secao">
    <div class="titulo">CATEGORIAS</div>
    <div class="grid" id="gridCat"></div>
  </div>
  <div class="secao">
    <div class="titulo">DESTAQUES</div>
    <div class="grid" id="gridProd"></div>
  </div>
</div>

<div id="admin" class="tela">
  <div class="header">
    <div class="header-top">
      <div class="btn-voltar" onclick="voltar()">←</div>
      <div class="logo-top"><img src="https://i.postimg.cc/Qd8mVjvG/logo.png" style="height:28px"></div>
      <div style="width:36px"></div>
    </div>
  </div>
  <div class="secao" id="adminBody"></div>
</div>

<div id="categorias" class="tela">
  <div class="header">
    <div class="header-top">
      <div class="btn-voltar" onclick="voltar()">←</div>
      <div class="logo-top"><img src="https://i.postimg.cc/Qd8mVjvG/logo.png" style="height:28px"></div>
      <div style="width:36px"></div>
    </div>
  </div>
  <div class="secao"><div id="listaCat"></div></div>
</div>

<div id="subcategorias" class="tela">
  <div class="header">
    <div class="header-top">
      <div class="btn-voltar" onclick="voltar()">←</div>
      <div class="logo-top"><img src="https://i.postimg.cc/Qd8mVjvG/logo.png" style="height:28px"></div>
      <div style="width:36px"></div>
    </div>
  </div>
  <div class="secao">
    <div class="breadcrumb" id="bcSub"></div>
    <div id="listaSub"></div>
  </div>
</div>

<div id="produtos" class="tela">
  <div class="header">
    <div class="header-top">
      <div class="btn-voltar" onclick="voltar()">←</div>
      <div class="logo-top"><img src="https://i.postimg.cc/Qd8mVjvG/logo.png" style="height:28px"></div>
      <div style="width:36px"></div>
    </div>
  </div>
  <div class="secao">
    <div class="breadcrumb" id="bcProd"></div>
    <div id="listaProd"></div>
  </div>
</div>

<div class="nav">
  <div class="nav-item ativo" onclick="ir('home')">Home</div>
  <div class="nav-item" onclick="ir('categorias')">Categorias</div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div style="font-size:16px;font-weight:800;margin-bottom:16px" id="modalTit"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let telaAnt='home',logado=false,filtroCat=null,filtroSub=null;
const EMAIL='nannyvittoriah@gmail.com',SENHA='Lorrannyh.101225';
let db={cat:JSON.parse(localStorage.getItem('cat')||'[]'),sub:JSON.parse(localStorage.getItem('sub')||'[]'),prod:JSON.parse(localStorage.getItem('prod')||'[]')};
function save(){localStorage.setItem('cat',JSON.stringify(db.cat));localStorage.setItem('sub',JSON.stringify(db.sub));localStorage.setItem('prod',JSON.stringify(db.prod))}
function abrirMenu(){document.getElementById('sidebar').classList.add('ativo');document.getElementById('overlay').classList.add('ativo')}
function fecharMenu(){document.getElementById('sidebar').classList.remove('ativo');document.getElementById('overlay').classList.remove('ativo')}
function ir(t){telaAnt=document.querySelector('.tela.ativa')?.id||'home';document.querySelectorAll('.tela').forEach(e=>e.classList.remove('ativa'));document.getElementById(t).classList.add('ativa');document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('ativo'));if(t==='home')document.querySelectorAll('.nav-item')[0].classList.add('ativo')}
function voltar(){ir(telaAnt)}
function abrirAdmin(){if(!logado){document.getElementById('adminBody').innerHTML=`<input type="email" class="input" id="e" placeholder="E-mail"><input type="password" class="input" id="s" placeholder="Senha"><button class="btn" onclick="login()">ENTRAR</button>`}else{document.getElementById('adminBody').innerHTML=`<button class="btn" onclick="formCat()">+ NOVA CATEGORIA</button><button class="btn" onclick="formSub()">+ NOVA SUBCATEGORIA</button><button class="btn" onclick="formProd()">+ NOVO PRODUTO</button><button class="btn btn-red" onclick="sair()">SAIR</button>`}ir('admin')}
function login(){if(document.getElementById('e').value===EMAIL&&document.getElementById('s').value===SENHA){logado=true;abrirAdmin()}else{alert('Senha errada')}}
function sair(){logado=false;ir('home')}
function abrirCat(k=null){filtroCat=k;filtroSub=null;const c=db.cat.find(x=>x.k===k);document.getElementById('bcSub').innerHTML=c?`<span onclick="ir('categorias')">Categorias</span> > ${c.nome}`:'';ir('subcategorias');renderSub()}
function abrirSub(k=null){filtroSub=k;if(k){const s=db.sub.find(x=>x.k===k);const c=db.cat.find(x=>x.k===s.cat);document.getElementById('bcProd').innerHTML=`<span onclick="ir('categorias')">Categorias</span> > <span onclick="abrirCat('${c.k}')">${c.nome}</span> > ${s.nome}`}else{document.getElementById('bcProd').innerHTML=''}ir('produtos');renderProd()}
function formCat(e=null){const d=db.cat.find(x=>x.k===e);document.getElementById('modalTit').textContent=e?'EDITAR CATEGORIA':'NOVA CATEGORIA';document.getElementById('modalBody').innerHTML=`<div class="upload" onclick="document.getElementById('imgC').click()"><img id="prevC" src="${d?.img||''}" style="display:${d?.img?'block':'none'}"><div id="txtC" style="display:${d?.img?'none':'block'}">Escolher imagem</div></div><input type="file" id="imgC" accept="image/*" style="display:none" onchange="prevImg(event,'prevC','txtC')"><input type="text" class="input" id="nomeC" value="${d?.nome||''}" placeholder="Nome da categoria"><input type="text" class="input" id="emojiC" value="${d?.emoji||''}" placeholder="Emoji" maxlength="2"><button class="btn" onclick="salvarCat('${e||''}')">${e?'SALVAR':'CRIAR'}</button>${e?`<button class="btn btn-red" onclick="delCat('${e}')">EXCLUIR</button>`:''}<button class="btn" style="background:#1e1e1e" onclick="fecharModal()">CANCELAR</button>`;document.getElementById('modal').classList.add('ativo')}
function formSub(e=null){const d=db.sub.find(x=>x.k===e);let o=db.cat.map(c=>`<option value="${c.k}" ${d?.cat===c.k||filtroCat===c.k?'selected':''}>${c.nome}</option>`).join('');if(!o)o='<option value="">Cadastre categoria primeiro</option>';document.getElementById('modalTit').textContent=e?'EDITAR SUBCATEGORIA':'NOVA SUBCATEGORIA';document.getElementById('modalBody').innerHTML=`<select class="input" id="catS">${o}</select><div class="upload" onclick="document.getElementById('imgS').click()"><img id="prevS" src="${d?.img||''}" style="display:${d?.img?'block':'none'}"><div id="txtS" style="display:${d?.img?'none':'block'}">Escolher imagem</div></div><input type="file" id="imgS" accept="image/*" style="display:none" onchange="prevImg(event,'prevS','txtS')"><input type="text" class="input" id="nomeS" value="${d?.nome||''}" placeholder="Nome da subcategoria"><button class="btn" onclick="salvarSub('${e||''}')">${e?'SALVAR':'CRIAR'}</button>${e?`<button class="btn btn-red" onclick="delSub('${e}')">EXCLUIR</button>`:''}<button class="btn" style="background:#1e1e1e" onclick="fecharModal()">CANCELAR</button>`;document.getElementById('modal').classList.add('ativo')}
function formProd(e=null){const d=db.prod.find(x=>x.k===e);let o=db.sub.map(s=>`<option value="${s.k}" ${d?.sub===s.k||filtroSub===s.k?'selected':''}>${s.nome}</option>`).join('');if(!o)o='<option value="">Cadastre subcategoria primeiro</option>';document.getElementById('modalTit').textContent=e?'EDITAR PRODUTO':'NOVO PRODUTO';document.getElementById('modalBody').innerHTML=`<select class="input" id="subP">${o}</select><div class="upload" onclick="document.getElementById('imgP').click()"><img id="prevP" src="${d?.img||''}" style="display:${d?.img?'block':'none'}"><div id="txtP" style="display:${d?.img?'none':'block'}">Escolher imagem</div></div><input type="file" id="imgP" accept="image/*" style="display:none" onchange="prevImg(event,'prevP','txtP')"><input type="text" class="input" id="nomeP" value="${d?.nome||''}" placeholder="Nome do produto"><input type="number" step="0.01" class="input" id="precoP" value="${d?.preco||''}" placeholder="Valor R$"><input type="number" class="input" id="estP" value="${d?.est||''}" placeholder="Estoque"><textarea class="input" id="descP" placeholder="Descrição" style="min-height:80px">${d?.desc||''}</textarea><label style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><input type="checkbox" id="destP" ${d?.dest?'checked':''}> Destaque</label><button class="btn" onclick="salvarProd('${e||''}')">${e?'SALVAR':'CRIAR'}</button>${e?`<button class="btn btn-red" onclick="delProd('${e}')">EXCLUIR</button>`:''}<button class="btn" style="background:#1e1e1e" onclick="fecharModal()">CANCELAR</button>`;document.getElementById('modal').classList.add('ativo')}
function prevImg(e,img,txt){const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{document.getElementById(img).src=ev.target.result;document.getElementById(img).style.display='block';document.getElementById(txt).style.display='none'};r.readAsDataURL(f)}}
function fecharModal(){document.getElementById('modal').classList.remove('ativo')}
function salvarCat(k){const nome=document.getElementById('nomeC').value.trim(),emoji=document.getElementById('emojiC').value.trim(),img=document.getElementById('prevC').src;if(!nome){alert('Nome obrigatório');return}if(k){const i=db.cat.findIndex(x=>x.k===k);db.cat[i]={...db.cat[i],nome,emoji,img:img.includes('data:image')?img:db.cat[i].img}}else{db.cat.push({k:'c'+Date.now(),nome,emoji,img:img.includes('data:image')?img:''})}save();fecharModal();renderHome();renderCat()}
function delCat(k){if(confirm('Excluir categoria? Vai apagar tudo junto.')){db.cat=db.cat.filter(x=>x.k!==k);const s=db.sub.filter(x=>x.cat===k).map(x=>x.k);db.sub=db.sub.filter(x=>x.cat!==k);db.prod=db.prod.filter(x=>!s.includes(x.sub));save();fecharModal();renderHome();renderCat()}}
function salvarSub(k){const nome=document.getElementById('nomeS').value.trim(),cat=document.getElementById('catS').value,img=document.getElementById('prevS').src;if(!nome||!cat){alert('Preencha tudo');return}if(k){const i=db.sub.findIndex(x=>x.k===k);db.sub[i]={...db.sub[i],nome,cat,img:img.includes('data:image')?img:db.sub[i].img}}else{db.sub.push({k:'s'+Date.now(),nome,cat,img:img.includes('data:image')?img:''})}save();fecharModal();renderSub()}
function delSub(k){if(confirm('Excluir subcategoria? Vai apagar produtos juntos.')){db.sub=db.sub.filter(x=>x.k!==k);db.prod=db.prod.filter(x=>x.sub!==k);save();fecharModal();renderSub()}}
function salvarProd(k){const nome=document.getElementById('nomeP').value.trim(),sub=document.getElementById('subP').value,preco=parseFloat(document.getElementById('precoP').value),est=parseInt(document.getElementById('estP').value)||0,desc=document.getElementById('descP').value.trim(),dest=document.getElementById('destP').checked,img=document.getElementById('prevP').src;if(!nome||!sub||!preco){alert('Preencha nome, subcategoria e valor');return}if(k){const i=db.prod.findIndex(x=>x.k===k);db.prod[i]={...db.prod[i],nome,sub,preco,est,desc,dest,img:img.includes('data:image')?img:db.prod[i].img}}else{db.prod.push({k:'p'+Date.now(),nome,sub,preco,est,desc,dest,img:img.includes('data:image')?img:''})}save();fecharModal();renderHome();renderProd()}
function delProd(k){if(confirm('Excluir produto?')){db.prod=db.prod.filter(x=>x.k!==k);save();fecharModal();renderHome();renderProd()}}
function renderHome(){const g1=document.getElementById('gridCat');if(db.cat.length===0){g1.innerHTML='<div class="empty" style="grid-column:1/-1">Cadastre no Admin</div>'}else{g1.innerHTML=db.cat.slice(0,3).map(c=>`<div class="card" onclick="abrirCat('${c.k}')"><div class="card-img">${c.img?`<img src="${c.img}">`:c.emoji||'📦'}</div><div class="card-nome">${c.nome}</div></div>`).join('')}const g2=document.getElementById('gridProd');const d=db.prod.filter(x=>x.dest).slice(0,6);if(d.length===0){g2.innerHTML='<div class="empty" style="grid-column:1/-1">Nenhum destaque</div>'}else{g2.innerHTML=d.map(p=>`<div class="card" onclick="alert('${p.nome}')"><div class="card-img">${p.img?`<img src="${p.img}">`:'🎁'}</div><div class="card-nome">${p.nome}</div><div class="card-preco">R$ ${parseFloat(p.preco).toFixed(2).replace('.',',')}</div></div>`).join('')}}
function renderCat(){const d=document.getElementById('listaCat');if(db.cat.length===0){d.innerHTML='<div class="empty">Nenhuma categoria</div>'}else{d.innerHTML=db.cat.map(c=>`<div class="lista-item" onclick="abrirCat('${c.k}')"><div class="lista-img">${c.img?`<img src="${c.img}">`:c.emoji||'📦'}</div><div class="lista-info"><div class="lista-nome">${c.nome}</div><div class="lista-desc">${db.sub.filter(s=>s.cat===c.k).length} subcategorias</div></div></div>`).join('')}if(logado)d.innerHTML+='<div class="add" onclick="formCat()">+</div>'}
function renderSub(){const d=document.getElementById('listaSub');let s=db.sub;if(filtroCat)s=s.filter(x=>x.cat===filtroCat);if(s.length===0){d.innerHTML='<div class="empty">Nenhuma subcategoria</div>'}else{d.innerHTML=s.map(x=>{const c=db.cat.find(y=>y.k===x.cat);return`<div class="lista-item" onclick="abrirSub('${x.k}')"><div class="lista-img">${x.img?`<img src="${x.img}">`:'📂'}</div><div class="lista-info"><div class="lista-nome">${x.nome}</div><div class="lista-desc">${c?.nome||''} - ${db.prod.filter(p=>p.sub===x.k).length} produtos</div></div></div>`}).join('')}if(logado)d.innerHTML+='<div class="add" onclick="formSub()">+</div>'}
function renderProd(){const d=document.getElementById('listaProd');let p=db.prod;if(filtroSub)p=p.filter(x=>x.sub===filtroSub);if(p.length===0){d.innerHTML='<div class="empty">Nenhum produto</div>'}else{d.innerHTML=p.map(x=>{const s=db.sub.find(y=>y.k===x.sub);return`<div class="lista-item"><div class="lista-img">${x.img?`<img src="${x.img}">`:'🎁'}</div><div class="lista-info"><div class="lista-nome">${x.nome}</div><div class="lista-desc">${s?.nome||''} - R$ ${parseFloat(x.preco).toFixed(2).replace('.',',')} - Estoque: ${x.est}</div></div></div>`}).join('')}if(logado)d.innerHTML+='<div class="add" onclick="formProd()">+</div>'}
function buscar(){const t=document.getElementById('busca').value.toLowerCase();if(!t){renderHome();return}const f=db.prod.filter(p=>p.nome.toLowerCase().includes(t));const g=document.getElementById('gridProd');if(f.length===0){g.innerHTML='<div class="empty" style="grid-column:1/-1">Nenhum produto encontrado</div>'}else{g.innerHTML=f.map(p=>`<div class="card" onclick="alert('${p.nome}')"><div class="card-img">${p.img?`<img src="${p.img}">`:'🎁'}</div><div class="card-nome">${p.nome}</div><div class="card-preco">R$ ${parseFloat(p.preco).toFixed(2).replace('.',',')}</div></div>`).join('')}}
renderHome();renderCat();
</script>
</body>
</html>
