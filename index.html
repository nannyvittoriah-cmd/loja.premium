<script>
  let tipoUser = '';
  let carrinho = [];
  let usuarios = [
    {email: "cliente@teste.com", senha: "1234", nome: "Cliente"}
  ];

  let produtos = [
    {id: 1, nome: "100 Diamantes FF", preco: 5, tag: "MAIS VENDIDO", emoji: "💎", estoque: 50, img: ""},
    {id: 2, nome: "310 Diamantes FF", preco: 15, tag: "EM ALTA", emoji: "💎", tagColor: "#FF6B35", estoque: 30, img: ""},
    {id: 3, nome: "Passe Premium", preco: 10, emoji: "🎫", estoque: 20, img: ""},
    {id: 4, nome: "Tokens 25", preco: 15, emoji: "🪙", estoque: 100, img: ""}
  ];

  let imagemTemp = "";

  function renderizarProdutos() {
    const lista = document.getElementById('lista-produtos');
    lista.innerHTML = '';

    // CORREÇÃO: aplica admin-mode direto aqui
    if(tipoUser === 'admin') {
      lista.classList.add('admin-mode');
    } else {
      lista.classList.remove('admin-mode');
    }

    produtos.forEach(p => {
      lista.innerHTML += `
        <div class="card">
          <div class="admin-actions">
            <button class="icon-btn" onclick="editarProduto(${p.id})">✏️</button>
            <button class="icon-btn" onclick="excluirProduto(${p.id})">🗑️</button>
          </div>
          ${p.tag? `<span class="tag" ${p.tagColor? `style="background:${p.tagColor}"` : ''}>${p.tag}</span>` : ''}
          ${p.img? `<img src="${p.img}" alt="${p.nome}">` : `<div style="font-size:40px; margin:10px 0;">${p.emoji || '🎮'}</div>`}
          <h4>${p.nome}</h4>
          <div class="price">R$ ${p.preco}</div>
          <div class="estoque">Estoque: ${p.estoque}</div>
          <button class="btn-pink" style="margin-top:10px; padding:8px;" onclick="addCarrinho(${p.id})" ${p.estoque <= 0? 'disabled' : ''}>
            ${p.estoque <= 0? 'Esgotado' : 'Add ao carrinho'}
          </button>
        </div>
      `;
    });
  }

  function fazerLogin() {
    let email = document.getElementById('email').value;
    let senha = document.getElementById('senha').value;
    let erro = document.getElementById('erro-login');
    let user = usuarios.find(u => u.email === email && u.senha === senha);

    if(user || (email && senha)) { // CORREÇÃO: deixa entrar mesmo sem cadastro
      tipoUser = 'cliente';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('store-screen').style.display = 'block';
      document.getElementById('user-logado').innerText = user? user.nome : email;
      document.getElementById('btn-admin').style.display = 'none';
      erro.style.display = 'none';
      renderizarProdutos();
    } else {
      erro.style.display = 'block';
    }
  }

  function mostrarCadastro() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('cadastro-screen').style.display = 'flex';
  }

  function voltarLogin() {
    document.getElementById('cadastro-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function criarConta() {
    let nome = document.getElementById('nome-cadastro').value;
    let email = document.getElementById('email-cadastro').value;
    let senha = document.getElementById('senha-cadastro').value;
    let erro = document.getElementById('erro-cadastro');

    if(nome && email && senha) {
      usuarios.push({email, senha, nome});
      alert('Conta criada! Faça login.');
      voltarLogin();
    } else {
      erro.style.display = 'block';
    }
  }

  function abrirAdminLogin() {
    document.getElementById('admin-login-modal').style.display = 'flex';
  }

  function fecharAdminLogin() {
    document.getElementById('admin-login-modal').style.display = 'none';
  }

  function loginAdmin() {
    let user = document.getElementById('user-admin').value;
    let senha = document.getElementById('senha-admin').value;
    let erro = document.getElementById('erro-admin');

    if(user === "Lorrannyh.16" && senha === "Lorrannyh.16") {
      tipoUser = 'admin';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('cadastro-screen').style.display = 'none';
      document.getElementById('admin-login-modal').style.display = 'none';
      document.getElementById('store-screen').style.display = 'block'; // CORREÇÃO: vai direto pra loja
      document.getElementById('user-logado').innerText = 'Lorrannyh.16';
      document.getElementById('btn-admin').style.display = 'inline';
      erro.style.display = 'none';
      renderizarProdutos(); // CORREÇÃO: renderiza com os botões de admin
    } else {
      erro.style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('store-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('cadastro-screen').style.display = 'none';
    document.getElementById('admin-login-modal').style.display = 'none';
    document.getElementById('email').value = '';
    document.getElementById('senha').value = '';
    carrinho = [];
    tipoUser = '';
    atualizarBadge();
  }

  function voltarLoja() {
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('store-screen').style.display = 'block';
    renderizarProdutos();
  }

  function addCarrinho(id) {
    let produto = produtos.find(p => p.id === id);
    if(produto.estoque <= 0) {
      alert('Produto esgotado!');
      return;
    }
    carrinho.push({...produto}); // CORREÇÃO: clona o objeto
    atualizarBadge();
    alert(`${produto.nome} adicionado ao carrinho 🎮`);
  }

  function atualizarBadge() {
    document.getElementById('badge-carrinho').innerText = carrinho.length;
  }

  function abrirCarrinho() {
    let itens = document.getElementById('carrinho-itens');
    let total = 0;
    itens.innerHTML = '';

    if(carrinho.length === 0) {
      itens.innerHTML = '<p style="text-align:center; color:#FF9ECB;">Carrinho vazio</p>';
    } else {
      carrinho.forEach((item, index) => {
        total += item.preco;
        itens.innerHTML += `
          <div class="carrinho-item">
            <span>${item.img? `<img src="${item.img}" style="width:30px;height:30px;object-fit:cover;border-radius:4px;">` : item.emoji} ${item.nome}</span>
            <span>R$ ${item.preco} <button class="btn-pink btn-small" onclick="removerCarrinho(${index})">x</button></span>
          </div>
        `;
      });
    }
    document.getElementById('carrinho-total').innerText = total.toFixed(2);
    document.getElementById('carrinho-modal').style.display = 'flex';
  }

  function removerCarrinho(index) {
    carrinho.splice(index, 1);
    atualizarBadge();
    abrirCarrinho();
  }

  function fecharCarrinho() {
    document.getElementById('carrinho-modal').style.display = 'none';
  }

  function finalizarCompra() {
    if(carrinho.length === 0) return;
    let msg = `Olá Lorrannyh! Quero finalizar minha compra:%0A`;
    let total = 0;
    carrinho.forEach(item => {
      msg += `- ${item.nome} - R$ ${item.preco}%0A`;
      total += item.preco;
    });
    msg += `%0ATotal: R$ ${total.toFixed(2)}%0APIX: (98) 98984-8535-63`;
    window.open(`https://wa.me/5598989848535?text=${msg}`, '_blank');

    carrinho.forEach(item => {
      let p = produtos.find(prod => prod.id === item.id);
      if(p) p.estoque--;
    });
    carrinho = [];
    atualizarBadge();
    renderizarProdutos();
    fecharCarrinho();
  }

  function chamarSuporte() {
    let msg = `Olá Lorrannyh! Preciso de suporte na Loja FF`;
    window.open(`https://wa.me/5598989848535?text=${msg}`, '_blank');
  }

  function abrirProdutos() {
    renderizarListaAdmin();
    document.getElementById('produtos-modal').style.display = 'flex';
  }

  function fecharProdutos() {
    document.getElementById('produtos-modal').style.display = 'none';
  }

  function renderizarListaAdmin() {
    const lista = document.getElementById('lista-admin-produtos');
    lista.innerHTML = '';
    produtos.forEach(p => {
      lista.innerHTML += `
        <div class="produto-item">
          <span style="display:flex;align-items:center;gap:8px;">
            ${p.img? `<img src="${p.img}" style="width:30px;height:30px;object-fit:cover;border-radius:4px;">` : p.emoji}
            ${p.nome} - R$ ${p.preco} - Estq: ${p.estoque}
          </span>
          <div>
            <button class="btn-pink btn-small" onclick="editarProduto(${p.id})">✏️</button>
            <button class="btn-pink btn-small" onclick="excluirProduto(${p.id})">🗑️</button>
          </div>
        </div>
      `;
    });
  }

  function previewImagem(event) {
    const file = event.target.files[0];
    if(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        imagemTemp = e.target.result;
        document.getElementById('preview').src = imagemTemp;
        document.getElementById('preview').style.display = 'block';
      }
      reader.readAsDataURL(file);
    }
  }

  function abrirFormProduto() {
    document.getElementById('titulo-form-produto').innerText = 'Novo Produto';
    document.getElementById('produto-id').value = '';
    document.getElementById('produto-nome').value = '';
    document.getElementById('produto-preco').value = '';
    document.getElementById('produto-estoque').value = '';
    document.getElementById('produto-tag').value = '';
    document.getElementById('produto-imagem').value = '';
    document.getElementById('preview').style.display = 'none';
    imagemTemp = '';
    document.getElementById('form-produto-modal').style.display = 'flex';
  }

  function fecharFormProduto() {
    document.getElementById('form-produto-modal').style.display = 'none';
  }

  function editarProduto(id) {
    let p = produtos.find(prod => prod.id === id);
    document.getElementById('titulo-form-produto').innerText = 'Editar Produto';
    document.getElementById('produto-id').value = p.id;
    document.getElementById('produto-nome').value = p.nome;
    document.getElementById('produto-preco').value = p.preco;
    document.getElementById('produto-estoque').value = p.estoque;
    document.getElementById('produto-tag').value = p.tag || '';
    imagemTemp = p.img || '';
    if(p.img) {
      document.getElementById('preview').src = p.img;
      document.getElementById('preview').style.display = 'block';
    } else {
      document.getElementById('preview').style.display = 'none';
    }
    document.getElementById('form-produto-modal').style.display = 'flex';
    document.getElementById('produtos-modal').style.display = 'none';
  }

  function salvarProduto() {
    let id = document.getElementById('produto-id').value;
    let nome = document.getElementById('produto-nome').value;
    let preco = parseFloat(document.getElementById('produto-preco').value);
    let estoque = parseInt(document.getElementById('produto-estoque').value);
    let tag = document.getElementById('produto-tag').value;

    if(!nome ||!preco || estoque < 0) {
      alert('Preenche nome, preço e estoque válido');
      return;
    }

    if(id) {
      let i = produtos.findIndex(p => p.id == id);
      produtos[i] = {...produtos[i], nome, preco, estoque, tag, img: imagemTemp};
    } else {
      let novoId = produtos.length? Math.max(...produtos.map(p => p.id)) + 1 : 1;
      produtos.push({id: novoId, nome, preco, estoque, tag, emoji: '🎮', img: imagemTemp});
    }

    fecharFormProduto();
    renderizarListaAdmin();
    renderizarProdutos();
    alert('Produto salvo!');
  }

  function excluirProduto(id) {
    if(confirm('Tem certeza que quer excluir?')) {
      produtos = produtos.filter(p => p.id!= id);
      renderizarListaAdmin();
      renderizarProdutos();
    }
  }

  // Fecha modal clicando fora
  window.onclick = function(event) {
    if (event.target.classList.contains('modal')) {
      event.target.style.display = 'none';
    }
  }

  // Inicializa
  renderizarProdutos();
</script>
