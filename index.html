<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
:root{
--border:#00c3ff;
--bg:#000;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:#fff;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
padding:18px;
background:#0b0f2a;
border-bottom:2px solid var(--border);
}

/* MENU */
#overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:998;
}

.menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
z-index:999;
border-left:2px solid var(--border);
}

.menu button{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:none;
cursor:pointer;
border-radius:6px;
}

/* LOJA */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

.card{
background:#111;
padding:10px;
border-radius:10px;
border:2px solid var(--border);
text-align:center;
}

.card img{width:100%;border-radius:10px;}

.buyBtn{
width:100%;
padding:10px;
background:#00ff66;
border:none;
cursor:pointer;
margin-top:5px;
}

/* ADM */
.admin{display:none;padding:15px;}

.box{
background:#111;
padding:15px;
border-radius:10px;
border:2px solid var(--border);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:1px solid #333;
border-radius:6px;
}

.item{
padding:10px;
border:1px solid #333;
margin:5px 0;
}

/* PIX */
#pixModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.pixBox{
background:#111;
padding:20px;
width:320px;
border-radius:10px;
border:2px solid var(--border);
text-align:center;
}

.green{color:#00ff66;}
.red{color:#ff4444;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div>BONY STORE</div>
<div onclick="openMenu()" style="cursor:pointer">☰</div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div id="menu" class="menu">
<h3>MENU</h3>
<button onclick="home()">🏠 Loja</button>
<button onclick="openAdmin()">⚙ ADM</button>

<h4>🎨 TEMAS</h4>
<button onclick="theme('azul')">Azul</button>
<button onclick="theme('amarelo')">Amarelo</button>
</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="box">

<h2>🔐 LOGIN ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>📦 PEDIDOS</h3>
<div id="pedidos"></div>

</div>

</div>
</div>

<!-- PIX -->
<div id="pixModal">
<div class="pixBox">

<h2>💳 PAGAMENTO PIX</h2>

<p id="pNome"></p>
<p id="pValor"></p>

<hr>

<p><b>Lorrane Vitória Alves Vaz</b></p>
<p><b>(98) 98535-3563</b></p>

<p style="font-size:13px;color:#ccc">
Cole o link do seu comprovante para verificarmos
</p>

<input id="comprovante" placeholder="Link do comprovante">

<button style="background:#00ff66;width:100%;padding:10px;margin-top:10px"
onclick="enviar()">
ENVIAR
</button>

<button style="background:#444;width:100%;padding:10px;margin-top:5px"
onclick="closePix()">
FECHAR
</button>

</div>
</div>

<script>

const ADMIN_USER="admin";
const ADMIN_PASS="123";

let produtos=[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png"],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png"]
];

let pedidoAtual={};

/* ELEMENTOS */
const loja=document.getElementById("loja");
const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");

/* MENU */
function openMenu(){
menu.style.right="0";
overlay.style.display="block";
}

function closeMenu(){
menu.style.right="-260px";
overlay.style.display="none";
}

/* LOJA */
function render(){
loja.innerHTML="";
produtos.forEach(p=>{
loja.innerHTML+=`
<div class="card">
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>
<button class="buyBtn" onclick="pix('${p[0]}','${p[1]}')">COMPRAR</button>
</div>`;
});
}

/* HOME */
function home(){
admin.style.display="none";
loja.style.display="grid";
render();
}

/* ADM */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

/* LOGIN */
function login(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){
painel.style.display="block";
load();
}else alert("erro login");
}

/* PIX */
function pix(nome,valor){

pedidoAtual={nome,valor};

pNome.innerText="Produto: "+nome;
pValor.innerText="R$ "+valor;

pixModal.style.display="flex";

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

pedidos.push({
id:Date.now(),
produto:nome,
valor:valor,
status:"PENDENTE",
comprovante:""
});

localStorage.setItem("pedidos",JSON.stringify(pedidos));
}

/* ENVIAR COMPROVANTE */
function enviar(){

let link=document.getElementById("comprovante").value;

if(!link){
alert("Cole o link do comprovante!");
return;
}

let pedidos=JSON.parse(localStorage.getItem("pedidos"));

pedidos.forEach(p=>{
if(p.id===pedidos[pedidos.length-1].id){
p.comprovante=link;
}
});

localStorage.setItem("pedidos",JSON.stringify(pedidos));

let msg=
`💳 PIX ENVIADO
Produto: ${pedidoAtual.nome}
Valor: R$ ${pedidoAtual.valor}
Comprovante: ${link}`;

window.open("https://wa.me/55989853563?text="+encodeURIComponent(msg));

closePix();
}

/* FECHAR */
function closePix(){
pixModal.style.display="none";
}

/* LOAD ADM */
function load(){

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

pedidos.innerHTML="";

pedidos.forEach(p=>{

let cor=p.status==="VERIFICADO"?"green":"red";

pedidos.innerHTML+=`
<div class="item">
<b>ID:</b> ${p.id}<br>
${p.produto} - R$ ${p.valor}<br>
<span class="${cor}">${p.status}</span><br>
📎 ${p.comprovante || "sem comprovante"}
</div>`;
});
}

/* TEMAS */
function theme(t){
if(t==="azul"){
document.documentElement.style.setProperty("--border","#00c3ff");
document.body.style.background="#000";
}
if(t==="amarelo"){
document.documentElement.style.setProperty("--border","#ffd400");
document.body.style.background="#1a1a00";
}
}

/* START */
home();

</script>

</body>
</html>
