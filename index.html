<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
<style>
:root{
  --bg:#060609;
  --card:#131319;
  --border:#26262f;
  --purple:#7c3aed;
  --text:#f5f5f7;
  --text2:#8a8a93;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  background:radial-gradient(circle at 50% 0%, rgba(124,58,237,0.12), transparent 50%), var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  font-size:13px;
}

.login-card{
  width:100%;
  max-width:320px;
  background:rgba(19,19,25,0.6);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px 24px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:28px;
}
.logo svg{width:28px;height:28px;}
.logo h1{font-size:18px;font-weight:600;letter-spacing:0.5px;}
.logo span{font-size:11px;color:var(--text2);letter-spacing:2px;display:block;}

h2{font-size:18px;font-weight:600;margin-bottom:6px;}
.subtitle{font-size:12px;color:var(--text2);margin-bottom:24px;}

.input-group{
  position:relative;
  margin-bottom:14px;
}
.input-group input{
  width:100%;
  height:42px;
  background:rgba(26,26,33,0.8);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0 40px 0 40px;
  color:var(--text);
  font-size:13px;
  outline:none;
  transition:0.2s;
}
.input-group input:focus{
  border-color:var(--purple);
  box-shadow:0 0 0 2px rgba(124,58,237,0.2);
}
.input-group .icon{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text2);
  font-size:18px;
}
.input-group .toggle{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text2);
  cursor:pointer;
  font-size:18px;
}
.input-group input::placeholder{color:var(--text2);font-size:12px;}

.forgot{text-align:right;margin-bottom:20px;}
.forgot a{color:var(--purple);font-size:12px;text-decoration:none;}

.btn{
  width:100%;
  height:42px;
  background:transparent;
  border:1px solid var(--purple);
  border-radius:10px;
  color:var(--purple);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}
.btn:hover{
  background:var(--purple);
  color:#fff;
  box-shadow:0 0 20px rgba(124,58,237,0.4);
}

.divider{height:1px;background:var(--border);margin:20px 0;}
.signup{text-align:center;font-size:12px;color:var(--text2);}
.signup a{color:var(--purple);text-decoration:none;font-weight:500;}
.hidden{display:none;}
.error{color:#ef4444;font-size:11px;margin:-10px 0 12px;display:none;}
</style>
</head>
<body>

<div class="login-card">
  
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#7c3aed"/>
      <path d="M2 17L12 22L22 17" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
      <path d="M2 12L12 17L22 12" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div>
      <h1>PRIME</h1>
      <span>STORE</span>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <h2>Bem-vindo de volta!</h2>
    <p class="subtitle">Faça login para continuar</p>
    
    <div class="input-group">
      <span class="material-symbols-outlined icon">mail</span>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    
    <div class="input-group">
      <span class="material-symbols-outlined icon">lock</span>
      <input type="password" id="loginPass" placeholder="Senha">
      <span class="material-symbols-outlined toggle" onclick="togglePass('loginPass',this)">visibility_off</span>
    </div>
    
    <p class="error" id="loginError"></p>
    
    <div class="forgot">
      <a href="#" onclick="resetPass()">Esqueci minha senha</a>
    </div>
    
    <button class="btn" onclick="login()">Entrar</button>
    
    <div class="divider"></div>
    
    <div class="signup">
      Ainda não tem conta? <a href="#" onclick="toggleForm()">Criar conta</a>
    </div>
  </div>

  <!-- CADASTRO -->
  <div id="registerForm" class="hidden">
    <h2>Criar conta</h2>
    <p class="subtitle">Preencha seus dados</p>
    
    <div class="input-group">
      <span class="material-symbols-outlined icon">person</span>
      <input type="text" id="regName" placeholder="Seu nome">
    </div>
    
    <div class="input-group">
      <span class="material-symbols-outlined icon">mail</span>
      <input type="email" id="regEmail" placeholder="seu@email.com">
    </div>
    
    <div class="input-group">
      <span class="material-symbols-outlined icon">lock</span>
      <input type="password" id="regPass" placeholder="Senha">
      <span class="material-symbols-outlined toggle" onclick="togglePass('regPass',this)">visibility_off</span>
    </div>
    
    <p class="error" id="regError"></p>
    
    <button class="btn" onclick="register()">Cadastrar</button>
    
    <div class="divider"></div>
    
    <div class="signup">
      Já tem conta? <a href="#" onclick="toggleForm()">Fazer login</a>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function toggleForm(){
  document.getElementById('loginForm').classList.toggle('hidden');
  document.getElementById('registerForm').classList.toggle('hidden');
  document.getElementById('loginError').style.display='none';
  document.getElementById('regError').style.display='none';
}

function togglePass(id, el){
  const input = document.getElementById(id);
  if(input.type === 'password'){
    input.type = 'text';
    el.innerText = 'visibility';
  }else{
    input.type = 'password';
    el.innerText = 'visibility_off';
  }
}

function showError(id, msg){
  document.getElementById(id).innerText = msg;
  document.getElementById(id).style.display = 'block';
}

async function login(){
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  document.getElementById('loginError').style.display='none';
  
  try{
    await auth.signInWithEmailAndPassword(email,pass);
    alert('Logado com sucesso!');
    // window.location.href = 'home.html';
  }catch(e){
    showError('loginError', e.message);
  }
}

async function register(){
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const pass = document.getElementById('regPass').value;
  document.getElementById('regError').style.display='none';
  
  if(!name){showError('regError', 'Digite seu nome'); return;}
  
  try{
    const cred = await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
    await db.collection('users').doc(cred.user.uid).set({
      name:name,
      email:email,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    alert('Conta criada! Faça login.');
    toggleForm();
  }catch(e){
    showError('regError', e.message);
  }
}

async function resetPass(){
  const email = document.getElementById('loginEmail').value;
  if(!email){showError('loginError', 'Digite seu email primeiro'); return;}
  try{
    await auth.sendPasswordResetEmail(email);
    alert('Email de recuperação enviado!');
  }catch(e){
    showError('loginError', e.message);
  }
}

// Redireciona se já estiver logado
auth.onAuthStateChanged(user=>{
  if(user){
    console.log('Usuário logado:', user.email);
    // window.location.href = 'home.html';
  }
});
</script>
</body>
</html>
