<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chanel Store - A melhor loja do Brasil</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #000;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }
    
    :root {
      --neon: #ff00c8;
      --ciano: #00f3ff;
    }
    
    .neon-text { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
    .neon-border {
      border: 2px solid var(--neon);
      box-shadow: 0 0 15px var(--neon), inset 0 0 10px rgba(255,0,200,0.1);
    }
    
    .btn-bubble {
      background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
      border: 2px solid var(--neon);
      border-radius: 50px;
      padding: 12px 30px;
      color: var(--neon);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px var(--neon), inset 0 0 15px rgba(255,0,200,0.2);
      text-transform: uppercase;
    }
    
    .btn-bubble:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px var(--neon);
      background: var(--neon);
      color: #000;
    }
    
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 2px solid var(--neon);
    }
    
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--neon);
    }
    
    .menu { display: flex; gap: 20px; align-items: center; }
    
    .carrinho-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.5rem;
    }
    
    .carrinho-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--neon);
      color: #000;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    
    main { margin-top: 80px; }
    
    .hero {
      text-align: center;
      padding: 80px 5%;
      background: radial-gradient(circle at center, rgba(255,0,200,0.1) 0%, transparent 70%);
    }
    
    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      margin-bottom: 10px;
      color: var(--neon);
    }
    
    .hero h2 { font-size: 1.5rem; color: #aaa; margin-bottom: 40px; }
    
    .stats-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      padding: 40px 5%;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .stat-box {
      text-align: center;
      padding: 30px;
      background: #0a0a0a;
      border-radius: 15px;
    }
    
    .stat-box h3 {
      font-size: 2.5rem;
      color: var(--ciano);
      font-family: 'Orbitron', sans-serif;
    }
    
    .info-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      padding: 40px 5%;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .info-card {
      padding: 30px;
      background: #0a0a0a;
      border-radius: 15px;
      text-align: center;
    }
    
    .categorias {
      padding: 60px 5%;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .categorias h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 40px;
      text-align: center;
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }
    
    .categoria-card {
      background: #0a0a0a;
      border-radius: 20px;
      padding: 30px;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .categoria-card:hover { transform: translateY(-5px); }
    
    .produtos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }
    
    .produto-card {
      background: #111;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }
    
    .produto-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
      background: #1a1a1a;
    }
    
    .produto-preco {
      font-size: 1.8rem;
      color: var(--ciano);
      font-family: 'Orbitron', sans-serif;
      margin: 10px 0;
    }
    
    .carrinho-sidebar {
      position: fixed;
      right: -400px;
      top: 80px;
      width: 380px;
      height: calc(100vh - 80px);
      background: #0a0a0a;
      border-left: 2px solid var(--neon);
      padding: 30px;
      transition: 0.3s;
      overflow-y: auto;
      z-index: 999;
    }
    
    .carrinho-sidebar.ativo { right: 0; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.ativo { display: flex; }
    
    .modal-content {
      background: #0a0a0a;
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      width: 90%;
    }
    
    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: #000;
      border: 2px solid #333;
      border-radius: 10px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
    }
    
    input:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 10px var(--neon);
    }
    
    .admin-panel {
      display: none;
      padding: 100px 5%;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .admin-grid {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 30px;
    }
    
    .admin-menu {
      background: #0a0a0a;
      border-radius: 15px;
      padding: 20px;
      height: fit-content;
    }
    
    .admin-menu button {
      width: 100%;
      margin: 5px 0;
      text-align: left;
    }
    
    .admin-content {
      background: #0a0a0a;
      border-radius: 15px;
      padding: 30px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #222;
    }
    
    th { color: var(--neon); }
    
    @media (max-width: 768px) {
      .grid-2, .stats-3, .info-3 { grid-template-columns: 1fr; }
      .hero h1 { font-size: 2rem; }
      .carrinho-sidebar { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo neon-text">Chanel Store</div>
    <div class="menu">
      <button class="btn-bubble" onclick="abrirModal('login')">Login</button>
      <button class="btn-bubble" onclick="abrirModal('cadastro')">Cadastro</button>
      <button class="btn-bubble" onclick="fecharAba()">Fechar</button>
      <div class="carrinho-icon" onclick="toggleCarrinho()">
