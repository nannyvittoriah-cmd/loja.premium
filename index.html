<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#020c20,#071a3a);
    color: white;
}

/* HEADER */
header {
    padding: 15px;
    text-align: center;
    font-size: 20px;
    background: #010814;
    box-shadow: 0 0 10px #39ff14;
}

/* INPUT */
input {
    width: 90%;
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* PRODUTOS */
.produtos {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
    padding: 10px;
}

.card {
    background: #0d2b5c;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 0 10px #39ff14;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.btn {
    background: #39ff14;
    border: none;
    padding: 8px;
    width: 100%;
    font-weight: bold;
    border-radius: 6px;
    margin-top: 5px;
}

/* CARRINHO */
.carrinho {
    position: fixed;
    bottom: 70px;
    right: 10px;
    background: #010814;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 0 10px #39ff14;
}

/* CHAT */
.chat {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #010814;
    padding: 5px;
    display: flex;
}

.chat input {
    flex: 1;
    margin: 0;
}

</style>
</head>

<body>

<header>🎮 Game Store</header>

<input id="cliente" placeholder="Digite seu nome">

<div class="produtos" id="produtos"></div>

<!-- CARRINHO -->
<div class="carrinho">
    <h4>🛒 Carrinho</h4>
    <div id="itens"></div>
    <button class="btn" onclick="finalizar()">Finalizar</button>
</div>

<!-- CHAT -->
<div class="chat">
    <input id="msg" placeholder="Fale com o vendedor...">
    <button class="btn" onclick="enviar()">Enviar</button>
</div>

<script>

// PRODUTOS (EDITA AQUI)
let produtos = [
    {
        nome:"35 Tokens",
        preco:6.47,
        estoque:10,
        desc:"Entrega rápida via ID"
    },
    {
        nome:"55 Tokens",
        preco:10.00,
        estoque:5,
        desc:"Instantâneo"
    }
];

let carrinho = [];

// MOSTRAR PRODUTOS
function mostrar(){
    let div = document.getElementById("produtos");
    div.innerHTML = "";

    produtos.forEach((p,i)=>{
        div.innerHTML += `
        <div class="card">
            <h3>${p.nome}</h3>
            <p>💰 R$ ${p.preco}</p>
            <p>📦 Estoque: ${p.estoque}</p>
            <p>${p.desc}</p>
            <button class="btn" onclick="add(${i})">Adicionar</button>
        </div>`;
    });
}

// ADICIONAR NO CARRINHO
function add(i){
    if(produtos[i].estoque <= 0){
        alert("Sem estoque!");
        return;
    }

    carrinho.push(produtos[i]);
    produtos[i].estoque--;

    atualizar();
    mostrar();
}

// ATUALIZAR CARRINHO
function atualizar(){
    let div = document.getElementById("itens");
    div.innerHTML = "";

    let total = 0;

    carrinho.forEach(p=>{
        div.innerHTML += `<div>${p.nome}</div>`;
        total += p.preco;
    });

    div.innerHTML += `<hr>Total: R$ ${total.toFixed(2)}`;
}

// FINALIZAR COMPRA
function finalizar(){
    let nome = document.getElementById("cliente").value;

    if(!nome){
        alert("Digite seu nome");
        return;
    }

    if(carrinho.length === 0){
        alert("Carrinho vazio");
        return;
    }

    let lista = carrinho.map(p=>p.nome).join(", ");
    let total = carrinho.reduce((t,p)=>t+p.preco,0);

    let numero = "5598984853563";

    let msg = `Cliente: ${nome}%0AProdutos: ${lista}%0ATotal: R$ ${total.toFixed(2)}`;

    window.open(`https://wa.me/${numero}?text=${msg}`);
}

// CHAT
function enviar(){
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    alert("Mensagem enviada: " + msg);
    document.getElementById("msg").value = "";
}

// INICIAR
mostrar();

</script>

</body>
</html>
