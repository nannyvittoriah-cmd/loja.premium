<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
:root{
--border:#00c3ff;
--border2:#ffd400;
}

body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
font-size:28px;
font-weight:bold;
background:#0b0f2a;
border-bottom:2px solid var(--border);
}

/* MENU LATERAL (AGORA CORRETO) */
.menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
z-index:9999;
border-left:2px solid var(--border);
}

.menu button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
cursor:pointer;
background:#222;
color:#fff;
border-radius:6px;
}

/* LOJA */
.container{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:12px;
padding:15px;
}

.card{
background:#111;
border:2px solid var(--border);
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.buyBtn{
width:100%;
padding:10px;
margin-top:5px;
background:#00ff66;
border:none;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

/* ADM */
.admin{display:none;padding:15px;}

.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
border:2px solid var(--border);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border-radius:6px;
border:1px solid #555;
}

.item{
border:1px solid #333;
padding:10px;
margin:5px 0;
}

.bar{
height:10px;
background:#00c3ff;
margin:5px 0;
}

/* PIX */
#pixModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:99999;
}

.pixBox{
background:#111;
padding:20px;
border-radius:10px;
width:300px;
border:2px solid #00c3ff;
text-align:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div>BONY STORE</div>
<div onclick="toggleMenu()" style="cursor:pointer">☰</div>
</div>

<!-- MENU LATERAL -->
<div id="menu" class="menu">

<h3>MENU</h3>

<button onclick="home()">🏠 Loja</button>
<button onclick="openAdmin()">⚙ ADM</button>

<h4>🎨 TEMAS</h4>
<button onclick="theme('azul')">🔵 Azul</button>
<button onclick="theme('amarelo')">🟡 Amarelo</button>

</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>📊 VENDAS</h3>
<div class="item">Total: <span id="vendas"></span></div>

<h3>📈 GRÁFICO</h3>
<div id="grafico"></div>

<h3>📩 HISTÓRICO</h3>
<div id="hist"></div>

<h3>➕ PRODUTOS</h3>
<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<button onclick="add()">Adicionar</button>

</div>
</div>
</div>

<!-- PIX -->
<div id="pixModal">
<div class="pixBox">

<h2>💳 PIX</h2>

<p id="pixNome"></p>
<p id="pixValor"></p>

<hr>

<p><b>Nome:</b> SEU NOME AQUI</p>
<p><b>PIX:</b> SUA-CHAVE-AQUI</p>

<button onclick="copiarPix()">📋 Copiar PIX</button>
<button onclick="fecharPix()">Fechar</button>

</div>
</div>

<script>

const ADMIN_USER="admin";
const ADMIN_PASS="123";

let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png","Desc"],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png","Desc"]
];

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function render(){
loja.innerHTML="";
produtos.forEach((p)=>{
loja.innerHTML+=`
<div class="card">
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>
<p>${p[3]}</p>

<button class="buyBtn" onclick="abrirPix('${p[0]}','${p[1]}')">
COMPRAR
</button>

</div>`;
});
}

/* MENU ABRIR/FECHAR (CORRIGIDO) */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.right = (m.style.right==="0px")?"-260px":"0px";
}

/* FECHA MENU AO CLICAR FORA */
document.addEventListener("click",function(e){
let menu=document.getElementById("menu");
let btn=document.querySelector(".topbar div:last-child");

if(!menu.contains(e.target) && !btn.contains(e.target)){
menu.style.right="-260px";
}
});

/* TEMAS */
function theme(t){
if(t==="azul"){
document.documentElement.style.setProperty("--border","#00c3ff");
document.documentElement.style.setProperty("--border2","#ffd400");
document.body.style.background="#000";
document.body.style.color="#fff";
}

if(t==="amarelo"){
document.documentElement.style.setProperty("--border","#ffd400");
document.documentElement.style.setProperty("--border2","#00c3ff");
document.body.style.background="#1a1a00";
document.body.style.color="#fff";
}
}

/* HOME */
function home(){
admin.style.display="none";
loja.style.display="grid";
render();
}

/* ADM */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

/* LOGIN */
function login(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){
painel.style.display="block";
load();
}else alert("erro login");
}

/* ADD */
function add(){
produtos.push([pnome.value,ppreco.value,pimg.value,pdesc.value]);
save();
render();
}

/* PIX */
let atualNome="";
let atualValor="";

function abrirPix(nome,valor){
atualNome=nome;
atualValor=valor;

pixNome.innerText="Produto: "+nome;
pixValor.innerText="Valor: R$ "+valor;

pixModal.style.display="flex";

/* salva venda */
let d=JSON.parse(localStorage.getItem("dados")||"[]");
d.push({produto:nome,valor:valor});
localStorage.setItem("dados",JSON.stringify(d));
}

function fecharPix(){
pixModal.style.display="none";
}

function copiarPix(){
navigator.clipboard.writeText("SUA-CHAVE-AQUI");
alert("PIX copiado!");
}

/* LOAD ADM */
function load(){
let d=JSON.parse(localStorage.getItem("dados")||"[]");
vendas.innerText=d.length;

hist.innerHTML="";
d.forEach(x=>{
hist.innerHTML+=`<div class="item">${x.produto} - R$ ${x.valor}</div>`;
});

grafico.innerHTML="";
let c={};
produtos.forEach(p=>c[p[0]]=0);
d.forEach(x=>{
if(c[x.produto]!=undefined) c[x.produto]++;
});

for(let k in c){
grafico.innerHTML+=`
<div>${k}</div>
<div class="bar" style="width:${c[k]*20}px"></div>`;
}
}

/* START */
home();

</script>

</body>
</html
