<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 SEU FIREBASE (não muda)
const firebaseConfig = {
  apiKey: "AIzaSyDo8baLqLDPTKTajoC-kl_6P_w3VMO0414",
  authDomain: "bonyx-sh.firebaseapp.com",
  projectId: "bonyx-sh",
  storageBucket: "bonyx-sh.firebasestorage.app",
  messagingSenderId: "379347082201",
  appId: "1:379347082201:web:842b31bf3e9df3c12fd7c8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


/* =========================
   🔐 CADASTRO (EMAIL ÚNICO)
========================= */
window.register = async () => {
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try {
const user = await createUserWithEmailAndPassword(auth, email, password);

// salva usuário no Firestore
await setDoc(doc(db, "users", user.user.uid), {
email: email
});

showUser(user.user);

} catch (e) {
alert(e.message); // já bloqueia email repetido automaticamente
}
};


/* =========================
   🔑 LOGIN
========================= */
window.login = async () => {
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try {
const user = await signInWithEmailAndPassword(auth, email, password);
showUser(user.user);
} catch (e) {
alert("Email ou senha inválidos");
}
};


/* =========================
   🔄 AUTO LOGIN
========================= */
onAuthStateChanged(auth, (user) => {
if (user) {
showUser(user);
}
});


/* =========================
   🟣 PAINEL (NÃO MUDA SEU DESIGN)
========================= */
function showUser(user) {

// ⚠️ só troca telas (não mexe no visual)
document.getElementById("loginBox").style.display = "none";
document.getElementById("dashboard").style.display = "block";

// mostra email logado
document.getElementById("userInfo").innerText = user.email;
}


/* =========================
   🚪 LOGOUT
========================= */
window.logout = async () => {
await signOut(auth);
location.reload();
};
</script>
