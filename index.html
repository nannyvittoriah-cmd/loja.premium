<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #0a0a0a;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 0 30px rgba(255, 0, 150, 0.6),
                  0 0 60px rgba(255, 0, 150, 0.3);
      border: 1px solid rgba(255, 0, 150, 0.2);
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 32px;
      color: #ff0080;
      letter-spacing: 1px;
    }
    .
