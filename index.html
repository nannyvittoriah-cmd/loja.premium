<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Store - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  background:#000;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:#fff;
}

.card{
  width:100%;
  max-width:360px;
  background:#0f0f0f;
  border-radius:16px;
  padding:28px 24px;
  border:1px solid #1a1a1a;
}

.logo{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:24px;
}
.logo svg{
  width:48px;
  height:48px;
  margin-bottom:8px;
}
.logo h1{
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
}
.logo span{
  font-size:12px;
  color:#8b5cf6;
  letter-spacing:2px;
  margin-top:-4px;
}

.tabs{
  display:flex;
  margin-bottom:20px;
  border-bottom:1px solid #1a1a1a;
}
.tab{
  flex:1;
  text-align:center;
  padding:12px 0;
  font-size:14px;
  font-weight:600;
  color:#6b7280;
  cursor:pointer;
}
.tab.active{
  color:#fff;
  border-bottom:2px solid #8b5cf6;
}

.input-group{
  margin-bottom:16px;
}
.input-group label{
  display:block;
  font-size:13px;
  color:#9ca3af;
  margin-bottom:6px;
}
.input-group input{
  width:100%;
  height:44px;
  background:#1a1a1a;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:0 14px;
  color:#fff;
  font-size:14px;
  outline:none;
}
.input-group input:focus{
  border-color:#8b5cf6;
}
.input-group .pass-wrap{
  position:relative;
}
.pass-wrap svg{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  width:20px;
  height:20px;
  cursor:pointer;
  color:#6b7280;
}

.btn{
  width:100%;
  height:46px;
  background:#8b5cf6;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}
.btn:active{
  transform:scale(0.98);
}
.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.error{
  background:#ef444420;
  border:1px solid #ef4444;
  color:#ef4444;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  margin-bottom:14px;
  display:none;
}
.error.success{
  background:#10b98120;
  border-color:#10b981;
  color:#10b981;
}
.hidden{display:none;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="#8b5cf6">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    <h1>PREMIUM</h1>
    <span>STORE</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabLogin">Login</div>
    <div class="tab" id="tabRegister">Criar conta</div>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="input-group hidden" id="nameGroup">
    <label>Nome</label>
    <input type="text" id="name" placeholder="Digite seu nome">
  </div>

  <div class="input-group">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="Digite seu e-mail">
  </div>

  <div class="input-group">
    <label>Senha</label>
    <div class="pass-wrap">
      <input type="password" id="password" placeholder="Digite sua senha">
      <svg id="togglePass" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
  </div>

  <button class="btn" id="actionBtn">ENTRAR</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let mode = 'login';

const tabLogin = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const actionBtn = document.getElementById('actionBtn');
const togglePass = document.getElementById('togglePass');
const passInput = document.getElementById('password');
const nameGroup = document.getElementById('nameGroup');

tabLogin.onclick = () => {
  mode = 'login';
  tabLogin.classList.add('active');
  tabRegister.classList.remove('active');
  actionBtn.innerText = 'ENTRAR';
  nameGroup.classList.add('hidden');
}

tabRegister.onclick = () => {
  mode = 'register';
  tabRegister.classList.add('active');
  tabLogin.classList.remove('active');
  actionBtn.innerText = 'CRIAR CONTA';
  nameGroup.classList.remove('hidden');
}

togglePass.onclick = () => {
  passInput.type = passInput.type === 'password' ? 'text' : 'password';
}

actionBtn.onclick = async () => {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  
  if(!email || !pass){showError('Preencha todos os campos');return;}
  if(mode === 'register' && !name){showError('Digite seu nome');return;}
  
  actionBtn.disabled = true;
  
  try{
    if(mode === 'login'){
      await signInWithEmailAndPassword(auth, email, pass);
      showError('Login ok! Redirecionando...', 'success');
      setTimeout(()=>{window.location.href='home.html'},1000);
    }else{
      const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(userCredential.user, {displayName: name});
      showError('Conta criada! Redirecionando...', 'success');
      setTimeout(()=>{window.location.href='home.html'},1000);
    }
  }catch(e){
    showError(mode==='login'?'Email ou senha incorretos':e.message);
    actionBtn.disabled = false;
  }
}

function showError(msg, type='error'){
  const e = document.getElementById('errorMsg');
  e.innerText = msg;
  e.className = 'error' + (type==='success'?' success':'');
  e.style.display = 'block';
  setTimeout(()=>{e.style.display='none';},3000);
}
</script>
</body>
</html>
