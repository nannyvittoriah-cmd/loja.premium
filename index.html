<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px;
font-size:28px;
font-weight:bold;
background:#0b0f2a;
border-bottom:2px solid #00c3ff;
}

/* MENU */
#menu{
position:fixed;
top:0;
right:-240px;
width:220px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
z-index:999;
border-left:2px solid #00c3ff;
}

#menu button{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:none;
cursor:pointer;
}

/* LOJA */
.container{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
padding:20px;
}

.card{
width:260px;
background:#111;
border:2px solid #00c3ff;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
cursor:pointer;
padding:10px;
border:none;
width:100%;
margin-top:5px;
background:#00c3ff;
}

/* CHECKOUT */
.checkout{display:none;padding:20px;}
.box{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.modalBox{
background:#111;
padding:20px;
max-width:500px;
border-radius:10px;
}

/* ADM */
.admin{display:none;padding:20px;}
.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:1px solid #555;
border-radius:6px;
}

.item{
border:1px solid #333;
padding:10px;
margin:5px 0;
}

.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#222;
padding:10px;
border-radius:8px;
text-align:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div>BONY STORE</div>
<div onclick="toggleMenu()" style="cursor:pointer;font-size:26px">☰</div>
</div>

<!-- MENU -->
<div id="menu">

<h3>MENU</h3>

<button onclick="home()">🏠 Home</button>
<button onclick="openAdmin()">⚙ ADM</button>

<h4>🎨 Temas</h4>
<button onclick="theme('#000','#00c3ff')">Azul</button>
<button onclick="theme('#fff','#ff4fd8')">Rosa</button>
<button onclick="theme('#fff','#b26bff')">Lilás</button>
<button onclick="theme('#fff','#ffd400')">Amarelo</button>

<h4>📂 Categorias</h4>
<button onclick="render('todos')">Todos</button>
<button onclick="render('passe')">Passes</button>
<button onclick="render('tokens')">Tokens</button>

</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout">
<div class="box">

<h3>ENVIO DE COMPROVANTE</h3>

<input id="nome" placeholder="Nome">
<input id="whats" placeholder="WhatsApp">
<input id="produto" readonly>
<input id="link" placeholder="Link comprovante">

<button onclick="enviar()">ENVIAR</button>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modalBox">
<h3 id="mTitulo"></h3>
<p id="mPreco"></p>
<p id="mDesc" style="white-space:pre-line"></p>
<p id="mEstoque"></p>
<button onclick="fechar()">FECHAR</button>
</div>
</div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>➕ PRODUTOS</h3>

<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem">
<textarea id="pdesc" placeholder="Descrição completa"></textarea>
<input id="pestoque" placeholder="Estoque">
<input id"pcat" placeholder="Categoria (passe/tokens)">
<button onclick="add()">Adicionar</button>

<hr>

<div id="produtosADM"></div>

<hr>

<h3>📊 STATS</h3>
<div class="stats">
<div class="stat">Vendas<br><span id="vendas"></span></div>
<div class="stat">Pedidos<br><span id="pedidos"></span></div>
</div>

<hr>

<div id="hist"></div>

</div>
</div>
</div>

<script>

let selected="";

/* PRODUTOS */
let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png","Acesso básico",10,"passe"],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png","Mais recursos",5,"passe"],
["100 Tokens","25","https://i.imgur.com/3Q9Z1ZQ.png","Moeda interna",10,"tokens"]
];

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function render(cat="todos"){
loja.innerHTML="";

produtos.forEach((p,i)=>{

if(cat!=="todos" && p[5]!==cat) return;

let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>
<p style="font-size:12px">${p[3]}</p>
<p>Estoque: ${p[4]}</p>

<button onclick="detalhe(${i})">DETALHES</button>
<button onclick="buy(${i})" ${p[4]<=0?'disabled':''}>COMPRAR</button>
`;

loja.appendChild(d);
});
}
render();

/* MENU */
function toggleMenu(){
menu.style.right = menu.style.right==="0px" ? "-240px":"0px";
}

/* TEMA */
function theme(bg,border){
document.body.style.background=bg;
document.querySelector(".topbar").style.borderBottom="2px solid "+border;
}

/* HOME */
function home(){
loja.style.display="flex";
checkout.style.display="none";
admin.style.display="none";
}

/* DETALHES */
function detalhe(i){
modal.style.display="flex";
mTitulo.innerText=produtos[i][0];
mPreco.innerText="R$ "+produtos[i][1];
mDesc.innerText=produtos[i][3];
mEstoque.innerText="Estoque: "+produtos[i][4];
}

function fechar(){modal.style.display="none";}

/* COMPRA */
function buy(i){
if(produtos[i][4]<=0){alert("Sem estoque");return;}

produtos[i][4]--;
save();
render();

selected=produtos[i][0];

loja.style.display="none";
checkout.style.display="block";

produto.value=selected;
}

/* ENVIO */
function enviar(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
nome:nome.value,
produto:selected,
link:link.value
});

localStorage.setItem("dados",JSON.stringify(dados));

let v=Number(localStorage.getItem("vendas")||0);
localStorage.setItem("vendas",v+1);

alert("Enviado!");
home();
}

/* ADM */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

/* LOGIN */
function login(){
if(u.value==="admin" && p.value==="123"){
painel.style.display="block";
loadADM();
loadHist();
stats();
}else alert("erro");
}

/* ADD */
function add(){
produtos.push([
pnome.value,
ppreco.value,
pimg.value,
pdesc.value,
Number(pestoque.value),
pcat.value
]);

save();
render();
loadADM();
}

/* ADM LIST */
function loadADM(){
produtosADM.innerHTML="";

produtos.forEach((p,i)=>{
produtosADM.innerHTML+=`
<div class="item">
<input value="${p[0]}" onchange="produtos[${i}][0]=this.value">
<input value="${p[1]}" onchange="produtos[${i}][1]=this.value">
<input value="${p[2]}" onchange="produtos[${i}][2]=this.value">
<textarea onchange="produtos[${i}][3]=this.value">${p[3]}</textarea>
<input value="${p[4]}" onchange="produtos[${i}][4]=Number(this.value)">
<input value="${p[5]}" onchange="produtos[${i}][5]=this.value">
</div>
`;
});
}

/* HIST */
function loadHist(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");
hist.innerHTML="";
dados.forEach(d=>{
hist.innerHTML+=`<div class="item">${d.nome} - ${d.produto}</div>`;
});
}

/* STATS */
function stats(){
vendas.innerText=localStorage.getItem("vendas")||0;
pedidos.innerText=(JSON.parse(localStorage.getItem("dados")||"[]")).length;
}

setInterval(stats,1000);

</script>

</body>
</html>
