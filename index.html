<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Gamer</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0a0014,#1a0033);
    color:white;
}

/* CATEGORIAS */
.categorias{
    display:flex;
    gap:10px;
    padding:10px;
    overflow:auto;
}

.cat{
    min-width:140px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    background:#111;
    border:1px solid #ff00aa;
}

.cat img{
    width:100%;
    height:80px;
    object-fit:cover;
}

.cat p{
    text-align:center;
    padding:5px;
}

/* PRODUTOS GRID */
#produtos{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

.produto{
    border:1px solid #ff00aa;
    padding:10px;
    border-radius:12px;
    text-align:center;
    background:#140022;
}

/* BOTÃO */
button{
    background:#ff00aa;
    border:none;
    padding:8px;
    width:100%;
    border-radius:10px;
    color:white;
    font-weight:bold;
    margin-top:5px;
}

/* PIX */
.pix{
    grid-column:1/3;
    border:1px solid #00ffcc;
    padding:15px;
    border-radius:12px;
    text-align:center;
}
</style>
</head>

<body>

<h2 style="padding:10px;">Categorias</h2>

<div class="categorias">

    <!-- FREE FIRE -->
    <div class="cat" onclick="mostrar('ff')">
        <img src="https://i.imgur.com/8QfKuz1.png">
        <p>Free Fire</p>
    </div>

    <!-- INSTAGRAM -->
    <div class="cat" onclick="mostrar('insta')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
        <p>Instagram</p>
    </div>

</div>

<div id="produtos"></div>

<script>

// MOSTRAR PRODUTOS
function mostrar(cat){
    let div = document.getElementById("produtos");
    div.innerHTML = "";

    if(cat === "ff"){
        div.innerHTML += produto("100 Dimas", "R$ 7");
        div.innerHTML += produto("200 Dimas", "R$ 14");
        div.innerHTML += produto("300 Dimas", "R$ 20");
        div.innerHTML += produto("500 Dimas", "R$ 32");
        div.innerHTML += produto("800 Dimas", "R$ 50");
        div.innerHTML += produto("1000 Dimas", "R$ 65");
        div.innerHTML += produto("1500 Dimas", "R$ 95");
        div.innerHTML += produto("2000 Dimas", "R$ 120");
    }

    if(cat === "insta"){
        div.innerHTML += produto("100 Seguidores", "R$ 5");
        div.innerHTML += produto("500 Seguidores", "R$ 15");
        div.innerHTML += produto("1000 Seguidores", "R$ 25");
    }
}

// TEMPLATE
function produto(nome, preco){
    return `
    <div class="produto">
        <h4>${nome}</h4>
        <p>${preco}</p>

        <button onclick="comprar('${nome}','${preco}')">
            Comprar
        </button>
    </div>
    `;
}

// COMPRA
function comprar(nome, preco){
    let div = document.getElementById("produtos");

    div.innerHTML += `
    <div class="pix">
        <h3>Pagamento via PIX</h3>
        <p>Chave: (98) 984853563</p>

        <a href="https://wa.me/5598984853563?text=Comprei ${nome} - ${preco}">
            <button>Enviar comprovante no WhatsApp</button>
        </a>
    </div>
    `;
}
</script>

</body>
</html
