<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prime Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"/>

<style>

/* ======= (SEU CSS ORIGINAL MANTIDO) ======= */

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#050505;color:#fff;overflow-x:hidden}
:root{--roxo:#b026ff;--border:rgba(176,38,255,.18);--card:#111}
.page{display:none;max-width:430px;margin:auto;min-height:100vh;padding:12px;padding-bottom:85px}
.page.active{display:block}

/* ===== ADM NOVOS ESTILOS ===== */

.section-box{
background:#111;
border:1px solid var(--border);
border-radius:14px;
padding:12px;
margin-bottom:10px;
}

.section-box h3{
font-size:12px;
margin-bottom:8px;
color:#fff;
}

.input, select{
width:100%;
background:#111;
border:1px solid var(--border);
padding:10px;
border-radius:10px;
color:#fff;
margin-bottom:8px;
font-size:11px;
}

.btn{
background:linear-gradient(90deg,#7a00ff,#d000ff);
border:none;
padding:10px;
border-radius:10px;
color:#fff;
font-weight:700;
font-size:11px;
width:100%;
cursor:pointer;
}

.list-card{
background:#111;
border:1px solid var(--border);
padding:10px;
border-radius:12px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.small{
font-size:10px;
color:#999;
}

</style>
</head>

<body>

<!-- ================= DASHBOARD ================= -->

<section class="page active" id="dashboardAdm">

<div class="section-box">
<h3>PAINEL ADM</h3>

<button class="btn" onclick="showPage('admProdutos')">Produtos</button>
<button class="btn" onclick="showPage('admCategorias')">Categorias</button>
<button class="btn" onclick="showPage('admSubcategorias')">Subcategorias</button>
<button class="btn" onclick="showPage('admConfiguracoes')">Configurações</button>

</div>

</section>

<!-- ================= PRODUTOS ================= -->

<section class="page" id="admProdutos">

<div class="section-box">
<h3>PRODUTOS</h3>

<input class="input" id="buscarProduto" placeholder="Buscar produtos..." onkeyup="buscarProdutoAdm()">

<button class="btn" onclick="showPage('addProduto')">+ ADICIONAR</button>

<div id="listaProdutosAdm"></div>

</div>

</section>

<!-- ================= CATEGORIAS ================= -->

<section class="page" id="admCategorias">

<div class="section-box">
<h3>CATEGORIAS</h3>

<button class="btn">+ ADICIONAR</button>

<div class="list-card">
<div>
<strong>Diamantes</strong>
<div class="small">3 subcategorias</div>
</div>
<span>✏️ 🗑️</span>
</div>

<div class="list-card">
<div>
<strong>Contas</strong>
<div class="small">2 subcategorias</div>
</div>
<span>✏️ 🗑️</span>
</div>

</div>

</section>

<!-- ================= SUBCATEGORIAS ================= -->

<section class="page" id="admSubcategorias">

<div class="section-box">
<h3>SUBCATEGORIAS</h3>

<select class="input">
<option>Diamantes</option>
<option>Contas</option>
</select>

<button class="btn">+ ADICIONAR</button>

<div class="list-card">
<div>
<strong>Free Fire</strong>
<div class="small">12 produtos</div>
</div>
<span>✏️ 🗑️</span>
</div>

<div class="list-card">
<div>
<strong>Roblox</strong>
<div class="small">15 produtos</div>
</div>
<span>✏️ 🗑️</span>
</div>

</div>

</section>

<!-- ================= CONFIGURAÇÕES ================= -->

<section class="page" id="admConfiguracoes">

<div class="section-box">
<h3>CONFIGURAÇÕES</h3>

<button class="btn" onclick="showPage('configGeral')">Geral</button>
<button class="btn">Aparência</button>
<button class="btn">Redes Sociais</button>
<button class="btn">Pagamentos</button>
<button class="btn">Notificações</button>
<button class="btn">Segurança</button>
<button class="btn">SEO</button>
<button class="btn">Manutenção</button>

</div>

</section>

<!-- ================= CONFIG GERAL ================= -->

<section class="page" id="configGeral">

<div class="section-box">
<h3>CONFIGURAÇÕES GERAIS</h3>

<input class="input" placeholder="Nome da Loja">

<input type="file" class="input">

<input class="input" type="color" value="#7c3aed">

<select class="input">
<option>BRL</option>
<option>USD</option>
<option>EUR</option>
</select>

<input class="input" type="number" placeholder="Taxa de entrega (R$)">

<button class="btn">SALVAR CONFIGURAÇÕES</button>

</div>

</section>

<script>

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

let produtosAdm = JSON.parse(localStorage.getItem("produtosAdm")) || [];

function renderProdutosAdm(){

const area = document.getElementById("listaProdutosAdm");
if(!area) return;

area.innerHTML = "";

produtosAdm.forEach((p)=>{

area.innerHTML += `
<div class="list-card">
<div>
<strong>${p.nome}</strong>
<div class="small">${p.categoria} • ${p.sub}</div>
<div class="small">R$ ${p.preco}</div>
</div>
<span>${p.status || "Ativo"}</span>
</div>
`;

});

}

function buscarProdutoAdm(){

const v = document.getElementById("buscarProduto").value.toLowerCase();
const area = document.getElementById("listaProdutosAdm");

area.innerHTML = "";

produtosAdm
.filter(p=>p.nome.toLowerCase().includes(v))
.forEach(p=>{

area.innerHTML += `
<div class="list-card">
<div>
<strong>${p.nome}</strong>
<div class="small">${p.categoria}</div>
</div>
</div>
`;

});

}

renderProdutosAdm();

</script>

</body>
</html>
