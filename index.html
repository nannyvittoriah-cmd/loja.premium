<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonyx - Painel Admin</title>
<style>
:root {
  --rosa: #ff00c8;
  --roxo: #8b00ff;
  --azul: #0099ff;
  --dourado: #ffd700;
  --tema: var(--rosa);
  --roxo-neon: #8b00ff;
  --vermelho-neon: #ff0033;
}

* {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif;}

body {
  background: #000;
  color: #fff;
  min-height: 100vh;
}

/* Barra superior */
.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 14px 20px;
  background: #000;
  font-size: 14px;
  border-bottom: 1px solid #1a1a1a;
}

.top-bar.sair {
  color: var(--tema);
  cursor: pointer;
  text-decoration: underline;
}

/* Header: ☰ | LV PREMIUM | ❤️ */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  border-bottom: 2px solid var(--roxo-neon);
  background: #000;
  position: sticky;
  top: 0;
  z-index: 100;
}

.btn-menu {
  color: var(--tema);
  font-size: 24px;
  cursor: pointer;
  filter: drop-shadow(0 0 10px var(--tema));
}

.lv-premium {
  color: var(--dourado);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 1.5px;
  text-shadow: 0 0 15px var(--dourado);
}

.btn-heart {
  color: var(--vermelho-neon);
  font-size: 24px;
  cursor: pointer;
  filter: drop-shadow(0 0 15px var(--vermelho-neon));
}

.container {
  padding: 20px;
  max-width: 480px;
  margin: 0 auto;
}

/* Sistema de ABAS */
.aba {
  display: none;
}

.aba.ativa {
  display: block;
}

/* Trocado: Total de compras → Contas do site */
.titulo-principal {
  color: var(--tema);
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 6px;
  text-shadow: 0 0 20px var(--tema);
}

.info-contato {
  color: #888;
  font-size: 13px;
  margin-bottom: 20px;
}

.info-contato.link {
  color: #4a9eff;
}
