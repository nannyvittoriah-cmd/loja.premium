<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f2a;
color:white;
}

/* fundo */
.fundo {
position: fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://i.imgur.com/iWGitub.jpeg") no-repeat center center;
background-size:cover;
z-index:-1;
filter:brightness(0.6);
}

/* telas */
.tela{
display:none;
padding:20px;
}

/* ativa */
.ativo{
display:block;
}

/* topo */
.topo{
text-align:center;
font-size:22px;
color:#ff4da6;
margin-bottom:10px;
}

/* grid */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* card */
.card{
background:#11194a;
border:2px solid #ff4da6;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:100px;
object-fit:contain;
}

/* botão */
button{
margin-top:8px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff4da6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* voltar */
.voltar{
background:#333;
margin-bottom:10px;
}
</style>

</head>

<body>

<div class="fundo"></div>

<!-- 🔥 CATEGORIAS -->
<div id="categorias" class="tela ativo">

<div class="topo">Categorias</div>

<div class="grid">

<div class="card" onclick="openFF()">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>Free Fire</p>
</div>

<div class="card" onclick="openInsta()">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>Instagram</p>
</div>

</div>

</div>

<!-- 🔥 INSTAGRAM SUBCATEGORIA -->
<div id="insta" class="tela">

<button class="voltar" onclick="back()">⬅ Voltar</button>

<div class="topo">Instagram Seguidores</div>

<div class="grid">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>100 Seguidores</p>
<button onclick="buy('100 Seguidores Instagram')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>300 Seguidores</p>
<button onclick="buy('300 Seguidores Instagram')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>500 Seguidores</p>
<button onclick="buy('500 Seguidores Instagram')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>1K Seguidores</p>
<button onclick="buy('1K Seguidores Instagram')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>2K Seguidores</p>
<button onclick="buy('2K Seguidores Instagram')">Comprar</button>
</div>

</div>

</div>

<!-- 🔥 FREE FIRE -->
<div id="ff" class="tela">

<button class="voltar" onclick="back()">⬅ Voltar</button>

<div class="topo">Free Fire</div>

<div class="grid">

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>Diamantes</p>
<button onclick="buy('Diamantes FF')">Comprar</button>
</div>

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>Pass Elite</p>
<button onclick="buy('Pass Elite')">Comprar</button>
</div>

</div>

</div>

<script>

function openInsta(){
document.getElementById("categorias").classList.remove("ativo");
document.getElementById("insta").classList.add("ativo");
}

function openFF(){
document.getElementById("categorias").classList.remove("ativo");
document.getElementById("ff").classList.add("ativo");
}

function back(){
document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativo"));
document.getElementById("categorias").classList.add("ativo");
}

// WhatsApp
function buy(product){
let number = "5598984853563";
let msg = "Olá, quero comprar: " + product;
let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(msg);
window.open(url, "_blank");
}

</script>

</body>
</html>
