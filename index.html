<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Store Vz - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#0a0a12;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-box{
  width:100%;
  max-width:340px;
}

/* Logo */
.logo{
  text-align:center;
  margin-bottom:32px;
}
.logo-icon{
  width:48px;
  height:48px;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  border-radius:12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
}
.logo-icon svg{
  width:26px;
  height:26px;
  color:#fff;
}
.logo h1{
  font-size:16px;
  font-weight:700;
  color:#fff;
  letter-spacing:0.5px;
}
.logo span{
  font-size:11px;
  color:#8a8a9e;
  letter-spacing:1px;
}

/* Textos */
h2{
  font-size:18px;
  font-weight:700;
  color:#fff;
  text-align:center;
  margin-bottom:6px;
}
.subtitle{
  font-size:12px;
  color:#8a8a9e;
  text-align:center;
  margin-bottom:28px;
}

/* Inputs */
.input-group{
  position:relative;
  margin-bottom:14px;
}
.input-group svg{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  color:#6b7280;
}
.input-group input{
  width:100%;
  height:46px;
  background:#16161f;
  border:1px solid #262630;
  border-radius:10px;
  padding:0 44px 0 44px;
  color:#fff;
  font-size:13px;
  outline:none;
}
.input-group input:focus{
  border-color:#7c3aed;
}
.toggle-pass{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  background:none;
  border:none;
}
.toggle-pass svg{
  width:18px;
  height:18px;
  color:#6b7280;
}

/* Link esqueci senha */
.forgot{
  text-align:right;
  margin-bottom:20px;
}
.forgot a{
  font-size:12px;
  color:#8a8a9e;
  text-decoration:none;
}

/* Botão */
.btn{
  width:100%;
  height:46px;
  background:#7c3aed;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}
.btn:active{transform:scale(0.98);}
.btn:disabled{opacity:0.6;}

/* Rodapé */
.footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:#8a8a9e;
}
.footer a{
  color:#7c3aed;
  text-decoration:none;
  font-weight:600;
}

.error{
  background:#ef444420;
  border:1px solid #ef4444;
  color:#ef4444;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  margin-bottom:14px;
  display:none;
}

.loading{
  display:none;
}
</style>
</head>
<body>

<div class="login-box">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>NEXUS STORE</h1>
    <span>PRIME STORE VZ</span>
  </div>

  <!-- Título -->
  <h2>Bem-vindo de volta!</h2>
  <p class="subtitle">Faça login para continuar</p>

  <!-- Erro -->
  <div class="error" id="errorMsg"></div>

  <!-- Form -->
  <div class="input-group">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <input type="email" id="email" placeholder="seu@email.com">
  </div>

  <div class="input-group">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <input type="password" id="password" placeholder="Senha">
    <button type="button" class="toggle-pass" onclick="togglePass()">
      <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="forgot">
    <a href="#" onclick="forgotPass()">Esqueci minha senha</a>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">
    <span id="btnText">Entrar</span>
    <span class="loading" id="loading">Entrando...</span>
  </button>

  <div class="footer">
    Ainda não tem conta? <a href="#" onclick="register()">Criar conta</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const errorMsg = document.getElementById('errorMsg');
const btnText = document.getElementById('btnText');
const loading = document.getElementById('loading');
const loginBtn = document.getElementById('loginBtn');

// Mostrar/ocultar senha
window.togglePass = function(){
  const pass = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if(pass.type === 'password'){
    pass.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }else{
    pass.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// Login
window.login = async function(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  
  errorMsg.style.display = 'none';
  
  if(!email || !pass){
    showError('Preencha email e senha');
    return;
  }
  
  setLoading(true);
  
  try{
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = 'home.html'; // muda pra tua home
  }catch(e){
    showError('Email ou senha incorretos');
    setLoading(false);
  }
}

// Criar conta
window.register = async function(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  
  if(!email || !pass){
    showError('Preencha email e senha');
    return;
  }
  
  if(pass.length < 6){
    showError('Senha deve ter no mínimo 6 caracteres');
    return;
  }
  
  setLoading(true);
  
  try{
    await createUserWithEmailAndPassword(auth, email, pass);
    window.location.href = 'home.html';
  }catch(e){
    showError('Erro ao criar conta. Email já existe?');
    setLoading(false);
  }
}

// Esqueci senha
window.forgotPass = async function(){
  const email = document.getElementById('email').value;
  
  if(!email){
    showError('Digite seu email primeiro');
    return;
  }
  
  try{
    await sendPasswordResetEmail(auth, email);
    showError('Email de redefinição enviado!');
    errorMsg.style.background = '#10b98120';
    errorMsg.style.borderColor = '#10b981';
    errorMsg.style.color = '#10b981';
  }catch(e){
    showError('Erro ao enviar email');
  }
}

function showError(msg){
  errorMsg.innerText = msg;
  errorMsg.style.display = 'block';
  errorMsg.style.background = '#ef444420';
  errorMsg.style.borderColor = '#ef4444';
  errorMsg.style.color = '#ef4444';
}

function setLoading(state){
  loginBtn.disabled = state;
  btnText.style.display = state ? 'none' : 'inline';
  loading.style.display = state ? 'inline' : 'none';
}
</script>
</body>
</html>
