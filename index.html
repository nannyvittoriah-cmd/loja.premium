<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bonys Story</title>

<style>

/* FUNDO FIXO */
.fundo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("https://i.imgur.com/iWGitub.jpeg") no-repeat center center;
    background-size: cover;
    z-index: -1;
}

/* BODY */
body {
    margin: 0;
    font-family: Arial;
}

/* =======================
   🔥 AVISO
======================= */

#avisoTela{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.avisoBox{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:400px;

    /* neon leve */
    border:2px solid #ff4da6;
    box-shadow:0 0 10px rgba(255,77,166,0.4);
}

.neonBtn{
    margin-top:15px;
    padding:12px;
    width:200px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#ff4da6;
    color:white;
    box-shadow:0 0 10px #ff4da6, 0 0 20px #ff4da6;
}

.continuarSeparado{
    margin-top:15px;
}

/* =======================
   🔥 CATEGORIAS
======================= */

#categorias{
    display:none;
    padding: 20px 15px;
    min-height: 100vh;
    color: white;
    flex-direction: column;
}

/* TOPO */
.topo {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 15px;
    color: #ff4da6;
    text-shadow: 0 0 6px rgba(255, 77, 166, 0.6);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* CARD */
.card {
    background: #11194a;
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    border: 2px solid #ff4da6;
    box-shadow: 0 0 8px rgba(255, 77, 166, 0.3);
}

/* IMAGEM */
.card img {
    width: 100%;
    height: 110px;
    object-fit: contain;
    background: #000;
    border-radius: 10px;
}

/* NOME */
.nome {
    margin-top: 10px;
    font-size: 13px;
    font-weight: bold;
}

/* BOTÕES */
.voltarBtn{
    margin-top:15px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="fundo"></div>

<!-- 🔥 AVISO -->
<div id="avisoTela">

    <div class="avisoBox">
        <h2>⚠️ Aviso</h2>

        <p>
        Este site não possui login ou cadastro.<br><br>

        ✔ Nenhum dado é salvo<br>
        ✔ Compra direta via WhatsApp<br>
        ✔ Processo rápido e simples<br><br>

        Apenas escolha seu produto e finalize o pedido.
        </p>
    </div>

    <!-- botão separado do quadrado -->
    <div class="continuarSeparado">
        <button class="neonBtn" onclick="irCategorias()">CONTINUAR</button>
    </div>

</div>

<!-- 🔥 CATEGORIAS -->
<div id="categorias">

    <div class="topo">Bonys Story</div>

    <button class="voltarBtn" onclick="voltarAviso()">⬅ Voltar</button>

    <h3>Categorias</h3>

    <div class="grid">

        <div class="card">
            <img src="https://i.imgur.com/NgqTIHu.jpeg">
            <div class="nome">⚡ Sensi FF</div>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/tm2T0RM.jpeg">
            <div class="nome">🔥 Free Fire</div>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/XF6wb2O.jpeg">
            <div class="nome">📸 Redes Sociais</div>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/Nb0Ba33.jpeg">
            <div class="nome">💎 Tokens Evolutivas</div>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/31BewwU.jpeg">
            <div class="nome">🎁 Caixa Misteriosa</div>
        </div>

    </div>

</div>

<script>
function irCategorias(){
document.getElementById("avisoTela").style.display="none";
document.getElementById("categorias").style.display="block";
}

function voltarAviso(){
document.getElementById("categorias").style.display="none";
document.getElementById("avisoTela").style.display="flex";
}
</script>

</body>
</html>
