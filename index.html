<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0b0f2a;
    color:white;
}

/* TOPO */
.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:2px solid #ff008c;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#ff008c;
}

.topo-direita{
    display:flex;
    gap:15px;
    align-items:center;
}

.notificacao{
    background:#ff008c;
    padding:8px 12px;
    border-radius:20px;
    cursor:pointer;
}

.menu{
    cursor:pointer;
    font-size:22px;
}

.dropdown{
    position:absolute;
    right:10px;
    top:60px;
    background:#11163a;
    border:1px solid #ff008c;
    border-radius:10px;
    display:none;
    flex-direction:column;
}

.dropdown div{
    padding:10px;
    cursor:pointer;
}

.dropdown div:hover{
    background:#ff008c;
}

.divisor{
    height:10px;
    background:#05071a;
}

.container{
    display:flex;
}

/* PRINCIPAL */
.principal{
    flex:3;
    padding:20px;
}

/* SIDEBAR */
.sidebar{
    flex:1;
    border-left:2px solid #ff008c;
    padding:20px;
}

/* GRID DE CATEGORIAS */
.categorias-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.categoria{
    background:#11163a;
    padding:12px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.categoria:hover{
    background:#ff008c;
}

/* BOTÃO */
.btn{
    background:#ff008c;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 10px #ff008c;
}

/* TEMA CLARO */
.light{
    background:white;
    color:black;
}

.light .categoria{
    background:#eee;
}

</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
    <div class="logo">BS</div>

    <div class="topo-direita">
        <div class="notificacao">🔔</div>
        <div class="menu" onclick="abrirMenu()">⋮</div>
    </div>

    <div class="dropdown" id="menuDrop">
        <div>Afiliados</div>
        <div onclick="trocarTema()">Tema Claro/Escuro</div>
    </div>
</div>

<div class="divisor"></div>

<div class="container">

    <!-- CONTEÚDO -->
    <div class="principal">
        <h1>Bem-vindo à BS Store</h1>
        <br>
        <button class="btn">Explorar Produtos</button>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Categorias</h3>
        <br>

        <div class="categorias-grid">
            <div class="categoria">Instagram</div>
            <div class="categoria">TikTok</div>

            <div class="categoria">Kwai</div>
            <div class="categoria">Free Fire</div>

            <div class="categoria">Fortnite</div>
            <div class="categoria">Contas / Streaming</div>

            <div class="categoria">Contas à Venda</div>
            <div class="categoria">Sorteios</div>

            <div class="categoria">Itens Aleatórios</div>
        </div>

    </div>

</div>

<script>

function abrirMenu(){
    let menu = document.getElementById("menuDrop");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

function trocarTema(){
    document.body.classList.toggle("light");
}

</script>

</body>
</html>
