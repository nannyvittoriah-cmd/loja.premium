<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>VisionCode AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#070707;
color:white;
padding:12px;
}

.topo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.logo{
width:45px;
height:45px;
border-radius:14px;
background:linear-gradient(135deg,#6a00ff,#1a001f);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

.nome{
font-size:18px;
font-weight:bold;
}

.card{
background:#121212;
border:1px solid #2d0b45;
border-radius:18px;
padding:14px;
margin-bottom:14px;
}

.label{
font-size:12px;
margin-bottom:8px;
color:#9f9f9f;
}

.upload{
width:100%;
height:130px;
border:2px dashed #6a00ff;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
position:relative;
background:#0d0d0d;
}

.upload input{
position:absolute;
width:100%;
height:100%;
opacity:0;
}

.upload img{
width:100%;
height:100%;
object-fit:cover;
display:none;
}

textarea{
width:100%;
height:90px;
background:#0d0d0d;
border:none;
outline:none;
border-radius:14px;
padding:12px;
color:white;
font-size:13px;
resize:none;
}

button{
width:100%;
height:48px;
border:none;
border-radius:14px;
background:#6a00ff;
color:white;
font-size:14px;
font-weight:bold;
margin-top:10px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:10px;
}

.tab{
flex:1;
height:42px;
border-radius:12px;
background:#161616;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
border:1px solid #2d2d2d;
}

.active{
background:#6a00ff;
border:none;
}

pre{
background:#0d0d0d;
padding:14px;
border-radius:14px;
overflow:auto;
font-size:11px;
color:#b7ffce;
height:280px;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:14px;
background:white;
}

.loading{
display:none;
margin-top:10px;
font-size:12px;
color:#999;
text-align:center;
}
</style>
</head>

<body>

<div class="topo">
<div class="logo">V</div>
<div class="nome">VisionCode AI</div>
</div>

<div class="card">

<div class="label">ADICIONAR IMAGEM</div>

<label class="upload">

<input type="file" id="imagem" accept="image/*">

<img id="previewImg">

<span id="textoUpload">📷 Clique para adicionar imagem</span>

</label>

</div>

<div class="card">

<div class="label">EXPLIQUE O QUE VOCÊ QUER</div>

<textarea id="prompt"
placeholder="Ex: Quero um site roxo e preto estilo loja gamer mobile..."></textarea>

<button onclick="gerarCodigo()">
GERAR SITE
</button>

<div class="loading" id="loading">
Gerando código...
</div>

</div>

<div class="tabs">
<div class="tab active">CÓDIGO</div>
<div class="tab">PREVIEW</div>
</div>

<div class="card">

<pre id="codigo"></pre>

</div>

<div class="card">

<iframe id="preview"></iframe>

</div>

<script>

const imagem = document.getElementById("imagem");
const previewImg = document.getElementById("previewImg");
const textoUpload = document.getElementById("textoUpload");

imagem.addEventListener("change", function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

previewImg.src = e.target.result;
previewImg.style.display = "block";

textoUpload.style.display = "none";

}

reader.readAsDataURL(file);

}

});

function gerarCodigo(){

const loading = document.getElementById("loading");

loading.style.display = "block";

const prompt = document.getElementById("prompt").value;

setTimeout(()=>{

const htmlGerado = `
<!DOCTYPE html>
<html>
<head>
<style>

body{
background:#070707;
font-family:Arial;
color:white;
padding:20px;
}

.card{
background:#151515;
padding:20px;
border-radius:20px;
border:1px solid #6a00ff;
}

button{
width:100%;
height:45px;
border:none;
border-radius:12px;
background:#6a00ff;
color:white;
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h1>Prime Store</h1>

<p>
${prompt}
</p>

<button>
COMPRAR AGORA
</button>

</div>

</body>
</html>
`;

document.getElementById("codigo").textContent = htmlGerado;

document.getElementById("preview").srcdoc = htmlGerado;

loading.style.display = "none";

},1500);

}

</script>

</body>
</html>
