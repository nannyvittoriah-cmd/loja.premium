<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Vz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Poppins:wght@300;400;600;700&display=swap');

  :root{
    --preto:#000000;
    --rosa-neon:#ff00ff;
    --roxo-neon:#8b00ff;
    --rosa-glow:rgba(255,0,255,0.7);
    --roxo-glow:rgba(139,0,255,0.7);
    --card-bg:#0d0d0d;
    --texto:#ffffff;
    --cinza:#1a1a1a;
  }

  *{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}

  body{
    background:var(--preto);
    color:var(--texto);
    font-size:13px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(139,0,255,0.2) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(255,0,255,0.2) 0%, transparent 40%);
    min-height:100vh;
  }

.login-screen{
    position:fixed;
    inset:0;
    background:var(--preto);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
  }

.login-card{
    background:var(--card-bg);
    border:2px solid var(--rosa-neon);
    border-radius:15px;
    padding:35px 30px;
    width:90%;
    max-width:350px;
    box-shadow:0 0 40px var(--rosa-glow), inset 0 0 25px rgba(255,0,255,0.1);
  }

.login-card h3{
    font-family:'Orbitron',sans-serif;
    color:var(--rosa-neon);
    text-align:center;
    font-size:20px;
    margin-bottom:25px;
    text-shadow:0 0 15px var(--rosa-neon), 0 0 30px var(--rosa-neon);
    font-weight:900;
  }

.login-card input{
    width:100%;
    padding:13px;
    margin-bottom:14px;
    background:var(--preto);
    border:1px solid #333;
    color:var(--texto);
    border-radius:8px;
    font-size:13px;
  }

.login-card input:focus{
    outline:none;
    border-color:var(--rosa-neon);
    box-shadow:0 0 15px var(--rosa-glow);
  }

.btn-rosa{
    width:100%;
    background:linear-gradient(135deg,var(--rosa-neon),var(--roxo-neon));
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
    margin-bottom:12px;
    box-shadow:0 0 20px var(--rosa-glow);
    text-transform:uppercase;
    font-family:'Orbitron',sans-serif;
  }

.link-text{
    text-align:center;
    color:var(--rosa-neon);
    cursor:pointer;
    font-size:12px;
    display:block;
    margin-top:10px;
  }

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:var(--card-bg);
    border-bottom:2px solid var(--roxo-neon);
    box-shadow:0 2px 25px var(--roxo-glow);
  }

.menu-btn{
    font-size:24px;
    background:none;
    border:none;
    color:var(--rosa-neon);
    cursor:pointer;
    text-shadow:0 0 15px var(--rosa-neon);
  }

.heart{
    color:var(--rosa-neon);
    font-size:26px;
    filter:drop-shadow(0 0 10px var(--rosa-neon));
  }

.user-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--cinza);
    padding:12px 20px;
    font-size:11px;
    border-bottom:1px solid var(--roxo-neon);
  }

.container{
    padding:20px;
    max-width:1400px;
    margin:auto;
  }

.top-info h2{
    font-family:'Orbitron',sans-serif;
    color:var(--rosa-neon);
    font-size:18px;
    margin-bottom:8px;
    text-shadow:0 0 15px var(--rosa-neon), 0 0 30px var(--rosa-neon);
    font-weight:700;
  }

.top-info p{
    font-size:12px;
    margin-bottom:4px;
    opacity:0.9;
  }

.saudacao{
    margin:25px 0;
    padding:18px;
    background:linear-gradient(135deg, var(--card-bg), #1a0a1a);
    border-left:4px solid var(--rosa-neon);
    border-radius:10px;
    box-shadow:0 0 25px rgba(255,0,255,0.3);
  }

.saudacao h3{
    font-size:15px;
    color:var(--rosa-neon);
    margin-bottom:5px;
    font-weight:700;
    text-shadow:0 0 10px var(--rosa-neon);
  }

.saudacao p{
    font-size:12px;
    opacity:.85;
  }

.btn-impulsionar{
    background:var(--cinza);
    color:#555;
    border:1px solid #333;
    padding:14px;
    width:100%;
    border-radius:10px;
    margin-bottom:30px;
    cursor:not-allowed;
    font-weight:600;
    font-size:13px;
    font-family:'Orbitron',sans-serif;
  }

.section-title{
    color:var(--texto);
    font-size:16px;
    margin-bottom:18px;
    font-weight:700;
    font-family:'Orbitron',sans-serif;
  }

.grid-categorias{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-bottom:35px;
  }

.cat-card{
    background:var(--card-bg);
    border:2px solid var(--roxo-neon);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(139,0,255,0.4);
  }

.cat-card:active{
    transform:scale(0.97);
  }

.cat-card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 35px var(--rosa-glow);
    border-color:var(--rosa-neon);
  }

.cat-card img{
    width:100%;
    height:110px;
    object-fit:cover;
    display:block;
    background:var(--preto);
  }

.cat-card h4{
    padding:12px 8px;
    font-size:10px;
    text-align:center;
    font-weight:700;
    text-transform:uppercase;
    background:linear-gradient(135deg, var(--roxo-neon), var(--rosa-neon));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-family:'Orbitron',sans-serif;
  }

.produtos-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:18px;
  }

.product-card{
    background:var(--card-bg);
    border:2px solid var(--roxo-neon);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(139,0,255,0.5);
  }

.product-header{
    padding:14px;
    border-bottom:1px solid var(--roxo-neon);
    background:linear-gradient(135deg, rgba(139,0,255,0.2), rgba(255,0,255,0.1));
  }

.product-header h4{
    font-size:13px;
    color:var(--texto);
    font-weight:700;
  }

.product-body{
    padding:16px;
  }

.price-select{
    width:100%;
    padding:10px;
    background:var(--preto);
    border:1px solid var(--rosa-neon);
    color:var(--texto);
    border-radius:8px;
    margin-bottom:12px;
    font-size:12px;
  }

.btn-comprar{
    width:100%;
    background:linear-gradient(135deg,var(--rosa-neon),var(--roxo-neon));
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    font-weight:900;
    cursor:pointer;
    font-size:13px;
    box-shadow:0 0 25px var(--rosa-glow);
    text-transform:uppercase;
    font-family:'Orbitron',sans-serif;
  }

.hidden{display:none!important}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;align-items:center;justify-content:center}
.modal.active{display:flex}

.admin-bar{
    background:linear-gradient(135deg,var(--roxo-neon),var(--rosa-neon));
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    box-shadow:0 0 30px var(--roxo-glow);
    border-radius:10px;
  }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h3>⚡ PREMIUM VZ</h3>
    <div id="formLogin">
      <input type="text" id="loginEmail" placeholder="Email">
      <input type="password" id="loginSenha" placeholder="Senha">
      <button class="btn-rosa" onclick="fazerLogin()">Entrar</button>
      <p class="link-text" onclick="mostrarCadastro()">Criar conta</p>
      <p class="link-text" onclick="abrirAdmin()">Acesso Admin</p>
    </div>
    <div id="formCadastro" class="hidden">
      <input type="text" id="cadNome" placeholder="Nome completo">
      <input type="text" id="cadEmail" placeholder="Email">
      <input type="password" id="cadSenha" placeholder="Senha">
      <button class="btn-rosa" onclick="cadastrar()">Criar Conta</button>
      <p class="link-text" onclick="mostrarLogin()">Voltar pro Login</p>
    </div>
  </div>
</div>

<div id="adminModal" class="modal">
  <div class="login-card">
    <h3>⚡ PAINEL ADMIN</h3>
    <input type="text" id="adminUser" placeholder="Usuário">
    <input type="password" id="adminPass" placeholder="Senha">
    <button class="btn-rosa" onclick="loginAdmin()">Entrar</button>
    <p class="link-text" onclick="fecharAdmin()">Voltar</p>
  </div>
</div>

<div id="app" class="hidden">
  <div class="user-bar">
    <span id="userLogado"></span>
    <span class="link-text" onclick="sair()">Sair</span>
  </div>

  <div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <span class="heart">♥</span>
  </div>

  <div class="container">
    <div class="top-info">
      <h2>Contatos do site</h2>
      <p>@chanelff__ | WhatsApp: 98984753563</p>
    </div>

    <div class="saudacao">
      <h3 id="saudacaoNome">Oie, cliente!</h3>
      <p>Seu painel está otimizado</p>
    </div>

    <button class="btn-impulsionar" disabled>Impulsionar</button>

    <div id="categoriasView">
      <h3 class="section-title">Categorias</h3>
      <div class="grid-categorias" id="gridCategorias"></div>
    </div>

    <div id="produtosView" class="hidden">
      <button onclick="voltarCategorias()" style="margin-bottom:18px;background:var(--cinza);border:1px solid var(--roxo-neon);color:var(--texto);padding:10px 18px;border-radius:8px;cursor:pointer;font-size:12px">← Voltar</button>
      <h3 class="section-title" id="tituloCat"></h3>
      <div class="produtos-grid" id="gridProdutos"></div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="admin-bar">
        <span style="font-size:14px;font-weight:700;font-family:'Orbitron',sans-serif">PAINEL ADMIN</span>
        <button onclick="abrirModalProduto()" style="background:var(--rosa-neon);color:white;border:none;padding:10px 18px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700">+ Adicionar</button>
      </div>
    </div>
  </div>
</div>

<div id="modalProduto" class="modal">
  <div class="login-card">
    <h3 id="modalTitulo">Adicionar Produto</h3>
    <select id="pCategoria" class="price-select"></select>
    <input type="text" id="pNome" placeholder="Nome do produto">
    <input type="text" id="pImagem" placeholder="URL da imagem">
    <input type="number" id="pValor" placeholder="Valor R$">
    <input type="number" id="pEstoque" placeholder="Estoque">
    <button class="btn-rosa" onclick="salvarProduto()">Salvar</button>
    <button onclick="fecharModalProduto()" style="background:var(--cinza);color:var(--texto);border:1px solid var(--roxo-neon);padding:12px;border-radius:8px;width:100%;margin-top:10px;cursor:pointer">Fechar</button>
  </div>
</div>

<script>
  const CATEGORIAS = [
    {nome:'FORTNITE BATTLE ROYALE', img:'https://cdn2.unrealengine.com/Fortnite/fortnite-game/home/carousel/08BR-1920x1080-1920x1080.jpg'},
    {nome:'CLASH OF CLANS', img:'https://clashofclans.com/images/news/clashofclans_banner.jpg'},
    {nome:'FREE FIRE', img:'https://freefiremobile-a.akamaihd.net/common/web_event/official/logo_ff.png'},
    {nome:'ROBLOX', img:'https://images.rbxcdn.com/7b3b4a4a4a'},
    {nome:'MINECRAFT', img:'https://www.minecraft.net/content/dam/games/minecraft/key-art/MC-Vanilla_Media-Block-Image_PC-Bundle-Keyart_800x450.jpg'},
    {nome:'BRAWL STARS', img:'https://supercell.com/images/games/brawlstars-thumb.jpg'}
  ];

  let db = JSON.parse(localStorage.getItem('premiumvz_neon')) || {
    produtos: [],
    clientes: [],
    logado:null,
    admin:false
  };

  let categoriaAtual = null;
  let editandoId = null;

  function mostrarCadastro(){
    document.getElementById('formLogin').classList.add('hidden');
    document.getElementById('formCadastro').classList.remove('hidden');
  }

  function mostrarLogin(){
    document.getElementById('formCadastro').classList.add('hidden');
    document.getElementById('formLogin').classList.remove('hidden');
  }

  function cadastrar(){
    const nome = document.getElementById('cadNome').value.trim();
    const email = document.getElementById('cadEmail').value.trim();
    const senha = document.getElementById('cadSenha').value.trim();
    if(!nome||!email||!senha){alert('Preencha tudo');return;}
    if(db.clientes.find(c=>c.email===email)){alert('Email já cadastrado');return;}
    db.clientes.push({nome,email,senha});
    salvarDB();
    alert('Conta criada! Faça login');
    mostrarLogin();
  }

  function fazerLogin(){
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value.trim();
    const cliente = db.clientes.find(c=>c.email===email&&c.senha===senha);
    if(cliente){
      db.logado = cliente;
      db.admin = false;
      salvarDB();
      entrarSite();
    }else{
      alert('Email ou senha incorretos');
    }
  }

  function abrirAdmin(){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminModal').classList.add('active');
  }

  function fecharAdmin(){
    document.getElementById('adminModal').classList.remove('active');
    document.getElementById('loginScreen').classList.remove('hidden');
  }

  function loginAdmin(){
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if(u==='Lorrannyh.16' && p==='Lorrannyh.16'){
      db.admin = true;
      db.logado = {nome:'Lorrannyh.120',email:'admin'};
      salvarDB();
      fecharAdmin();
      entrarSite();
    }else{
      alert('Acesso negado');
    }
  }

  function entrarSite(){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminModal').classList.remove('active');
    document.getElementById('app').classList.remove('hidden');

    if(db.admin){
      document.getElementById('adminPanel').classList.remove('hidden');
      document.getElementById('saudacaoNome').textContent = 'Oie, Lorrannyh.120!';
    }else{
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('saudacaoNome').textContent = `Oie, ${db.logado.nome}!`;
    }

    document.getElementById('userLogado').textContent = `Logado: ${db.logado.email}`;
    init();
  }

  function sair(){
    db.logado = null;
    db.admin = false;
    salvarDB();
    location.reload();
  }

  function init(){
    renderCategorias();
    popularSelectCategoria();
  }

  function renderCategorias(){
    const grid = document.getElementById('gridCategorias');
    grid.innerHTML = CATEGORIAS.map(cat=>`
      <div class="cat-card" onclick="abrirCategoria('${cat.nome}')">
        <img src="${cat.img}" alt="${cat.nome}" onerror="this.src='https://via.placeholder.com/300x200/8b00ff/ffffff?text=${cat.nome}'">
        <h4>${cat.nome}</h4>
      </div>
    `).join('');
  }

  function abrirCategoria(nome){
    categoriaAtual = nome;
    document.getElementById('categoriasView').classList.add('hidden');
    document.getElementById('produtosView').classList.remove('hidden');
    document.getElementById('tituloCat').textContent = nome;
    renderProdutos();
  }

  function voltarCategorias(){
    document.getElementById('categoriasView').classList.remove('hidden');
    document.getElementById('produtosView').classList.add('hidden');
  }

  function renderProdutos(){
    const grid = document.getElementById('gridProdutos');
    const lista = db.produtos.filter(p=>p.categoria===categoriaAtual);
    if(lista.length===0){
      grid.innerHTML='<p style="grid-column:1/-1;text-align:center;opacity:.5">Nenhum produto cadastrado</p>';
      return;
    }
    grid.innerHTML = lista.map(p=>`
      <div class="product-card">
        <div class="product-header">
          <h4>${p.nome}</h4>
        </div>
        <div class="product-body">
          <select class="price-select">
            <option>R$ ${p.valor.toFixed(2)}</option>
          </select>
          <p style="font-size:11px;opacity:.7;margin-bottom:12px">Estoque: ${p.estoque}</p>
          <button class="btn-comprar" onclick="comprar(${p.id})">COMPRAR</button>
          ${db.admin?`<button onclick="editarProduto(${p.id})" style="width:100%;margin-top:10px;background:var(--roxo-neon);color:white;border:none;padding:10px;border-radius:8px;font-size:11px;cursor:pointer">Editar</button>`:''}
        </div>
      </div>
    `).join('');
  }

  function comprar(id){
    const p = db.produtos.find(prod=>prod.id===id);
    const msg = `Olá! Quero comprar: ${p.nome} - R$${p.valor.toFixed(2)}`;
    window.open(`https://wa.me/5598984753563?text=${encodeURIComponent(msg)}`,'_blank');
  }

  function abrirModalProduto(){
    editandoId=null;
    document.getElementById('modalTitulo').textContent='Adicionar Produto';
    document.getElementById('pNome').value='';
    document.getElementById('pImagem').value='';
    document.getElementById('pValor').value='';
    document.getElementById('pEstoque').value='';
    document.getElementById('modalProduto').classList.add('active');
  }

  function editarProduto(id){
    const p = db.produtos.find(prod=>prod.id===id);
    editandoId=id;
    document.getElementById('modalTitulo').textContent='Editar Produto';
    document.getElementById('pCategoria').value=p.categoria;
    document.getElementById('pNome').value=p.nome;
    document.getElementById('pImagem').value=p.imagem;
    document.getElementById('pValor').value=p.valor;
    document.getElementById('pEstoque').value=p.estoque;
    document.getElementById('modalProduto').classList.add('active');
  }

  function fecharModalProduto(){
    document.getElementById('modalProduto').classList.remove('active');
  }

  function popularSelectCategoria(){
    document.getElementById('pCategoria').innerHTML = CATEGORIAS.map(c=>
      `<option value="${c.nome}">${c.nome}</option>`
    ).join('');
  }

  function salvarProduto(){
    const produto = {
      id: editandoId || Date.now(),
      categoria: document.getElementById('pCategoria').value,
      nome: document.getElementById('pNome').value,
      imagem: document.getElementById('pImagem').value,
      valor: parseFloat(document.getElementById('pValor').value)||0,
      estoque: parseInt(document.getElementById('pEstoque').value)||0
    };
    if(editandoId){
      const idx = db.produtos.findIndex(p=>p.id===editandoId);
      db.produtos[idx]=produto;
    }else{
      db.produtos.push(produto);
    }
    salvarDB();
    fecharModalProduto();
    if(categoriaAtual) renderProdutos();
  }

  function toggleMenu(){
    alert('Menu: Fechar | Categorias | Redes sociais | Painel Admin');
  }

  function salvarDB(){
    localStorage.setItem('premiumvz_neon',JSON.stringify(db));
  }

  if(db.logado||db.admin){
    entrarSite();
  }
</script>
</body>
</html>
