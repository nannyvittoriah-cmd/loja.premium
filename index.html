<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prime AI Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
padding:12px;
overflow-x:hidden;
}

.topo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:18px;
}

.logo{
width:50px;
height:50px;
border-radius:16px;
background:linear-gradient(135deg,#7b1fff,#290040);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

.nome{
font-size:20px;
font-weight:bold;
}

.card{
background:#101010;
border:1px solid #2d1047;
padding:14px;
border-radius:18px;
margin-bottom:16px;
}

.label{
font-size:12px;
color:#999;
margin-bottom:10px;
}

button{
width:100%;
height:52px;
border:none;
border-radius:16px;
background:#7b1fff;
color:white;
font-weight:bold;
margin-top:12px;
font-size:14px;
}

select,
textarea,
input{
width:100%;
background:#0a0a0a;
border:none;
outline:none;
border-radius:14px;
padding:12px;
color:white;
font-size:13px;
margin-top:10px;
}

textarea{
height:100px;
resize:none;
}

.preview{
background:white;
border-radius:20px;
overflow:hidden;
height:700px;
margin-top:15px;
}

iframe{
width:100%;
height:100%;
border:none;
}

.elementos{
display:flex;
flex-direction:column;
gap:14px;
margin-top:15px;
}

.elemento{
background:#0a0a0a;
border-radius:18px;
padding:12px;
border:1px solid #2d2d2d;
}

.elemento img{
width:100%;
border-radius:14px;
margin-top:10px;
}

.small{
font-size:11px;
color:#888;
margin-top:8px;
}

.codigo{
background:#0a0a0a;
padding:14px;
border-radius:14px;
overflow:auto;
font-size:11px;
color:#6fff95;
max-height:400px;
margin-top:14px;
}

</style>

</head>

<body>

<div class="topo">

<div class="logo">
P
</div>

<div class="nome">
Prime AI Builder
</div>

</div>

<div class="card">

<div class="label">
ADICIONAR ESTRUTURA
</div>

<select id="tipo">

<option value="titulo">
Título
</option>

<option value="texto">
Texto
</option>

<option value="botao">
Botão
</option>

<option value="imagem">
Imagem
</option>

<option value="card">
Card
</option>

</select>

<textarea
id="descricao"
placeholder="Ex: botão roxo arredondado escrito comprar agora..."
></textarea>

<input
type="file"
id="imagemInput"
accept="image/*"
>

<button onclick="adicionarElemento()">
ADICIONAR ELEMENTO
</button>

</div>

<div class="card">

<div class="label">
ESTRUTURA DO SITE
</div>

<div class="elementos" id="elementos"></div>

<button onclick="gerarSite()">
GERAR SITE MOBILE
</button>

</div>

<div class="card">

<div class="label">
PREVIEW
</div>

<div class="preview">

<iframe id="preview"></iframe>

</div>

</div>

<div class="card">

<div class="label">
CÓDIGO HTML
</div>

<pre class="codigo" id="codigo"></pre>

</div>

<script>

let estrutura = [];

function adicionarElemento(){

const tipo = document.getElementById("tipo").value;

const descricao = document.getElementById("descricao").value;

const imagemInput = document.getElementById("imagemInput");

if(tipo === "imagem"){

const file = imagemInput.files[0];

if(!file){
alert("Selecione uma imagem");
return;
}

const reader = new FileReader();

reader.onload = function(e){

estrutura.push({
tipo,
descricao,
imagem:e.target.result
});

renderEstrutura();

}

reader.readAsDataURL(file);

}else{

estrutura.push({
tipo,
descricao
});

renderEstrutura();

}

}

function renderEstrutura(){

const container = document.getElementById("elementos");

container.innerHTML = "";

estrutura.forEach((item,index)=>{

const div = document.createElement("div");

div.className = "elemento";

div.innerHTML = `

<b>
${item.tipo.toUpperCase()}
</b>

<div class="small">
${item.descricao}
</div>

${item.imagem ? `<img src="${item.imagem}">` : ""}

<button onclick="remover(${index})">
REMOVER
</button>

`;

container.appendChild(div);

});

}

function remover(index){

estrutura.splice(index,1);

renderEstrutura();

}

function gerarSite(){

let htmlFinal = "";

estrutura.forEach(item=>{

if(item.tipo === "titulo"){

htmlFinal += `

<h1 class="titulo">
${item.descricao}
</h1>

`;

}

if(item.tipo === "texto"){

htmlFinal += `

<p class="texto">
${item.descricao}
</p>

`;

}

if(item.tipo === "botao"){

htmlFinal += `

<button class="botao">
${item.descricao}
</button>

`;

}

if(item.tipo === "imagem"){

htmlFinal += `

<img class="imagem"
src="${item.imagem}">

`;

}

if(item.tipo === "card"){

htmlFinal += `

<div class="cardSite">

<h2>
${item.descricao}
</h2>

</div>

`;

}

});

const html = `

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
padding:14px;
color:white;
}

.titulo{
font-size:28px;
margin-bottom:18px;
}

.texto{
font-size:14px;
color:#ccc;
margin-bottom:18px;
line-height:1.5;
}

.botao{
width:100%;
height:55px;
background:#7b1fff;
border:none;
border-radius:18px;
color:white;
font-weight:bold;
margin-bottom:18px;
}

.imagem{
width:100%;
border-radius:20px;
margin-bottom:18px;
display:block;
}

.cardSite{
background:#101010;
border:1px solid #37105a;
padding:18px;
border-radius:22px;
margin-bottom:18px;
}

</style>

</head>

<body>

${htmlFinal}

</body>

</html>

`;

document.getElementById("preview").srcdoc = html;

document.getElementById("codigo").textContent = html;

}

</script>

</body>
</html>
