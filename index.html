<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BONYX.SH</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:url('https://i.imgur.com/8Km9tLL.png') no-repeat center/cover;
  color:white;
}

/* ESCURECER FUNDO */
.overlay{
  background:rgba(0,0,0,0.75);
  min-height:100vh;
  padding:20px;
}

/* CAIXA LOGIN */
.login-box{
  max-width:350px;
  margin:auto;
  background:#0a0f2c;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px #ff00ff;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#020617;
  color:white;
}

/* BOTÃO NEON */
.btn{
  width:100%;
  padding:12px;
  background:#ff00ff;
  color:black;
  font-weight:bold;
  border:none;
  border-radius:10px;
  margin-top:10px;
  box-shadow:0 0 10px #ff00ff;
}

/* CARDS */
.card{
  background:#111a44;
  padding:15px;
  border-radius:15px;
  margin:10px 0;
  box-shadow:0 0 10px black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* MENU */
.menu{
  position:fixed;
  right:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#0a0f2c;
  padding:20px;
  transition:0.3s;
}
.menu.active{right:0}

.menu div{
  padding:15px;
  border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div class="overlay">
  <div id="app"></div>
</div>

<div class="menu" id="menu">
  <div onclick="conta()">Minha conta</div>
  <div onclick="compras()">Minhas compras</div>
  <div onclick="favoritos()">Favoritos</div>
  <div onclick="contato()">Contato</div>
  <div onclick="admin()">Admin</div>
</div>

<script>

const ADMIN = "nannyvittoriah@gmail.com";

// ================= LOGIN =================
function telaLogin(){
  app.innerHTML = `
    <div class="login-box">
      <h2>BONYX.SH 💎</h2>

      <input id="email" placeholder="Email">
      <input id="senha" placeholder="Senha">

      <button class="btn" onclick="login()">Entrar</button>
      <button class="btn" onclick="cadastro()">Cadastrar</button>
    </div>
  `;
}

// ================= CADASTRO =================
function cadastro(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({
    email:email.value,
    senha:senha.value,
    compras:[],
    fav:[],
    feedback:false
  });

  localStorage.setItem("users", JSON.stringify(users));
  alert("Conta criada!");
}

// ================= LOGIN =================
function login(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u=>u.email==email.value && u.senha==senha.value);

  if(user){
    localStorage.setItem("user", user.email);
    home();
  }else{
    alert("Login inválido");
  }
}

// ================= HOME =================
function home(){
  app.innerHTML = `
    <button onclick="menuToggle()">☰</button>

    <h2>Categorias</h2>

    <div class="grid">
      <div class="card" onclick="produtos()">Free Fire</div>
      <div class="card">Clash</div>
    </div>

    <h2>Feedback dos clientes</h2>
    <div class="card">⭐️⭐️⭐️⭐️⭐️ - Emory</div>
    <div class="card">⭐️⭐️⭐️⭐️ - Sofia</div>
  `;
}

// ================= PRODUTOS =================
function produtos(){
  app.innerHTML = `
    <button onclick="home()">Voltar</button>

    <div class="card">
      <h3>DIMAS FF</h3>
      <p>Descrição: Entrega rápida</p>

      <input id="qtd" type="number" placeholder="Quantidade">

      <p>Preço: R$ 14</p>

      <button class="btn" onclick="comprar('Dimas FF',14)">Comprar</button>
      <button class="btn" onclick="fav('Dimas FF')">Favoritar</button>
    </div>
  `;
}

// ================= COMPRAR =================
function comprar(nome,preco){
  let users = JSON.parse(localStorage.getItem("users"));
  let email = localStorage.getItem("user");
  let user = users.find(u=>u.email==email);

  user.compras.push({nome,preco});
  localStorage.setItem("users", JSON.stringify(users));

  alert("PIX: (98) 98485-3563\nNome: Lorrane Vitória Alves Vaz");
}

// ================= FAVORITOS =================
function fav(nome){
  let users = JSON.parse(localStorage.getItem("users"));
  let email = localStorage.getItem("user");
  let user = users.find(u=>u.email==email);

  user.fav.push(nome);
  localStorage.setItem("users", JSON.stringify(users));

  alert("Adicionado aos favoritos");
}

// ================= MENU =================
function menuToggle(){
  menu.classList.toggle("active");
}

// ================= CONTA =================
function conta(){
  app.innerHTML = `
    <h2>Minha conta</h2>
    <p>${localStorage.getItem("user")}</p>
  `;
}

// ================= COMPRAS =================
function compras(){
  let users = JSON.parse(localStorage.getItem("users"));
  let email = localStorage.getItem("user");
  let user = users.find(u=>u.email==email);

  app.innerHTML = `<h2>Compras</h2>`;

  user.compras.forEach(c=>{
    app.innerHTML += `<div class="card">${c.nome} - R$ ${c.preco}</div>`;
  });
}

// ================= FAVORITOS =================
function favoritos(){
  let users = JSON.parse(localStorage.getItem("users"));
  let email = localStorage.getItem("user");
  let user = users.find(u=>u.email==email);

  app.innerHTML = `<h2>Favoritos</h2>`;

  user.fav.forEach(f=>{
    app.innerHTML += `<div class="card">${f}</div>`;
  });
}

// ================= CONTATO =================
function contato(){
  app.innerHTML = `
    <h2>Fale com a gerente</h2>
    <p>WhatsApp: (98) 98485-3563</p>
  `;
}

// ================= ADMIN =================
function admin(){
  if(localStorage.getItem("user") !== ADMIN){
    alert("Acesso negado");
    return;
  }

  app.innerHTML = `<h2>PAINEL ADMIN 👑</h2>`;
}

// ================= INIT =================
if(localStorage.getItem("user")){
  home();
}else{
  telaLogin();
}

</script>

</body>
</html>
