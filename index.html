<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0"/>
<style>
:root{
  --bg:#060609;--card:#131319;--border:#26262f;--purple:#7c3aed;--text:#f5f5f7;--text2:#8a8a93;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);font-size:12px;}
.page{display:none;min-height:100vh;padding-bottom:70px;}
.page.active{display:block;}

.header{
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
}
.header h3{font-size:14px;font-weight:600;}
.header.right{display:flex;align-items:center;gap:14px;}
.header.right span{cursor:pointer;font-size:20px;}

.search{
  margin:0 16px 16px;
  background:rgba(26,26,33,0.8);
  border:1px solid var(--border);
  border-radius:10px;
  height:38px;
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:8px;
}
.search input{
  background:transparent;border:none;outline:none;color:var(--text);
  flex:1;font-size:12px;
}
.search input::placeholder{color:var(--text2);font-size:11px;}

.banner{
  margin:0 16px 20px;
  height:140px;
  border-radius:14px;
  background:linear-gradient(135deg,#1e1b4b,#7c3aed);
  padding:20px;
  position:relative;
  overflow:hidden;
}
.banner h2{font-size:16px;font-weight:700;margin-bottom:4px;}
.banner p{font-size:11px;color:#d1d5db;}
.banner img{
  position:absolute;right:10px;bottom:0;height:120px;
}

.section-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 16px;margin-bottom:12px;
}
.section-head h4{font-size:13px;font-weight:600;}
.section-head a{font-size:11px;color:var(--purple);text-decoration:none;}

.grid-cat{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:0 16px;margin-bottom:24px;
}
.cat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;
}
.cat-card img{width:32px;height:32px;margin-bottom:6px;}
.cat-card p{font-size:10px;color:var(--text2);}

.grid-prod{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:0 16px;
}
.prod-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:10px;cursor:pointer;
}
.prod-card img{
  width:100%;height:60px;object-fit:contain;margin-bottom:8px;
}
.prod-card h5{font-size:11px;font-weight:600;margin-bottom:2px;}
.prod-card p{font-size:10px;color:var(--text2);margin-bottom:4px;}
.prod-card.price{font-size:12px;font-weight:700;color:#fff;}

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(19,19,25,0.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;padding:8px 0;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--text2);font-size:10px;cursor:pointer;
}
.nav-item.active{color:var(--purple);}
.nav-item span{font-size:22px;}
.badge{
  position:absolute;background:#ef4444;color:#fff;font-size:9px;
  border-radius:50%;width:16px;height:16px;display:none;
  align-items:center;justify-content:center;top:4px;right:16px;
}
</style>
</head>
<body>

<!-- HOME -->
<section class="page active" id="home">
  <div class="header">
    <div>
      <span class="material-symbols-outlined">menu</span>
    </div>
    <h3>Olá, Gabriel 👋</h3>
    <div class="right">
      <span>Ver saldo</span>
      <span class="material-symbols-outlined" onclick="showPage('cart')" style="position:relative;">
        shopping_cart
        <span class="badge" id="cartBadge">0</span>
      </span>
    </div>
  </div>

  <div class="search">
    <span class="material-symbols-outlined" style="color:var(--text2);font-size:18px;">search</span>
    <input type="text" id="searchInput" placeholder="Buscar produtos..." oninput="search()">
  </div>

  <div class="banner">
    <h2>MEGA PROMO</h2>
    <p>ATÉ 50% OFF<br>Produtos selecionados!</p>
    <img src="https://i.imgur.com/8QfT6vO.png" alt="">
  </div>

  <div class="section-head">
    <h4>Categorias</h4>
    <a href="#" onclick="showPage('shop')">Ver todas</a>
  </div>

  <div class="grid-cat" id="catGrid"></div>

  <div class="section-head">
    <h4>Destaques</h4>
    <a href="#" onclick="showPage('shop')">Ver todas</a>
  </div>

  <div class="grid-prod" id="prodGrid"></div>
</section>

<!-- SHOP -->
<section class="page" id="shop">
  <div class="header">
    <span class="material-symbols-outlined" onclick="showPage('home')">arrow_back</span>
    <h3>Loja</h3>
    <span></span>
  </div>
  <div class="grid-prod" id="shopGrid" style="padding:16px;"></div>
</section>

<!-- CART -->
<section class="page" id="cart">
  <div class="header">
    <span class="material-symbols-outlined" onclick="showPage('home')">arrow_back</span>
    <h3>Carrinho</h3>
    <span onclick="clearCart()" style="color:var(--purple);font-size:12px;">Limpar</span>
  </div>
  <div id="cartList" style="padding:16px;display:flex;flex-direction:column;gap:10px;"></div>
</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showPage('home')">
    <span class="material-symbols-outlined">home</span>Home
  </div>
  <div class="nav-item" onclick="showPage('shop')">
    <span class="material-symbols-outlined">grid_view</span>Loja
  </div>
  <div class="nav-item" onclick="showPage('cart')" style="position:relative;">
    <span class="material-symbols-outlined">shopping_cart</span>Carrinho
  </div>
  <div class="nav-item">
    <span class="material-symbols-outlined">receipt</span>Pedidos
  </div>
  <div class="nav-item">
    <span class="material-symbols-outlined">person</span>Perfil
  </div>
</div>

<script>
const categories = [
  {name:'Games', img:'https://img.icons8.com/ios-filled/50/7c3aed/game-controller.png'},
  {name:'Streaming', img:'https://img.icons8.com/ios-filled/50/7c3aed/youtube-play.png'},
  {name:'Redes Sociais', img:'https://img.icons8.com/ios-filled/50/7c3aed/instagram-new.png'},
  {name:'Gift Cards', img:'https://img.icons8.com/ios-filled/50/7c3aed/wallet.png'}
];

const products = [
  {id:1,name:'ROBUX',desc:'400 Robux',price:15.90,img:'https://i.imgur.com/5zQ8X3m.png',cat:'Games'},
  {id:2,name:'NETFLIX',desc:'1 Mês',price:17.90,img:'https://i.imgur.com/6W0lVJy.png',cat:'Streaming'},
  {id:3,name:'SPOTIFY',desc:'Premium 1 Mês',price:10.90,img:'https://i.imgur.com/5d0vgDi.png',cat:'Streaming'},
  {id:4,name:'FREE FIRE',desc:'1000 Diamantes',price:29.90,img:'https://i.imgur.com/3QJ3Q3m.png',cat:'Games'},
  {id:5,name:'DISCORD',desc:'Nitro 1 Mês',price:24.90,img:'https://i.imgur.com/4QJ3Q3m.png',cat:'Redes Sociais'},
  {id:6,name:'GOOGLE PLAY',desc:'R$ 50',price:50.00,img:'https://i.imgur.com/5QJ3Q3m.png',cat:'Gift Cards'}
];

let cart = JSON.parse(localStorage.getItem("cart"))||[];

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',i==['home','shop','cart','orders','profile'].indexOf(p)));

  if(p=='home')renderHome();
  if(p=='shop')renderShop();
  if(p=='cart')renderCart();
}

function renderHome(){
  document.getElementById('catGrid').innerHTML = categories.map(c=>`
    <div class="cat-card" onclick="openCat('${c.name}')">
      <img src="${c.img}">
      <p>${c.name}</p>
    </div>
  `).join('');

  document.getElementById('prodGrid').innerHTML = products.slice(0,3).map(p=>`
    <div class="prod-card" onclick="addCart(${p.id})">
      <img src="${p.img}">
      <h5>${p.name}</h5>
      <p>${p.desc}</p>
      <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
    </div>
  `).join('');

  updateBadge();
}

function renderShop(){
  document.getElementById('shopGrid').innerHTML = products.map(p=>`
    <div class="prod-card" onclick="addCart(${p.id})">
      <img src="${p.img}">
      <h5>${p.name}</h5>
      <p>${p.desc}</p>
      <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
    </div>
  `).join('');
}

function openCat(cat){
  showPage('shop');
  setTimeout(()=>{
    document.getElementById('shopGrid').innerHTML = products.filter(p=>p.cat==cat).map(p=>`
      <div class="prod-card" onclick="addCart(${p.id})">
        <img src="${p.img}">
        <h5>${p.name}</h5>
        <p>${p.desc}</p>
        <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
      </div>
    `).join('');
  },100);
}

function search(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const f = products.filter(p=>p.name.toLowerCase().includes(q));
  document.getElementById('prodGrid').innerHTML = f.slice(0,3).map(p=>`
    <div class="prod-card" onclick="addCart(${p.id})">
      <img src="${p.img}">
      <h5>${p.name}</h5>
      <p>${p.desc}</p>
      <div class="price">R$ ${p.price.toFixed(2).replace('.',',')}</div>
    </div>
  `).join('');
}

function addCart(id){
  const p = products.find(x=>x.id==id);
  const e = cart.find(x=>x.id==id);
  if(e)e.qty++;else cart.push({...p,qty:1});
  localStorage.setItem("cart",JSON.stringify(cart));
  updateBadge();
  alert(p.name+' adicionado!');
}

function renderCart(){
  if(cart.length==0){
    document.getElementById('cartList').innerHTML='<p style="text-align:center;padding:40px;color:var(--text2);">Carrinho vazio</p>';
    return;
  }
  document.getElementById('cartList').innerHTML = cart.map((i,idx)=>`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;gap:12px;align-items:center;">
      <img src="${i.img}" style="width:50px;height:50px;object-fit:contain;">
      <div style="flex:1;">
        <h5 style="font-size:12px;">${i.name}</h5>
        <p style="font-size:11px;color:var(--text2);">${i.desc}</p>
        <div style="font-size:13px;font-weight:700;">R$ ${(i.price*i.qty).toFixed(2).replace('.',',')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="chgQty(${idx},-1)" style="width:24px;height:24px;border:1px solid var(--border);background:transparent;color:#fff;border-radius:6px;">-</button>
        <span style="font-size:12px;">${i.qty}</span>
        <button onclick="chgQty(${idx},1)" style="width:24px;height:24px;border:1px solid var(--border);background:transparent;color:#fff;border-radius:6px;">+</button>
      </div>
    </div>
  `).join('');
}

function chgQty(i,d){
  cart[i].qty+=d;
  if(cart[i].qty<=0)cart.splice(i,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();updateBadge();
}

function clearCart(){
  cart=[];localStorage.removeItem("cart");
  renderCart();updateBadge();
}

function updateBadge(){
  const t = cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartBadge').style.display=t>0?'flex':'none';
  document.getElementById('cartBadge').innerText=t;
}

// Inicia
renderHome();
</script>
</body>
</html>
