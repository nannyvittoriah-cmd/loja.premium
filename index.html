<!-- LOGIN -->
<section class="page active" id="login">
  <div class="login-wrap">
    <div class="login-card">
      
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#7c3aed"/>
            <path d="M2 17L12 22L22 17" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
            <path d="M2 12L12 17L22 12" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>PRIME</h1>
          <span>STORE VZ</span>
        </div>
      </div>

      <div id="loginForm">
        <h2>Bem-vindo de volta!</h2>
        <p class="subtitle">Faça login para continuar</p>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">mail</span>
          <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">lock</span>
          <input type="password" id="loginPass" placeholder="Senha">
          <span class="material-symbols-outlined toggle" onclick="togglePass('loginPass',this)">visibility_off</span>
        </div>

        <div class="forgot">
          <a href="#">Esqueci minha senha</a>
        </div>

        <p class="error" id="loginError"></p>
        
        <button class="btn-primary" onclick="login()">Entrar</button>

        <div class="divider"></div>

        <p class="signup">Ainda não tem conta? <a href="#" onclick="toggleForm()">Criar conta</a></p>
      </div>

      <div id="registerForm" class="hidden">
        <h2>Criar conta</h2>
        <p class="subtitle">Preencha seus dados</p>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">person</span>
          <input type="text" id="regName" placeholder="Seu nome">
        </div>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">mail</span>
          <input type="email" id="regEmail" placeholder="seu@email.com">
        </div>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">lock</span>
          <input type="password" id="regPass" placeholder="Senha">
          <span class="material-symbols-outlined toggle" onclick="togglePass('regPass',this)">visibility_off</span>
        </div>

        <p class="error" id="regError"></p>
        
        <button class="btn-primary" onclick="register()">Cadastrar</button>

        <div class="divider"></div>

        <p class="signup">Já tem conta? <a href="#" onclick="toggleForm()">Fazer login</a></p>
      </div>
    </div>
  </div>
</section>

<style>
.login-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:#060609;
}

.login-card{
  width:100%;
  max-width:360px;
  background:#131319;
  border:1px solid #26262f;
  border-radius:18px;
  padding:32px 24px;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:32px;
}
.logo-icon{
  width:40px;
  height:40px;
}
.logo-icon svg{
  width:100%;
  height:100%;
}
.logo h1{
  font-size:20px;
  font-weight:700;
  letter-spacing:0.5px;
  color:#fff;
}
.logo span{
  font-size:11px;
  color:#8a8a93;
  letter-spacing:2px;
  display:block;
  margin-top:-2px;
}

h2{
  font-size:20px;
  font-weight:600;
  margin-bottom:6px;
  color:#fff;
  text-align:center;
}
.subtitle{
  font-size:13px;
  color:#8a8a93;
  margin-bottom:28px;
  text-align:center;
}

.input-group{
  position:relative;
  margin-bottom:14px;
}
.input-group input{
  width:100%;
  height:48px;
  background:#1a1a21;
  border:1px solid #26262f;
  border-radius:12px;
  padding:0 44px 0 44px;
  color:#fff;
  font-size:14px;
  outline:none;
  transition:0.2s;
}
.input-group input:focus{
  border-color:#7c3aed;
}
.input-group input::placeholder{
  color:#6b7280;
}
.input-group .icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:#8a8a93;
  font-size:20px;
}
.input-group .toggle{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  color:#8a8a93;
  cursor:pointer;
  font-size:20px;
}
.input-group .toggle:hover{color:#7c3aed;}

.forgot{
  text-align:right;
  margin:-6px 0 20px;
}
.forgot a{
  font-size:12px;
  color:#7c3aed;
  text-decoration:none;
}

.btn-primary{
  width:100%;
  height:48px;
  background:#7c3aed;
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}
.btn-primary:hover{
  background:#6d28d9;
}

.divider{
  height:1px;
  background:#26262f;
  margin:20px 0;
}

.signup{
  text-align:center;
  font-size:13px;
  color:#8a8a93;
}
.signup a{
  color:#7c3aed;
  text-decoration:none;
  font-weight:600;
}

.error{
  color:#ef4444;
  font-size:12px;
  margin:-8px 0 16px;
  display:none;
  text-align:center;
}

.hidden{display:none;}
</style>
<html>
