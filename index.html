<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Gamer</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0a0014,#1a0033);
    color:white;
}

/* LOGIN */
.login{
    padding:20px;
    text-align:center;
}

input{
    width:80%;
    padding:12px;
    margin:5px;
    border-radius:10px;
    border:1px solid #ff00aa;
    background:transparent;
    color:white;
}

button{
    background:#ff00aa;
    border:none;
    padding:12px;
    width:85%;
    border-radius:10px;
    color:white;
    font-weight:bold;
    margin-top:10px;
}

/* CATEGORIAS */
.categorias{
    padding:15px;
}

.categorias img{
    width:100px;
    border-radius:10px;
    margin:5px;
}

/* COMPRA */
.compra{
    margin:15px;
    padding:15px;
    border:1px solid #ff00aa;
    border-radius:15px;
}

/* AVALIAÇÕES */
.avaliacoes{
    padding:15px;
}

.card{
    border:1px solid #ff00aa;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="login">
    <h2>Login</h2>
    <input type="text" placeholder="Email"><br>
    <input type="password" placeholder="Senha"><br>
    <button>ENTRAR</button><br><br>

    <button>Entrar com Google</button><br>
    <button>Entrar com Discord</button><br>

    <p>Novo por aqui? <span style="color:#ff00aa;">Cadastrar-se</span></p>
</div>

<!-- CATEGORIAS -->
<div class="categorias">
    <h2>Categorias</h2>
    <img src="https://via.placeholder.com/100">
    <img src="https://via.placeholder.com/100">
    <img src="https://via.placeholder.com/100">
</div>

<!-- COMPRA -->
<div class="compra">
    <h2>Free Fire</h2>
    <p>DIMAS FF</p>

    <select>
        <option>1</option>
        <option>2</option>
    </select>

    <select>
        <option>R$ 10</option>
        <option>R$ 20</option>
    </select>

    <button>COMPRAR</button>
</div>

<!-- AVALIAÇÕES -->
<div class="avaliacoes">
    <h2>Feedback dos Clientes</h2>

    <div class="card">
        ⭐⭐⭐⭐⭐<br>
        Entrega rápida, recomendo!
    </div>

    <div class="card">
        ⭐⭐⭐⭐⭐<br>
        Muito bom, comprarei novamente!
    </div>

    <div class="card">
        ⭐⭐⭐⭐⭐<br>
        Atendimento top!
    </div>
</div>

</body>
</html>
