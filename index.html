<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja FF</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f2a;
color:white;
}

.fundo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://i.imgur.com/iWGitub.jpeg") no-repeat center center;
background-size:cover;
z-index:-1;
filter:brightness(0.6);
}

.tela{
display:none;
padding:20px;
}

.ativo{display:block;}

.topo{
text-align:center;
font-size:22px;
color:#ff4da6;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:#11194a;
border:2px solid #ff4da6;
border-radius:12px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:100px;
object-fit:contain;
background:black;
border-radius:10px;
}

button{
margin-top:8px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff4da6;
color:white;
font-weight:bold;
cursor:pointer;
}

.voltar{
background:#333;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="fundo"></div>

<!-- ================= CATEGORIAS ================= -->
<div id="categorias" class="tela ativo">

<div class="topo">🔥 Bonys Story</div>

<div class="grid">

<div class="card" onclick="openRede()">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>📸 Redes Sociais</p>
</div>

<div class="card" onclick="openTokens()">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>💎 Tokens Universal FF</p>
</div>

<div class="card" onclick="openElite()">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>🎮 Pass de Elite FF</p>
</div>

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>💎 Diamantes FF</p>
</div>

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>🎁 Caixa Surpresa FF</p>
</div>

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>🎯 Sensi FF</p>
</div>

</div>

</div>

<!-- ================= REDES SOCIAIS ================= -->
<div id="rede" class="tela">

<button class="voltar" onclick="back()">⬅ Voltar</button>

<div class="topo">Instagram Seguidores</div>

<div class="grid">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>100 Seguidores</p>
<button onclick="buy('100 Seguidores')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>300 Seguidores</p>
<button onclick="buy('300 Seguidores')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>1K Seguidores</p>
<button onclick="buy('1K Seguidores')">Comprar</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
<p>2K Seguidores</p>
<button onclick="buy('2K Seguidores')">Comprar</button>
</div>

</div>

</div>

<!-- ================= TOKENS ================= -->
<div id="tokens" class="tela">

<button class="voltar" onclick="back()">⬅ Voltar</button>

<div class="topo">Tokens Universal FF</div>

<div class="grid">

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>Token 100</p>
<button onclick="buy('Token 100')">Comprar</button>
</div>

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>Token 500</p>
<button onclick="buy('Token 500')">Comprar</button>
</div>

</div>

</div>

<!-- ================= ELITE ================= -->
<div id="elite" class="tela">

<button class="voltar" onclick="back()">⬅ Voltar</button>

<div class="topo">Pass de Elite FF</div>

<div class="grid">

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>Elite Básico</p>
<button onclick="buy('Pass Elite Básico')">Comprar</button>
</div>

<div class="card">
<img src="https://i.imgur.com/31BewwU.jpeg">
<p>Elite Premium</p>
<button onclick="buy('Pass Elite Premium')">Comprar</button>
</div>

</div>

</div>

<script>

function openRede(){
switchPage("rede");
}

function openTokens(){
switchPage("tokens");
}

function openElite(){
switchPage("elite");
}

function switchPage(id){
document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativo"));
document.getElementById(id).classList.add("ativo");
}

function back(){
switchPage("categorias");
}

function buy(product){
let number = "5598984853563";
let msg = "Olá, quero comprar: " + product;
let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(msg);
window.open(url,"_blank");
}

</script>

</body>
</html>
