<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { background: #000; margin: 0; }
    * { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // TEUS DADOS JÁ ESTÃO AQUI
    const SENHA_ADMIN = "Lorrannyh.101225"; 
    const CHAVE_PIX = "98984853563";
    const WHATSAPP = "5598984853563";
    const NOME_LOJA = "Premium Store";
    const NOME_COMPLETO = "Lorrane Vitória Alves Vaz";

    function Loja() {
      const [admin, setAdmin] = useState(false);
      const [modal, setModal] = useState(null);
      const [copiado, setCopiado] = useState(false);
      const [aba, setAba] = useState("produtos");
      const [banner, setBanner] = useState(localStorage.getItem("banner") || "");
      const [categorias, setCategorias] = useState(JSON.parse(localStorage.getItem("categorias")) || [
        { id: 1, nome: "Pijamas", foto: "https://picsum.photos/300/200" }
      ]);
      const [produtos, setProdutos] = useState(JSON.parse(localStorage.getItem("produtos")) || [
        { id: 1, nome: "Pijama Rosa", preco: 89.9, desc: "100% algodão", foto: "https://picsum.photos/400/400", categoria: "Pijamas", estoque: 5 }
      ]);
      const [pedidos, setPedidos] = useState(JSON.parse(localStorage.getItem("pedidos")) || []);

      useEffect(() => {
        localStorage.setItem("produtos", JSON.stringify(produtos));
        localStorage.setItem("categorias", JSON.stringify(categorias));
        localStorage.setItem("pedidos", JSON.stringify(pedidos));
        localStorage.setItem("banner", banner);
      }, [produtos, categorias, pedidos, banner]);

      useEffect(() => {
        if (window.location.hash === "#admin") {
          const senha = prompt("Senha do admin:");
          if (senha === SENHA_ADMIN) setAdmin(true);
          else window.location.hash = "";
        }
        lucide.createIcons();
      }, []);

      useEffect(() => { lucide.createIcons(); });

      const copiarPix = () => {
        navigator.clipboard.writeText(CHAVE_PIX);
        setCopiado(true);
        setTimeout(() => setCopiado(false), 2000);
      };

      const finalizarWhats = (p) => {
        const msg = `Olá! Quero comprar: ${p.nome} - R$ ${p.preco.toFixed(2)}`;
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");
        setPedidos([...pedidos, {
          id: Date.now(),
          cliente: "Cliente WhatsApp",
          produto: p.nome,
          total: p.preco,
          data: new Date().toLocaleString("pt-BR"),
          status: "Pendente"
        }]);
        setProdutos(produtos.map(x => x.id === p.id? {...x, estoque: x.estoque - 1} : x));
        setModal(null);
      };

      const addProduto = () => {
        const nome = prompt("Nome do produto:");
        const preco = parseFloat(prompt("Preço:") || "0");
        const desc = prompt("Descrição:");
        const foto = prompt("URL da foto:");
        const categoria = prompt("Categoria:") || categorias[0]?.nome;
        const estoque = parseInt(prompt("Estoque:") || "0");
        if (nome && preco) {
          setProdutos([...produtos, { id: Date.now(), nome, preco, desc: desc || "", foto: foto || "", categoria, estoque }]);
        }
      };

      const addCategoria = () => {
        const nome = prompt("Nome da categoria:");
        const foto = prompt("URL da foto:");
        if (nome) setCategorias([...categorias, { id: Date.now(), nome, foto: foto || "" }]);
      };

      const mudarStatus = (id, status) => {
        setPedidos(pedidos.map(p => p.id === id? {...p, status} : p));
      };

      if (admin) {
        return (
          <div className="min-h-screen bg-black text-white p-4">
            <div className="max-w-6xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <div>
                  <h1 className="text-2xl font-bold text-[#FF2D75]">Painel Admin</h1>
                  <p className="text-sm text-zinc-400">{NOME_COMPLETO}</p>
                </div>
                <button onClick={() => { setAdmin(false); window.location.hash = ""; }} className="flex items-center gap-2 bg-zinc-800 px-4 py-2 rounded-lg">
                  <i data-lucide="log-out" className="w-4 h-4"></i> Sair
                </button>
              </div>
              <div className="flex gap-4 mb-6">
                <button onClick={() => setAba("produtos")} className={`px-4 py-2 rounded-lg ${aba === "produtos"? "bg-[#FF2D75]" : "bg-zinc-800"}`}>Produtos</button>
                <button onClick={() => setAba("pedidos")} className={`px-4 py-2 rounded-lg ${aba === "pedidos"? "bg-[#FF2D75]" : "bg-zinc-800"}`}>Pedidos</button>
                <button onClick={() => setAba("banner")} className={`px-4 py-2 rounded-lg ${aba === "banner"? "bg-[#FF2D75]" : "bg-zinc-800"}`}>Banner</button>
              </div>
              {aba === "produtos" && (
                <>
                  <div className="flex gap-4 mb-4">
                    <button onClick={addProduto} className="flex items-center gap-2 bg-[#FF2D75] px-4 py-2 rounded-lg"><i data-lucide="plus" className="w-4 h-4"></i> Produto</button>
                    <button onClick={addCategoria} className="flex items-center gap-2 bg-zinc-800 px-4 py-2 rounded-lg"><i data-lucide="plus" className="w-4 h-4"></i> Categoria</button>
                  </div>
                  <div className="grid gap-4">
                    {produtos.map(p => (
                      <div key={p.id} className="bg-zinc-900 p-4 rounded-lg flex justify-between items-center">
                        <div>
                          <p className="font-bold">{p.nome}</p>
                          <p className="text-sm text-zinc-400">R$ {p.preco.toFixed(2)} | Estoque: {p.estoque}</p>
                        </div>
                        <button onClick={() => setProdutos(produtos.filter(x => x.id!== p.id))} className="text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                      </div>
                    ))}
                  </div>
                </>
              )}
              {aba === "pedidos" && (
                <div className="grid gap-4">
                  {pedidos.length === 0 && <p className="text-zinc-500">Nenhum pedido ainda</p>}
                  {pedidos.map(p => (
                    <div key={p.id} className="bg-zinc-900 p-4 rounded-lg">
                      <div className="flex justify-between mb-2">
                        <p className="font-bold">{p.produto}</p>
                        <p className="text-[#FF2D75]">R$ {p.total.toFixed(2)}</p>
                      </div>
                      <p className="text-sm text-zinc-400 mb-2">{p.data}</p>
                      <select value={p.status} onChange={e => mudarStatus(p.id, e.target.value)} className="bg-zinc-800 px-3 py-1 rounded">
                        <option>Pendente</option>
                        <option>Pago</option>
                        <option>Enviado</option>
                      </select>
                    </div>
                  ))}
                </div>
              )}
              {aba === "banner" && (
                <div>
                  <input type="text" placeholder="URL da imagem do banner" value={banner} onChange={e => setBanner(e.target.value)} className="w-full bg-zinc-800 p-3 rounded-lg mb-4" />
                  {banner && <img src={banner} alt="Banner" className="w-full rounded-lg" />}
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-black text-white">
          {banner && <img src={banner} alt="Banner" className="w-full h-48 object-cover" />}
          <header className="p-4 flex items-center gap-3 border-b border-zinc-800">
            <i data-lucide="shopping-bag" className="w-6 h-6 text-[#FF2D75]"></i>
            <h1 className="text-xl font-bold">{NOME_LOJA}</h1>
          </header>
          <div className="p-4">
            {categorias.map(cat => (
              <div key={cat.id} className="mb-8">
                <h2 className="text-lg font-bold mb-3 text-[#FF2D75]">{cat.nome}</h2>
                <div className="grid grid-cols-2 gap-4">
                  {produtos.filter(p => p.categoria === cat.nome && p.estoque > 0).map(p => (
                    <div key={p.id} onClick={() => setModal(p)} className="bg-zinc-900 rounded-lg overflow-hidden cursor-pointer">
                      <img src={p.foto} alt={p.nome} className="w-full h-40 object-cover" />
                      <div className="p-3">
                        <p className="font-bold text-sm">{p.nome}</p>
                        <p className="text-[#FF2D75] font-bold">R$ {p.preco.toFixed(2)}</p>
                        <p className="text-xs text-zinc-500">Estoque: {p.estoque}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          {modal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={() => setModal(null)}>
              <div className="bg-zinc-900 rounded-lg max-w-md w-full p-6" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between mb-4">
                  <h3 className="text-xl font-bold">{modal.nome}</h3>
                  <button onClick={() => setModal(null)}><i data-lucide="x" className="w-6 h-6"></i></button>
                </div>
                <img src={modal.foto} alt={modal.nome} className="w-full h-64 object-cover rounded-lg mb-4" />
                <p className="text-zinc-300 mb-2">{modal.desc}</p>
                <p className="text-2xl font-bold text-[#FF2D75] mb-4">R$ {modal.preco.toFixed(2)}</p>
                <div className="bg-zinc-800 p-4 rounded-lg mb-4">
                  <p className="text-sm mb-1">Pague via Pix para:</p>
                  <p className="text-xs text-zinc-400 mb-2">{NOME_COMPLETO}</p>
                  <div className="bg-white p-4 rounded mb-3 flex justify-center">
                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=00020126580014br.gov.bcb.pix0136${CHAVE_PIX}52040000530398654${modal.preco.toFixed(2).replace('.','')}5802BR5919${NOME_COMPLETO.substring(0,25)}6009SAO LUIS62070503***6304`} alt="QR Code" />
                  </div>
                  <button onClick={copiarPix} className="w-full bg-zinc-700 py-2 rounded-lg flex items-center justify-center gap-2 mb-2">
                    {copiado? <><i data-lucide="check" className="w-4 h-4"></i> Copiado!</> : <><i data-lucide="copy" className="w-4 h-4"></i> {CHAVE_PIX}</>}
                  </button>
                </div>
                <button onClick={() => finalizarWhats(modal)} className="w-full bg-[#25D366] py-3 rounded-lg font-bold">
                  Finalizar no WhatsApp
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<Loja />, document.getElementById('root'));
  </script>
</body>
</html>
