<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja FF Rosa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
    body {
      background: #1a0b13;
      color: #fff;
      min-height: 100vh;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #2d1520;
      border: 1px solid #FF2D95;
      border-radius: 8px;
      color: white;
      outline: none;
    }
   .borda-rosa { border: 1px solid #FF2D95; }

    /* LOGIN E CADASTRO */
    #login-screen, #cadastro-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0d0609;
    }
    #cadastro-screen { display: none; }
   .login-box {
      background: #1a0b13;
      border: 1px solid #FF2D95;
      border-radius: 12px;
      padding: 30px 25px;
      width: 90%;
      max-width: 350px;
      text-align: center;
    }
   .login-box h2 { color: #FF2D95; margin-bottom: 25px; font-size: 20px; }
   .btn-pink {
      width: 100%;
      padding: 12px;
      background: #FF2D95;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      margin: 10px 0;
      cursor: pointer;
      transition: 0.3s;
    }
   .btn-pink:hover { background: #E02684; }
   .btn-pink:disabled { background: #5a1f3a; cursor: not-allowed; }
   .btn-white {
      width: 100%;
      padding: 12px;
      background: white;
      color: #1a0b13;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
   .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      width: auto;
      margin: 0 4px;
    }
   .login-box a {
      color: #FF9ECB;
      font-size: 13px;
      text-decoration: none;
      display: block;
      margin-top: 10px;
      cursor: pointer;
    }
   .erro { color: #FF4D6D; font-size: 13px; margin-top: 8px; display: none; }

    /* LOJA */
    #store-screen { display: none; }
   .header {
      background: #1a0b13;
      padding: 15px;
      border-bottom: 1px solid #FF2D95;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
   .header span { color: #FF2D95; cursor: pointer; font-size: 14px; }
   .menu-icons { display: flex; gap: 15px; align-items: center; }
   .carrinho {
      position: relative;
      cursor: pointer;
      font-size: 22px;
    }
   .carrinho-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: #FF2D95;
      color: white;
      font-size: 11px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
   .banner {
      background: linear-gradient(135deg, #2d1520, #1a0b13);
      padding: 30px 20px;
      text-align: center;
      border: 1px solid #FF2D95;
      margin: 15px;
      border-radius: 12px;
    }
   .banner h1 { font-size: 24px; color: #FF9ECB; line-height: 1.2; }
   .stats {
      display: flex;
      justify-content: space-around;
      margin: 20px 15px;
      text-align: center;
    }
   .stat h3 { color: #FF2D95; font-size: 20px; }
   .stat p { font-size: 12px; color: #FF9ECB; }
   .tabs {
      display: flex;
      gap: 10px;
      padding: 0 15px;
      margin: 20px 0;
    }
   .tab {
      padding: 8px 16px;
      background: #2d1520;
      border: 1px solid #FF2D95;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }
   .tab.active { background: #FF2D95; }
   .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 0 15px 30px;
    }
   .card {
      background: #2d1520;
      border: 1px solid #FF2D95;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      position: relative;
    }
   .card img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      margin: 8px 0;
    }
   .card.tag {
      background: #FF2D95;
      color: white;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 8px;
    }
   .card h4 { font-size: 14px; margin: 8px 0; }
   .card.price { color: #FF2D95; font-weight: bold; margin: 8px 0; }
   .card.estoque { font-size: 11px; color: #FF9ECB; margin-bottom: 8px; }
   .admin-actions {
      position: absolute;
      top: 5px;
      right: 5px;
      display: none;
      gap: 5px;
    }
   .admin-mode.admin-actions { display: flex; }
   .icon-btn {
      background: #FF2D95;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
   .suporte {
      background: #2d1520;
      border: 1px solid #FF2D95;
      border-radius: 12px;
      margin: 15px;
      padding: 15px;
      text-align: center;
    }
   .suporte p { font-size: 13px; margin: 5px 0; }
   .suporte.pix { color: #FF2D95; font-weight: bold; font-size: 15px; }

    /* ADMIN */
    #admin-screen { display: none; padding: 15px; }
   .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
   .admin-header.sair { color: #FF2D95; cursor: pointer; }
   .admin-box {
      background: #2d1520;
      border-left: 3px solid #FF2D95;
      padding: 20px;
      border-radius: 8px;
      margin: 15px 0;
    }
   .admin-box h3 { color: #FF2D95; margin-bottom: 10px; }
   .admin-menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0;
    }
   .admin-card {
      background: #2d1520;
      border: 1px solid #FF2D95;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
    }
   .admin-card:hover { background: #3a1c2a; }

    /* MODAIS */
   .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
   .modal-box {
      background: #1a0b13;
      border: 1px solid #FF2D95;
      border-radius: 12px;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
   .modal-box h2 { color: #FF2D95; margin-bottom: 15px; }
   .carrinho-item,.pedido-item,.produto-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2d1520;
      align-items: center;
      gap: 10px;
    }
   .preview-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #FF2D95;
      margin: 10px 0;
      display: none;
    }
  </style>
</head>
<body>

  <!-- TELA LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h2>⚡ LOGIN</h2>
      <input type="email" placeholder="Email" id="email">
      <input type="password" placeholder="Senha" id="senha">
      <p class="erro" id="erro-login">Email ou senha incorretos</p>
      <button class="btn-pink" onclick="fazerLogin()">Entrar</button>
      <p style="margin: 10px 0; font-size: 12px;">OU</p>
      <button class="btn-white" onclick="fazerLogin()">Entrar com Google</button>
      <a onclick="mostrarCadastro()">Criar conta</a>
      <a onclick="abrirAdminLogin()">Painel Admin</a>
    </div>
  </div>

  <!-- TELA CADASTRO -->
  <div id="cadastro-screen">
    <div class="login-box">
      <h2>✨ CRIAR CONTA</h2>
      <input type="text" placeholder="Nome" id="nome-cadastro">
      <input type="email" placeholder="Email" id="email-cadastro">
      <input type="password" placeholder="Senha" id="senha-cadastro">
      <p class="erro" id="erro-cadastro">Preencha todos os campos</p>
      <button class="btn-pink" onclick="criarConta()">Cadastrar</button>
      <a onclick="voltarLogin()">Já tenho conta</a>
    </div>
  </div>

  <!-- MODAL LOGIN ADMIN -->
  <div id="admin-login-modal" class="modal">
    <div class="modal-box">
      <h2>🔒 ADMIN</h2>
      <input type="text" placeholder="Usuário Admin" id="user-admin">
