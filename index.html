<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Store VC</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
font-size:13px;
}

/* HEADER */
header{
text-align:center;
padding:12px;
border-bottom:1px solid #3b1b5c;
}

header h1{
margin:0;
font-size:18px;
color:#b18cff;
}

header img{
width:70px;
margin-top:8px;
border-radius:10px;
border:1px solid #3b1b5c;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
padding:20px;
gap:8px;
}

input, select{
padding:10px;
background:#111;
border:1px solid #3b1b5c;
color:#fff;
border-radius:8px;
font-size:12px;
}

button{
padding:10px;
background:#b18cff;
border:none;
color:#000;
font-weight:bold;
border-radius:8px;
font-size:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:#111;
border:1px solid #3b1b5c;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:90px;
object-fit:cover;
}

.card .content{
padding:8px;
}

.small{
font-size:11px;
opacity:0.8;
}

.price{
font-weight:bold;
color:#b18cff;
margin-top:5px;
}

/* ADMIN */
#admin{
display:none;
padding:10px;
border-top:1px solid #3b1b5c;
}
</style>
</head>

<body>

<header>
<h1>Prime Store VC</h1>
<img src="https://i.postimg.cc/PJ2Vcty8/e1befe8d-0630-444f-aea5-9b0a96d5f84b.jpg">
</header>

<!-- LOGIN -->
<div id="login">
<input id="email" placeholder="E-mail">
<input id="senha" placeholder="Senha" type="password">
<button onclick="entrar()">Entrar</button>
</div>

<!-- LOJA -->
<div id="loja" style="display:none">

<select id="cat" onchange="loadSub()"></select>
<select id="sub" onchange="render()"></select>

<div class="grid" id="grid"></div>

</div>

<!-- ADMIN -->
<div id="admin">

<h3 style="color:#b18cff">Painel Admin</h3>

<input id="catName" placeholder="Nova Categoria">
<button onclick="addCat()">Adicionar Categoria</button>

<input id="subName" placeholder="Nova Subcategoria">
<button onclick="addSub()">Adicionar Subcategoria</button>

<hr>

<input id="pname" placeholder="Nome produto">
<input id="pdesc" placeholder="Descrição">
<input id="pprice" placeholder="Preço">
<input id="pstock" placeholder="Estoque">
<input type="file" id="pimg">

<button onclick="addProduct()">Adicionar Produto</button>

</div>

<script>
let db = JSON.parse(localStorage.getItem("prime_vc")) || {
cats:{},
products:[]
};

/* LOGIN SIMPLES */
function entrar(){
let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

if(email === "nannyvittoriah@gmail.com" && senha === "Lorrannyh.101225"){
document.getElementById("login").style.display="none";
document.getElementById("loja").style.display="block";
document.getElementById("admin").style.display="block";
loadCats();
}else{
alert("Acesso negado");
}
}

/* SALVAR */
function save(){
localStorage.setItem("prime_vc",JSON.stringify(db));
}

/* CATEGORIA */
function addCat(){
let c = catName.value;
db.cats[c] = [];
save();
loadCats();
}

/* SUB */
function addSub(){
let c = cat.value;
db.cats[c].push(subName.value);
save();
loadCats();
}

/* LOAD CATS */
function loadCats(){
cat.innerHTML = Object.keys(db.cats).map(c=>`<option>${c}</option>`).join("");
loadSub();
}

/* LOAD SUB */
function loadSub(){
let c = cat.value;
sub.innerHTML = (db.cats[c]||[]).map(s=>`<option>${s}</option>`).join("");
render();
}

/* ADD PRODUTO */
function addProduct(){
let file = pimg.files[0];
let reader = new FileReader();

reader.onload = function(){
db.products.push({
id:Date.now(),
cat:cat.value,
sub:sub.value,
name:pname.value,
desc:pdesc.value,
price:pprice.value,
stock:pstock.value,
img:reader.result
});

save();
render();
};

reader.readAsDataURL(file);
}

/* RENDER */
function render(){
grid.innerHTML = "";

db.products
.filter(p=>p.cat===cat.value && p.sub===sub.value)
.forEach(p=>{
grid.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="content">
<b>${p.name}</b>
<div class="small">${p.desc}</div>
<div class="price">R$ ${p.price}</div>
<div class="small">Estoque: ${p.stock}</div>
<button onclick="info(${p.id})">Informações</button>
</div>
</div>
`;
});
}

/* INFO PRODUTO */
function info(id){
let p = db.products.find(x=>x.id===id);

alert(`
PRODUTO COMPLETO:

Nome: ${p.name}
Descrição: ${p.desc}
Preço: R$ ${p.price}
Estoque: ${p.stock}
ID Compra: ${p.id}
`);
}
</script>

</body>
</html>
