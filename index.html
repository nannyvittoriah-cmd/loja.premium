<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>BONYS.SH</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f2c;
  color:white;
}
h1,h2{color:#00bfff}
button{
  background:#ff00ff;
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
}
input{
  padding:10px;
  margin:5px;
}
.card{
  background:#111a44;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
.hidden{display:none}
</style>

</head>

<body>

<div id="app"></div>

<script>

const ADMIN = "nannyvittoriah@gmail.com";

// ================= LOGIN =================
function telaLogin(){
  document.getElementById("app").innerHTML = `
    <h1>BONYS.SH 🔥</h1>
    <input id="email" placeholder="Digite seu email">
    <br>
    <button onclick="login()">Entrar</button>
  `;
}

function login(){
  const email = document.getElementById("email").value;
  localStorage.setItem("user", email);

  if(email === ADMIN){
    telaAdmin();
  } else {
    telaCliente();
  }
}

// ================= CLIENTE =================
function telaCliente(){
  document.getElementById("app").innerHTML = `
    <h1>Loja BONYS.SH</h1>

    <h2>Produtos</h2>
    <div id="produtos"></div>

    <h2>Chat</h2>
    <input id="msg">
    <button onclick="enviar('cliente')">Enviar</button>
    <div id="chat"></div>
  `;

  carregarProdutos();
  atualizarChat();
}

// PRODUTOS
function carregarProdutos(){
  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
  let div = document.getElementById("produtos");

  div.innerHTML = "";

  produtos.forEach(p=>{
    div.innerHTML += `
      <div class="card">
        <h3>${p.nome}</h3>
        <p>R$ ${p.preco}</p>
        <button onclick="comprar('${p.nome}')">Comprar</button>
      </div>
    `;
  });
}

// COMPRAR
function comprar(nome){
  let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

  pedidos.push({
    produto:nome,
    status:"aguardando pix"
  });

  localStorage.setItem("pedidos", JSON.stringify(pedidos));

  alert("PIX: (98) 98485-3563\nEnvie o comprovante no chat!");
}

// ================= ADMIN =================
function telaAdmin(){

  if(localStorage.getItem("user") !== ADMIN){
    alert("Acesso negado!");
    telaLogin();
    return;
  }

  document.getElementById("app").innerHTML = `
    <h1>PAINEL ADMIN 👑</h1>

    <h2>Adicionar Produto</h2>
    <input id="nome" placeholder="Nome">
    <input id="preco" placeholder="Preço">
    <button onclick="addProduto()">Adicionar</button>

    <hr>

    <h2>Pedidos</h2>
    <div id="pedidos"></div>

    <hr>

    <h2>Chat</h2>
    <input id="msg">
    <button onclick="enviar('admin')">Enviar</button>
    <div id="chat"></div>
  `;

  atualizarPedidos();
  atualizarChat();
}

// ADD PRODUTO
function addProduto(){
  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

  produtos.push({
    nome:document.getElementById("nome").value,
    preco:document.getElementById("preco").value
  });

  localStorage.setItem("produtos", JSON.stringify(produtos));
  alert("Produto adicionado!");
}

// PEDIDOS
function atualizarPedidos(){
  setInterval(()=>{
    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
    let div = document.getElementById("pedidos");

    if(!div) return;

    div.innerHTML = "";

    pedidos.forEach(p=>{
      div.innerHTML += `<div class="card">${p.produto} - ${p.status}</div>`;
    });

  },1000);
}

// ================= CHAT =================
function enviar(tipo){
  let chat = JSON.parse(localStorage.getItem("chat")) || [];

  chat.push({
    tipo:tipo,
    msg:document.getElementById("msg").value
  });

  localStorage.setItem("chat", JSON.stringify(chat));
}

function atualizarChat(){
  setInterval(()=>{
    let chat = JSON.parse(localStorage.getItem("chat")) || [];
    let div = document.getElementById("chat");

    if(!div) return;

    div.innerHTML = "";

    chat.forEach(m=>{
      div.innerHTML += `<p><b>${m.tipo}:</b> ${m.msg}</p>`;
    });

  },1000);
}

// INICIAR
if(localStorage.getItem("user")){
  if(localStorage.getItem("user") === ADMIN){
    telaAdmin();
  } else {
    telaCliente();
  }
} else {
  telaLogin();
}

</script>

</body>
</html>
