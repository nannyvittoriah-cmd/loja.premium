<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Prime Store Vz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b0b0d;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:16px;
color:white;
}

/* BOX */

.login-box{
width:100%;
max-width:360px;
background:#131316;
border-radius:28px;
padding:22px;
border:1px solid #202026;
}

/* LOGO */

.logo-area{
display:flex;
align-items:center;
gap:14px;
margin-bottom:28px;
}

.logo{
width:58px;
height:58px;
border-radius:18px;
background:#7b2cff;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
color:white;
}

.logo-text h1{
font-size:24px;
font-weight:700;
line-height:1;
}

.logo-text span{
color:#9b59ff;
}

.logo-text p{
font-size:11px;
color:#8a8a8f;
margin-top:6px;
}

/* TABS */

.tabs{
display:flex;
gap:8px;
margin-bottom:22px;
}

.tab{
flex:1;
height:42px;
border-radius:14px;
background:#1a1a20;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:#8d8d95;
cursor:pointer;
transition:0.2s;
}

.tab.active{
background:#7b2cff;
color:white;
font-weight:600;
}

/* TEXT */

.title{
font-size:22px;
font-weight:700;
margin-bottom:5px;
}

.desc{
font-size:12px;
color:#8b8b91;
margin-bottom:22px;
}

/* INPUT */

.input-group{
margin-bottom:14px;
}

.label{
font-size:11px;
margin-bottom:7px;
display:block;
color:#b7b7bc;
}

.input{
width:100%;
height:50px;
border:none;
outline:none;
border-radius:16px;
padding:0 16px;
background:#1a1a20;
color:white;
font-size:13px;
}

/* OPTIONS */

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:4px;
margin-bottom:20px;
font-size:11px;
color:#9c9ca4;
}

.options a{
color:#9b59ff;
text-decoration:none;
}

/* BUTTON */

.btn{
width:100%;
height:52px;
border:none;
border-radius:16px;
background:#7b2cff;
color:white;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
opacity:0.9;
}

/* FOOT */

.footer{
display:flex;
gap:10px;
margin-top:20px;
}

.footer-box{
flex:1;
background:#1a1a20;
padding:10px;
border-radius:14px;
text-align:center;
font-size:9px;
color:#9a9aa1;
}

.footer-box b{
display:block;
font-size:10px;
margin-bottom:4px;
color:white;
}

</style>

</head>

<body>

<div class="login-box">

<!-- LOGO -->

<div class="logo-area">

<div class="logo">
P
</div>

<div class="logo-text">

<h1>
Prime <span>store Vz</span>
</h1>

<p>
Loja de produtos digitais
</p>

</div>

</div>

<!-- TABS -->

<div class="tabs">

<div class="tab active">
Login
</div>

<div class="tab">
Cadastro
</div>

<div class="tab">
Senha
</div>

</div>

<!-- TITLE -->

<div class="title">
Entrar
</div>

<div class="desc">
Faça login na sua conta
</div>

<!-- EMAIL -->

<div class="input-group">

<label class="label">
E-mail
</label>

<input
type="email"
class="input"
placeholder="seuemail@gmail.com"
id="email">

</div>

<!-- SENHA -->

<div class="input-group">

<label class="label">
Senha
</label>

<input
type="password"
class="input"
placeholder="Sua senha"
id="senha">

</div>

<!-- OPTIONS -->

<div class="options">

<div>
Lembrar login
</div>

<a href="#">
Esqueceu senha?
</a>

</div>

<!-- BUTTON -->

<button class="btn" onclick="login()">
Entrar na conta
</button>

<!-- FOOT -->

<div class="footer">

<div class="footer-box">

<b>
Seguro
</b>

Dados protegidos

</div>

<div class="footer-box">

<b>
Entrega
</b>

Automática

</div>

<div class="footer-box">

<b>
Suporte
</b>

24h

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",

authDomain: "premium-store-aa58b.firebaseapp.com",

databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",

projectId: "premium-store-aa58b",

storageBucket: "premium-store-aa58b.firebasestorage.app",

messagingSenderId: "462239500057",

appId: "1:462239500057:web:f1b7cea162ed308a866788",

measurementId: "G-CN88J28WRX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

if(email === "" || senha === ""){

alert("Preencha todos os campos");

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
senha
);

alert("Login realizado!");

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
