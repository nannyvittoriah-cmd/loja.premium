<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Prime Game Vz</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#000000;
  --roxo-escuro:#4C1D95;
  --roxo-medio:#5B21B6;
  --roxo:#6D28D9;
  --roxo-glass:rgba(76,29,149,.25);
  --branco:#FFFFFF;
  --cinza:#9CA3AF;
  --card:rgba(15,15,20,.8);
  --borda:rgba(76,29,149,.4);
  --txt:var(--branco);
}
body.tema-claro{
  --bg:#F3F4F6;
  --roxo-glass:rgba(76,29,149,.08);
  --branco:#1F2937;
  --cinza:#6B7280;
  --card:rgba(255,255,255,.9);
  --borda:rgba(76,29,149,.2);
  --txt:#1F2937;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--txt);
  font-size:11px;
  min-height:100vh;
  transition:background .3s,color .3s;
}
body::before{
  content:'';
  position:fixed;
  top:-40%;
  left:50%;
  transform:translateX(-50%);
  width:400px;
  height:400px;
  background:radial-gradient(circle,var(--roxo-escuro) 0%,transparent 70%);
  opacity:.3;
  z-index:-1;
  pointer-events:none;
  filter:blur(100px);
}
body.tema-claro::before{opacity:.15}

.header-gg{padding:12px 16px 0}
.header-icons{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo-gg{width:32px;height:32px;background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.logo-gg i{width:18px;height:18px;fill:#FFFFFF}
.header-btns{display:flex;gap:8px}
.btn-circle{width:36px;height:36px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.15), 0 4px 20px rgba(76,29,149,.3)}
.btn-circle i{width:16px;height:16px;stroke:var(--txt)}
.notif-badge{position:absolute;top:-2px;right:-2px;background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));color:#FFFFFF;font-size:7px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

.banner-gg{text-align:center;padding:30px 20px 40px}
.banner-tit{font-size:18px;font-weight:900;margin-bottom:12px;letter-spacing:.5px}
.banner-sub{display:inline-block;background:var(--roxo-glass);backdrop-filter:blur(30px);border:1px solid var(--borda);border-radius:20px;padding:10px 18px;font-size:8px;color:var(--txt);margin-bottom:20px;box-shadow:inset 0 2px 0 rgba(255,255,255,.1), inset 0 -1px 0 rgba(0,0,0,.2), 0 8px 32px rgba(76,29,149,.4);cursor:pointer}
.btn-como-funciona{background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));color:#FFFFFF;border:1px solid var(--borda);border-radius:25px;padding:12px 32px;font-size:9px;font-weight:700;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.2), 0 4px 25px rgba(76,29,149,.5);text-transform:uppercase}

.secao{padding:0 16px;margin-bottom:24px}
.secao-tit{font-size:13px;font-weight:700;margin-bottom:12px}
.secao-tit-center{text-align:center;color:var(--cinza);font-size:8px;font-weight:600;margin:16px 0;position:relative}
.secao-tit-center::before,.secao-tit-center::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--borda)}
.secao-tit-center::before{left:0}
.secao-tit-center::after{right:0}

.categorias-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.categorias-scroll::-webkit-scrollbar{display:none}
.card-categoria{min-width:48%;height:100px;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;flex-shrink:0;border:1px solid var(--borda);box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 4px 15px rgba(76,29,149,.4)}
.card-categoria img{width:100%;height:100%;object-fit:cover}
.card-categoria-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.95));padding:8px 6px 6px}
.card-categoria-nome{font-size:7px;font-weight:900;text-transform:uppercase;color:#FFFFFF}

.produtos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card-produto{background:var(--card);backdrop-filter:blur(30px);border:1px solid var(--borda);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 8px 32px rgba(76,29,149,.3)}
.produto-img{width:100%;height:100px;position:relative}
.produto-img img{width:100%;height:100%;object-fit:cover}
.produto-fav{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--borda);box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.produto-fav i{width:12px;height:12px;stroke:#FFFFFF;fill:transparent}
.produto-info{padding:10px}
.produto-nome{font-size:8px;font-weight:600;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;min-height:22px;color:var(--cinza)}
.produto-preco{margin-bottom:6px}
.preco-box{display:inline-block;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--roxo-medio);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:900;color:var(--txt);box-shadow:inset 0 1px 0 rgba(255,255,255,.15)}
.produto-vendedor{display:flex;align-items:center;gap:4px;font-size:7px;color:var(--cinza)}
.vendedor-avatar{width:14px;height:14px;background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);color:#FFFFFF}

/* MENU LATERAL */
.menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:9998;display:none;opacity:0;transition:opacity .3s}
.menu-overlay.ativo{display:block;opacity:1}
.menu-lateral{position:fixed;top:0;right:-280px;width:280px;height:100%;background:var(--card);backdrop-filter:blur(40px);border-left:1.5px solid var(--borda);z-index:9999;transition:right .3s;box-shadow:-10px 0 40px rgba(0,0,0,.5)}
.menu-lateral.ativo{right:0}
.menu-header{padding:20px 16px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between}
.menu-tit{font-size:14px;font-weight:900}
.btn-fechar-menu{width:32px;height:32px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.btn-fechar-menu i{width:18px;height:18px}
.menu-lista{padding:12px 0}
.menu-item{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.menu-item:active{background:var(--roxo-glass);border-left-color:var(--roxo-medio)}
.menu-item i{width:20px;height:20px;stroke:var(--txt)}
.menu-item-txt{font-size:10px;font-weight:600}
.menu-divisor{height:1px;background:var(--borda);margin:8px 20px}
.tema-switch{display:flex;align-items:center;justify-content:space-between;padding:14px 20px}
.tema-label{display:flex;align-items:center;gap:12px;font-size:10px;font-weight:600}
.tema-label i{width:20px;height:20px}
.switch{width:44px;height:24px;background:var(--borda);border-radius:20px;position:relative;cursor:pointer;transition:background .3s}
.switch.ativo{background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio))}
.switch-bola{width:20px;height:20px;background:#FFFFFF;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .3s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.switch.ativo .switch-bola{left:22px}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px}
.modal.ativo{display:flex}
.modal-content{width:100%;max-width:400px;background:var(--card);backdrop-filter:blur(40px);border:1.5px solid var(--borda);border-radius:16px;padding:24px 20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 10px 60px rgba(76,29,149,.6);max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-tit{font-size:16px;font-weight:900}
.btn-fechar{width:28px;height:28px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.btn-fechar i{width:16px;height:16px}
</style>
</head>
<body>
<div class="header-gg">
  <div class="header-icons">
    <div class="logo-gg"><i data-lucide="gamepad-2"></i></div>
    <div class="header-btns">
      <div class="btn-circle"><i data-lucide="search"></i></div>
      <div class="btn-circle"><i data-lucide="bell"></i><div class="notif-badge">1</div></div>
      <div class="btn-circle"><i data-lucide="bookmark"></i></div>
      <div class="btn-circle" onclick="abrirMenu()"><i data-lucide="menu"></i></div>
    </div>
  </div>
</div>

<div class="banner-gg">
  <div class="banner-tit">[ serviços digitais ]</div>
  <div class="banner-sub">contas, jogos, gift cards, gold, itens digitais e mais!</div>
  <button class="btn-como-funciona" onclick="alert('Em breve: tutorial')">COMO FUNCIONA?</button>
</div>

<div class="secao">
  <div class="secao-tit">Categorias Populares</div>
  <div class="categorias-scroll">
    <div class="card-categoria" onclick="alert('Filtro: minecraft')">
      <img src="https://images.unsplash.com/photo-1607853202273-797f1c22a38e?w=400" alt="Minecraft">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">MINECRAFT</div></div>
    </div>
    <div class="card-categoria" onclick="alert('Filtro: freefire')">
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400" alt="Free Fire">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">FREE FIRE</div></div>
    </div>
    <div class="card-categoria" onclick="alert('Filtro: valorant')">
      <img src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400" alt="Valorant">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">VALORANT</div></div>
    </div>
    <div class="card-categoria" onclick="alert('Filtro: roblox')">
      <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?w=400" alt="Roblox">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">ROBLOX</div></div>
    </div>
  </div>
  <div class="secao-tit-center">VER TODAS CATEGORIAS</div>
</div>

<div class="secao">
  <div class="secao-tit">Assinaturas e Premium</div>
  <div class="produtos-grid" id="produtosGrid"></div>
</div>

<!-- MENU LATERAL -->
<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>
<div class="menu-lateral" id="menuLateral">
  <div class="menu-header">
    <div class="menu-tit">Menu</div>
    <div class="btn-fechar-menu" onclick="fecharMenu()"><i data-lucide="x"></i></div>
  </div>
  <div class="menu-lista">
    <div class="menu-item" onclick="alert('Em breve: Minhas compras')">
      <i data-lucide="shopping-bag"></i>
      <div class="menu-item-txt">Minhas compras</div>
    </div>
    <div class="menu-item" onclick="alert('Em breve: Categorias')">
      <i data-lucide="layout-grid"></i>
      <div class="menu-item-txt">Categorias</div>
    </div>
    <div class="menu-item" onclick="alert('Em breve: Meus favoritos')">
      <i data-lucide="heart"></i>
      <div class="menu-item-txt">Meus favoritos</div>
    </div>
    <div class="menu-item" onclick="alert('Em breve: Conta')">
      <i data-lucide="user"></i>
      <div class="menu-item-txt">Conta</div>
    </div>
    <div class="menu-divisor"></div>
    <div class="tema-switch">
      <div class="tema-label">
        <i data-lucide="sun"></i>
        <span>Tema</span>
      </div>
      <div class="switch" id="switchTema" onclick="trocarTema()">
        <div class="switch-bola"></div>
      </div>
    </div>
  </div>
</div>

<script>
let produtos = [
  {id:'1',nome:'YOUTUBE PREMIUM + MUSIC LINK / FAMÍLIA 30 DIAS',preco:4.20,imagem:'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400'},
  {id:'2',nome:'BRAVE VPN + BRAVE LEO AI + BRAVE TALK 7 DIAS | CONTA EXCLUSIVA',preco:9.99,imagem:'https://images.unsplash.com/photo-1563986768609-322da168b6f1?w=400'},
  {id:'3',nome:'SPOTIFY PREMIUM 30 DIAS | FAMÍLIA',preco:3.50,imagem:'https://images.unsplash.com/photo-1611339556316-e607c835dd28?w=400'},
  {id:'4',nome:'DISNEY+ PREMIUM 30 DIAS | CONTA COMPARTILHADA',preco:5.00,imagem:'https://images.unsplash.com/photo-1603181601493-a4ea7ff75c23?w=400'}
];

window.addEventListener('load',()=>{
  lucide.createIcons();
  renderizarProdutos();
  carregarTema();
});

function renderizarProdutos(){
  const grid = document.getElementById('produtosGrid');
  grid.innerHTML = produtos.map(p => `
    <div class="card-produto" onclick="verProduto('${p.id}')">
      <div class="produto-img">
        <img src="${p.imagem}" alt="${p.nome}">
        <div class="produto-fav" onclick="event.stopPropagation();alert('Favoritado!')"><i data-lucide="heart"></i></div>
      </div>
      <div class="produto-info">
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco"><div class="preco-box">R$ ${p.preco.toFixed(2)}</div></div>
        <div class="produto-vendedor"><div class="vendedor-avatar">L</div><span>L. Vz</span></div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function verProduto(id){
  const p = produtos.find(prod => prod.id === id);
  if(!p) return;
  alert(`Produto: ${p.nome}\n\nPreço: R$ ${p.preco.toFixed(2)}\nVendedor: L. Vz`);
}

function abrirMenu(){
  document.getElementById('menuOverlay').classList.add('ativo');
  document.getElementById('menuLateral').classList.add('ativo');
}

function fecharMenu(){
  document.getElementById('menuOverlay').classList.remove('ativo');
  document.getElementById('menuLateral').classList.remove('ativo');
}

function trocarTema(){
  const body = document.body;
  const switchEl = document.getElementById('switchTema');
  body.classList.toggle('tema-claro');
  switchEl.classList.toggle('ativo');
  localStorage.setItem('tema', body.classList.contains('tema-claro') ? 'claro' : 'escuro');
}

function carregarTema(){
  const temaSalvo = localStorage.getItem('tema');
  if(temaSalvo === 'claro'){
    document.body.classList.add('tema-claro');
    document.getElementById('switchTema').classList.add('ativo');
  }
}

lucide.createIcons();
</script>
</body>
</html>
