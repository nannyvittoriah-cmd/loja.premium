<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Prime Game Vz</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#000000;
  --roxo-escuro:#4C1D95;
  --roxo-medio:#5B21B6;
  --roxo:#6D28D9;
  --roxo-glass:rgba(76,29,149,.25);
  --branco:#FFFFFF;
  --cinza:#9CA3AF;
  --card:rgba(15,15,20,.8);
  --borda:rgba(76,29,149,.4);
  --txt:var(--branco);
}
body.tema-claro{
  --bg:#FFFFFF;
  --roxo-glass:rgba(76,29,149,.06);
  --branco:#0F172A;
  --cinza:#475569;
  --card:rgba(248,250,252,.95);
  --borda:rgba(76,29,149,.15);
  --txt:#0F172A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--txt);
  font-size:11px;
  min-height:100vh;
  transition:background .3s,color .3s;
}
body::before{
  content:'';
  position:fixed;
  top:-40%;
  left:50%;
  transform:translateX(-50%);
  width:400px;
  height:400px;
  background:radial-gradient(circle,var(--roxo-escuro) 0%,transparent 70%);
  opacity:.3;
  z-index:-1;
  pointer-events:none;
  filter:blur(100px);
}
body.tema-claro::before{opacity:.08}

/* AJUSTES TEMA CLARO - TEXTO DESTACADO */
body.tema-claro .produto-nome{color:#334155;font-weight:700}
body.tema-claro .menu-item-txt{font-weight:700}
body.tema-claro .secao-tit{color:#0F172A;font-weight:900}
body.tema-claro .banner-tit{color:#0F172A;font-weight:900}
body.tema-claro .banner-sub{color:#1E293B;font-weight:600}
body.tema-claro .preco-box{color:#0F172A;border:1.5px solid var(--roxo-medio);font-weight:900}
body.tema-claro .card-categoria-nome{text-shadow:0 2px 4px rgba(0,0,0,.8)}
body.tema-claro .secao-tit-center{color:#475569;font-weight:700}
body.tema-claro .produto-vendedor{color:#64748B;font-weight:600}
body.tema-claro .card-produto{border:1.5px solid rgba(76,29,149,.25);box-shadow:0 4px 20px rgba(76,29,149,.08)}
body.tema-claro .card-categoria{border:1.5px solid rgba(76,29,149,.25)}
body.tema-claro .btn-circle{border:1.5px solid rgba(76,29,149,.25)}
body.tema-claro .menu-lateral{border:1.5px solid rgba(76,29,149,.3)}

.header-gg{padding:12px 16px 0}
.header-icons{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo-gg{width:32px;height:32px;background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.logo-gg i{width:18px;height:18px;fill:#FFFFFF}
.header-btns{display:flex;gap:8px}
.btn-circle{width:36px;height:36px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.15), 0 4px 20px rgba(76,29,149,.3)}
.btn-circle i{width:16px;height:16px;stroke:var(--txt)}
.notif-badge{position:absolute;top:-2px;right:-2px;background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));color:#FFFFFF;font-size:7px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

.banner-gg{text-align:center;padding:30px 20px 40px}
.banner-tit{font-size:18px;font-weight:900;margin-bottom:12px;letter-spacing:.5px}
.banner-sub{display:inline-block;background:var(--roxo-glass);backdrop-filter:blur(30px);border:1px solid var(--borda);border-radius:20px;padding:10px 18px;font-size:8px;color:var(--txt);margin-bottom:20px;box-shadow:inset 0 2px 0 rgba(255,255,255,.1), inset 0 -1px 0 rgba(0,0,0,.2), 0 8px 32px rgba(76,29,149,.4);cursor:pointer}
.btn-como-funciona{background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));color:#FFFFFF;border:1px solid var(--borda);border-radius:25px;padding:12px 32px;font-size:9px;font-weight:700;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.2), 0 4px 25px rgba(76,29,149,.5);text-transform:uppercase}

.secao{padding:0 16px;margin-bottom:24px}
.secao-tit{font-size:13px;font-weight:700;margin-bottom:12px}
.secao-tit-center{text-align:center;color:var(--cinza);font-size:8px;font-weight:600;margin:16px 0;position:relative}
.secao-tit-center::before,.secao-tit-center::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--borda)}
.secao-tit-center::before{left:0}
.secao-tit-center::after{right:0}

.categorias-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.categorias-scroll::-webkit-scrollbar{display:none}
.card-categoria{min-width:48%;height:100px;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;flex-shrink:0;border:1px solid var(--borda);box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 4px 15px rgba(76,29,149,.4)}
.card-categoria img{width:100%;height:100%;object-fit:cover}
.card-categoria-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.95));padding:8px 6px 6px}
.card-categoria-nome{font-size:7px;font-weight:900;text-transform:uppercase;color:#FFFFFF}

.produtos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card-produto{background:var(--card);backdrop-filter:blur(30px);border:1px solid var(--borda);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 8px 32px rgba(76,29,149,.3)}
.produto-img{width:100%;height:100px;position:relative}
.produto-img img{width:100%;height:100%;object-fit:cover}
.produto-fav{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--borda);box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.produto-fav i{width:12px;height:12px;stroke:#FFFFFF;fill:transparent}
.produto-fav.ativo i{fill:#FFFFFF}
.produto-info{padding:10px}
.produto-nome{font-size:8px;font-weight:600;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;min-height:22px;color:var(--cinza)}
.produto-preco{margin-bottom:6px}
.preco-box{display:inline-block;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--roxo-medio);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:900;color:var(--txt);box-shadow:inset 0 1px 0 rgba(255,255,255,.15)}
.produto-vendedor{display:flex;align-items:center;gap:4px;font-size:7px;color:var(--cinza)}
.vendedor-avatar{width:14px;height:14px;background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);color:#FFFFFF}

/* MENU LATERAL - BOLHA BALÃO TRANSPARENTE */
.menu-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(15px);
  z-index:9998;
  display:none;
  opacity:0;
  transition:opacity .3s;
}
.menu-overlay.ativo{display:block;opacity:1}
.menu-lateral{
  position:fixed;
  top:60px;
  right:-300px;
  width:280px;
  height:auto;
  max-height:calc(100vh - 80px);
  background:rgba(15,15,20,.4);
  backdrop-filter:blur(50px) saturate(180%);
  border:1.5px solid rgba(76,29,149,.5);
  border-radius:24px;
  z-index:9999;
  transition:right .4s cubic-bezier(.34,1.56,.64,1);
  box-shadow:inset 0 2px 0 rgba(255,255,255,.15), inset 0 -2px 0 rgba(0,0,0,.3), 0 20px 60px rgba(76,29,149,.6);
  overflow:hidden;
  margin-right:16px;
}
body.tema-claro .menu-lateral{background:rgba(255,255,255,.6)}
.menu-lateral.ativo{right:0}
.menu-header{
  padding:20px 16px 16px;
  border-bottom:1px solid rgba(76,29,149,.3);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.menu-tit{font-size:14px;font-weight:900}
.btn-fechar-menu{
  width:32px;
  height:32px;
  background:rgba(76,29,149,.3);
  backdrop-filter:blur(20px);
  border:1px solid rgba(76,29,149,.4);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-fechar-menu i{width:18px;height:18px}
.menu-lista{padding:8px 0 16px}
.menu-item{
  padding:14px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all .2s;
}
.menu-item:active{
  background:rgba(76,29,149,.2);
  border-left-color:var(--roxo-medio);
}
.menu-item i{width:20px;height:20px;stroke:var(--txt)}
.menu-item-txt{font-size:10px;font-weight:600}
.menu-divisor{height:1px;background:rgba(76,29,149,.3);margin:8px 20px}
.tema-switch{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px;
}
.tema-label{display:flex;align-items:center;gap:12px;font-size:10px;font-weight:600}
.tema-label i{width:20px;height:20px}
.switch{
  width:44px;
  height:24px;
  background:rgba(76,29,149,.3);
  border:1px solid rgba(76,29,149,.4);
  border-radius:20px;
  position:relative;
  cursor:pointer;
  transition:all .3s;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.3);
}
.switch.ativo{background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio))}
.switch-bola{
  width:20px;
  height:20px;
  background:#FFFFFF;
  border-radius:50%;
  position:absolute;
  top:1px;
  left:1px;
  transition:left .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.switch.ativo .switch-bola{left:21px}

/* MODAL BUSCA */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);z-index:10000;display:none;align-items:flex-start;justify-content:center;padding:20px}
.modal.ativo{display:flex}
.modal-content{width:100%;max-width:400px;background:var(--card);backdrop-filter:blur(40px);border:1.5px solid var(--borda);border-radius:16px;padding:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 10px 60px rgba(76,29,149,.6);margin-top:60px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-tit{font-size:16px;font-weight:900}
.btn-fechar{width:28px;height:28px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.btn-fechar i{width:16px;height:16px}
.input-busca{background:rgba(0,0,0,.5);border:1.5px solid var(--borda);border-radius:10px;padding:12px;font-size:12px;color:var(--txt);width:100%;outline:none;margin-bottom:12px}
.input-busca:focus{border-color:var(--roxo-medio);box-shadow:0 0 25px rgba(76,29,149,.5)}
body.tema-claro .input-busca{background:#F8FAFC;border-color:rgba(76,29,149,.25);color:#0F172A}
.resultado-busca{max-height:400px;overflow-y:auto}
.item-busca{padding:12px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:10px;margin-bottom:8px;cursor:pointer}
.item-busca:active{background:rgba(76,29,149,.4)}
.item-busca-nome{font-size:10px;font-weight:700;margin-bottom:4px}
.item-busca-preco{font-size:11px;font-weight:900;color:var(--txt)}

/* NOTIFICAÇÕES */
.lista-notif{max-height:400px;overflow-y:auto}
.item-notif{padding:12px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:10px;margin-bottom:8px;display:flex;gap:10px;align-items:start}
.item-notif i{width:18px;height:18px;stroke:var(--roxo-medio);flex-shrink:0;margin-top:2px}
.notif-txt{flex:1}
.notif-tit{font-size:10px;font-weight:700;margin-bottom:3px}
.notif-desc{font-size:9px;color:var(--cinza);line-height:1.4}
.notif-tempo{font-size:7px;color:var(--cinza);margin-top:4px}

/* CARRINHO */
.lista-carrinho{max-height:350px;overflow-y:auto;margin-bottom:12px}
.item-carrinho{display:flex;gap:10px;padding:10px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1px solid var(--borda);border-radius:10px;margin-bottom:8px}
.item-carrinho-img{width:60px;height:60px;border-radius:8px;overflow:hidden;flex-shrink:0}
.item-carrinho-img img{width:100%;height:100%;object-fit:cover}
.item-carrinho-info{flex:1}
.item-carrinho-nome{font-size:9px;font-weight:600;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-carrinho-preco{font-size:11px;font-weight:900}
.item-carrinho-del{width:24px;height:24px;background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.4);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.item-carrinho-del i{width:14px;height:14px;stroke:#EF4444}
.carrinho-total{padding:14px;background:var(--roxo-glass);backdrop-filter:blur(20px);border:1.5px solid var(--borda);border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.carrinho-total-txt{font-size:11px;font-weight:700}
.carrinho-total-valor{font-size:16px;font-weight:900}
.btn-finalizar{width:100%;background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo-medio));color:#FFFFFF;border:1px solid var(--borda);border-radius:10px;padding:14px;font-weight:700;font-size:10px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.2), 0 4px 30px rgba(76,29,149,.6);text-transform:uppercase}
.carrinho-vazio{text-align:center;padding:40px 20px;color:var(--cinza)}
.carrinho-vazio i{width:48px;height:48px;margin-bottom:12px;opacity:.5}
</style>
</head>
<body>
<div class="header-gg">
  <div class="header-icons">
    <div class="logo-gg"><i data-lucide="gamepad-2"></i></div>
    <div class="header-btns">
      <div class="btn-circle" onclick="abrirBusca()"><i data-lucide="search"></i></div>
      <div class="btn-circle" onclick="abrirNotificacoes()"><i data-lucide="bell"></i><div class="notif-badge" id="notifBadge">3</div></div>
      <div class="btn-circle" onclick="abrirCarrinho()"><i data-lucide="shopping-cart"></i></div>
      <div class="btn-circle" onclick="abrirMenu()"><i data-lucide="menu"></i></div>
    </div>
  </div>
</div>

<div class="banner-gg">
  <div class="banner-tit">[ serviços digitais ]</div>
  <div class="banner-sub">contas, jogos, gift cards, gold, itens digitais e mais!</div>
  <button class="btn-como-funciona" onclick="alert('Em breve: tutorial')">COMO FUNCIONA?</button>
</div>

<div class="secao">
  <div class="secao-tit">Categorias Populares</div>
  <div class="categorias-scroll">
    <div class="card-categoria" onclick="filtrarCategoria('minecraft')">
      <img src="https://images.unsplash.com/photo-1607853202273-797f1c22a38e?w=400" alt="Minecraft">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">MINECRAFT</div></div>
    </div>
    <div class="card-categoria" onclick="filtrarCategoria('freefire')">
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400" alt="Free Fire">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">FREE FIRE</div></div>
    </div>
    <div class="card-categoria" onclick="filtrarCategoria('valorant')">
      <img src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400" alt="Valorant">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">VALORANT</div></div>
    </div>
    <div class="card-categoria" onclick="filtrarCategoria('roblox')">
      <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?w=400" alt="Roblox">
      <div class="card-categoria-overlay"><div class="card-categoria-nome">ROBLOX</div></div>
    </div>
  <div class="secao-tit-center">VER TODAS CATEGORIAS</div>
</div>

<div class="secao">
  <div class="secao-tit" id="tituloSecao">Assinaturas e Premium</div>
  <div class="produtos-grid" id="produtosGrid"></div>
</div>

<!-- MODAL BUSCA -->
<div id="modalBusca" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-tit">Buscar</div>
      <div class="btn-fechar" onclick="fecharBusca()"><i data-lucide="x"></i></div>
    </div>
    <input type="text" class="input-busca" id="inputBusca" placeholder="Buscar serviços ou categorias..." oninput="buscarProdutos()">
    <div class="resultado-busca" id="resultadoBusca"></div>
  </div>
</div>

<!-- MODAL NOTIFICAÇÕES -->
<div id="modalNotif" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-tit">Notificações</div>
      <div class="btn-fechar" onclick="fecharNotificacoes()"><i data-lucide="x"></i></div>
    </div>
    <div class="lista-notif" id="listaNotif"></div>
  </div>
</div>

<!-- MODAL CARRINHO -->
<div id="modalCarrinho" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-tit">Carrinho</div>
      <div class="btn-fechar" onclick="fecharCarrinho()"><i data-lucide="x"></i></div>
    </div>
    <div class="lista-carrinho" id="listaCarrinho"></div>
    <div class="carrinho-total">
      <div class="carrinho-total-txt">Total:</div>
      <div class="carrinho-total-valor" id="carrinhoTotal">R$ 0,00</div>
    </div>
    <button class="btn-finalizar" onclick="finalizarCompra()">FINALIZAR COMPRA</button>
  </div>
</div>

<!-- MENU LATERAL -->
<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>
<div class="menu-lateral" id="menuLateral">
  <div class="menu-header">
    <div class="menu-tit">Menu</div>
    <div class="btn-fechar-menu" onclick="fecharMenu()"><i data-lucide="x"></i></div>
  </div>
  <div class="menu-lista">
    <div class="menu-item" onclick="alert('Em breve: Minhas compras')">
      <i data-lucide="shopping-bag"></i>
      <div class="menu-item-txt">Minhas compras</div>
    </div>
    <div class="menu-item" onclick="alert('Em breve: Categorias')">
      <i data-lucide="layout-grid"></i>
      <div class="menu-item-txt">Categorias</div>
    </div>
    <div class="menu-item" onclick="alert('Em breve: Meus favoritos')">
      <i data-lucide="heart"></i>
      <div class="menu-item-txt">Meus favoritos</div>
    </div>
    <div class="menu-item" onclick="alert('Em breve: Conta')">
      <i data-lucide="user"></i>
      <div class="menu-item-txt">Conta</div>
    </div>
    <div class="menu-divisor"></div>
    <div class="tema-switch">
      <div class="tema-label">
        <i data-lucide="sun"></i>
        <span>Tema</span>
      </div>
      <div class="switch" id="switchTema" onclick="trocarTema()">
        <div class="switch-bola"></div>
      </div>
    </div>
  </div>
</div>

<script>
let produtos = [
  {id:'1',nome:'YOUTUBE PREMIUM + MUSIC LINK / FAMÍLIA 30 DIAS',preco:4.20,imagem:'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400',categoria:'streaming'},
  {id:'2',nome:'BRAVE VPN + BRAVE LEO AI + BRAVE TALK 7 DIAS | CONTA EXCLUSIVA',preco:9.99,imagem:'https://images.unsplash.com/photo-1563986768609-322da168b6f1?w=400',categoria:'vpn'},
  {id:'3',nome:'SPOTIFY PREMIUM 30 DIAS | FAMÍLIA',preco:3.50,imagem:'https://images.unsplash.com/photo-1611339556316-e607c835dd28?w=400',categoria:'streaming'},
  {id:'4',nome:'DISNEY+ PREMIUM 30 DIAS | CONTA COMPARTILHADA',preco:5.00,imagem:'https://images.unsplash.com/photo-1603181601493-a4ea7ff75c23?w=400',categoria:'streaming'},
  {id:'5',nome:'MINECRAFT PREMIUM | CONTA FULL ACESSO',preco:25.00,imagem:'https://images.unsplash.com/photo-1607853202273-797f1c22a38e?w=400',categoria:'minecraft'},
  {id:'6',nome:'FREE FIRE | 1000 DIAMANTES',preco:15.00,imagem:'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400',categoria:'freefire'}
];

let carrinho = [];
let favoritos = [];
let notificacoes = [
  {id:1,titulo:'Bem-vindo ao Prime Game Vz!',desc:'Explore milhares de serviços digitais com os melhores preços.',tempo:'Agora'},
  {id:2,titulo:'Promoção YouTube Premium',desc:'Apenas R$ 4,20 por 30 dias de conta família!',tempo:'1h atrás'},
  {id:3,titulo:'Novo produto disponível',desc:'Spotify Premium 30 dias por R$ 3,50',tempo:'3h atrás'}
];

window.addEventListener('load',()=>{
  lucide.createIcons();
  renderizarProdutos();
  carregarTema();
  atualizarBadgeNotif();
});

function renderizarProdutos(lista=produtos){
  const grid = document.getElementById('produtosGrid');
  grid.innerHTML = lista.map(p => `
    <div class="card-produto" onclick="verProduto('${p.id}')">
      <div class="produto-img">
        <img src="${p.imagem}" alt="${p.nome}">
        <div class="produto-fav ${favoritos.includes(p.id)?'ativo':''}" onclick="event.stopPropagation();toggleFavorito('${p.id}')"><i data-lucide="heart"></i></div>
      </div>
      <div class="produto-info">
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco"><div class="preco-box">R$ ${p.preco.toFixed(2)}</div></div>
        <div class="produto-vendedor"><div class="vendedor-avatar">L</div><span>L. Vz</span></div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function verProduto(id){
  const p = produtos.find(prod => prod.id === id);
  if(!p) return;
  if(confirm(`Produto: ${p.nome}\n\nPreço: R$ ${p.preco.toFixed(2)}\n\nAdicionar ao carrinho?`)){
    adicionarCarrinho(p.id);
  }
}

function toggleFavorito(id){
  if(favoritos.includes(id)){
    favoritos = favoritos.filter(f => f !== id);
  }else{
    favoritos.push(id);
  }
  renderizarProdutos();
}

function filtrarCategoria(cat){
  const filtrados = produtos.filter(p => p.categoria === cat);
  renderizarProdutos(filtrados);
  document.getElementById('tituloSecao').textContent = cat.toUpperCase();
}

// BUSCA
function abrirBusca(){
  document.getElementById('modalBusca').classList.add('ativo');
  document.getElementById('inputBusca').focus();
}
function fecharBusca(){
  document.getElementById('modalBusca').classList.remove('ativo');
  document.getElementById('inputBusca').value = '';
  document.getElementById('resultadoBusca').innerHTML = '';
}
function buscarProdutos(){
  const termo = document.getElementById('inputBusca').value.toLowerCase();
  const resultado = document.getElementById('resultadoBusca');
  if(!termo){
    resultado.innerHTML = '';
    return;
  }
  const encontrados = produtos.filter(p => 
    p.nome.toLowerCase().includes(termo) || 
    p.categoria.toLowerCase().includes(termo)
  );
  if(encontrados.length === 0){
    resultado.innerHTML = '<div style="text-align:center;padding:20px;color:var(--cinza)">Nenhum resultado encontrado</div>';
    return;
  }
  resultado.innerHTML = encontrados.map(p => `
    <div class="item-busca" onclick="verProduto('${p.id}');fecharBusca()">
      <div class="item-busca-nome">${p.nome}</div>
      <div class="item-busca-preco">R$ ${p.preco.toFixed(2)}</div>
    </div>
  `).join('');
}

// NOTIFICAÇÕES
function abrirNotificacoes(){
  document.getElementById('modalNotif').classList.add('ativo');
  renderizarNotificacoes();
}
function fecharNotificacoes(){
  document.getElementById('modalNotif').classList.remove('ativo');
}
function renderizarNotificacoes(){
  const lista = document.getElementById('listaNotif');
  lista.innerHTML = notificacoes.map(n => `
    <div class="item-notif">
      <i data-lucide="bell"></i>
      <div class="notif-txt">
        <div class="notif-tit">${n.titulo}</div>
        <div class="notif-desc">${n.desc}</div>
        <div class="notif-tempo">${n.tempo}</div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}
function atualizarBadgeNotif(){
  document.getElementById('notifBadge').textContent = notificacoes.length;
}

// CARRINHO
function abrirCarrinho(){
  document.getElementById('modalCarrinho').classList.add('ativo');
  renderizarCarrinho();
}
function fecharCarrinho(){
  document.getElementById('modalCarrinho').classList.remove('ativo');
}
function adicionarCarrinho(id){
  const p = produtos.find(prod => prod.id === id);
  if(!p) return;
  if(!carrinho.find(item => item.id === id)){
    carrinho.push(p);
    alert('Produto adicionado ao carrinho!');
  }else{
    alert('Produto já está no carrinho!');
  }
}
function removerCarrinho(id){
  carrinho = carrinho.filter(item => item.id !== id);
  renderizarCarrinho();
}
function renderizarCarrinho(){
  const lista = document.getElementById('listaCarrinho');
  const total = carrinho.reduce((sum,item) => sum + item.preco, 0);
  if(carrinho.length === 0){
    lista.innerHTML = '<div class="carrinho-vazio"><i data-lucide="shopping-cart"></i><div>Carrinho vazio</div></div>';
    lucide.createIcons();
  }else{
    lista.innerHTML = carrinho.map(item => `
      <div class="item-carrinho">
        <div class="item-carrinho-img"><img src="${item.imagem}" alt="${item.nome}"></div>
        <div class="item-carrinho-info">
          <div class="item-carrinho-nome">${item.nome}</div>
          <div class="item-carrinho-preco">R$ ${item.preco.toFixed(2)}</div>
        </div>
        <div class="item-carrinho-del" onclick="removerCarrinho('${item.id}')"><i data-lucide="trash-2"></i></div>
      </div>
    `).join('');
    lucide.createIcons();
  }
  document.getElementById('carrinhoTotal').textContent = `R$ ${total.toFixed(2)}`;
}
function finalizarCompra(){
  if(carrinho.length === 0){
    alert('Carrinho vazio!');
    return;
  }
  alert('Compra finalizada! Em breve entraremos em contato.');
  carrinho = [];
  renderizarCarrinho();
  fecharCarrinho();
}

// MENU
function abrirMenu(){
  document.getElementById('menuOverlay').classList.add('ativo');
  document.getElementById('menuLateral').classList.add('ativo');
}
function fecharMenu(){
  document.getElementById('menuOverlay').classList.remove('ativo');
  document.getElementById('menuLateral').classList.remove('ativo');
}

// TEMA
function trocarTema(){
  const body = document.body;
  const switchEl = document.getElementById('switchTema');
  body.classList.toggle('tema-claro');
  switchEl.classList.toggle('ativo');
  localStorage.setItem('tema', body.classList.contains('tema-claro') ?
  'claro' : 'escuro');
}

function carregarTema(){
  const temaSalvo = localStorage.getItem('tema');
  if(temaSalvo === 'claro'){
    document.body.classList.add('tema-claro');
    document.getElementById('switchTema').classList.add('ativo');
  }
}

lucide.createIcons();
</script>
</body>
</html>
