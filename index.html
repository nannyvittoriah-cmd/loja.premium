<!-- LOGIN -->
<section class="page active" id="login">
  <div class="login-wrap">
    <div class="login-card">
      
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#grad)"/>
          <path d="M2 17L12 22L22 17" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
          <path d="M2 12L12 17L22 12" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="24" y2="24">
              <stop offset="0%" stop-color="#8b5cf6"/>
              <stop offset="100%" stop-color="#d4af37"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <h1>PRIME</h1>
          <span>STORE</span>
        </div>
      </div>

      <div id="loginForm">
        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Faça login para continuar</p>
        
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="email">
        </div>
        
        <div class="input-group">
          <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password">
          <span class="material-symbols-outlined toggle" onclick="togglePass('loginPass',this)">visibility_off</span>
        </div>

        <div class="options">
          <label class="checkbox">
            <input type="checkbox">
            <span>Lembrar-me</span>
          </label>
          <a href="#" class="forgot">Esqueci a senha</a>
        </div>

        <p class="error" id="loginError"></p>
        
        <button class="btn-primary" onclick="login()">Entrar</button>

        <p class="signup">Ainda não tem conta? <a href="#" onclick="toggleForm()">Criar conta</a></p>
      </div>

      <div id="registerForm" class="hidden">
        <h2>Criar conta</h2>
        <p class="subtitle">Comece agora</p>
        
        <div class="input-group">
          <input type="text" id="regName" placeholder="Nome completo">
        </div>
        
        <div class="input-group">
          <input type="email" id="regEmail" placeholder="E-mail">
        </div>
        
        <div class="input-group">
          <input type="password" id="regPass" placeholder="Senha">
          <span class="material-symbols-outlined toggle" onclick="togglePass('regPass',this)">visibility_off</span>
        </div>

        <p class="error" id="regError"></p>
        
        <button class="btn-primary" onclick="register()">Cadastrar</button>

        <p class="signup">Já tem conta? <a href="#" onclick="toggleForm()">Fazer login</a></p>
      </div>
    </div>
  </div>
</section>

<style>
.login-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:radial-gradient(circle at 50% -20%, rgba(139,92,246,0.15) 0%, transparent 50%),
             #060609;
}

.login-card{
  width:100%;
  max-width:380px;
  background:#0c0c0f;
  border:1px solid #1a1a22;
  border-radius:20px;
  padding:40px 32px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  animation:fadeIn 0.4s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:40px;
}
.logo h1{
  font-size:24px;
  font-weight:700;
  letter-spacing:1px;
  color:#fff;
}
.logo span{
  font-size:11px;
  color:#6b7280;
  letter-spacing:2.5px;
  display:block;
  margin-top:-4px;
}

h2{
  font-size:22px;
  font-weight:600;
  margin-bottom:6px;
  color:#fff;
}
.subtitle{
  font-size:13px;
  color:#6b7280;
  margin-bottom:32px;
}

.input-group{
  position:relative;
  margin-bottom:16px;
}
.input-group input{
  width:100%;
  height:52px;
  background:#141418;
  border:1px solid #1f1f28;
  border-radius:12px;
  padding:0 16px;
  color:#fff;
  font-size:14px;
  outline:none;
  transition:all 0.2s;
}
.input-group input:focus{
  border-color:#8b5cf6;
  background:#17171c;
}
.input-group input::placeholder{
  color:#4b5563;
}
.toggle{
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  color:#6b7280;
  cursor:pointer;
  font-size:20px;
}
.toggle:hover{color:#8b5cf6;}

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:20px 0 28px;
  font-size:13px;
}
.checkbox{
  display:flex;
  align-items:center;
  gap:8px;
  color:#9ca3af;
  cursor:pointer;
}
.checkbox input{
  width:16px;
  height:16px;
  accent-color:#8b5cf6;
}
.forgot{
  color:#8b5cf6;
  text-decoration:none;
  font-weight:500;
}
.forgot:hover{text-decoration:underline;}

.btn-primary{
  width:100%;
  height:52px;
  background:#8b5cf6;
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
}
.btn-primary:hover{
  background:#7c3aed;
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(139,92,246,0.3);
}
.btn-primary:active{transform:translateY(0);}

.signup{
  text-align:center;
  font-size:13px;
  color:#6b7280;
  margin-top:24px;
}
.signup a{
  color:#8b5cf6;
  font-weight:500;
  text-decoration:none;
}
.signup a:hover{text-decoration:underline;}

.error{
  color:#ef4444;
  font-size:12px;
  margin:-8px 0 16px;
  display:none;
}

.hidden{display:none;}
</style>
