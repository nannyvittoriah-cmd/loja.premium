<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Gamer</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0a0014,#1a0033);
    color:white;
}

/* TOPO */
.topo{
    padding:15px;
}

/* CATEGORIAS */
.categorias{
    display:flex;
    gap:10px;
    overflow:auto;
}

.cat{
    min-width:120px;
    text-align:center;
    border:1px solid #ff00aa;
    border-radius:12px;
    padding:10px;
    cursor:pointer;
    background: rgba(255,0,170,0.1);
}

.cat img{
    width:60px;
    height:60px;
    border-radius:10px;
}

.cat p{
    margin:5px 0 0;
    font-size:14px;
}

/* PRODUTOS */
.produto{
    border:1px solid #ff00aa;
    padding:15px;
    margin:15px;
    border-radius:12px;
}

/* BOTÃO */
button{
    background:#ff00aa;
    border:none;
    padding:10px;
    width:100%;
    border-radius:10px;
    color:white;
    font-weight:bold;
}

/* PIX */
.pix{
    border:1px solid #00ffcc;
    padding:15px;
    margin:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="topo">
    <h2>Categorias</h2>

    <div class="categorias">

      .cat img{https://share.google/images/MIm6zOBomRSDJA1i7
    width:100%;
    height:70px;
    object-fit:cover;
    border-radius:10px;
}

        <!-- INSTAGRAM -->
        <div class="cat" onclick="mostrar('insta')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
            <p>Instagram</p>
        </div>

    </div>
</div>

<div id="produtos"></div>

<script>
function mostrar(cat){
    let div = document.getElementById("produtos");
    div.innerHTML = "";

    if(cat === "ff"){
        div.innerHTML += produto("Dimas FF 110", "R$ 10");
        div.innerHTML += produto("Dimas FF 310", "R$ 25");
    }

    if(cat === "insta"){
        div.innerHTML += produto("100 Seguidores", "R$ 5");
        div.innerHTML += produto("500 Seguidores", "R$ 15");
    }
}

function produto(nome, preco){
    return `
    <div class="produto">
        <h3>${nome}</h3>
        <p>${preco}</p>

        <button onclick="comprar('${nome}','${preco}')">
            COMPRAR
        </button>
    </div>
    `;
}

function comprar(nome, preco){
    let div = document.getElementById("produtos");

    div.innerHTML += `
    <div class="pix">
        <h3>Pagamento via PIX</h3>
        <p>Chave: (98) 984853563</p>

        <a href="https://wa.me/5598984853563?text=Comprei ${nome} - ${preco}">
            <button>Enviar comprovante no WhatsApp</button>
        </a>
    </div>
    `;
}
</script>

</body>
</html>
