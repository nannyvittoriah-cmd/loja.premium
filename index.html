<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS STORE - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0c0c14;color:#fff;padding-bottom:80px;}

/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
}
.menu-icon{width:24px;height:24px;color:#fff;cursor:pointer;}
.header-right{display:flex;align-items:center;gap:16px;}
.greeting{font-size:15px;font-weight:600;}
.balance{font-size:13px;color:#9ca3af;cursor:pointer;}
.cart{position:relative;cursor:pointer;}
.cart svg{width:24px;height:24px;}
.badge{
  position:absolute;top:-6px;right:-8px;background:#ef4444;color:#fff;
  font-size:10px;padding:2px 5px;border-radius:10px;font-weight:600;
}

/* Search */
.search{
  margin:0 16px 16px;position:relative;
}
.search svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:#6b7280;
}
.search input{
  width:100%;height:46px;background:#1a1a24;border:1px solid #2a2a35;
  border-radius:12px;padding:0 16px 0 44px;color:#fff;font-size:14px;outline:none;
}

/* Banner */
.banner{
  margin:0 16px 20px;height:160px;border-radius:16px;
  background:linear-gradient(135deg,#1e1b4b,#7c3aed);
  position:relative;overflow:hidden;display:flex;align-items:center;
  padding:0 20px;
}
.banner-text{position:relative;z-index:2;}
.banner-text h3{font-size:18px;font-weight:700;margin-bottom:6px;}
.banner-text p{font-size:13px;color:#d1d5db;line-height:1.4;}
.banner-img{
  position:absolute;right:-10px;bottom:0;height:140px;
  opacity:0.9;
}

/* Section */
.section{padding:0 16px 20px;}
.section-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}
.section-head h4{font-size:15px;font-weight:600;}
.section-head a{font-size:13px;color:#9ca3af;text-decoration:none;}

/* Categories */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.card{
  background:#1a1a24;border:1px solid #2a2a35;border-radius:12px;
  padding:14px 8px;text-align:center;cursor:pointer;
  transition:0.2s;
}
.card:active{transform:scale(0.95);}
.card img{width:28px;height:28px;margin-bottom:6px;}
.card span{font-size:11px;color:#9ca3af;display:block;}

/* Products */
.products{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.prod-card{
  background:#1a1a24;border:1px solid #2a2a35;border-radius:12px;
  overflow:hidden;cursor:pointer;
}
.prod-card img{width:100%;height:80px;object-fit:cover;}
.prod-info{padding:8px;}
.prod-info h5{font-size:12px;font-weight:600;margin-bottom:3px;}
.prod-info p{font-size:11px;color:#9ca3af;}
.price{font-size:13px;font-weight:700;color:#7c3aed;margin-top:4px;}

/* Bottom Nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;background:#0c0c14;
  border-top:1px solid #2a2a35;display:flex;justify-content:space-around;
  padding:8px 0;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;font-size:11px;
  color:#6b7280;cursor:pointer;
}
.nav-item.active{color:#7c3aed;}
.nav-item svg{width:22px;height:22px;margin-bottom:4px;}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <svg class="menu-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path d="M4 6h16M4 12h16M4 18h16"/>
  </svg>
  <div class="greeting">Olá, <span id="userName">Gabriel</span> 👋</div>
  <div class="header-right">
    <span class="balance" onclick="logout()">Ver saldo</span>
    <div class="cart">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="badge">1</span>
    </div>
  </div>
</div>

<!-- Search -->
<div class="search">
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
  </svg>
  <input type="text" placeholder="Buscar produtos...">
</div>

<!-- Banner -->
<div class="banner">
  <div class="banner-text">
    <h3>MEGA PROMO</h3>
    <p>ATÉ 50% OFF<br>Produtos selecionados!</p>
  </div>
  <img class="banner-img" src="https://i.imgur.com/8Km9tLL.png" alt="">
</div>

<!-- Categories -->
<div class="section">
  <div class="section-head">
    <h4>Categorias</h4>
    <a href="#">Ver todas</a>
  </div>
  <div class="grid">
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/3616/3616212.png">
      <span>Games</span>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
      <span>Streaming</span>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
      <span>Redes Sociais</span>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/833/833593.png">
      <span>Gift Cards</span>
    </div>
  </div>
</div>

<!-- Destaques -->
<div class="section">
  <div class="section-head">
    <h4>Destaques</h4>
    <a href="#">Ver todas</a>
  </div>
  <div class="products">
    <div class="prod-card">
      <img src="https://i.imgur.com/9Q2bZ8L.png">
      <div class="prod-info">
        <h5>ROBLOX</h5>
        <p>400 Robux</p>
        <div class="price">R$ 15,90</div>
      </div>
    </div>
    <div class="prod-card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" style="background:#000;padding:20px;">
      <div class="prod-info">
        <h5>NETFLIX</h5>
        <p>1 Mês</p>
        <div class="price">R$ 17,90</div>
      </div>
    </div>
    <div class="prod-card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" style="background:#1DB954;padding:20px;">
      <div class="prod-info">
        <h5>SPOTIFY</h5>
        <p>Premium 1 Mês</p>
        <div class="price">R$ 10,90</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 3h18M3 12h18M3 21h18"/>
    </svg>
    <span>Loja</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <span>Carrinho</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
    </svg>
    <span>Pedidos</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Perfil</span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Protege a página - se não tiver logado volta pro login
onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
  }else{
    window.location.href = 'index.html';
  }
});

window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = 'index.html';
  });
}
</script>
</body>
</html>
