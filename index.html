<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Store VZ - Dashboard</title>
<style>
:root{--bg:#0a0a12;--card:#16161f;--input:#1e1e2a;--border:#2f2f42;--purple:#8b5cf6;--purple-dark:#7c3aed;--text:#fff;--text-dim:#8b8ba1;--green:#10b981;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.logo-text{font-size:18px;font-weight:800}
.logo-text.prime{color:#fff}
.logo-text.store{color:var(--purple)}
.btn-sair{height:36px;padding:0 16px;background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:11px;font-weight:600;cursor:pointer}
.btn-sair:active{transform:scale(0.96);border-color:var(--red);color:var(--red)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.card-title{font-size:16px;font-weight:800;margin-bottom:8px}
.card-sub{font-size:12px;color:var(--text-dim);margin-bottom:20px}
.btn{width:100%;height:44px;background:linear-gradient(135deg,var(--purple) 0%,var(--purple-dark) 100%);border:none;border-radius:11px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="header">
  <div class="logo-text"><span class="prime">Prime</span> <span class="store">store Vz</span></div>
  <button class="btn-sair" onclick="logout()">🚪 Sair</button>
</div>

<div class="card">
  <div class="card-title">Login feito com sucesso! 🎉</div>
  <div class="card-sub" id="userEmail">Carregando...</div>
  <button class="btn" onclick="alert('Aqui vai a loja')">Ir para Loja</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('userEmail').textContent = user.email;
  }else{
    window.location.href='index.html';
  }
});

function logout(){
  auth.signOut();
}
</script>
</body>
</html>
