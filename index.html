<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameStore</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #000428, #004e92);
    color: white;
}

/* TOPO */
header {
    background: #000;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: #00ffcc;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px;
}

button {
    background: #00ff99;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* PRODUTOS */
.produtos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #001f4d;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px #00ffcc;
}

.card h3 {
    color: #00ffcc;
}

.card button {
    width: 100%;
    margin-top: 10px;
}

/* CARRINHO */
#carrinho {
    position: fixed;
    right: 10px;
    top: 70px;
    background: #000;
    padding: 10px;
    width: 220px;
    border: 1px solid #00ffcc;
}

#carrinho h3 {
    color: #00ffcc;
}
</style>
</head>

<body>

<header>🎮 GameStore</header>

<div class="menu">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('ff')">Free Fire</button>
    <button onclick="filtrar('contas')">Contas</button>
</div>

<div class="produtos" id="produtos"></div>

<div id="carrinho">
    <h3>Carrinho</h3>
    <ul id="lista"></ul>
    <p id="total">Total: R$0</p>
</div>

<script>
// PRODUTOS (EDITA AQUI)
let produtos = [
    {nome:"💎 100 Diamantes FF", preco:10, cat:"ff", desc:"Entrega rápida via ID"},
    {nome:"🔥 Conta FF Rara", preco:50, cat:"contas", desc:"Skins exclusivas"},
    {nome:"💎 310 Diamantes FF", preco:25, cat:"ff", desc:"Entrega imediata"},
    {nome:"🎮 Conta Level Alto", preco:80, cat:"contas", desc:"Conta full upada"}
];

let carrinho = [];

// MOSTRAR PRODUTOS
function mostrar(lista){
    let area = document.getElementById("produtos");
    area.innerHTML = "";

    lista.forEach((p,i)=>{
        area.innerHTML += `
        <div class="card">
            <h3>${p.nome}</h3>
            <p>${p.desc}</p>
            <p><b>R$ ${p.preco}</b></p>
            <button onclick="add(${i})">Comprar</button>
        </div>`;
    });
}

// FILTRO
function filtrar(cat){
    if(cat === "todos"){
        mostrar(produtos);
    } else {
        mostrar(produtos.filter(p => p.cat === cat));
    }
}

// CARRINHO
function add(i){
    carrinho.push(produtos[i]);
    atualizar();
}

function atualizar(){
    let lista = document.getElementById("lista");
    let total = 0;
    lista.innerHTML = "";

    carrinho.forEach(p=>{
        lista.innerHTML += `<li>${p.nome} - R$${p.preco}</li>`;
        total += p.preco;
    });

    document.getElementById("total").innerText = "Total: R$" + total;
}

// INICIAR
mostrar(produtos);
</script>

</body>
</html>
