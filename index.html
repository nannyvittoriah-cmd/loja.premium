<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonys Story</title>

<style>
:root{
--bg:#000;
--card:#111;
--text:#fff;
--border:#00c3ff;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* TOPO */
.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#0b0f2a;
font-weight:bold;
}

.dots{cursor:pointer;font-size:24px}

/* MENU */
.menu{
position:absolute;
right:10px;
top:50px;
background:#fff;
color:#000;
display:none;
flex-direction:column;
width:180px;
border-radius:10px;
}

.menu button{
padding:10px;
border:none;
background:none;
cursor:pointer;
}

/* LOJA */
.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
padding:20px;
}

.card{
width:260px;
background:var(--card);
border:2px solid var(--border);
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.buy{
width:100%;
padding:10px;
background:var(--border);
border:none;
cursor:pointer;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border-radius:6px;
border:1px solid #555;
}

/* CHECKOUT */
.checkout{display:none;padding:20px;}
.box{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

/* ADM */
.admin{display:none;padding:20px;}
.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

.stats{display:flex;gap:10px;flex-wrap:wrap;}
.stat{
flex:1;
background:#222;
padding:10px;
border-radius:8px;
text-align:center;
}

/* HIST */
.item{
border:1px solid #333;
margin:5px;
padding:8px;
}

.nao{border-left:5px solid red;}
.visto{border-left:5px solid green;}

/* TEMAS */
.rosa{--bg:#fff;--card:#fff;--text:#000;--border:#ff4fd8;}
.lilas{--bg:#fff;--card:#fff;--text:#000;--border:#b26bff;}
.azul{--bg:#000;--card:#111;--text:#fff;--border:#00c3ff;}
.amarelo{--bg:#000;--card:#111;--text:#fff;--border:#ffd400;}
</style>
</head>

<body class="azul">

<div class="topbar">
<div>BONYS STORY</div>
<div class="dots" onclick="toggleMenu()">⋮</div>
</div>

<div id="menu" class="menu">
<button onclick="goHome()">Home</button>
<button onclick="setTheme('rosa')">🌸 Rosa</button>
<button onclick="setTheme('lilas')">💜 Lilás</button>
<button onclick="setTheme('azul')">🔵 Azul</button>
<button onclick="setTheme('amarelo')">🟡 Amarelo</button>
<button onclick="openAdmin()">ADM</button>
</div>

<div id="loja" class="container"></div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout">
<div class="box">
<h3>COMPROVANTE</h3>
<input id="nome" placeholder="Nome">
<input id="whats" placeholder="WhatsApp">
<input id="produto" readonly>
<input id="link" placeholder="Link comprovante">
<button onclick="enviar()">ENVIAR</button>
</div>
</div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">
<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>📊 DASH</h3>
<div class="stats">
<div class="stat">Cliques<br><span id="cliques"></span></div>
<div class="stat">Vendas<br><span id="vendas"></span></div>
<div class="stat">Pedidos<br><span id="pedidos"></span></div>
</div>

<hr>

<h3>➕ PRODUTOS</h3>
<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem URL">
<button onclick="addProduto()">Adicionar</button>

<hr>

<div id="produtosADM"></div>

<hr>

<h3>📄 HISTÓRICO</h3>
<input id="busca" placeholder="Buscar..." oninput="carregar()">
<div id="hist"></div>

</div>
</div>
</div>

<script>

let selected="";

/* PRODUTOS */
let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png"],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png"],
["Passe Elite","80","https://i.imgur.com/3Q9Z1ZQ.png"],

["Starter Pack","10","https://i.imgur.com/4Q9Z1ZQ.png"],
["Pro Pack","30","https://i.imgur.com/5Q9Z1ZQ.png"],
["Ultra Pack","100","https://i.imgur.com/6Q9Z1ZQ.png"],

["50 Tokens","15","https://i.imgur.com/7Q9Z1ZQ.png"],
["100 Tokens","25","https://i.imgur.com/8Q9Z1ZQ.png"],
["200 Tokens","50","https://i.imgur.com/9Q9Z1ZQ.png"],
["300 Tokens","70","https://i.imgur.com/10Q9Z1ZQ.png"],
["400 Tokens","90","https://i.imgur.com/11Q9Z1ZQ.png"],
["500 Tokens","120","https://i.imgur.com/12Q9Z1ZQ.png"],
["600 Tokens","140","https://i.imgur.com/13Q9Z1ZQ.png"],
["700 Tokens","160","https://i.imgur.com/14Q9Z1ZQ.png"],
["800 Tokens","172","https://i.imgur.com/15Q9Z1ZQ.png"],
["900 Tokens","182","https://i.imgur.com/16Q9Z1ZQ.png"],
["1000 Tokens","200","https://i.imgur.com/17Q9Z1ZQ.png"],

["Mega Combo","250","https://i.imgur.com/18Q9Z1ZQ.png"],
["VIP Deluxe","300","https://i.imgur.com/19Q9Z1ZQ.png"]
];

function salvarProdutos(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function renderLoja(){
loja.innerHTML="";
produtos.forEach((p,i)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`
${p[2]?`<img src="${p[2]}">`:""}
<div>${p[0]}</div>
<div>R$ ${p[1]}</div>
<button class="buy" onclick="buy('${p[0]}')">COMPRAR</button>
`;
loja.appendChild(d);
});
}
renderLoja();

/* MENU */
function toggleMenu(){menu.style.display=menu.style.display==="flex"?"none":"flex";}
function setTheme(t){document.body.className=t;}
function goHome(){loja.style.display="flex";checkout.style.display="none";admin.style.display="none";}

/* COMPRA */
function buy(p){
selected=p;
loja.style.display="none";
checkout.style.display="block";
produto.value=p;
}

/* ENVIO */
function enviar(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
nome:nome.value,
produto:selected,
link:link.value,
status:"nao"
});

localStorage.setItem("dados",JSON.stringify(dados));

let v=Number(localStorage.getItem("vendas")||0);
localStorage.setItem("vendas",v+1);

alert("Enviado!");
goHome();
}

/* ADM */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

function login(){
if(u.value==="Lorrannyh.170" && p.value==="Lorrannyh.170"){
painel.style.display="block";
carregar();
renderADMProdutos();
}else alert("erro login");
}

/* ADD */
function addProduto(){
produtos.push([pnome.value,ppreco.value,pimg.value]);
salvarProdutos();
renderLoja();
renderADMProdutos();
}

/* ADM LIST */
function renderADMProdutos(){
produtosADM.innerHTML="";
produtos.forEach((p,i)=>{
let d=document.createElement("div");
d.className="item";
d.innerHTML=`
<input value="${p[0]}" onchange="produtos[${i}][0]=this.value;salvarProdutos();renderLoja()">
<input value="${p[1]}" onchange="produtos[${i}][1]=this.value;salvarProdutos();renderLoja()">
<input value="${p[2]}" onchange="produtos[${i}][2]=this.value;salvarProdutos();renderLoja()">
<button onclick="produtos.splice(${i},1);salvarProdutos();renderLoja();renderADMProdutos()">Excluir</button>
`;
produtosADM.appendChild(d);
});
}

/* HIST */
function carregar(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");
hist.innerHTML="";

dados.forEach((d,i)=>{
if(busca.value && !d.nome.toLowerCase().includes(busca.value.toLowerCase())) return;

let div=document.createElement("div");
div.className="item "+(d.status==="nao"?"nao":"visto");

div.innerHTML=`
<b>${d.nome}</b><br>
${d.produto}<br>
<a href="${d.link}" target="_blank">Ver comprovante</a>
`;

hist.appendChild(div);
});

cliques.innerText=localStorage.getItem("clicks")||0;
vendas.innerText=localStorage.getItem("vendas")||0;
pedidos.innerText=dados.length;
}

carregar();

/* CLIQUES */
let c=Number(localStorage.getItem("clicks")||0);
localStorage.setItem("clicks",c+1);

</script>

</body>
</html>
