<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      font-family: 'Montserrat', sans-serif;
      background: #050505;
      color: #fff;
      --roxo-neon: #8B5CF6;
      --roxo-glow: rgba(139, 92, 246, 0.3);
      --bg-card: #0E0E12;
      --borda-roxa: rgba(139, 92, 246, 0.3);
      --cinza-texto: #A1A1AA;
    }
    .hidden { display: none !important; }
    
    .login-box {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a0b2e 0%, #050505 100%);
      padding: 8px;
      overflow: hidden;
    }
    .login-wrapper { width: 100%; max-width: 280px; }
    .banner-login {
      width: 100%;
      margin-bottom: 8px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--borda-roxa);
      box-shadow: 0 0 15px var(--roxo-glow);
    }
    .banner-login img { width: 100%; display: block; }
    .login-card {
      background: var(--bg-card);
      padding: 12px;
      border-radius: 20px;
      border: 1px solid var(--borda-roxa);
      box-shadow: 0 0 12px var(--roxo-glow);
    }
    .login-card h2 {
      font-size: 16px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .login-card h2::before,.login-card h2::after {
      content: '➔';
      color: var(--roxo-neon);
      font-size: 0.6rem;
    }
    .login-card p {
      text-align: center;
      color: var(--cinza-texto);
      margin-bottom: 8px;
      font-size: 9px;
    }
    .input-group { margin-bottom: 6px; position: relative; }
    .input-group input {
      width: 100%;
      background: #050505;
      border: 1px solid var(--borda-roxa);
      padding: 7px 7px 28px;
      border-radius: 20px;
      color: #fff;
      font-size: 10px;
      font-family: 'Montserrat', sans-serif;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--roxo-neon);
      box-shadow: 0 0 6px var(--roxo-glow);
    }
    .input-group .icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--roxo-neon);
      font-size: 0.7rem;
    }
    .opcoes {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 6px 0;
      font-size: 9px;
      color: var(--cinza-texto);
    }
    .checkbox { display: flex; align-items: center; gap: 3px; }
    .checkbox input { accent-color: var(--roxo-neon); width: 10px; height: 10px; }
    .link-roxo { color: var(--roxo-neon); cursor: pointer; }
    .btn {
      width: 100%;
      background: var(--roxo-neon);
      color: #fff;
      border: none;
      padding: 8px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 11px;
      cursor: pointer;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow: 0 0 10px var(--roxo-glow);
    }
    .erro { color: #ff4757; text-align: center; margin-top: 6px; font-size: 10px; }
    .cadastro-footer {
      text-align: center;
      margin-top: 8px;
      color: var(--cinza-texto);
      font-size: 10px;
    }
    .info-box {
      background: #050505;
      border: 1px solid var(--borda-roxa);
      padding: 8px;
      border-radius: 20px;
      margin-top: 6px;
      font-size: 9px;
    }
    .info-box h4 {
      color: var(--roxo-neon);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
    }
    .info-box p { color: var(--cinza-texto); }

    /* TELA APÓS LOGIN */
    .construcao {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #050505;
      text-align: center;
      padding: 20px;
    }
    .construcao h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--roxo-neon);
      margin-bottom: 12px;
      text-shadow: 0 0 20px var(--roxo-glow);
    }
    .construcao p {
      color: var(--cinza-texto);
      font-size: 14px;
      margin-bottom: 20px;
    }
    .btn-sair {
      background: var(--roxo-neon);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--roxo-glow);
    }
  </style>
</head>
<body>
  <div id="login" class="login-box">
    <div class="login-wrapper">
      <div class="banner-login">
        <img src="https://i.postimg.cc/HW54tvz2/c4b93135-a1e9-4246-9138-b2fac3dc79e0.jpg" alt="Premium Store">
      </div>

      <div class="login-card" id="form-cadastro">
        <h2>CADASTRO</h2>
        <p>Crie sua conta</p>
        <div class="input-group">
          <span class="icon">👤</span>
          <input type="text" id="nome-cadastro" placeholder="Usuário">
        </div>
        <div class="input-group">
          <span class="icon">✉️</span>
          <input type="email" id="email-cadastro" placeholder="E-mail">
        </div>
        <div class="input-group">
          <span class="icon">🔒</span>
          <input type="password" id="senha-cadastro" placeholder="Senha">
        </div>
        <div class="input-group">
          <span class="icon">🔒</span>
          <input type="password" id="senha-confirm" placeholder="Confirmar">
        </div>
        <label class="checkbox" style="margin: 6px 0;">
          <input type="checkbox" id="termos"> Aceito os <span class="link-roxo">Termos</span>
        </label>
        <button class="btn" id="btn-cadastrar">CRIAR 👤+</button>
        <div class="cadastro-footer">
          Já tem? <span class="link-roxo" onclick="trocarTela('login')">Login ➔</span>
        </div>
      </div>

      <div class="login-card hidden" id="form-login">
        <h2>LOGIN</h2>
        <p>Acesse sua conta</p>
        <div class="input-group">
          <span class="icon">✉️</span>
          <input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="input-group">
          <span class="icon">🔒</span>
          <input type="password" id="senha" placeholder="Senha">
        </div>
        <div class="opcoes">
          <label class="checkbox">
            <input type="checkbox" id="lembrar"> Lembrar
          </label>
          <span class="link-roxo" onclick="trocarTela('esqueci')">Esqueceu?</span>
        </div>
        <button class="btn" id="btn-entrar">ENTRAR ➔</button>
        <div class="cadastro-footer">
          Sem conta? <span class="link-roxo" onclick="trocarTela('cadastro')">Cadastrar ➔</span>
        </div>
      </div>

      <div class="login-card hidden" id="form-esqueci">
        <h2>ESQUECEU SENHA?</h2>
        <p>Enviaremos link de redefinição.</p>
        <div class="input-group">
          <span class="icon">✉️</span>
          <input type="email" id="email-recuperar" placeholder="Digite seu e-mail">
        </div>
        <button class="btn" id="btn-recuperar">ENVIAR ✈️</button>
        <div class="info-box">
          <h4>ℹ️ Info</h4>
          <p>Verifique o spam também.</p>
        </div>
        <div class="cadastro-footer">
          <span class="link-roxo" onclick="trocarTela('login')">← Voltar</span>
        </div>
      </div>

      <p class="erro hidden" id="erro-login"></p>
    </div>
  </div>

  <div id="painel" class="construcao hidden">
    <h1>🎮 PREMIUM STORE</h1>
    <p>Login realizado com sucesso!<br>Site em construção...</p>
    <button class="btn-sair" onclick="sair()">SAIR</button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'
    import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js'

    const firebaseConfig = {
      apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
      authDomain: "premium-store-aa58b.firebaseapp.com",
      databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
      projectId: "premium-store-aa58b",
      storageBucket: "premium-store-aa58b.firebasestorage.app",
      messagingSenderId: "462239500057",
      appId: "1:462239500057:web:f1b7cea162ed308a866788",
      measurementId: "G-CN88J28WRX"
    };

    const app = initializeApp(firebaseConfig)
    const auth = getAuth(app)
    const db = getDatabase(app)

    window.trocarTela = (tela) => {
      document.getElementById('form-login').classList.toggle('hidden', tela !== 'login')
      document.getElementById('form-cadastro').classList.toggle('hidden', tela !== 'cadastro')
      document.getElementById('form-esqueci').classList.toggle('hidden', tela !== 'esqueci')
      document.getElementById('erro-login').classList.add('hidden')
    }

    document.getElementById('btn-entrar').onclick = async () => {
      const email = document.getElementById('email').value
      const senha = document.getElementById('senha').value
      try {
        await signInWithEmailAndPassword(auth, email, senha)
      } catch (e) {
        mostrarErro(e.message)
      }
    }

    document.getElementById('btn-cadastrar').onclick = async () => {
      const nome = document.getElementById('nome-cadastro').value
      const email = document.getElementById('email-cadastro').value
      const senha = document.getElementById('senha-cadastro').value
      const confirma = document.getElementById('senha-confirm').value
      const termos = document.getElementById('termos').checked

      if (!termos) return mostrarErro('Aceite os termos')
      if (senha !== confirma) return mostrarErro('Senhas diferentes')
      if (senha.length < 6) return mostrarErro('Senha mín 6 caracteres')
      if (!nome) return mostrarErro('Digite usuário')

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, senha)
        await updateProfile(cred.user, { displayName: nome })
        await set(ref(db, 'users/' + cred.user.uid), {
          nome: nome,
          email: email,
          saldo: 0,
          criadoEm: Date.now()
        })
      } catch (e) {
        mostrarErro(e.message)
      }
    }

    document.getElementById('btn-recuperar').onclick = async () => {
      const email = document.getElementById('email-recuperar').value
      try {
        await sendPasswordResetEmail(auth, email)
        alert('Link enviado!')
        trocarTela('login')
      } catch (e) {
        mostrarErro(e.message)
      }
    }

    window.sair = () => signOut(auth)

    function mostrarErro(msg) {
      const erro = document.getElementById('erro-login')
      erro.innerText = msg.includes('auth/') ? 'Email/senha inválidos' : msg
      erro.classList.remove('hidden')
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login').classList.add('hidden')
        document.getElementById('painel').classList.remove('hidden')
      } else {
        document.getElementById('login').classList.remove('hidden')
        document.getElementById('painel').classList.add('hidden')
      }
    })
  </script>
</body>
</html>
