<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bonys Story</title>

<style>

/* FUNDO */
body {
    margin: 0;
    padding: 0;
    font-size: 19px; /* fonte maior */
    font-family: Arial, sans-serif;
    background: url("https://i.imgur.com/iWGitub.jpeg") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* TITULOS */
h1, h2 {
    font-size: 30px;
    text-align: center;
}

/* CATEGORIAS */
.categorias, .subcategorias {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.65);
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff4da6;
}

.card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* WHATSAPP FLUTUANTE */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 65px;
    height: 65px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px black;
    z-index: 999;
}

.whatsapp-float img {
    width: 35px;
}

</style>
</head>

<body>

<h1>Bonys Story</h1>

<!-- WHATSAPP -->
<a class="whatsapp-float" href="https://wa.me/5598984843563" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png">
</a>

<!-- CATEGORIAS -->
<div class="categorias">

    <div class="card" onclick="abrirCategoria('instagram')">
        <img src="https://i.imgur.com/4M34hi2.png">
        <h3>Instagram</h3>
    </div>

    <div class="card" onclick="abrirCategoria('ff')">
        <img src="https://i.imgur.com/0e6bW8Q.png">
        <h3>Free Fire</h3>
    </div>

</div>

<h2>Produtos</h2>
<div class="subcategorias" id="subcategorias"></div>

<script>

function abrirCategoria(tipo) {

    let container = document.getElementById("subcategorias");
    container.innerHTML = "";

    /* INSTAGRAM */
    if (tipo === "instagram") {

        container.innerHTML = `
        <div class="card">
            <img src="https://i.imgur.com/abc1.jpg">
            <h3>Seguidores Instagram</h3>
            <p>💰 Sem seguidores por R$ 6,00 (TESTE)</p>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/abc2.jpg">
            <h3>Curtidas Instagram</h3>
            <p>Melhore seu engajamento rápido</p>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/abc3.jpg">
            <h3>Visualizações Reels</h3>
            <p>Mais alcance nos vídeos</p>
        </div>
        `;
    }

    /* FREE FIRE */
    if (tipo === "ff") {

        container.innerHTML = `
        <div class="card">
            <img src="https://i.imgur.com/xyz1.jpg">
            <h3>33 Toques Universal</h3>
            <p>🔥 R$ 10,99 (TESTE)</p>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/xyz2.jpg">
            <h3>Diamantes FF</h3>
            <p>Entrega rápida no ID</p>
        </div>

        <div class="card">
            <img src="https://i.imgur.com/xyz3.jpg">
            <h3>Skins Free Fire</h3>
            <p>Skins exclusivas e raras</p>
        </div>
        `;
    }
}

</script>

</body>
</html>
