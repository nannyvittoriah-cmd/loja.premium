<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Gamer</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: #fff;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff;
}

/* BOTÕES NEON */
.neon-btn {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 80%;
    text-align: center;
    border: 2px solid #ff00ff;
    color: #ff00ff;
    background: transparent;
    border-radius: 10px;
    text-shadow: 0 0 10px #ff00ff;
    box-shadow: 0 0 10px #ff00ff;
    cursor: pointer;
}

.neon-btn:hover {
    background: #ff00ff;
    color: black;
}

/* PRODUTOS */
.produto {
    border: 1px solid #ff00ff;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

/* ADMIN */
#adminPanel {
    display: none;
    padding: 20px;
}

input {
    padding: 10px;
    margin: 5px;
    width: 90%;
}
</style>
</head>

<body>

<header>🔥 LOJA GAMER 🔥</header>

<!-- LOGIN ADMIN -->
<div style="text-align:center;">
    <button class="neon-btn" onclick="loginAdmin()">Área Admin</button>
</div>

<!-- CATEGORIAS -->
<div id="categorias">
    <button class="neon-btn" onclick="mostrar('ff')">Itens Free Fire</button>
    <button class="neon-btn" onclick="mostrar('fortnite')">Fortnite</button>
    <button class="neon-btn" onclick="mostrar('caixa')">Caixas de Sorteio</button>
</div>

<!-- PRODUTOS -->
<div id="produtos"></div>

<!-- ADMIN -->
<div id="adminPanel">
    <h2>Painel Admin</h2>

    <input id="nome" placeholder="Nome do Produto">
    <input id="preco" placeholder="Preço">
    <input id="categoria" placeholder="Categoria (ff, fortnite, caixa)">
    <button class="neon-btn" onclick="addProduto()">Adicionar Produto</button>
</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [
    {nome:"Diamantes FF", preco:"R$10", categoria:"ff"},
    {nome:"Skin Fortnite", preco:"R$25", categoria:"fortnite"},
    {nome:"Caixa Misteriosa", preco:"R$5", categoria:"caixa"}
];

function salvar() {
    localStorage.setItem("produtos", JSON.stringify(produtos));
}

function mostrar(cat) {
    let area = document.getElementById("produtos");
    area.innerHTML = "";

    produtos.filter(p => p.categoria === cat).forEach(p => {
        area.innerHTML += `
        <div class="produto">
            <h3>${p.nome}</h3>
            <p>${p.preco}</p>
            <button class="neon-btn" onclick="comprar('${p.nome}','${p.preco}')">
                Comprar
            </button>
        </div>
        `;
    });
}

function comprar(nome, preco) {
    let msg = `Quero comprar ${nome} por ${preco}`;
    let numero = "5598984853563"; // seu número

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

function loginAdmin() {
    let senha = prompt("Digite a senha:");
    if(senha === "1234") {
        document.getElementById("adminPanel").style.display = "block";
    } else {
        alert("Senha errada!");
    }
}

function addProduto() {
    let nome = document.getElementById("nome").value;
    let preco = document.getElementById("preco").value;
    let categoria = document.getElementById("categoria").value;

    produtos.push({nome, preco, categoria});
    salvar();
    alert("Produto adicionado!");
}

</script>

</body>
</html>
