<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Neon</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: black;
    color: white;
}

/* TOPO */
header {
    text-align:center;
    padding:20px;
    font-size:26px;
    color:#ff00ff;
    text-shadow:0 0 15px #ff00ff;
}

/* CATEGORIAS */
.categorias {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.categoria-box {
    width:150px;
    height:150px;
    background:#111;
    border:2px solid #ff00ff;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 0 15px #ff00ff;
    transition:0.3s;
}

.categoria-box:hover {
    transform:scale(1.1);
}

.categoria-box img {
    width:80px;
    margin-top:15px;
}

.categoria-box p {
    color:#ff00ff;
}

/* PRODUTOS */
.produtos {
    display:none;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.card {
    background:#111;
    border:2px solid #ff00ff;
    border-radius:10px;
    width:200px;
    text-align:center;
    padding:10px;
    box-shadow:0 0 10px #ff00ff;
}

.card img {
    width:100%;
    border-radius:10px;
}

.card button {
    background:black;
    border:2px solid #ff00ff;
    color:#ff00ff;
    padding:8px;
    margin-top:5px;
    cursor:pointer;
}

.card button:hover {
    background:#ff00ff;
    color:black;
}

/* BOTÃO VOLTAR */
.voltar {
    display:none;
    text-align:center;
    margin-top:10px;
}
</style>

</head>
<body>

<header>🔥 LOJA NEON 🔥</header>

<!-- CATEGORIAS -->
<div class="categorias" id="categorias">

    <div class="categoria-box" onclick="abrir('ff')">
        <img src="https://i.imgur.com/3ZQ3Z6k.png">
        <p>Free Fire</p>
    </div>

    <div class="categoria-box" onclick="abrir('fortnite')">
        <img src="https://i.imgur.com/Jn1XxYb.png">
        <p>Fortnite</p>
    </div>

    <div class="categoria-box" onclick="abrir('insta')">
        <img src="https://i.imgur.com/Y6X0Z9B.png">
        <p>Instagram</p>
    </div>

    <div class="categoria-box" onclick="abrir('caixa')">
        <img src="https://i.imgur.com/zYIlgBl.png">
        <p>Caixa Sorteio</p>
    </div>

</div>

<!-- BOTÃO VOLTAR -->
<div class="voltar" id="voltar">
    <button onclick="voltar()">⬅ Voltar</button>
</div>

<!-- PRODUTOS -->
<div class="produtos" id="produtos"></div>

<script>

let numero = "5598984853563"; // TROCA PELO SEU

let dados = {

ff: [
    {nome:"Diamantes FF", preco:"R$5", img:"https://i.imgur.com/3ZQ3Z6k.png"},
    {nome:"Conta FF", preco:"R$20", img:"https://i.imgur.com/3ZQ3Z6k.png"},
    {nome:"Passe Elite", preco:"R$15", img:"https://i.imgur.com/3ZQ3Z6k.png"},
    {nome:"Curtidas FF", preco:"R$3", img:"https://i.imgur.com/3ZQ3Z6k.png"}
],

fortnite: [
    {nome:"V-Bucks", preco:"R$20", img:"https://i.imgur.com/Jn1XxYb.png"},
    {nome:"Conta Fortnite", preco:"R$50", img:"https://i.imgur.com/Jn1XxYb.png"}
],

insta: [
    {nome:"Seguidores", preco:"R$10", img:"https://i.imgur.com/Y6X0Z9B.png"},
    {nome:"Curtidas", preco:"R$5", img:"https://i.imgur.com/Y6X0Z9B.png"},
    {nome:"Visualizações", preco:"R$7", img:"https://i.imgur.com/Y6X0Z9B.png"}
],

caixa: [
    {nome:"Caixa de Sorteio", preco:"R$1", img:"https://i.imgur.com/zYIlgBl.png"}
]

};

function abrir(cat){
    document.getElementById("categorias").style.display="none";
    document.getElementById("produtos").style.display="flex";
    document.getElementById("voltar").style.display="block";

    let area = document.getElementById("produtos");
    area.innerHTML="";

    dados[cat].forEach(p=>{
        area.innerHTML += `
        <div class="card">
            <img src="${p.img}">
            <h4>${p.nome}</h4>
            <p>${p.preco}</p>
            <button onclick="comprar('${p.nome}')">Comprar</button>
        </div>`;
    });
}

function voltar(){
    document.getElementById("categorias").style.display="flex";
    document.getElementById("produtos").style.display="none";
    document.getElementById("voltar").style.display="none";
}

function comprar(produto){
    let msg = "Quero comprar: " + produto;
    let link = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;
    window.open(link);
}

</script>

</body>
</html>
