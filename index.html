<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonys Story</title>

<style>
:root{
--bg:#000;
--card:#111;
--text:#fff;
--border:#00c3ff;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* TOP */
.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#0b0f2a;
font-weight:bold;
}

.dots{cursor:pointer;font-size:24px}

/* MENU */
.menu{
position:absolute;
right:10px;
top:50px;
background:#fff;
color:#000;
display:none;
flex-direction:column;
width:180px;
border-radius:10px;
z-index:10;
}

.menu button{
padding:10px;
border:none;
background:none;
text-align:left;
cursor:pointer;
}

/* STATUS */
#status{
text-align:center;
padding:10px;
font-weight:bold;
}

/* LOJA */
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:300px;
background:var(--card);
border:2px solid var(--border);
border-radius:15px;
padding:10px;
}

.card img{
width:100%;
border-radius:10px;
}

button.buy{
width:100%;
padding:10px;
margin-top:10px;
background:var(--border);
border:none;
cursor:pointer;
font-weight:bold;
}

/* INPUTS */
input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #555;
background:#222;
color:#fff;
}

/* TEMA CLARO */
.rosa input,
.lilas input{
background:#fff;
color:#000;
border:1px solid #ccc;
}

/* CHECKOUT */
.checkout{display:none;padding:20px;}

.box{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

/* PIX */
.pixbox{
margin-top:10px;
padding:10px;
border:2px solid #444;
border-radius:10px;
background:#0a0a0a;
}

/* ADM */
.admin{display:none;padding:20px;}

.adminBox{
max-width:700px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

/* DASH */
.stats{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:10px 0;
}

.stat{
flex:1;
background:#222;
padding:10px;
border-radius:8px;
text-align:center;
}

/* THEMES */
.rosa{--bg:#fff;--card:#fff;--text:#000;--border:#ff4fd8;}
.lilas{--bg:#fff;--card:#fff;--text:#000;--border:#b26bff;}
.azul{--bg:#000;--card:#111;--text:#fff;--border:#00c3ff;}
.amarelo{--bg:#000;--card:#111;--text:#fff;--border:#ffd400;}
</style>
</head>

<body class="azul">

<div class="topbar">
<div>BONYS STORY</div>
<div class="dots" onclick="toggleMenu()">⋮</div>
</div>

<div class="menu" id="menu">
<button onclick="goHome()">Home</button>
<button onclick="setTheme('rosa')">🌸 Rosa</button>
<button onclick="setTheme('lilas')">💜 Lilás</button>
<button onclick="setTheme('azul')">🔵 Azul</button>
<button onclick="setTheme('amarelo')">🟡 Amarelo</button>
<button onclick="openAdmin()">ADM</button>
</div>

<div id="status">🟢 LOJA ONLINE</div>

<div id="loja" class="container"></div>

<div id="checkout" class="checkout">
<div class="box">

<h3>COMPROVANTE</h3>

<input id="nome" placeholder="Nome">
<input id="sobrenome" placeholder="Sobrenome">
<input id="email" placeholder="Email">
<input id="whats" placeholder="WhatsApp">
<input id="produto" readonly>

<div class="pixbox">
<p>💳 PIX</p>
<p>📱 5598984853563</p>
<p>👤 Lorrane Vitória</p>
</div>

<input id="linkpix" placeholder="Link comprovante">
<input id="nomepix" placeholder="Nome recebedor">
<input id="chavepix" placeholder="Chave PIX">

<button onclick="send()">ENVIAR</button>

</div>
</div>

<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="panel" style="display:none">

<div class="stats">
<div class="stat">Cliques<br><span id="cliques"></span></div>
<div class="stat">Vendas<br><span id="vendas"></span></div>
<div class="stat">Pedidos<br><span id="compras"></span></div>
</div>

<div id="hist"></div>

</div>
</div>
</div>

<script>

const whatsapp="5598984853563";
let selected="";

/* PRODUTOS */
const produtos=[
["25 Tokens","8","https://i.imgur.com/OFmm8PI.jpeg"],
["50 Tokens","15","https://i.imgur.com/OFmm8PI.jpeg"],
["100 Tokens","25","https://i.imgur.com/OFmm8PI.jpeg"],
["200 Tokens","50","https://i.imgur.com/OFmm8PI.jpeg"],
["500 Tokens","120","https://i.imgur.com/OFmm8PI.jpeg"],
["1000 Tokens","200","https://i.imgur.com/OFmm8PI.jpeg"]
];

const box=document.getElementById("loja");

produtos.forEach(p=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<img src="${p[2]}">
<div>${p[0]}</div>
<div>R$ ${p[1]}</div>
<button class="buy" onclick="buy('${p[0]}')">COMPRAR</button>
`;
box.appendChild(d);
});

/* MENU */
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=m.style.display==="flex"?"none":"flex";
}

function setTheme(t){document.body.className=t;}

function goHome(){
loja.style.display="flex";
checkout.style.display="none";
admin.style.display="none";
}

/* BUY */
function buy(p){
selected=p;
loja.style.display="none";
checkout.style.display="block";
produto.value=p;
}

/* SEND */
function send(){
let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");
pedidos.push(selected);
localStorage.setItem("pedidos",JSON.stringify(pedidos));

let vendas=Number(localStorage.getItem("vendas")||0);
localStorage.setItem("vendas",vendas+1);

window.open(`https://wa.me/${whatsapp}?text=${selected}`);
}

/* ADMIN */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

function login(){
if(u.value==="Lorrannyh.170" && p.value==="Lorrannyh.170"){
panel.style.display="block";
load();
}else alert("erro login");
}

/* DASH */
function load(){
let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

cliques.innerText=localStorage.getItem("clicks")||0;
vendas.innerText=localStorage.getItem("vendas")||0;
compras.innerText=pedidos.length;

hist.innerHTML=pedidos.map(p=>`<div>${p}</div>`).join("");
}

/* CLIQUES */
let c=Number(localStorage.getItem("clicks")||0);
localStorage.setItem("clicks",c+1);

</script>

</body>
</html>
