<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANEL STORE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; font-family: 'Arial', sans-serif; color: #fff; min-height: 100vh; }
 .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(10, 14, 26, 0.8); backdrop-filter: blur(10px); }
 .logo { font-size: 24px; font-weight: 800; color: #00d4ff; letter-spacing: 2px; }
 .admin-btn { background: rgba(255,0,80,0.2); border: 1px solid #ff0050; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        #userLogado { margin-right: 12px; color: #00ff88; }
 .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; text-align: center; }
 .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; padding: 8px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 30px; }
 .badge-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; }
        h1 { font-size: 48px; font-weight: 800; margin-bottom: 16px; line-height: 1.2; }
 .highlight { background: linear-gradient(90deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
 .subtitle { color: #8b92a8; font-size: 16px; margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; }
 .buttons { display: flex; gap: 16px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
 .btn { padding: 14px 32px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; border: none; transition: 0.3s; }
 .btn-primary { background: linear-gradient(90deg, #00d4ff, #0099ff); color: #fff; }
 .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }
 .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
 .stats { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
 .stat { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
 .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
 .modal-content { background: #1a1f2e; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; border: 1px solid rgba(0, 212, 255, 0.3); margin: 20px; }
 .modal-content h2 { margin-bottom: 20px; color: #00d4ff; }
 .modal-content input { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; }
 .modal-content button { width: 100%; margin-top: 16px; }
 .close { float: right; font-size: 28px; cursor: pointer; color: #8b92a8; }
 .lista-users { max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: left; font-size: 14px; }
 .user-item { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        @media (max-width: 768px) { h1 { font-size: 32px; }.buttons { flex-direction: column; align-items: center; }.btn { width: 100%; max-width: 300px; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">CHANEL STORE</div>
        <div>
            <span id="userLogado"></span>
            <button class="admin-btn" onclick="verCadastros()">Ver Cadastros</button>
        </div>
    </header>

    <div class="container">
        <div class="badge"><div class="badge-dot"></div>SISTEMA ONLINE</div>
        <h1>Compras <span class="highlight">manualmente</span><br>e com segurança</h1>
        <p class="subtitle">100% seguro - sem precisar de nem um acesso</p>

        <div class="buttons">
            <button class="btn btn-primary" onclick="abrirModal('cadastro')">CADASTRAR</button>
            <button class="btn btn-secondary" onclick="abrirModal('login')">ENTRAR</button>
        </div>

        <div class="stats">
            <div class="stat">👥 <span id="totalUsers">1.4k+</span> Usuários</div>
            <div class="stat">❤️ 100% seguro</div>
            <div class="stat">⚡ Envio instantâneos</div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h2 id="modalTitulo">CADASTRAR</h2>
            <input type="text" id="nome" placeholder="Nome completo">
            <input type="tel" id="telefone" placeholder="Telefone / WhatsApp">
            <input type="password" id="senha" placeholder="Criar senha">
            <button class="btn btn-primary" onclick="salvar()">Confirmar</button>
        </div>
    </div>

    <div id="modalAdmin" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModalAdmin()">&times;</span>
            <h2>CADASTROS FEITOS</h2>
            <div id="listaUsuarios" class="lista-users"></div>
            <button class="btn btn-secondary" onclick="exportarTxt()">Baixar Lista.txt</button>
        </div>
    </div>

    <script>
        let tipoAtual = 'cadastro';
        function atualizarContador() {
            const users = JSON.parse(localStorage.getItem('chanel_users') || '[]');
            document.getElementById('totalUsers').innerText = users.length > 0? users.length : '1.4k+';
        }
        atualizarContador();
        function abrirModal(tipo) {
            tipoAtual = tipo;
            document.getElementById('modalTitulo').innerText = tipo === 'cadastro'? 'CADASTRAR' : 'ENTRAR';
            document.getElementById('nome').style.display = tipo === 'cadastro'? 'block' : 'none';
            document.getElementById('modal').style.display = 'flex';
        }
        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('nome').value = '';
            document.getElementById('telefone').value = '';
            document.getElementById('senha').value = '';
        }
        function salvar() {
            const nome = document.getElementById('nome').value;
            const tel = document.getElementById('telefone').value;
            const pass = document.getElementById('senha').value;
            if(tipoAtual === 'cadastro') {
                if(!nome ||!tel ||!pass) return alert('Preenche nome, telefone e senha');
                let users = JSON.parse(localStorage.getItem('chanel_users') || '[]');
                if(users.find(u => u.telefone === tel)) return alert('Esse telefone já foi cadastrado');
                users.push({ nome, telefone: tel, senha: pass, data: new Date().toLocaleString('pt-BR') });
                localStorage.setItem('chanel_users', JSON.stringify(users));
                alert('Cadastrado com sucesso!');
                atualizarContador();
                fecharModal();
            } else {
                if(!tel ||!pass) return alert('Preenche telefone e senha');
                let users = JSON.parse(localStorage.getItem('chanel_users') || '[]');
                const user = users.find(u => u.telefone === tel && u.senha === pass);
                if(user) {
                    alert('Login feito! Bem-vindo ' + user.nome);
                    document.getElementById('userLogado').innerText = '👤 ' + user.nome;
                    fecharModal();
                } else {
                    alert('Telefone ou senha errados');
                }
            }
        }
        function verCadastros() {
            const senhaAdmin = prompt('Senha de admin:');
            if(senhaAdmin!== 'chanel123') return alert('Senha incorreta');
            let users = JSON.parse(localStorage.getItem('chanel_users') || '[]');
            let html = users.length? '' : 'Nenhum cadastro ainda';
            users.forEach((u, i) => {
                html += `<div class="user-item"><b>${i+1}.</b> ${u.nome}<br>📱 ${u.telefone}<br>📅 ${u.data}</div>`;
            });
            document.getElementById('listaUsuarios').innerHTML = html;
            document.getElementById('modalAdmin').style.display = 'flex';
        }
        function fecharModalAdmin() {
            document.getElementById('modalAdmin').style.display = 'none';
        }
        function exportarTxt() {
            let users = JSON.parse(localStorage.getItem('chanel_users') || '[]');
            let texto = 'LISTA DE CADASTROS - CHANEL STORE\n\n';
            users.forEach((u, i) => {
                texto += `${i+1}. Nome: ${u.nome}\n Tel: ${u.telefone}\n Data: ${u.data}\n\n`;
            });
            const blob = new Blob([texto], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'cadastros-chanel.txt';
            link.click();
        }
        window.onclick = function(e) {
            if(e.target == document.getElementById('modal')) fecharModal();
            if(e.target == document.getElementById('modalAdmin')) fecharModalAdmin();
        }
    </script>
</body>
</html>
