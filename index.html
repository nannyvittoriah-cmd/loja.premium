<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      font-family: 'Montserrat', sans-serif;
      background: #050505;
      color: #fff;
      --roxo-neon: #8B5CF6;
      --roxo-glow: rgba(139, 92, 246, 0.3);
      --bg-card: #0E0E12;
      --borda-roxa: rgba(139, 92, 246, 0.3);
      --cinza-texto: #A1A1AA;
    }
    .hidden { display: none!important; }
    
    .login-box {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a0b2e 0%, #050505 100%);
      padding: 6px;
      overflow: hidden;
    }
    .login-wrapper { width: 100%; max-width: 260px; }
    .banner-login {
      width: 100%;
      margin-bottom: 6px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--borda-roxa);
      box-shadow: 0 0 12px var(--roxo-glow);
    }
    .banner-login img { width: 100%; display: block; }
    .login-card {
      background: var(--bg-card);
      padding: 10px;
      border-radius: 20px;
      border: 1px solid var(--borda-roxa);
      box-shadow: 0 0 10px var(--roxo-glow);
      backdrop-filter: blur(10px);
    }
    .login-card h2 {
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .login-card h2::before,.login-card h2::after {
      content: '➔';
      color: var(--roxo-neon);
      font-size: 0.5rem;
      filter: drop-shadow(0 0 4px var(--roxo-neon));
    }
    .login-card p {
      text-align: center;
      color: var(--cinza-texto);
      margin-bottom: 6px;
      font-size: 8px;
    }
    .input-group { margin-bottom: 5px; position: relative; }
    .input-group input {
      width: 100%;
      background: rgba(5,5,5,0.6);
      border: 1px solid var(--borda-roxa);
      padding: 6px 6px 6px 26px;
      border-radius: 20px;
      color: #fff;
      font-size: 9px;
      font-family: 'Montserrat', sans-serif;
      backdrop-filter: blur(5px);
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--roxo-neon);
      box-shadow: 0 0 5px var(--roxo-glow);
    }
    /* SVG 3D NEON GLASS CYBERPUNK */
    .input-group .icon {
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      filter: drop-shadow(0 0 3px var(--roxo-neon));
    }
    .input-group .icon svg {
      width: 100%;
      height: 100%;
    }
    .opcoes {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 5px 0;
      font-size: 8px;
      color: var(--cinza-texto);
    }
    .checkbox { display: flex; align-items: center; gap: 2px; }
    .checkbox input { accent-color: var(--roxo-neon); width: 9px; height: 9px; }
    .link-roxo { color: var(--roxo-neon); cursor: pointer; text-shadow: 0 0 4px var(--roxo-glow); }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--roxo-neon), #A855F7);
      color: #fff;
      border: none;
      padding: 7px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 10px;
      cursor: pointer;
      margin-top: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      box-shadow: 0 0 8px var(--roxo-glow), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn svg {
      width: 10px;
      height: 10px;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
    }
    .erro { color: #ff4757; text-align: center; margin-top: 5px; font-size: 9px; }
    .cadastro-footer {
      text-align: center;
      margin-top: 6px;
      color: var(--cinza-texto);
      font-size: 9px;
    }
    .info-box {
      background: rgba(5,5,5,0.6);
      border: 1px solid var(--borda-roxa);
      padding: 6px;
      border-radius: 20px;
      margin-top: 5px;
      font-size: 8px;
      backdrop-filter: blur(5px);
    }
    .info-box h4 {
      color: var(--roxo-neon);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 9px;
      text-shadow: 0 0 4px var(--roxo-glow);
    }
    .info-box p { color: var(--cinza-texto); }

    .construcao {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #050505;
      text-align: center;
      padding: 15px;
    }
    .construcao h1 {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--roxo-neon), #C084FC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 15px var(--roxo-glow));
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .construcao p {
      color: var(--cinza-texto);
      font-size: 11px;
      margin-bottom: 15px;
    }
    .btn-sair {
      background: linear-gradient(135deg, var(--roxo-neon), #A855F7);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 10px;
      cursor: pointer;
      box-shadow: 0 0 12px var(--roxo-glow), inset 0 1px 0 rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .icon-inline {
      width: 12px;
      height: 12px;
      filter: drop-shadow(0 0 3px var(--roxo-neon));
    }
  </style>
</head>
<body>
  <!-- SVG GRADIENTS E ÍCONES -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#C084FC"/>
      </linearGradient>
      
      <!-- 👤 USUÁRIO -->
      <symbol id="icon-user" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4" fill="url(#neonGrad)" opacity="0.8"/>
        <path d="M4 20c0-4 3.5-7 8-7s8 3 8 7" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
      </symbol>
      
      <!-- 📧 E-MAIL -->
      <symbol id="icon-email" viewBox="0 0 24 24">
        <rect x="3" y="5" width="18" height="14" rx="2" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
        <path d="M3 7l9 6 9-6" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
      </symbol>
      
      <!-- 🔒 SENHA -->
      <symbol id="icon-lock" viewBox="0 0 24 24">
        <rect x="5" y="11" width="14" height="10" rx="2" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
        <circle cx="12" cy="16" r="1" fill="url(#neonGrad)"/>
        <path d="M8 11V7a4 4 0 018 0v4" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
      </symbol>
      
      <!-- 🔑 ENTRAR -->
      <symbol id="icon-key" viewBox="0 0 24 24">
        <circle cx="8" cy="15" r="4" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
        <path d="M12 15h8M18 12v6" stroke="url(#neonGrad)" stroke-width="2"/>
        <circle cx="8" cy="15" r="1" fill="url(#neonGrad)"/>
      </symbol>
      
      <!-- 🛡️ SEGURANÇA -->
      <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
        <path d="M9 12l2 2 4-4" stroke="url(#neonGrad)" stroke-width="2" fill="none"/>
      </symbol>
      
      <!-- 🚀 ACESSO RÁPIDO -->
      <symbol id="icon-rocket" viewBox="0 0 24 24">
        <path d="M12 2l3.5 7H8.5L12 2zM12 22l-3.5-7h7L12 22z" fill="url(#neonGrad)"/>
        <circle cx="12" cy="12" r="2" fill="url(#neonGrad)"/>
        <path d="M2 12l7-3.5L2 12zM22 12l-7 3.5L22 12z" fill="url(#neonGrad)" opacity="0.6"/>
      </symbol>
      
      <!-- 👑 ÁREA VIP -->
      <symbol id="icon-crown" viewBox="0 0 24 24">
        <path d="M5 8l3 3 4-6 4 6 3-3v10H5V8z" stroke="url(#neonGrad)" stroke-width="2" fill="url(#neonGrad)" opacity="0.3"/>
        <circle cx="5" cy="8" r="1" fill="url(#neonGrad)"/>
        <circle cx="12" cy="5" r="1" fill="url(#neonGrad)"/>
        <circle cx="19" cy="8" r="1" fill="url(#neonGrad)"/>
      </symbol>
      
      <!-- 💎 PREMIUM -->
      <symbol id="icon-diamond" viewBox="0 0 24 24">
        <path d="M6 3l6 6 6-6M6 3l-4 6 10 12L22 9l-4-6M6 3h12" stroke="url(#neonGrad)" stroke-width="2" fill="url(#neonGrad)" opacity="0.3"/>
        <path d="M12 9v12M6 9l6 12M18 9l-6 12" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.5"/>
      </symbol>

      <!-- SETA -->
      <symbol id="icon-arrow" viewBox="0 0 24 24">
        <path d="M13 7l5 5-5 5M6 12h12" stroke="white" stroke-width="2" fill="none"/>
      </symbol>

      <!-- AVIÃO ENVIAR -->
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" fill="white"/>
      </symbol>
    </defs>
  </svg>

  <div id="login" class="login-box">
    <div class="login-wrapper">
      <div class="banner-login">
        <img src="https://i.postimg.cc/HW54tvz2/c4b93135-a1e9-4246-9138-b2fac3dc79e0.jpg" alt="Premium Store">
      </div>

      <div class="login-card" id="form-cadastro">
        <h2>CADASTRO</h2>
        <p>Crie sua conta</p>
        <div class="input-group">
          <div class="icon"><svg><use href="#icon-user"/></svg></div>
          <input type="text" id="nome-cadastro" placeholder="Usuário">
        </div>
        <div class="input-group">
          <div class="icon"><svg><use href="#icon-email"/></svg></div>
          <input type="email" id="email-cadastro" placeholder="E-mail">
        </div>
        <div class="input-group">
          <div class="icon"><svg><use href="#icon-lock"/></svg></div>
          <input type="password" id="senha-cadastro" placeholder="Senha">
        </div>
        <div class="input-group">
          <div class="icon"><svg><use href="#icon-lock"/></svg></div>
          <input type="password" id="senha-confirm" placeholder="Confirmar">
        </div>
        <label class="checkbox" style="margin: 5px 0;">
          <input type="checkbox" id="termos"> 
          <svg class="icon-inline"><use href="#icon-shield"/></svg>
          Aceito Termos
        </label>
        <button class="btn" id="btn-cadastrar">
          <svg><use href="#icon-arrow"/></svg>
          CRIAR
        </button>
        <div class="cadastro-footer">
          Tem conta? <span class="link-roxo" onclick="trocarTela('login')">Login ➔</span>
        </div>
      </div>

      <div class="login-card hidden" id="form-login">
        <h2>LOGIN</h2>
        <p>Acesse sua conta</p>
        <div class="input-group">
          <div class="icon"><svg><use href="#icon-email"/></svg></div>
          <input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="input-group">
          <div class="icon"><svg><use href="#icon-lock"/></svg></div>
          <input type="password" id="senha" placeholder="Senha">
        </div>
        <div class="opcoes">
          <label class="checkbox">
            <input type="checkbox" id="lembrar"> 
            <svg class="icon-inline"><use href="#icon-rocket"/></svg>
            Lembrar
          </label>
          <span class="link-roxo" onclick="trocarTela('esqueci')">Esqueceu?</span>
        </div>
        <button class="btn" id="btn-entrar">
          <svg><use href="#icon-key"/></svg>
          ENTRAR
        </button>
        <div class="cadastro-footer">
          Sem conta? <span class="link-roxo" onclick="trocarTela('cadastro')">Cadastrar ➔</span>
        </div>
      </div>

      <div class="login-card hidden" id="form-esqueci">
        <h2>ESQUECEU?</h2>
        <p>Enviaremos link.</p>
        <div class="input-group">
          <div class="icon"><svg><use href="#icon-email"/></svg></div>
          <input type="email" id="email-recuperar" placeholder="Digite seu e-mail">
        </div>
        <button class="btn" id="btn-recuperar">
          <svg><use href="#icon-send"/></svg>
          ENVIAR
        </button>
        <div class="info-box">
          <h4>
            <svg class="icon-inline"><use href="#icon-shield"/></svg>
            Info
          </h4>
          <p>Verifique spam.</p>
        </div>
        <div class="cadastro-footer">
          <span class="link-roxo" onclick="trocarTela('login')">← Voltar</span>
        </div>
      </div>

      <p class="erro hidden" id="erro-login"></p>
    </div>
  </div>

  <div id="painel" class="construcao hidden">
    <h1>
      <svg class="icon-inline" style="width:16px;height:16px;"><use href="#icon-crown"/></svg>
      PREMIUM STORE
    </h1>
    <p>
      <svg class="icon-inline"><use href="#icon-diamond"/></svg>
      Login OK!<br>Site em construção...
    </p>
    <button class="btn-sair" onclick="sair()">
      <svg class="icon-inline"><use href="#icon-key"/></svg>
      SAIR
    </button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'
    import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js'

    const firebaseConfig = {
      apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
      authDomain: "premium-store-aa58b.firebaseapp.com",
      databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
      projectId: "premium-store-aa58b",
      storageBucket: "premium-store-aa58b.firebasestorage.app",
      messagingSenderId: "462239500057",
      appId: "1:462239500057:web:f1b7cea162ed308a866788",
      measurementId: "G-CN88J28WRX"
    };

    const app = initializeApp(firebaseConfig)
    const auth = getAuth(app)
    const db = getDatabase(app)

    window.trocarTela = (tela) => {
      document.getElementById('form-login').classList.toggle('hidden', tela !== 'login')
      document.getElementById('form-cadastro').classList.toggle('hidden', tela !== 'cadastro')
      document.getElementById('form-esqueci').classList.toggle('hidden', tela !== 'esqueci')
      document.getElementById('erro-login').classList.add('hidden')
    }

    document.getElementById('btn-entrar').onclick = async () => {
      const email = document.getElementById('email').value
      const senha = document.getElementById('senha').value
      try {
        await signInWithEmailAndPassword(auth, email, senha)
      } catch (e) {
        mostrarErro(e.message)
      }
    }

    document.getElementById('btn-cadastrar').onclick = async () => {
      const nome = document.getElementById('nome-cadastro').value
      const email = document.getElementById('email-cadastro').value
      const senha = document.getElementById('senha-cadastro').value
      const confirma = document.getElementById('senha-confirm').value
      const termos = document.getElementById('termos').checked

      if (!termos) return mostrarErro('Aceite os termos')
      if (senha !== confirma) return mostrarErro('Senhas diferentes')
      if (senha.length < 6) return mostrarErro('Senha mín 6')
      if (!nome) return mostrarErro('Digite usuário')

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, senha)
        await updateProfile(cred.user, { displayName: nome })
        await set(ref(db, 'users/' + cred.user.uid), {
          nome: nome,
          email: email,
          saldo: 0,
          criadoEm: Date.now()
        })
      } catch (e) {
        mostrarErro(e.message)
      }
    }

    document.getElementById('btn-recuperar').onclick = async () => {
      const email = document.getElementById('email-recuperar').value
      try {
        await sendPasswordResetEmail(auth, email)
        alert('Link enviado!')
        trocarTela('login')
      } catch (e) {
        mostrarErro(e.message)
      }
    }

    window.sair = () => signOut(auth)

    function mostrarErro(msg) {
      const erro = document.getElementById('erro-login')
      erro.innerText = msg.includes('auth/') ? 'Email/senha inválidos' : msg
      erro.classList.remove('hidden')
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('login').classList.add('hidden')
        document.getElementById('painel').classList.remove('hidden')
      } else {
        document.getElementById('login').classList.remove('hidden')
        document.getElementById('painel').classList.add('hidden')
      }
    })
  </script>
</body>
</html>
