<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS STORE - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0c0c14;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

.login-box{width:100%;max-width:360px;}

/* Logo */
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:48px;}
.logo-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,#a855f7,#6366f1);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
.logo-icon svg{width:24px;height:24px;color:#fff;}
.logo-text h2{font-size:18px;font-weight:700;letter-spacing:0.5px;}
.logo-text span{font-size:11px;color:#9ca3af;letter-spacing:2px;}

h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px;}
.subtitle{font-size:14px;color:#9ca3af;text-align:center;margin-bottom:36px;}

/* Input */
.input-group{position:relative;margin-bottom:16px;}
.input-group svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:#6b7280;}
.input-group input{
  width:100%;height:52px;background:#1a1a24;border:1px solid #2a2a35;
  border-radius:12px;padding:0 50px;color:#fff;font-size:15px;outline:none;
}
.input-group input:focus{border-color:#7c3aed;}
.input-group input::placeholder{color:#6b7280;}
.eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;color:#6b7280;}

/* Forgot password */
.forgot{
  text-align:right;margin-bottom:24px;
}
.forgot a{color:#7c3aed;font-size:13px;text-decoration:none;font-weight:500;}

/* Button */
.btn{
  width:100%;height:52px;background:#7c3aed;border:none;border-radius:12px;
  color:#fff;font-size:16px;font-weight:600;cursor:pointer;
  transition:0.2s;
}
.btn:active{transform:scale(0.98);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.error{color:#ef4444;font-size:13px;margin-bottom:16px;text-align:center;}
</style>
</head>
<body>
<div class="login-box">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7L12 12L22 7L12 2Z"/>
        <path d="M2 17L12 22L22 17"/>
        <path d="M2 12L12 17L22 12"/>
      </svg>
    </div>
    <div class="logo-text">
      <h2>NEXUS</h2>
      <span>STORE</span>
    </div>
  </div>

  <h1>Bem-vindo de volta!</h1>
  <p class="subtitle">Faça login para continuar</p>

  <div id="errorMsg" class="error"></div>

  <!-- Email -->
  <div class="input-group">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M4 4h16c1.1 0 2 2 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <input type="email" id="email" placeholder="seu@email.com">
  </div>

  <!-- Password -->
  <div class="input-group">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <input type="password" id="password" placeholder="Senha">
    <svg class="eye" id="togglePass" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </div>

  <!-- Forgot password -->
  <div class="forgot">
    <a href="#" onclick="resetPassword()">Esqueci minha senha</a>
  </div>

  <!-- Button -->
  <button class="btn" id="loginBtn" onclick="login()">Entrar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Teu config do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Mostrar/ocultar senha
document.getElementById('togglePass').onclick = function(){
  let pass = document.getElementById('password');
  pass.type = pass.type === 'password'? 'text' : 'password';
}

// Login
window.login = async function(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.innerText = '';

  if(!email ||!pass){
    errorMsg.innerText = 'Preenche email e senha';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Entrando...';

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    // Aqui você redireciona pra home
    window.location.href = 'home.html';
  }catch(error){
    btn.disabled = false;
    btn.innerText = 'Entrar';
    if(error.code === 'auth/user-not-found'){
      errorMsg.innerText = 'Usuário não encontrado';
    }else if(error.code === 'auth/wrong-password'){
      errorMsg.innerText = 'Senha incorreta';
    }else if(error.code === 'auth/invalid-email'){
      errorMsg.innerText = 'Email inválido';
    }else{
      errorMsg.innerText = 'Erro ao fazer login';
    }
  }
}

// Reset senha
window.resetPassword = async function(){
  const email = document.getElementById('email').value;
  if(!email){
    document.getElementById('errorMsg').innerText = 'Digite seu email primeiro';
    return;
  }
  try{
    await sendPasswordResetEmail(auth, email);
    alert('Link de redefinição enviado pro seu email');
  }catch(error){
    document.getElementById('errorMsg').innerText = 'Erro ao enviar email';
  }
}
</script>
</body>
</html>
