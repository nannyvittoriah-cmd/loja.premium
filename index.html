<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
:root{
--border:#00c3ff;
}

body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#0b0f2a;
border-bottom:2px solid var(--border);
}

/* MENU */
#overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:998;
}

.menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
z-index:999;
border-left:2px solid var(--border);
}

.menu button{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

/* SEÇÕES */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:15px;
}

/* CARD PRODUTO */
.card{
background:#111;
padding:10px;
border-radius:10px;
border:2px solid var(--border);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.buyBtn{
background:#00ff66;
width:100%;
padding:10px;
border:none;
cursor:pointer;
margin-top:5px;
}

/* PÁGINAS */
.page{
display:none;
padding:15px;
}

/* PIX */
#pixModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.pixBox{
background:#111;
padding:20px;
width:320px;
border-radius:10px;
border:2px solid var(--border);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:none;
border-radius:6px;
}

/* ADM */
.item{
padding:10px;
border:1px solid #333;
margin:5px 0;
}

.green{color:#00ff66;}
.red{color:#ff4444;}
</style>
</head>

<body>

<div class="topbar">
<div>💎 BONY STORE</div>
<div onclick="openMenu()" style="cursor:pointer">☰</div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div id="menu" class="menu">
<h3>MENU</h3>
<button onclick="show('home')">🏠 Loja</button>
<button onclick="show('dm')">📩 DM / Pedidos</button>
<button onclick="show('admin')">⚙ ADM</button>
</div>

<!-- LOJA -->
<div id="home" class="page" style="display:block;">
<div id="loja" class="container"></div>
</div>

<!-- DM -->
<div id="dm" class="page">
<h2>📩 MEUS PEDIDOS (DM)</h2>
<div id="listaDM"></div>
</div>

<!-- ADM -->
<div id="admin" class="page">
<h2>⚙ PAINEL ADM</h2>
<div id="pedidos"></div>
</div>

<!-- PIX -->
<div id="pixModal">
<div class="pixBox">

<h2>💳 PIX</h2>

<p id="pNome"></p>
<p id="pValor"></p>

<hr>

<p><b>Lorrane Vitória Alves Vaz</b></p>
<p style="color:#fff">(98) 98535-3563</p>

<input id="comprovante" placeholder="Link do comprovante">

<button onclick="enviar()"
style="width:100%;padding:10px;background:#00ff66;border:none;font-weight:bold">
ENVIAR
</button>

<button onclick="closePix()"
style="width:100%;padding:10px;margin-top:5px;background:#444;border:none">
FECHAR
</button>

</div>
</div>

<script>

let pedidoAtual={};

let produtos=[
{nome:"Passe Básico",preco:"20",img:"https://i.imgur.com/1Q9Z1ZQ.png"},
{nome:"Passe Premium",preco:"50",img:"https://i.imgur.com/2Q9Z1ZQ.png"},
{nome:"VIP Ultra",preco:"80",img:"https://i.imgur.com/3Q9Z1ZQ.png"}
];

/* MENU */
function openMenu(){
menu.style.right="0";
overlay.style.display="block";
}
function closeMenu(){
menu.style.right="-260px";
overlay.style.display="none";
}

/* TROCA PÁGINA */
function show(p){
home.style.display="none";
dm.style.display="none";
admin.style.display="none";

document.getElementById(p).style.display="block";

if(p==="dm")loadDM();
if(p==="admin")loadADM();
}

/* LOJA */
function render(){
loja.innerHTML="";
produtos.forEach(p=>{
loja.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button class="buyBtn" onclick="pix('${p.nome}','${p.preco}')">
COMPRAR
</button>
</div>`;
});
}

/* PIX */
function pix(nome,valor){

pedidoAtual={nome,valor};

pNome.innerText=nome;
pValor.innerText="R$ "+valor;

pixModal.style.display="flex";

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

pedidos.push({
id:Date.now(),
produto:nome,
valor:valor,
status:"PENDENTE",
comprovante:""
});

localStorage.setItem("pedidos",JSON.stringify(pedidos));
}

/* ENVIAR */
function enviar(){

let link=document.getElementById("comprovante").value;

if(!link){
alert("Cole o comprovante!");
return;
}

let pedidos=JSON.parse(localStorage.getItem("pedidos"));

pedidos.forEach(p=>{
if(p.produto===pedidoAtual.nome){
p.comprovante=link;
}
});

localStorage.setItem("pedidos",JSON.stringify(pedidos));

window.open(
"https://wa.me/55989853563?text="+encodeURIComponent(
`PIX: ${pedidoAtual.nome} - R$ ${pedidoAtual.valor}\nComprovante: ${link}`
),
"_blank"
);

closePix();
}

/* FECHAR */
function closePix(){
pixModal.style.display="none";
}

/* DM CLIENTE */
function loadDM(){

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

listaDM.innerHTML="";

pedidos.forEach(p=>{
listaDM.innerHTML+=`
<div class="item">
📦 ${p.produto} - R$ ${p.valor}<br>
📎 ${p.comprovante || "sem comprovante"}<br>
<span class="${p.status==="VERIFICADO"?"green":"red"}">
${p.status}
</span>
</div>`;
});
}

/* ADM */
function loadADM(){

let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");

pedidos.innerHTML="";

pedidos.forEach((p,i)=>{

pedidos.innerHTML+=`
<div class="item">
<b>ID:</b> ${p.id}<br>
${p.produto} - R$ ${p.valor}<br>
📎 ${p.comprovante || "nenhum"}<br>
<span class="${p.status==="VERIFICADO"?"green":"red"}">${p.status}</span><br>

<button onclick="verificar(${i})">✔ Verificar</button>
</div>`;
});

document.getElementById("pedidos").innerHTML=pedidos.innerHTML;
}

/* VERIFICAR */
function verificar(i){
let pedidos=JSON.parse(localStorage.getItem("pedidos"));
pedidos[i].status="VERIFICADO";
localStorage.setItem("pedidos",JSON.stringify(pedidos));
loadADM();
}

/* START */
render();

</script>

</body>
</html>
