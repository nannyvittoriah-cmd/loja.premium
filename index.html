<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f2c;
    color: white;
}

/* HEADER */
header {
    background: #060a1a;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

header h1 {
    color: #00c3ff;
}

/* BOTÕES */
button {
    background: #00c3ff;
    border: none;
    padding: 10px;
    color: black;
    cursor: pointer;
    border-radius: 5px;
}

/* LOGIN */
#login {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.login-box {
    background: #11183f;
    padding: 30px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* PRODUTOS */
#loja {
    display: none;
    padding: 20px;
}

.produtos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #11183f;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card h3 {
    color: #00c3ff;
}

/* CARRINHO */
#carrinho {
    position: fixed;
    right: 0;
    top: 0;
    background: #060a1a;
    width: 250px;
    height: 100%;
    padding: 15px;
}
</style>

</head>
<body>

<header>
    <h1>MINHA LOJA</h1>
    <button onclick="logout()">Sair</button>
</header>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="user" placeholder="Email">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- LOJA -->
<div id="loja">
    <h2>Produtos</h2>

    <div class="produtos">

        <div class="card">
            <h3>Produto 1</h3>
            <p>R$ 10,00</p>
            <button onclick="addCarrinho('Produto 1', 10)">Comprar</button>
        </div>

        <div class="card">
            <h3>Produto 2</h3>
            <p>R$ 25,00</p>
            <button onclick="addCarrinho('Produto 2', 25)">Comprar</button>
        </div>

        <div class="card">
            <h3>Produto 3</h3>
            <p>R$ 50,00</p>
            <button onclick="addCarrinho('Produto 3', 50)">Comprar</button>
        </div>

    </div>
</div>

<!-- CARRINHO -->
<div id="carrinho">
    <h3>Carrinho</h3>
    <ul id="lista"></ul>
    <p>Total: R$ <span id="total">0</span></p>
</div>

<script>
let total = 0;

function login() {
    document.getElementById("login").style.display = "none";
    document.getElementById("loja").style.display = "block";
}

function logout() {
    location.reload();
}

function addCarrinho(nome, preco) {
    let lista = document.getElementById("lista");

    let item = document.createElement("li");
    item.innerText = nome + " - R$" + preco;

    lista.appendChild(item);

    total += preco;
    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
