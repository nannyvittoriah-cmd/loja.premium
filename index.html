<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendas Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #050d1a, #0b1a2b);
  color: white;
}

/* TOPO */
header {
  text-align: center;
  padding: 25px;
  font-size: 32px;
  font-weight: bold;
  color: gold;
  text-shadow: 0 0 10px gold;
  border-bottom: 2px solid gold;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: #0f2238;
  border: 2px solid gold;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

.card:hover {
  transform: scale(1.05);
}

/* IMAGEM */
.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* TITULO */
.card h2 {
  color: gold;
  font-size: 18px;
}

/* BOTÕES */
.botoes {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  text-decoration: none;
  text-align: center;
  font-weight: bold;
}

/* BOTÃO 3D */
.comprar {
  background: linear-gradient(gold, #c9a000);
  color: black;
  box-shadow: 0 4px #8c6b00;
}

.comprar:active {
  box-shadow: 0 2px #8c6b00;
  transform: translateY(2px);
}

/* PIX */
.pix {
  background: #00ffcc;
  color: black;
}

/* TEXTO */
small {
  color: #ccc;
}
</style>

</head>

<body>

<header>🎮 Vendas Premium</header>

<div class="container">

<script>
function produto(nome, preco, estoque, imagem) {
  return `
  <div class="card">
    <img src="${imagem}">
    <h2>${nome}</h2>

    <p><strong>Preço:</strong> ${preco}</p>
    <p><strong>Estoque:</strong> ${estoque}</p>

    <small>
    ✔ Entrega na caixa de correio<br>
    ✔ Caixa vazia obrigatória<br>
    ✔ Apagar aba AVISO<br>
    ✔ Entrega instantânea<br>
    ✔ Envie seu ID no WhatsApp
    </small>

    <div class="botoes">
      <a class="btn comprar" target="_blank"
      href="https://wa.me/5598984853563?text=Quero%20comprar%20${encodeURIComponent(nome)}">
      Comprar
      </a>

      <a class="btn pix"
      href="https://wa.me/5598984853563?text=Vou%20pagar%20via%20Pix%20(${preco})">
      Pix
      </a>
    </div>
  </div>
  `;
}
</script>

<script>
/* PASSE */
document.write(produto("Passe Premium", "R$ 10", "12", "https://i.imgur.com/Bud0zyu.png"));

/* TOKENS */
document.write(produto("Tokens 25", "R$ 15", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 50", "R$ 20", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 100", "R$ 25", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 200", "R$ 45", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 300", "R$ 70", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 400", "R$ 90", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 500", "R$ 120", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 600", "R$ 140", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 700", "R$ 150", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 800", "R$ 172", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 900", "R$ 182", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
document.write(produto("Tokens 1000", "R$ 200", "12", "https://i.imgur.com/OFmm8PI.jpeg"));
</script>

</div>

<footer style="text-align:center; padding:15px; border-top:2px solid gold;">
💰 Pix: (98) 98485-3563 | Atendimento via WhatsApp ⚡
</footer>

</body>
</html>
