<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prime Store VZ - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
body{background:#0a0a0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{width:100%;max-width:400px;}

.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:40px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:24px;height:24px;fill:#fff;}
.logo h1{font-size:20px;font-weight:700;letter-spacing:0.5px;}

h2{font-size:24px;font-weight:700;text-align:center;margin-bottom:8px;}
.subtitle{font-size:14px;color:#9ca3af;text-align:center;margin-bottom:32px;}

.input-group{margin-bottom:16px;position:relative;}
.input-box{
  width:100%;height:50px;background:#15151d;
  border:1px solid #2a2a35;border-radius:12px;
  display:flex;align-items:center;padding:0 16px;
  transition:0.2s;
}
.input-box:focus-within{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,0.2);}
.input-box svg{width:20px;height:20px;stroke:#6b7280;margin-right:12px;flex-shrink:0;}
.input-box input{
  flex:1;background:transparent;border:none;outline:none;
  color:#fff;font-size:15px;
}
.input-box input::placeholder{color:#6b7280;}
.toggle-pass{
  cursor:pointer;background:none;border:none;padding:4px;
}
.toggle-pass svg{width:20px;height:20px;stroke:#6b7280;}

.forgot{
  text-align:right;margin-bottom:24px;
}
.forgot a{color:#a855f7;font-size:13px;text-decoration:none;font-weight:500;}

.btn{
  width:100%;height:50px;background:#7c3aed;
  border:none;border-radius:12px;color:#fff;
  font-size:16px;font-weight:600;cursor:pointer;
  transition:0.2s;
}
.btn:active{transform:scale(0.98);background:#6d28d9;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}

.register{
  text-align:center;margin-top:24px;font-size:14px;color:#9ca3af;
}
.register a{color:#a855f7;text-decoration:none;font-weight:600;}

.alert{
  padding:12px 16px;border-radius:10px;font-size:13px;
  margin-bottom:16px;display:none;
}
.alert.error{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;}
.alert.success{background:rgba(16,185,129,0.1);border:1px solid #10b981;color:#10b981;}

.loading{display:none;}
.loading.show{display:inline-block;width:18px;height:18px;border:2px solid #fff;border-top:2px solid transparent;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">
  
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>PRIME STORE VZ</h1>
  </div>

  <h2>Bem-vindo de volta!</h2>
  <p class="subtitle">Faça login para continuar</p>

  <div class="alert error" id="errorAlert"></div>
  <div class="alert success" id="successAlert"></div>

  <div class="input-group">
    <div class="input-box">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
  </div>

  <div class="input-group">
    <div class="input-box">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
      <button type="button" class="toggle-pass" onclick="togglePassword()">
        <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="forgot">
    <a href="#" onclick="forgotPassword()">Esqueci minha senha</a>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">
    <span id="btnText">Entrar</span>
    <span class="loading" id="loading"></span>
  </button>

  <div class="register">
    Ainda não tem conta? <a href="#" onclick="register()">Criar conta</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Mostrar/ocultar senha
window.togglePassword = () => {
  const pass = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if(pass.type === 'password'){
    pass.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }else{
    pass.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// Login
window.login = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  
  if(!email || !password) return showAlert('errorAlert', 'Preencha email e senha');
  
  setLoading(true);
  hideAlerts();
  
  try{
    await signInWithEmailAndPassword(auth, email, password);
    showAlert('successAlert', 'Login realizado! Redirecionando...');
    // Troca essa linha pela tua tela principal
    setTimeout(()=>{ alert('Logado! Vai pra home agora'); }, 1500);
  }catch(e){
    let msg = 'Erro ao fazer login';
    if(e.code === 'auth/user-not-found') msg = 'Usuário não encontrado';
    if(e.code === 'auth/wrong-password') msg = 'Senha incorreta';
    if(e.code === 'auth/invalid-email') msg = 'Email inválido';
    showAlert('errorAlert', msg);
    setLoading(false);
  }
}

// Esqueci senha
window.forgotPassword = async () => {
  const email = document.getElementById('email').value.trim();
  if(!email) return showAlert('errorAlert', 'Digite seu email primeiro');
  
  try{
    await sendPasswordResetEmail(auth, email);
    showAlert('successAlert', 'Link de recuperação enviado!');
  }catch(e){
    showAlert('errorAlert', 'Erro ao enviar email');
  }
}

// Criar conta
window.register = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  
  if(!email || !password) return showAlert('errorAlert', 'Preencha email e senha');
  if(password.length < 6) return showAlert('errorAlert', 'Senha deve ter 6+ caracteres');
  
  setLoading(true);
  hideAlerts();
  
  try{
    await createUserWithEmailAndPassword(auth, email, password);
    showAlert('successAlert', 'Conta criada! Fazendo login...');
    setTimeout(()=>login(), 1500);
  }catch(e){
    let msg = 'Erro ao criar conta';
    if(e.code === 'auth/email-already-in-use') msg = 'Email já cadastrado';
    showAlert('errorAlert', msg);
    setLoading(false);
  }
}

function showAlert(id, msg){
  hideAlerts();
  const el = document.getElementById(id);
  el.innerText = msg;
  el.style.display = 'block';
}

function hideAlerts(){
  document.getElementById('errorAlert').style.display = 'none';
  document.getElementById('successAlert').style.display = 'none';
}

function setLoading(isLoading){
  document.getElementById('loginBtn').disabled = isLoading;
  document.getElementById('btnText').style.display = isLoading ? 'none' : 'inline';
  document.getElementById('loading').classList.toggle('show', isLoading);
}
</script>
</body>
</html>
