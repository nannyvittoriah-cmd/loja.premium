<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Vz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Poppins:wght@300;400;600;700&display=swap');

  :root{
    --preto:#000000;
    --rosa-neon:#ff00ff;
    --roxo-neon:#8b00ff;
    --rosa-glow:rgba(255,0,255,0.7);
    --roxo-glow:rgba(139,0,255,0.7);
    --card-bg:#0d0d0d;
    --texto:#ffffff;
    --cinza:#1a1a1a;
  }

  *{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}

  body{
    background:var(--preto);
    color:var(--texto);
    font-size:13px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(139,0,255,0.2) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(255,0,255,0.2) 0%, transparent 40%);
    min-height:100vh;
  }

  /* LOGIN */
.login-screen{
    position:fixed;
    inset:0;
    background:var(--preto);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
  }

.login-card{
    background:var(--card-bg);
    border:2px solid var(--rosa-neon);
    border-radius:15px;
    padding:35px 30px;
    width:90%;
    max-width:350px;
    box-shadow:0 0 40px var(--rosa-glow), inset 0 0 25px rgba(255,0,255,0.1);
  }

.login-card h3{
    font-family:'Orbitron',sans-serif;
    color:var(--rosa-neon);
    text-align:center;
    font-size:20px;
    margin-bottom:25px;
    text-shadow:0 0 15px var(--rosa-neon), 0 0 30px var(--rosa-neon);
    font-weight:900;
  }

.login-card input{
    width:100%;
    padding:13px;
    margin-bottom:14px;
    background:var(--preto);
    border:1px solid #333;
    color:var(--texto);
    border-radius:8px;
    font-size:13px;
  }

.login-card input:focus{
    outline:none;
    border-color:var(--rosa-neon);
    box-shadow:0 0 15px var(--rosa-glow);
  }

.btn-rosa{
    width:100%;
    background:linear-gradient(135deg,var(--rosa-neon),var(--roxo-neon));
    color:white;
    border:none;
    padding:14px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
