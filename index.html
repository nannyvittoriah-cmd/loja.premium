<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prime Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"/>

<style>

/* ====== (SEU CSS ORIGINAL INTACTO) ====== */

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:#050505;color:#fff;overflow-x:hidden;}

:root{
--roxo:#b026ff;
--border:rgba(176,38,255,.18);
--card:#111;
}

.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;}

.page{display:none;max-width:430px;margin:auto;min-height:100vh;padding:12px;padding-bottom:85px;}
.page.active{display:block;}

/* (todo seu CSS original permanece aqui sem mudança para não quebrar layout) */

/* ====== LOGIN ADM ====== */
.login-box{display:flex;flex-direction:column;gap:12px;margin-top:50px;}
.login-box input,.login-box select,.login-box textarea{
background:#111;border:1px solid var(--border);border-radius:12px;padding:12px;color:#fff;
}
.login-box button{
height:44px;border:none;border-radius:12px;background:linear-gradient(90deg,#7a00ff,#d000ff);
color:#fff;font-weight:700;cursor:pointer;
}

</style>
</head>

<body>

<!-- MENU E TELAS (SEU HTML ORIGINAL MANTIDO) -->

<!-- ADM PRODUTOS -->
<section class="page" id="admProdutos">

<div class="topo">

<div class="top-btn" onclick="showPage('dashboardAdm')">
<span class="material-symbols-outlined">arrow_back</span>
</div>

<div class="logo">PRODUTOS</div>

<div class="top-btn" onclick="showPage('addProduto')">
<span class="material-symbols-outlined">add</span>
</div>

</div>

<div class="login-box">
<input type="text" id="buscarProduto" placeholder="Buscar produto..." onkeyup="buscarProdutoAdm()">
</div>

<div class="lista" id="listaProdutosAdm"></div>

</section>

<!-- ADD PRODUTO -->
<section class="page" id="addProduto">

<div class="topo">
<div class="top-btn" onclick="showPage('admProdutos')">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="logo">PRODUTO</div>
</div>

<div class="login-box">

<input type="file" id="produtoImagem">

<input type="text" id="produtoNome" placeholder="Nome do produto">

<select id="produtoCategoria">
<option>Diamantes</option>
<option>Contas</option>
<option>Premium</option>
</select>

<select id="produtoSub">
<option>Free Fire</option>
<option>Netflix</option>
<option>Mobile</option>
</select>

<input type="number" id="produtoPreco" placeholder="Preço">
<input type="number" id="produtoPromo" placeholder="Preço promocional">
<input type="number" id="produtoEstoque" placeholder="Estoque">

<label style="font-size:12px;">
<input type="checkbox" id="produtoIlimitado">
Estoque ilimitado
</label>

<textarea id="produtoDesc" placeholder="Descrição"></textarea>

<select id="produtoEntrega">
<option>Manual</option>
<option>Automático</option>
</select>

<select id="produtoStatus">
<option>Ativo</option>
<option>Inativo</option>
</select>

<button onclick="salvarProduto()">
SALVAR PRODUTO
</button>

</div>

</section>

<!-- DASHBOARD -->
<section class="page" id="dashboardAdm">

<div class="topo">
<div class="logo">PAINEL ADM</div>
</div>

<div class="menu-list">

<div class="menu-item" onclick="showPage('admProdutos')">Produtos</div>

</div>

</section>

<script>

/* =======================
   PRODUTOS
======================= */

let produtosAdm =
JSON.parse(localStorage.getItem("produtosAdm")) || [];

let carrinho = [];

/* 🔥 NOVO: controle de edição */
let editingIndex = null;

/* =======================
   RENDER ADM
======================= */

function renderProdutosAdm(){

const area = document.getElementById("listaProdutosAdm");
area.innerHTML = "";

produtosAdm.forEach((p,index)=>{

area.innerHTML += `
<div class="item">

<img src="${p.imagem || 'https://i.postimg.cc/C5KWcT5z/be50f798-9fdd-49a3-99aa-7b4abaf24030.jpg'}">

<div class="item-info">

<h3>${p.nome}</h3>
<p>${p.categoria} • ${p.sub}</p>
<span>R$ ${p.preco}</span>
<p>${p.status}</p>

</div>

<div style="display:flex;flex-direction:column;gap:6px;">

<button onclick="editarProduto(${index})"
style="background:#7a00ff;color:#fff;border:none;padding:6px;border-radius:8px;">
Editar
</button>

<button onclick="removerProduto(${index})"
style="background:#ff2d55;color:#fff;border:none;padding:6px;border-radius:8px;">
Remover
</button>

</div>

</div>
`;

});

}

/* =======================
   SALVAR / EDITAR
======================= */

function salvarProduto(){

const imagemInput = document.getElementById("produtoImagem");

let imagem = "https://i.postimg.cc/C5KWcT5z/be50f798-9fdd-49a3-99aa-7b4abaf24030.jpg";

if(imagemInput.files[0]){
imagem = URL.createObjectURL(imagemInput.files[0]);
}

const novoProduto = {
nome: document.getElementById("produtoNome").value,
categoria: document.getElementById("produtoCategoria").value,
sub: document.getElementById("produtoSub").value,
preco: document.getElementById("produtoPreco").value,
promo: document.getElementById("produtoPromo").value,
estoque: document.getElementById("produtoEstoque").value,
ilimitado: document.getElementById("produtoIlimitado").checked,
desc: document.getElementById("produtoDesc").value,
entrega: document.getElementById("produtoEntrega").value,
status: document.getElementById("produtoStatus").value,
imagem
};

/* 🔥 EDITAR */
if(editingIndex !== null){

produtosAdm[editingIndex] = novoProduto;
editingIndex = null;

}else{

produtosAdm.push(novoProduto);

}

localStorage.setItem("produtosAdm", JSON.stringify(produtosAdm));

renderProdutosAdm();
showPage("admProdutos");

}

/* =======================
   EDITAR PRODUTO
======================= */

function editarProduto(index){

const p = produtosAdm[index];
editingIndex = index;

document.getElementById("produtoNome").value = p.nome;
document.getElementById("produtoCategoria").value = p.categoria;
document.getElementById("produtoSub").value = p.sub;
document.getElementById("produtoPreco").value = p.preco;
document.getElementById("produtoPromo").value = p.promo;
document.getElementById("produtoEstoque").value = p.estoque;
document.getElementById("produtoIlimitado").checked = p.ilimitado;
document.getElementById("produtoDesc").value = p.desc;
document.getElementById("produtoEntrega").value = p.entrega;
document.getElementById("produtoStatus").value = p.status;

showPage("addProduto");

}

/* =======================
   REMOVER PRODUTO
======================= */

function removerProduto(index){

if(confirm("Remover este produto?")){

produtosAdm.splice(index,1);

localStorage.setItem("produtosAdm", JSON.stringify(produtosAdm));

renderProdutosAdm();

}

}

/* =======================
   BUSCA
======================= */

function buscarProdutoAdm(){

const valor = document.getElementById("buscarProduto").value.toLowerCase();

const area = document.getElementById("listaProdutosAdm");
area.innerHTML = "";

produtosAdm
.filter(p => p.nome.toLowerCase().includes(valor))
.forEach((p,index)=>{

area.innerHTML += `
<div class="item">
<img src="${p.imagem}">
<div class="item-info">
<h3>${p.nome}</h3>
<p>${p.categoria}</p>
<span>${p.preco}</span>
</div>
</div>
`;

});

}

/* =======================
   NAV
======================= */

function showPage(id){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

/* INIT */
renderProdutosAdm();

</script>

</body>
</html>
