<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Store PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#020c20,#071a3a);
    color: white;
}

/* HEADER */
header {
    background: #010814;
    padding: 15px;
    text-align: center;
    box-shadow: 0 0 10px #39ff14;
}

/* TELAS */
.tela { display: none; padding: 10px; }
.ativa { display: block; }

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

/* BOTÃO */
.btn {
    background: #39ff14;
    border: none;
    padding: 10px;
    width: 100%;
    font-weight: bold;
    border-radius: 8px;
}

/* PRODUTOS */
.produtos {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
}

.card {
    background: #0d2b5c;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 0 10px #39ff14;
}

/* CHAT */
.chat {
    background: #010814;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
}
</style>
</head>

<body>

<header>🎮 Game Store PRO</header>

<!-- LOGIN -->
<div id="login" class="tela ativa">
    <h3>Login</h3>
    <input id="nome" placeholder="Seu nome">
    <button class="btn" onclick="entrar()">Entrar</button>
</div>

<!-- LOJA -->
<div id="loja" class="tela">
    <h3>Produtos</h3>
    <div class="produtos" id="produtos"></div>
    <button class="btn" onclick="abrirCliente()">Painel Cliente</button>
</div>

<!-- CLIENTE -->
<div id="cliente" class="tela">
    <h3>Meu Painel</h3>

    <h4>Pedidos</h4>
    <div id="pedidos"></div>

    <h4>Chat</h4>
    <div class="chat" id="chat"></div>
    <input id="msg">
    <button class="btn" onclick="enviar()">Enviar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="tela">
    <h3>Admin</h3>

    <input id="senha" placeholder="Senha">
    <button class="btn" onclick="logarAdmin()">Entrar</button>

    <div id="painelAdmin" style="display:none">

        <h4>Adicionar Produto</h4>
        <input id="p_nome" placeholder="Nome">
        <input id="p_preco" placeholder="Preço">
        <input id="p_desc" placeholder="Descrição">
        <button class="btn" onclick="addProduto()">Adicionar</button>

        <h4>Pedidos</h4>
        <div id="adminPedidos"></div>

        <h4>Chat</h4>
        <div id="adminChat"></div>
        <input id="resposta">
        <button class="btn" onclick="responder()">Responder</button>

    </div>
</div>

<script>

// 🔥 TROCAR ISSO DEPOIS PELO SEU BACKEND
const API_URL = "https://SEU-SERVIDOR.com";

// DADOS TEMPORÁRIOS
let produtos = [
    {nome:"35 Tokens",preco:6.47,desc:"Entrega rápida"},
    {nome:"Conta FF Rara",preco:50,desc:"Conta full"}
];

let pedidos = [];
let chat = [];

let usuario = "";

// LOGIN
function entrar(){
    usuario = document.getElementById("nome").value;
    if(!usuario) return alert("Digite seu nome");

    abrir("loja");
    carregarProdutos();
}

// TROCAR TELA
function abrir(tela){
    document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
    document.getElementById(tela).classList.add("ativa");
}

// PRODUTOS
function carregarProdutos(){
    let div = document.getElementById("produtos");
    div.innerHTML="";

    produtos.forEach((p,i)=>{
        div.innerHTML+=`
        <div class="card">
            <h3>${p.nome}</h3>
            <p>R$ ${p.preco}</p>
            <p>${p.desc}</p>
            <button class="btn" onclick="comprar(${i})">Comprar</button>
        </div>`;
    });
}

// COMPRAR
function comprar(i){
    pedidos.push({cliente:usuario,produto:produtos[i].nome});
    alert("Pedido feito!");
}

// CLIENTE
function abrirCliente(){
    abrir("cliente");

    let div = document.getElementById("pedidos");
    div.innerHTML="";

    pedidos.forEach(p=>{
        if(p.cliente === usuario){
            div.innerHTML += `<div>${p.produto}</div>`;
        }
    });

    atualizarChat();
}

// CHAT
function enviar(){
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    chat.push(`Cliente (${usuario}): ${msg}`);
    atualizarChat();
}

function responder(){
    let msg = document.getElementById("resposta").value;
    chat.push("Vendedor: "+msg);
    atualizarAdmin();
}

// ATUALIZAR CHAT
function atualizarChat(){
    let div = document.getElementById("chat");
    div.innerHTML="";

    chat.forEach(m=>{
        div.innerHTML+=`<div>${m}</div>`;
    });
}

// ADMIN
function logarAdmin(){
    if(document.getElementById("senha").value === "1234"){
        document.getElementById("painelAdmin").style.display="block";
        atualizarAdmin();
    }
}

function atualizarAdmin(){
    let p = document.getElementById("adminPedidos");
    p.innerHTML="";
    pedidos.forEach(i=>{
        p.innerHTML+=`<div>${i.cliente} - ${i.produto}</div>`;
    });

    let c = document.getElementById("adminChat");
    c.innerHTML="";
    chat.forEach(m=>{
        c.innerHTML+=`<div>${m}</div>`;
    });
}

// ADD PRODUTO
function addProduto(){
    produtos.push({
        nome:p_nome.value,
        preco:p_preco.value,
        desc:p_desc.value
    });

    alert("Produto adicionado!");
}

</script>

</body>
</html>
