<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0b0f2a;
    color:white;
}

/* TOPO */
.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:2px solid #ff008c;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#ff008c;
}

.topo-direita{
    display:flex;
    gap:15px;
    align-items:center;
}

.notificacao{
    background:#ff008c;
    padding:8px 12px;
    border-radius:20px;
}

.menu{
    cursor:pointer;
    font-size:22px;
}

.dropdown{
    position:absolute;
    right:10px;
    top:60px;
    background:#11163a;
    border:1px solid #ff008c;
    border-radius:10px;
    display:none;
    flex-direction:column;
}

.dropdown div{
    padding:10px;
    cursor:pointer;
}

.dropdown div:hover{
    background:#ff008c;
}

/* CONTEÚDO */
.container{
    padding:20px;
}

/* CATEGORIAS */
.categorias-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

.categoria{
    background:#11163a;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.categoria img{
    width:50px;
    height:50px;
    margin-bottom:10px;
}

/* BOTÃO */
.btn{
    background:#ff008c;
    color:white;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* LOGIN ADMIN */
.login{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000000d9;
    display:none;
    justify-content:center;
    align-items:center;
}

.box{
    background:#11163a;
    padding:20px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

input{
    padding:10px;
    border:none;
    border-radius:5px;
}

/* ADMIN */
.admin{
    display:none;
    margin-top:20px;
    border:1px solid #ff008c;
    padding:15px;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
    <div class="logo">BS</div>

    <div class="topo-direita">
        <div class="notificacao">🔔</div>
        <div class="menu" onclick="toggleMenu()">⋮</div>
    </div>

    <div class="dropdown" id="menuDrop">
        <div onclick="abrirLogin()">Admin</div>
        <div onclick="trocarTema()">Tema</div>
    </div>
</div>

<!-- CONTEÚDO -->
<div class="container">

    <h2>Bem-vindo à BS Store</h2>
    <br>

    <div class="categorias-grid" id="categorias"></div>

    <!-- PAINEL ADMIN -->
    <div class="admin" id="adminPanel">
        <h3>Painel Admin</h3>
        <input type="text" id="nomeCat" placeholder="Nome categoria">
        <input type="text" id="imgCat" placeholder="URL da imagem">
        <button class="btn" onclick="addCategoria()">Adicionar</button>
    </div>

</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <div class="box">
        <h3>Admin</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>
</div>

<script>

// DADOS INICIAIS
let categorias = JSON.parse(localStorage.getItem("cats")) || [
    {nome:"Instagram", img:"https://cdn-icons-png.flaticon.com/512/2111/2111463.png"},
    {nome:"TikTok", img:"https://cdn-icons-png.flaticon.com/512/3046/3046121.png"},
    {nome:"Kwai", img:"https://cdn-icons-png.flaticon.com/512/5968/5968805.png"},
    {nome:"Free Fire", img:"https://cdn-icons-png.flaticon.com/512/5969/5969313.png"},
    {nome:"Fortnite", img:"https://cdn-icons-png.flaticon.com/512/5968/5968653.png"},
    {nome:"Contas / Streaming", img:"https://cdn-icons-png.flaticon.com/512/5977/5977590.png"},
    {nome:"Contas à Venda", img:"https://cdn-icons-png.flaticon.com/512/263/263115.png"},
    {nome:"Sorteios", img:"https://cdn-icons-png.flaticon.com/512/1828/1828884.png"},
    {nome:"Itens Aleatórios", img:"https://cdn-icons-png.flaticon.com/512/992/992700.png"}
];

// RENDER
function render(){
    let area = document.getElementById("categorias");
    area.innerHTML="";
    categorias.forEach(c=>{
        area.innerHTML += `
        <div class="categoria">
            <img src="${c.img}">
            <p>${c.nome}</p>
        </div>`;
    });
}
render();

// MENU
function toggleMenu(){
    let m = document.getElementById("menuDrop");
    m.style.display = m.style.display=="flex"?"none":"flex";
}

// LOGIN
function abrirLogin(){
    document.getElementById("loginBox").style.display="flex";
}

function login(){
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    if(email==="nannyvittoriah@gmail.com" && senha==="Lorrannyh.170"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("adminPanel").style.display="block";
    }else{
        alert("Acesso negado");
    }
}

// ADD
function addCategoria(){
    let nome = document.getElementById("nomeCat").value;
    let img = document.getElementById("imgCat").value;

    categorias.push({nome,img});
    localStorage.setItem("cats", JSON.stringify(categorias));
    render();
}

// TEMA
function trocarTema(){
    document.body.classList.toggle("light");
}

</script>

</body>
</html>
