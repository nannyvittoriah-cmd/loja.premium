<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS STORE - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0a0a0f;color:#fff;padding-bottom:80px;}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px;}
.header-left{display:flex;align-items:center;gap:12px;}
.menu-icon{width:22px;height:22px;cursor:pointer;}
.greeting{font-size:15px;font-weight:600;}
.greeting span{margin-left:4px;}
.header-right{display:flex;align-items:center;gap:16px;font-size:13px;}
.cart{position:relative;cursor:pointer;}
.badge{position:absolute;top:-6px;right:-8px;background:#ef4444;color:#fff;font-size:10px;padding:2px 5px;border-radius:10px;}
.search{margin:0 16px 16px;}
.search input{width:100%;height:44px;background:#1a1a21;border:1px solid #26262f;border-radius:12px;padding:0 16px 0 40px;color:#fff;font-size:14px;outline:none;}
.search svg{position:absolute;margin:12px 0 0 14px;color:#8a8a93;width:18px;height:18px;}
.banner{margin:0 16px 20px;height:160px;border-radius:14px;background:linear-gradient(135deg,#1e1b4b,#7c3aed);position:relative;overflow:hidden;padding:16px;display:flex;align-items:center;}
.banner-text h3{font-size:18px;font-weight:700;margin-bottom:6px;}
.banner-text p{font-size:12px;color:#d1d5db;}
.banner img{position:absolute;right:0;bottom:0;height:100%;}
.section{padding:0 16px 20px;}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-head h4{font-size:15px;font-weight:600;}
.section-head a{font-size:12px;color:#8a8a93;text-decoration:none;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.card{background:#1a1a21;border:1px solid #26262f;border-radius:12px;padding:12px;text-align:center;cursor:pointer;}
.card img{width:28px;height:28px;margin-bottom:6px;}
.card span{font-size:11px;color:#8a8a93;display:block;}
.products{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.prod-card{background:#1a1a21;border:1px solid #26262f;border-radius:12px;overflow:hidden;cursor:pointer;}
.prod-card img{width:100%;height:90px;object-fit:cover;}
.prod-info{padding:8px;}
.prod-info h5{font-size:12px;font-weight:600;margin-bottom:4px;}
.prod-info p{font-size:11px;color:#8a8a93;}
.prod-info .price{font-size:13px;font-weight:700;color:#7c3aed;margin-top:4px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0f;border-top:1px solid #26262f;display:flex;justify-content:space-around;padding:8px 0;}
.nav-item{display:flex;flex-direction:column;align-items:center;font-size:10px;color:#8a8a93;cursor:pointer;}
.nav-item.active{color:#7c3aed;}
.nav-item svg{width:22px;height:22px;margin-bottom:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <svg class="menu-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
    <div class="greeting">Olá, Gabriel <span>👋</span></div>
  </div>
  <div class="header-right">
    <span>Ver saldo</span>
    <div class="cart">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="badge">3</span>
    </div>
  </div>
</div>

<div class="search" style="position:relative;">
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
  </svg>
  <input type="text" placeholder="Buscar produtos...">
</div>

<div class="banner">
  <div class="banner-text">
    <h3>MEGA PROMO</h3>
    <p>ATÉ 50% OFF<br>Produtos selecionados!</p>
  </div>
  <img src="https://i.imgur.com/8Km9tLL.png" alt="">
</div>

<div class="section">
  <div class="section-head">
    <h4>Categorias</h4>
    <a href="#">Ver todas</a>
  </div>
  <div class="grid">
    <div class="card">
      <img src="https://i.imgur.com/8Km9tLL.png">
      <span>Games</span>
    </div>
    <div class="card">
      <img src="https://i.imgur.com/3qT0K2A.png">
      <span>Streaming</span>
    </div>
    <div class="card">
      <img src="https://i.imgur.com/4vK8v7N.png">
      <span>Redes Sociais</span>
    </div>
    <div class="card">
      <img src="https://i.imgur.com/5vZQ5rQ.png">
      <span>Gift Cards</span>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-head">
    <h4>Destaques</h4>
    <a href="#">Ver todas</a>
  </div>
  <div class="products">
    <div class="prod-card">
      <img src="https://i.imgur.com/9Q2bZ8L.png">
      <div class="prod-info">
        <h5>ROBLOX</h5>
        <p>400 Robux</p>
        <div class="price">R$ 15,90</div>
      </div>
    </div>
    <div class="prod-card">
      <img src="https://i.imgur.com/5zK8v7N.png">
      <div class="prod-info">
        <h5>NETFLIX</h5>
        <p>1 Mês</p>
        <div class="price">R$ 17,90</div>
      </div>
    </div>
    <div class="prod-card">
      <img src="https://i.imgur.com/6Q2bZ8L.png">
      <div class="prod-info">
        <h5>SPOTIFY</h5>
        <p>Premium 1 Mês</p>
        <div class="price">R$ 10,90</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h18M3 12h18M3 21h18"/></svg>
    <span>Loja</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <span>Carrinho</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
    </svg>
    <span>Pedidos</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Perfil</span>
  </div>
</div>

</body>
</html>
