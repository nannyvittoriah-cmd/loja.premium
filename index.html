<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Store VZ</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getDatabase, ref, set, get, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
    authDomain: "premium-store-aa58b.firebaseapp.com",
    databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
    projectId: "premium-store-aa58b",
    storageBucket: "premium-store-aa58b.firebasestorage.app",
    messagingSenderId: "462239500057",
    appId: "1:462239500057:web:f1b7cea162ed308a866788",
    measurementId: "G-CN88J28WRX"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  window.app = { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, ref, set, get, push };
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#0A0A0F;--roxo:#8B5CF6;--azul:#06B6D4;--rosa:#EC4899;--branco:#FFFFFF;--cinza:#94A3B8;--borda:#1E293B;--card:#0F172A;--glow:rgba(139, 92, 246, 0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--branco);font-size:12px}
.tela{display:none;min-height:100vh}.tela.ativa{display:block}
.header{background:linear-gradient(180deg,#0F172A 0%,#0A0A0F 100%);padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--borda);position:sticky;top:0;z-index:50}
.logo-box{display:flex;align-items:center;gap:10px}
.logo-img{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--azul),var(--rosa));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px}
.logo-text{font-size:18px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,var(--azul),var(--rosa));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.menu-btn{font-size:20px;cursor:pointer;color:var(--branco)}
.hero{padding:40px 20px;text-align:left}
.hero h1{font-size:28px;font-weight:900;margin-bottom:12px}
.hero-bar{width:60px;height:4px;background:linear-gradient(90deg,var(--azul),var(--rosa));margin:12px 0;border-radius:10px;box-shadow:0 0 15px var(--glow)}
.hero p{font-size:13px;color:var(--cinza);line-height:1.6;margin-bottom:24px}
.btns-hero{display:flex;gap:12px}
.btn-hero{flex:1;padding:14px;border-radius:12px;font-weight:800;font-size:11px;cursor:pointer;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:6px;transition:.3s}
.btn-hero i{width:20px;height:20px}
.btn-prim{background:linear-gradient(135deg,var(--azul),var(--rosa));color:#fff;box-shadow:0 0 20px var(--glow)}
.btn-sec{background:transparent;border-color:var(--azul);color:var(--azul)}
.btn-hero:active{transform:scale(.95)}
.section{padding:0 20px 40px}
.section-title{font-size:16px;font-weight:800;margin-bottom:4px}
.section-bar{width:50px;height:3px;background:linear-gradient(90deg,var(--azul),var(--rosa));margin-bottom:20px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.cat-card{background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:16px;text-align:center;cursor:pointer;box-shadow:0 0 10px rgba(6,182,212,.1);transition:.3s}
.cat-card:hover{transform:translateY(-4px);border-color:var(--azul);box-shadow:0 0 20px var(--glow)}
.cat-img{width:100%;aspect-ratio:1;background:var(--bg);border-radius:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cat-img img{width:100%;height:100%;object-fit:cover}
.cat-nome{font-size:11px;font-weight:700;color:#fff}
.produtos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px}
.prod-card{background:var(--card);border:1px solid var(--borda);border-radius:16px;padding:14px;box-shadow:0 0 10px rgba(6,182,212,.1)}
.prod-img{width:100%;aspect-ratio:1;background:var(--bg);border-radius:12px;margin-bottom:10px;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-nome{font-size:12px;font-weight:700;margin-bottom:6px}
.prod-preco{font-size:16px;font-weight:900;color:var(--azul);margin-bottom:10px}
.btn-comprar{width:100%;background:linear-gradient(135deg,var(--azul),var(--rosa));color:#fff;border:none;padding:10px;border-radius:10px;font-weight:800;font-size:11px;cursor:pointer;box-shadow:0 0 15px var(--glow)}
.login-box{background:var(--card);border:1px solid var(--borda);border-radius:20px;padding:32px;max-width:380px;margin:80px auto;box-shadow:0 0 30px var(--glow)}
.input{width:100%;background:var(--bg);border:1px solid var(--borda);color:#fff;padding:14px;border-radius:10px;margin:10px 0;font-size:13px}
.input:focus{outline:none;border-color:var(--roxo);box-shadow:0 0 12px var(--glow)}
.btn{width:100%;background:linear-gradient(135deg,var(--azul),var(--rosa));color:#fff;border:none;padding:14px;border-radius:10px;cursor:pointer;margin:10px 0;font-weight:800;font-size:13px;box-shadow:0 0 20px var(--glow)}
.btn:active{transform:scale(.98)}
.btn-sec{background:var(--borda);box-shadow:none}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--card);border-right:1px solid var(--borda);z-index:200;transition:left.3s;padding:20px}
.sidebar.ativo{left:0}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:199;display:none}
.sidebar-overlay.ativo{display:block}
.sidebar-item{padding:14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--cinza);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.sidebar-item:hover{background:var(--borda);color:#fff}
.hidden{display:none!important}
.card{background:var(--card);border:1px solid var(--borda);padding:20px;border-radius:16px;margin:16px 0}
</style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="fecharMenu()"></div>
<div class="sidebar" id="sidebar">
  <div style="font-size:16px;font-weight:900;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--borda);color:var(--roxo)">MENU</div>
  <div class="sidebar-item" onclick="ir('loja');fecharMenu()"><i data-lucide="home"></i>Loja</div>
  <div class="sidebar-item" onclick="abrirAdmin();fecharMenu()" id="menuAdmin" style="display:none"><i data-lucide="settings"></i>Painel Admin</div>
  <div class="sidebar-item" onclick="logout();fecharMenu()"><i data-lucide="log-out"></i>Sair</div>
</div>

<div id="login" class="tela ativa">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:60px;height:60px;margin:0 auto 12px;background:linear-gradient(135deg,var(--azul),var(--rosa));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900">PZ</div>
      <h1 style="font-size:20px;font-weight:900">PRIME STORE VZ</h1>
      <p style="font-size:11px;color:var(--cinza);margin-top:6px">O melhor marketplace</p>
    </div>
    <input class="input" id="email" placeholder="Email" type="email">
    <input class="input" id="senha" placeholder="Senha" type="password">
    <button class="btn" onclick="login()">ENTRAR</button>
    <button class="btn btn-sec" onclick="cadastro()">CRIAR CONTA</button>
  </div>
</div>

<div id="loja" class="tela">
  <header class="header">
    <div class="logo-box">
      <div class="logo-img">PZ</div>
      <div class="logo-text">PRIME STORE VZ</div>
    </div>
    <div class="menu-btn" onclick="abrirMenu()"><i data-lucide="menu"></i></div>
  </header>

  <div class="hero">
    <h1>Bem-vindo ao Prime Store VZ</h1>
    <div class="hero-bar"></div>
    <p>O melhor marketplace para comprar produtos de games. Encontre ofertas incríveis de jogos, contas e muito mais!</p>
    <div class="btns-hero">
      <button class="btn-hero btn-prim" onclick="scrollTo('#cats')">
        <i data-lucide="grid-3x3"></i>
        VER<br>CATEGORIAS
      </button>
      <button class="btn-hero btn-sec" onclick="scrollTo('#prods')">
        <i data-lucide="search"></i>
        BUSCAR<br>PRODUTOS
      </button>
    </div>
  </div>

  <div class="section" id="cats">
    <div class="section-title">Categorias Populares</div>
    <div class="section-bar"></div>
    <div class="grid" id="gridCats"></div>
  </div>

  <div class="section" id="prods">
    <div class="section-title">Produtos em Destaque</div>
    <div class="section-bar"></div>
    <div class="produtos-grid" id="gridProds"></div>
  </div>
</div>

<div id="admin" class="tela">
  <header class="header">
    <div class="logo-text">PAINEL ADMIN</div>
    <button class="btn" style="width:auto;padding:10px 20px" onclick="voltarLoja()">VOLTAR</button>
  </header>
  <div style="padding:20px">
    <div class="card">
      <h3 style="margin-bottom:16px">Teste Rápido</h3>
      <button class="btn" onclick="addCatTeste()">CRIAR CATEGORIA: APEX LEGENDS</button>
      <button class="btn" onclick="addProdutoTeste()">CRIAR PRODUTO: 1000 APEX COINS</button>
      <button class="btn btn-sec" onclick="limparTudo()">LIMPAR TUDO</button>
    </div>
  </div>
</div>

<script>
const EMAIL_ADM = 'nannyvittoriah@gmail.com';
let db = {cats:[],prods:[]};

window.addEventListener('load',()=>{
  lucide.createIcons();
  const { auth, onAuthStateChanged, db: fdb, ref, get } = window.app;
  carregarDados();
  onAuthStateChanged(auth, (user) => {
    if(user){
      document.getElementById('login').classList.remove('ativa');
      document.getElementById('loja').classList.add('ativa');
      if(user.email.toLowerCase() === EMAIL_ADM.toLowerCase()){
        document.getElementById('menuAdmin').style.display='flex';
      }
    }else{
      document.getElementById('login').classList.add('ativa');
      document.getElementById('loja').classList.remove('ativa');
      document.getElementById('admin').classList.remove('ativa');
    }
  });
});

async function login(){
  const { auth, signInWithEmailAndPassword } = window.app;
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  try{await signInWithEmailAndPassword(auth, email, senha)}catch(e){alert('Erro: ' + e.message)}
}

async function cadastro(){
  const { auth, createUserWithEmailAndPassword } = window.app;
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  if(senha.length<6){alert('Senha min 6 caracteres');return}
  try{
    await createUserWithEmailAndPassword(auth, email, senha);
    alert('Conta criada!');
  }catch(e){alert('Erro: ' + e.message)}
}

async function logout(){
  const { auth, signOut } = window.app;
  await signOut(auth);
}

function abrirMenu(){document.getElementById('sidebar').classList.add('ativo');document.getElementById('overlay').classList.add('ativo')}
function fecharMenu(){document.getElementById('sidebar').classList.remove('ativo');document.getElementById('overlay').classList.remove('ativo')}
function ir(t){document.querySelectorAll('.tela').forEach(e=>e.classList.remove('ativa'));document.getElementById(t).classList.add('ativa')}
function scrollTo(id){document.querySelector(id).scrollIntoView({behavior:'smooth'})}

async function carregarDados(){
  const { db: fdb, ref, get } = window.app;
  try{
    const snap = await get(ref(fdb, 'primevzdados'));
    if(snap.exists()){
      const dados = snap.val();
      db.cats = dados.cats || [];
      db.prods = dados.prods || [];
    }
    renderCats();
    renderProds();
  }catch(e){console.log(e)}
}

function renderCats(){
  const html = db.cats.map(c=>`
    <div class="cat-card">
      <div class="cat-img"><img src="${c.img}" alt="${c.nome}"></div>
      <div class="cat-nome">${c.nome}</div>
    </div>
  `).join('');
  document.getElementById('gridCats').innerHTML = html || '<p style="color:var(--cinza)">Loga como admin e cria uma categoria</p>';
}

function renderProds(){
  const html = db.prods.map(p=>`
    <div class="prod-card">
      <div class="prod-img"><img src="${p.img}" alt="${p.nome}"></div>
      <div class="prod-nome">${p.nome}</div>
      <div class="prod-preco">R$ ${p.preco.toFixed(2).replace('.',',')}</div>
      <button class="btn-comprar" onclick="alert('Comprar: ${p.nome}')">COMPRAR</button>
    </div>
  `).join('');
  document.getElementById('gridProds').innerHTML = html || '<p style="color:var(--cinza)">Loga como admin e cria um produto</p>';
}

function abrirAdmin(){
  document.getElementById('loja').classList.remove('ativa');
  document.getElementById('admin').classList.add('ativa');
}

function voltarLoja(){
  document.getElementById('admin').classList.remove('ativa');
  document.getElementById('loja').classList.add('ativa');
}

async function addCatTeste(){
  const { db: fdb, ref, set } = window.app;
  const catTeste = {
    id: 'cat1',
    nome: 'Apex Legends',
    img: 'https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt8a1a5e2b64f50f12/5eb7cdc1b8d0c80c4e7481df/apex-featured-image.jpg'
  };
  db.cats = [catTeste];
  await set(ref(fdb, 'primevzdados/cats'), db.cats);
  renderCats();
  alert('Categoria criada! Volta pra loja e vê');
}

async function addProdutoTeste(){
  const { db: fdb, ref, set } = window.app;
  const prodTeste = {
    id: 'prod1',
    nome: '1000 Apex Coins',
    preco: 49.90,
    img: 'https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt8a1a5e2b64f50f12/5eb7cdc1b8d0c80c4e7481df/apex-featured-image.jpg',
    cat: 'cat1'
  };
  db.prods = [prodTeste];
  await set(ref(fdb, 'primevzdados/prods'), db.prods);
  renderProds();
  alert('Produto criado! Volta pra loja e vê');
}

async function limparTudo(){
  if(!confirm('Apagar tudo?'))return;
  const { db: fdb, ref, set } = window.app;
  db.cats = [];
  db.prods = [];
  await set(ref(fdb, 'primevzdados'), {cats:[],prods:[]});
  renderCats();
  renderProds();
  alert('Limpo!');
}

lucide.createIcons();
</script>
</body>
</html>
