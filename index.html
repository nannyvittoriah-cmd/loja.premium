<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prime Store VZ - Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
body{background:#0a0a0f;color:#fff;min-height:100vh;padding-bottom:80px;}

.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
}
.header h1{font-size:18px;font-weight:700;}
.header h1 span{color:#a855f7;}
.header-icons{display:flex;align-items:center;gap:16px;}
.icon-btn{position:relative;cursor:pointer;}
.icon-btn svg{width:24px;height:24px;stroke:#fff;}
.badge{
  position:absolute;top:-2px;right:-2px;
  width:10px;height:10px;background:#a855f7;
  border-radius:50%;border:2px solid #0a0a0f;
}

.search-box{
  margin:0 16px 20px;
  background:#15151d;border:1px solid #2a2a35;
  border-radius:12px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
}
.search-box svg{width:20px;height:20px;stroke:#6b7280;}
.search-box input{
  flex:1;background:transparent;border:none;outline:none;
  color:#fff;font-size:14px;
}
.search-box input::placeholder{color:#6b7280;}

.banner{
  margin:0 16px 28px;
  position:relative;border-radius:16px;overflow:hidden;
  border:1px solid #2a2a35;min-height:160px;
  background:#15151d;display:flex;align-items:center;
}
.banner img{
  width:100%;height:100%;object-fit:cover;
  position:absolute;inset:0;
}
.banner-content{
  position:relative;z-index:2;padding:20px;
  background:linear-gradient(90deg,rgba(10,10,15,0.9) 0%,rgba(10,10,15,0.4) 100%);
}
.banner h2{font-size:20px;font-weight:700;margin-bottom:4px;}
.banner h2 span{color:#a855f7;}
.banner p{font-size:16px;margin-bottom:12px;}
.banner button{
  background:#7c3aed;border:none;border-radius:8px;
  padding:8px 20px;color:#fff;font-weight:600;
  font-size:13px;cursor:pointer;
}
.banner-upload{
  position:absolute;top:10px;right:10px;z-index:3;
  background:rgba(124,58,237,0.9);border:none;
  border-radius:8px;padding:6px 12px;color:#fff;
  font-size:11px;cursor:pointer;
}
.banner input[type="file"]{display:none;}

.section-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 16px;margin-bottom:14px;
}
.section-header h3{font-size:16px;font-weight:600;}
.section-header a{color:#a855f7;font-size:13px;text-decoration:none;display:flex;align-items:center;gap:4px;}

.grid{
  padding:0 16px;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.card{
  background:#15151d;border:1px solid #2a2a35;
  border-radius:14px;padding:16px 8px;
  text-align:center;cursor:pointer;
  transition:0.2s;
}
.card:active{transform:scale(0.96);}
.card-icon{
  width:50px;height:50px;margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.card-icon::after{
  content:'';position:absolute;inset:0;
  border-radius:50%;background:#a855f7;
  filter:blur(20px);opacity:0.4;z-index:0;
}
.card-icon img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1;}
.card span{font-size:12px;font-weight:500;}

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#0a0a0f;border-top:1px solid #2a2a35;
  display:flex;justify-content:space-around;padding:10px 0;
}
.nav-item{
  text-align:center;color:#6b7280;font-size:11px;
  cursor:pointer;
}
.nav-item.active{color:#a855f7;}
.nav-item svg{width:24px;height:24px;margin-bottom:4px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="cursor:pointer;">
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>

  <h1>Prime <span>Store VZ</span></h1>

  <div class="header-icons">
    <div class="icon-btn" onclick="alert('Notificações em breve')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <div class="badge"></div>
    </div>
    <div class="icon-btn" onclick="alert('Perfil em breve')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-box">
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/>
    <path d="M21 21l-4.35-4.35"/>
  </svg>
  <input type="text" id="searchInput" placeholder="Buscar produtos..." onkeyup="searchProducts()">
</div>

<!-- BANNER -->
<div class="banner">
  <img id="bannerImg" src="" style="display:none;">
  <div class="banner-content" id="bannerContent">
    <h2>OFERTAS EXCLUSIVAS</h2>
    <p>ATÉ <span>70% OFF</span></p>
    <button onclick="alert('Ir para ofertas')">VER OFERTAS</button>
  </div>
  <button class="banner-upload" onclick="document.getElementById('bannerFile').click()">Trocar Imagem</button>
  <input type="file" id="bannerFile" accept="image/*" onchange="uploadBanner(event)">
</div>

<!-- CATEGORIAS -->
<div class="section-header">
  <h3>Categorias</h3>
  <a href="#">Ver todas <span>›</span></a>
</div>

<div class="grid" id="categoriesGrid">
  <div class="card" onclick="openCategory('Streaming')">
    <div class="card-icon">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
    </div>
    <span>Streaming</span>
  </div>

  <div class="card" onclick="openCategory('Gift Cards')">
    <div class="card-icon">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
    </div>
    <span>Gift Cards</span>
  </div>

  <div class="card" onclick="openCategory('Redes Sociais')">
    <div class="card-icon">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a5/Instagram_icon.png">
    </div>
    <span>Redes Sociais</span>
  </div>

  <div class="card" onclick="openCategory('Games')">
    <div class="card-icon">
      <img src="https://cdn-icons-png.flaticon.com/512/3616/3616993.png">
    </div>
    <span>Games</span>
  </div>

  <div class="card" onclick="openCategory('Apps Premium')">
    <div class="card-icon">
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg">
    </div>
    <span>Apps Premium</span>
  </div>

  <div class="card" onclick="openCategory('Outros')">
    <div class="card-icon">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">
    </div>
    <span>Outros</span>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <div>Home</div>
  </div>
  <div class="nav-item" onclick="alert('Categorias')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <div>Categorias</div>
  </div>
  <div class="nav-item" onclick="alert('Carrinho')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    <div>Carrinho</div>
  </div>
  <div class="nav-item" onclick="alert('Perfil')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <div>Perfil</div>
  </div>
</div>

<script>
// Carrega banner salvo
window.addEventListener('load', () => {
  const savedBanner = localStorage.getItem('prime_banner');
  if(savedBanner){
    document.getElementById('bannerImg').src = savedBanner;
    document.getElementById('bannerImg').style.display = 'block';
  }
});

// Upload banner da galeria
function uploadBanner(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const imgData = e.target.result;
    localStorage.setItem('prime_banner', imgData);
    document.getElementById('bannerImg').src = imgData;
    document.getElementById('bannerImg').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// Abrir categoria
function openCategory(name){
  alert('Abrir categoria: ' + name);
  // Aqui você redireciona pra tela de produtos da categoria
  // window.location.href = 'produtos.html?cat=' + encodeURIComponent(name);
}

// Buscar produtos
function searchProducts(){
  const query = document.getElementById('searchInput').value.toLowerCase();
  console.log('Buscar:', query);
  // Filtra produtos aqui
}
</script>
</body>
</html>
