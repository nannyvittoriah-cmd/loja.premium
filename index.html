<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prime AI VZ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#070707;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#0f0f0f;
border-right:1px solid #1f1f1f;
padding:18px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-icon{
width:48px;
height:48px;
border-radius:15px;
background:linear-gradient(135deg,#7b2eff,#a855f7);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:18px;
}

.logo h1{
font-size:18px;
}

.new-chat{
height:50px;
border:none;
border-radius:14px;
background:#7b2eff;
color:white;
font-weight:600;
cursor:pointer;
}

.history{
display:flex;
flex-direction:column;
gap:10px;
overflow:auto;
}

.history-item{
background:#161616;
border:1px solid #252525;
padding:12px;
border-radius:12px;
font-size:12px;
cursor:pointer;
transition:.3s;
}

.history-item:hover{
border-color:#7b2eff;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP */

.top{
height:75px;
border-bottom:1px solid #1f1f1f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:#0b0b0b;
}

.top-title{
font-size:16px;
font-weight:600;
}

.top-btn{
background:#171717;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
font-size:12px;
}

/* CHAT */

.chat{
flex:1;
overflow:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:20px;
}

/* MESSAGE */

.message{
display:flex;
gap:12px;
align-items:flex-start;
}

.avatar{
width:42px;
height:42px;
border-radius:14px;
background:linear-gradient(135deg,#7b2eff,#a855f7);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
flex-shrink:0;
}

.bubble{
background:#121212;
border:1px solid #242424;
padding:16px;
border-radius:18px;
max-width:700px;
}

.bubble p{
font-size:14px;
line-height:25px;
color:#e1e1e1;
}

/* IMAGE RESULT */

.image-box{
margin-top:15px;
border-radius:18px;
overflow:hidden;
border:1px solid #262626;
}

.image-box img{
width:100%;
display:block;
}

/* INPUT */

.bottom{
padding:18px;
border-top:1px solid #1f1f1f;
background:#0b0b0b;
}

.input-area{
background:#111;
border:1px solid #222;
border-radius:20px;
padding:14px;
display:flex;
gap:12px;
align-items:flex-end;
}

textarea{
flex:1;
background:none;
border:none;
resize:none;
outline:none;
color:white;
font-size:14px;
max-height:140px;
}

.send-btn{
width:52px;
height:52px;
border:none;
border-radius:16px;
background:#7b2eff;
color:white;
font-size:18px;
cursor:pointer;
}

/* LOADING */

.loading{
display:none;
margin-top:12px;
font-size:12px;
color:#9b9b9b;
}

/* MOBILE */

@media(max-width:800px){

.sidebar{
display:none;
}

.top-title{
font-size:14px;
}

.chat{
padding:15px;
}

.bubble{
max-width:100%;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<div class="logo-icon">
P
</div>

<h1>
Prime AI VZ
</h1>

</div>

<button class="new-chat">
+ Novo Chat
</button>

<div class="history">

<div class="history-item">
Site gamer preto e roxo
</div>

<div class="history-item">
Banner Free Fire
</div>

<div class="history-item">
Logo premium neon
</div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOP -->

<div class="top">

<div class="top-title">
Prime AI VZ
</div>

<button class="top-btn">
Premium
</button>

</div>

<!-- CHAT -->

<div class="chat" id="chat">

<div class="message">

<div class="avatar">
AI
</div>

<div class="bubble">

<p>
Olá 👋<br><br>

Descreva a imagem que deseja gerar.
</p>

</div>

</div>

</div>

<!-- INPUT -->

<div class="bottom">

<div class="input-area">

<textarea
id="prompt"
placeholder="Descreva sua imagem..."
rows="1"
></textarea>

<button
class="send-btn"
onclick="gerarImagem()"
>
➜
</button>

</div>

<div class="loading" id="loading">
Gerando imagem...
</div>

</div>

</div>

<script>

/* EXEMPLOS DE IMAGENS */

const imagens = [

"https://images.unsplash.com/photo-1518770660439-4636190af475",

"https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5",

"https://images.unsplash.com/photo-1516321318423-f06f85e504b3",

"https://images.unsplash.com/photo-1498050108023-c5249f4df085"

];

/* GERAR IMAGEM */

function gerarImagem(){

let prompt =
document.getElementById("prompt").value;

if(prompt.trim() == "") return;

let chat =
document.getElementById("chat");

let loading =
document.getElementById("loading");

/* USER MESSAGE */

chat.innerHTML += `

<div class="message">

<div class="avatar">
V
</div>

<div class="bubble">

<p>${prompt}</p>

</div>

</div>

`;

loading.style.display = "block";

/* SCROLL */

chat.scrollTop = chat.scrollHeight;

/* SIMULAR IA */

setTimeout(()=>{

loading.style.display = "none";

/* IMAGEM RANDOM */

let imagem =
imagens[Math.floor(Math.random()*imagens.length)];

/* IA RESPONSE */

chat.innerHTML += `

<div class="message">

<div class="avatar">
AI
</div>

<div class="bubble">

<p>
Imagem gerada com sucesso.
</p>

<div class="image-box">

<img src="${imagem}">

</div>

</div>

</div>

`;

/* LIMPAR */

document.getElementById("prompt").value = "";

/* SCROLL */

chat.scrollTop = chat.scrollHeight;

},2000);

}

</script>

</body>
</html>
