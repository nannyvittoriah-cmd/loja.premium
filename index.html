<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Prime Game Vz</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getDatabase, ref, onValue, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
    authDomain: "premium-store-aa58b.firebaseapp.com",
    databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
    projectId: "premium-store-aa58b",
    storageBucket: "premium-store-aa58b.firebasestorage.app",
    messagingSenderId: "462239500057",
    appId: "1:462239500057:web:f1b7cea162ed308a866788"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  window.fb = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, ref, onValue, push, serverTimestamp };
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#0A0A0F;
  --roxo:#A855F7;
  --roxo-neon:#C084FC;
  --roxo-escuro:#7E22CE;
  --roxo-glow:rgba(168,85,247,.6);
  --branco:#FFFFFF;
  --cinza:#9CA3AF;
  --card:rgba(20,20,30,.7);
  --borda:rgba(168,85,247,.3);
  --verde:#10B981;
  --amarelo:#F59E0B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--branco);
  font-size:11px;
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed;
  top:-30%;
  left:50%;
  transform:translateX(-50%);
  width:600px;
  height:600px;
  background:radial-gradient(circle,var(--roxo-escuro) 0%,transparent 70%);
  opacity:.3;
  z-index:-1;
  pointer-events:none;
  filter:blur(100px);
}

/* HEADER ESTILO GGMAX */
.header-gg{
  background:rgba(10,10,15,.8);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--borda);
  padding:12px 10px;
  position:sticky;
  top:0;
  z-index:100;
}
.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.logo-gg{
  font-size:16px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:5px;
  text-shadow:0 0 20px var(--roxo-glow);
}
.logo-gg i{width:18px;height:18px;stroke:var(--roxo-neon);fill:var(--roxo-neon)}
.header-actions{
  display:flex;
  gap:8px;
}
.btn-icon-header{
  width:32px;
  height:32px;
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.btn-icon-header i{width:16px;height:16px}
.btn-login-header{
  background:linear-gradient(135deg,var(--roxo),var(--roxo-neon));
  border:none;
  border-radius:8px;
  padding:6px 12px;
  font-size:8px;
  font-weight:700;
  color:var(--branco);
  cursor:pointer;
  box-shadow:0 0 20px var(--roxo-glow);
}
.search-bar{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:10px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.search-bar i{width:16px;height:16px;stroke:var(--cinza)}
.search-bar input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--branco);
  font-size:9px;
}

/* BANNER */
.banner{
  background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo));
  border-radius:12px;
  padding:20px;
  margin:12px 10px;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 32px var(--roxo-glow);
}
.banner::before{
  content:'';
  position:absolute;
  top:-50%;
  right:-20%;
  width:300px;
  height:300px;
  background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);
  filter:blur(60px);
}
.banner-tit{
  font-size:14px;
  font-weight:900;
  margin-bottom:4px;
  position:relative;
}
.banner-sub{
  font-size:8px;
  opacity:.9;
  position:relative;
}

/* FILTROS */
.filtros{
  padding:0 10px;
  margin-bottom:12px;
  display:flex;
  gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
}
.filtros::-webkit-scrollbar{display:none}
.filtro-btn{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:20px;
  padding:7px 14px;
  font-size:8px;
  font-weight:600;
  color:var(--cinza);
  white-space:nowrap;
  cursor:pointer;
  transition:all.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.filtro-btn.ativo{
  background:linear-gradient(135deg,var(--roxo),var(--roxo-neon));
  color:var(--branco);
  border-color:var(--roxo);
  box-shadow:0 0 20px var(--roxo-glow);
}
.filtro-btn i{width:12px;height:12px}

/* GRID DE PRODUTOS */
.container{padding:0 10px 80px}
.produtos-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.card-produto{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:all.2s;
  position:relative;
}
.card-produto:active{transform:scale(.97)}
.produto-img{
  width:100%;
  height:110px;
  background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo));
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.produto-img i{width:32px;height:32px;fill:rgba(255,255,255,.3)}
.produto-badge{
  position:absolute;
  top:6px;
  left:6px;
  background:var(--verde);
  color:var(--branco);
  font-size:6px;
  font-weight:700;
  padding:3px 6px;
  border-radius:4px;
  text-transform:uppercase;
}
.produto-badge.promo{background:var(--amarelo)}
.produto-info{
  padding:10px;
}
.produto-cat{
  font-size:6px;
  color:var(--roxo-neon);
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:4px;
}
.produto-nome{
  font-size:9px;
  font-weight:700;
  margin-bottom:6px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  line-height:1.3;
}
.produto-preco{
  display:flex;
  align-items:baseline;
  gap:4px;
  margin-bottom:6px;
}
.preco-atual{
  font-size:12px;
  font-weight:900;
  color:var(--roxo-neon);
  text-shadow:0 0 15px var(--roxo-glow);
}
.preco-antigo{
  font-size:7px;
  color:var(--cinza);
  text-decoration:line-through;
}
.produto-stats{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:6px;
  color:var(--cinza);
}
.stat-item{
  display:flex;
  align-items:center;
  gap:2px;
}
.stat-item i{width:10px;height:10px}

/* NAV BOTTOM */
.nav-bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(10,10,15,.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--borda);
  padding:8px 0 12px;
  display:flex;
  justify-content:space-around;
  z-index:100;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  cursor:pointer;
  color:var(--cinza);
  transition:all.2s;
}
.nav-item.ativo{color:var(--roxo-neon)}
.nav-item i{width:20px;height:20px}
.nav-item span{font-size:6px;font-weight:600}

/* MODAL LOGIN */
.modal-login{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(20px);
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-login.ativo{display:flex}
.login-content{
  width:100%;
  max-width:400px;
  background:var(--card);
  border:1.5px solid var(--borda);
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 10px 50px rgba(168,85,247,.4);
}
.login-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.login-tit-modal{
  font-size:16px;
  font-weight:900;
  text-shadow:0 0 20px var(--roxo-glow);
}
.btn-fechar-modal{
  width:28px;
  height:28px;
  background:rgba(168,85,247,.2);
  border:1px solid var(--borda);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.btn-fechar-modal i{width:16px;height:16px;stroke:var(--roxo-neon)}
.tabs-login{
  display:flex;
  gap:6px;
  margin-bottom:16px;
  background:rgba(0,0,0,.5);
  padding:5px;
  border-radius:10px;
}
.tab-login{
  flex:1;
  padding:8px;
  background:transparent;
  border:none;
  border-radius:7px;
  color:var(--cinza);
  font-size:8px;
  font-weight:600;
  cursor:pointer;
}
.tab-login.ativo{
  background:linear-gradient(135deg,var(--roxo),var(--roxo-neon));
  color:var(--branco);
}
.input-modal{
  background:rgba(0,0,0,.5);
  border:1px solid var(--borda);
  border-radius:10px;
  padding:12px;
  font-size:16px;
  color:var(--branco);
  width:100%;
  outline:none;
  margin-bottom:10px;
}
.input-modal:focus{
  border-color:var(--roxo);
  box-shadow:0 0 20px var(--roxo-glow);
}
.btn-login-modal{
  width:100%;
  background:linear-gradient(135deg,var(--roxo),var(--roxo-neon));
  color:var(--branco);
  border:none;
  border-radius:10px;
  padding:12px;
  font-weight:700;
  font-size:9px;
  cursor:pointer;
  box-shadow:0 4px 25px var(--roxo-glow);
  margin-top:6px;
}
</style>
</head>
<body>
<!-- HEADER -->
<div class="header-gg">
  <div class="header-top">
    <div class="logo-gg"><i data-lucide="gamepad-2"></i> Prime<span style="color:var(--roxo-neon)">Game</span></div>
    <div class="header-actions">
      <div class="btn-icon-header"><i data-lucide="bell"></i></div>
      <button class="btn-login-header" id="btnLoginHeader" onclick="abrirLogin()">ENTRAR</button>
    </div>
  <div class="search-bar">
    <i data-lucide="search"></i>
    <input type="text" placeholder="Buscar jogos, contas, serviços..." oninput="filtrarProdutos(this.value)">
  </div>
</div>

<!-- BANNER -->
<div class="banner">
  <div class="banner-tit">🔥 PROMOÇÃO IMPERDÍVEL</div>
  <div class="banner-sub">Contas Free Fire com até 70% OFF</div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <button class="filtro-btn ativo" onclick="filtrarCategoria('todos')">
    <i data-lucide="grid-3x3"></i> Todos
  </button>
  <button class="filtro-btn" onclick="filtrarCategoria('freefire')">
    <i data-lucide="flame"></i> Free Fire
  </button>
  <button class="filtro-btn" onclick="filtrarCategoria('roblox')">
    <i data-lucide="box"></i> Roblox
  </button>
  <button class="filtro-btn" onclick="filtrarCategoria('valorant')">
    <i data-lucide="target"></i> Valorant
  </button>
  <button class="filtro-btn" onclick="filtrarCategoria('lol')">
    <i data-lucide="sword"></i> LoL
  </button>
  <button class="filtro-btn" onclick="filtrarCategoria('servicos')">
    <i data-lucide="wrench"></i> Serviços
  </button>
</div>

<!-- PRODUTOS -->
<div class="container">
  <div class="produtos-grid" id="produtosGrid"></div>
</div>

<!-- NAV BOTTOM -->
<div class="nav-bottom">
  <div class="nav-item ativo">
    <i data-lucide="home"></i>
    <span>Início</span>
  </div>
  <div class="nav-item">
    <i data-lucide="trending-up"></i>
    <span>Popular</span>
  </div>
  <div class="nav-item">
    <i data-lucide="shopping-cart"></i>
    <span>Carrinho</span>
  </div>
  <div class="nav-item">
    <i data-lucide="user"></i>
    <span>Perfil</span>
  </div>
</div>

<!-- MODAL LOGIN -->
<div id="modalLogin" class="modal-login">
  <div class="login-content">
    <div class="login-header">
      <div class="login-tit-modal">Entrar</div>
      <div class="btn-fechar-modal" onclick="fecharLogin()"><i data-lucide="x"></i></div>
    </div>

    <div class="tabs-login">
      <button class="tab-login ativo" onclick="mudarTabLogin('login')">Login</button>
      <button class="tab-login" onclick="mudarTabLogin('cadastro')">Cadastro</button>
    </div>

    <div id="tabLoginContent">
      <input type="email" class="input-modal" id="loginEmail" placeholder="E-mail">
      <input type="password" class="input-modal" id="loginSenha" placeholder="Senha">
      <button class="btn-login-modal" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="tabCadastroContent" style="display:none">
      <input type="text" class="input-modal" id="cadNome" placeholder="Nome completo">
      <input type="email" class="input-modal" id="cadEmail" placeholder="E-mail">
      <input type="password" class="input-modal" id="cadSenha" placeholder="Senha - mín 6 caracteres">
      <button class="btn-login-modal" onclick="fazerCadastro()">CRIAR CONTA</button>
    </div>
  </div>
</div>

<script>
let userId = null;
let produtos = [];
let categoriaAtual = 'todos';

window.addEventListener('load',()=>{
  lucide.createIcons();
  const { auth, onAuthStateChanged } = window.fb;

  onAuthStateChanged(auth, (user) => {
    if(user){
      userId = user.uid;
      document.getElementById('btnLoginHeader').textContent = 'SAIR';
      document.getElementById('btnLoginHeader').onclick = fazerLogout;
    }else{
      document.getElementById('btnLoginHeader').textContent = 'ENTRAR';
      document.getElementById('btnLoginHeader').onclick = abrirLogin;
    }
  });

  carregarProdutos();
});

function carregarProdutos(){
  const { db, ref, onValue } = window.fb;

  onValue(ref(db, 'produtos'), (snapshot) => {
    const prods = snapshot.val() || {};
    produtos = Object.entries(prods).map(([id, p]) => ({id, ...p}));
    renderizarProdutos();
  });
}

function renderizarProdutos(){
  const grid = document.getElementById('produtosGrid');
  const filtrados = categoriaAtual === 'todos' ? produtos : produtos.filter(p => p.categoria === categoriaAtual);

  grid.innerHTML = filtrados.map(p => `
    <div class="card-produto" onclick="verProduto('${p.id}')">
      <div class="produto-img">
        <i data-lucide="${p.icone || 'package'}"></i>
        ${p.badge ? `<div class="produto-badge ${p.badge === 'PROMO' ? 'promo' : ''}">${p.badge}</div>` : ''}
      </div>
      <div class="produto-info">
        <div class="produto-cat">${p.categoria.toUpperCase()}</div>
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco">
          <div class="preco-atual">R$ ${p.preco.toFixed(2)}</div>
          ${p.precoAntigo ? `<div class="preco-antigo">R$ ${p.precoAntigo.toFixed(2)}</div>` : ''}
        </div>
        <div class="produto-stats">
          <div class="stat-item"><i data-lucide="eye"></i> ${p.views || 0}</div>
          <div class="stat-item"><i data-lucide="shopping-bag"></i> ${p.vendas || 0}</div>
        </div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function filtrarCategoria(cat){
  categoriaAtual = cat;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  event.target.classList.add('ativo');
  renderizarProdutos();
}

function filtrarProdutos(termo){
  const grid = document.getElementById('produtosGrid');
  const filtrados = produtos.filter(p => 
    p.nome.toLowerCase().includes(termo.toLowerCase()) ||
    p.categoria.toLowerCase().includes(termo.toLowerCase())
  );

  grid.innerHTML = filtrados.map(p => `
    <div class="card-produto" onclick="verProduto('${p.id}')">
      <div class="produto-img">
        <i data-lucide="${p.icone || 'package'}"></i>
        ${p.badge ? `<div class="produto-badge ${p.badge === 'PROMO' ? 'promo' : ''}">${p.badge}</div>` : ''}
      </div>
      <div class="produto-info">
        <div class="produto-cat">${p.categoria.toUpperCase()}</div>
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco">
          <div class="preco-atual">R$ ${p.preco.toFixed(2)}</div>
          ${p.precoAntigo ? `<div class="preco-antigo">R$ ${p.precoAntigo.toFixed(2)}</div>` : ''}
        </div>
        <div class="produto-stats">
          <div class="stat-item"><i data-lucide="eye"></i> ${p.views || 0}</div>
          <div class="stat-item"><i data-lucide="shopping-bag"></i> ${p.vendas || 0}</div>
        </div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function verProduto(id){
  if(!userId){
    alert('Faça login para comprar');
    abrirLogin();
    return;
  }
  alert('Produto ID: '+id+' - Em breve: página de compra');
}

function abrirLogin(){
  document.getElementById('modalLogin').classList.add('ativo');
}

function fecharLogin(){
  document.getElementById('modalLogin').classList.remove('ativo');
}

function mudarTabLogin(t){
  document.querySelectorAll('.tab-login').forEach(e=>e.classList.remove('ativo'));
  event.target.classList.add('ativo');
  document.getElementById('tabLoginContent').style.display=t==='login'?'block':'none';
  document.getElementById('tabCadastroContent').style.display=t==='cadastro'?'block':'none';
}

async function fazerLogin(){
  const { auth, signInWithEmailAndPassword } = window.fb;
  const email=document.getElementById('loginEmail').value.trim();
  const senha=document.getElementById('loginSenha').value;
  if(!email||!senha){alert('Preencha todos os campos');return}
  try{
    await signInWithEmailAndPassword(auth,email,senha);
    fecharLogin();
  }catch(e){
    alert('Erro: '+e.message);
  }
}

async function fazerCadastro(){
  const { auth, createUserWithEmailAndPassword } = window.fb;
  const nome=document.getElementById('cadNome').value.trim();
  const email=document.getElementById('cadEmail').value.trim();
  const senha=document.getElementById('cadSenha').value;
  if(!nome||!email||!senha){alert('Preencha todos os campos');return}
  if(senha.length<6){alert('Senha deve ter no mínimo 6 caracteres');return}
  try{
    await createUserWithEmailAndPassword(auth,email,senha);
    fecharLogin();
    alert('Conta criada com sucesso!');
  }catch(e){
    alert('Erro: '+e.message);
  }
}

async function fazerLogout(){
  const { auth, signOut } = window.fb;
  if(confirm('Deseja sair?'))await signOut(auth);
}

lucide.createIcons();
</script>
</body>
</html>
