<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bonyx Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f2a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:#121a3a;
padding:20px;
border-radius:12px;
width:320px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.login{background:#4a6bff;color:white;}
.google{background:#db4437;color:white;}
.register{background:#22c55e;color:white;}

#dashboard{
display:none;
text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="auth">

<h2>Login / Cadastro</h2>

<input id="name" placeholder="Nome">
<input id="username" placeholder="Usuário">
<input id="phone" placeholder="Telefone">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button class="register" onclick="register()">Cadastrar</button>
<button class="login" onclick="login()">Entrar</button>
<button class="google" onclick="googleLogin()">Google</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Bem-vindo 👋</h1>
<p id="info"></p>
<button onclick="logout()">Sair</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo8baLqLDPTKTajoC-kl_6P_w3VMO0414",
  authDomain: "bonyx-sh.firebaseapp.com",
  projectId: "bonyx-sh",
  storageBucket: "bonyx-sh.firebasestorage.app",
  messagingSenderId: "379347082201",
  appId: "1:379347082201:web:842b31bf3e9df3c12fd7c8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🔥 CADASTRO
window.register = async () => {
let name = document.getElementById("name").value;
let username = document.getElementById("username").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try{
const user = await createUserWithEmailAndPassword(auth, email, password);

await setDoc(doc(db,"users",user.user.uid),{
name, username, phone, email
});

show(user.user);

}catch(e){ alert(e.message); }
};


// 🔥 LOGIN
window.login = async () => {
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try{
const user = await signInWithEmailAndPassword(auth, email, password);
show(user.user);
}catch(e){ alert(e.message); }
};


// 🔥 GOOGLE LOGIN
window.googleLogin = async () => {
const provider = new GoogleAuthProvider();

try{
const user = await signInWithPopup(auth, provider);

await setDoc(doc(db,"users",user.user.uid),{
name: user.user.displayName,
email: user.user.email
});

show(user.user);

}catch(e){ alert(e.message); }
};


// 🔥 DASHBOARD
function show(user){
document.getElementById("auth").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("info").innerText =
"Logado: " + user.email;
}


// 🔥 LOGOUT
window.logout = async () => {
await signOut(auth);
location.reload();
};
</script>

</body>
</html>
