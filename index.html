<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, updateProfile, signOut, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const LOGIN_KEY = 'prime_login_time';
const LOGIN_DURATION = 24 * 60 * 60 * 1000; // 24h em ms

// SPLASH 5s + VERIFICA LOGIN 24H
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    checkLoginExpiry();
  }, 5000);
});

async function checkLoginExpiry(){
  const lastLogin = localStorage.getItem(LOGIN_KEY);
  const now = Date.now();
  
  if(lastLogin && (now - parseInt(lastLogin)) > LOGIN_DURATION){
    // Passou 24h, desloga
    await signOut(auth);
    localStorage.removeItem(LOGIN_KEY);
    showScreen('login');
    return;
  }

  onAuthStateChanged(auth, async (user) => {
    if(user){
      document.getElementById('bottomNav').classList.add('show');
      showScreen('home');
      await loadData();
    }else{
      showScreen('login');
    }
  });
}

// LOGIN
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('rememberMe').checked;
  
  if(!email || !password) return showAlert('loginError', 'Preencha e-mail e senha');
  
  try{
    // Se "Lembrar-me" marcado = persiste 24h. Se não, persiste só na sessão
    await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
    
    await signInWithEmailAndPassword(auth, email, password);
    
    // Salva timestamp do login
    localStorage.setItem(LOGIN_KEY, Date.now().toString());
    
  }catch(e){
    showAlert('loginError', 'E-mail ou senha inválidos');
  }
};

// REGISTER - mesmo código de antes
document.getElementById('registerBtn').onclick = async () => {
  const name = document.getElementById('registerName').value.trim();
  const email = document.getElementById('registerEmail').value.trim();
  const password = document.getElementById('registerPassword').value;
  const acceptTerms = document.getElementById('acceptTerms').checked;
  if(!name || !email || !password) return showAlert('registerError', 'Preencha todos os campos');
  if(!acceptTerms) return showAlert('registerError', 'Aceite os termos');
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, {displayName: name});
    showAlert('registerSuccess', 'Conta criada!', 'success');
    setTimeout(() => showScreen('login'), 1500);
  }catch(e){
    showAlert('registerError', 'Erro ao criar conta');
  }
};

// LOGOUT manual também limpa o timer
window.logout = async () => {
  await signOut(auth);
  localStorage.removeItem(LOGIN_KEY);
  document.getElementById('bottomNav').classList.remove('show');
  showScreen('login');
}
</script>
