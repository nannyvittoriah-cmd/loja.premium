<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  projectId: "premium-store-aa58b",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allCategories = [];
let allProducts = [];
let cart = [];
let currentCategory = null;
let currentProduct = null;
let currentSubcat = 'Todos';
let prevScreen = 'home';

// 1. VERIFICA SE JÁ TEM USUÁRIO LOGADO
onAuthStateChanged(auth, async (user) => {
  if(user){
    // Usuário logado: vai pra Home
    const nome = user.displayName || user.email.split('@')[0];
    document.getElementById('userName').innerText = nome;

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-home').classList.add('active');

    await loadData();
  }else{
    // Não logado: fica no Login
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-login').classList.add('active');
  }
});

// 2. LOGIN
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if(!email ||!password){
    showAlert('loginError', 'Preencha e-mail e senha');
    return;
  }

  document.getElementById('loginBtn').disabled = true;

  try{
    await signInWithEmailAndPassword(auth, email, password);
    // O onAuthStateChanged já cuida de ir pra Home
  }catch(e){
    showAlert('loginError', 'E-mail ou senha inválidos');
    document.getElementById('loginBtn').disabled = false;
  }
});

// 3. CADASTRO
document.getElementById('registerBtn').addEventListener('click', async () => {
  const name = document.getElementById('registerName').value.trim();
  const email = document.getElementById('registerEmail').value.trim();
  const phone = document.getElementById('registerPhone').value.trim();
  const password = document.getElementById('registerPassword').value;
  const acceptTerms = document.getElementById('acceptTerms').checked;

  if(!name ||!email ||!password){
    showAlert('registerError', 'Preencha todos os campos');
    return;
  }
  if(password.length < 6){
    showAlert('registerError', 'A senha deve ter no mínimo 6 caracteres');
    return;
  }
  if(!acceptTerms){
    showAlert('registerError', 'Aceite os termos de uso');
    return;
  }

  document.getElementById('registerBtn').disabled = true;

  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, {displayName: name});
    showAlert('registerSuccess', 'Conta criada com sucesso!', 'success');
    setTimeout(() => showScreen('login'), 1500);
  }catch(e){
    if(e.code === 'auth/email-already-in-use'){
      showAlert('registerError', 'Este e-mail já está em uso');
    }else{
      showAlert('registerError', 'Erro ao criar conta');
    }
    document.getElementById('registerBtn').disabled = false;
  }
});

// 4. ESQUECI SENHA
document.getElementById('forgotBtn').addEventListener('click', async () => {
  const email = document.getElementById('forgotEmail').value.trim();

  if(!email){
    showAlert('forgotError', 'Digite seu e-mail');
    return;
  }

  document.getElementById('forgotBtn').disabled = true;

  try{
    await sendPasswordResetEmail(auth, email);
    showAlert('forgotSuccess', 'Link enviado para seu e-mail!', 'success');
    setTimeout(() => showScreen('login'), 2000);
  }catch(e){
    showAlert('forgotError', 'E-mail não encontrado');
    document.getElementById('forgotBtn').disabled = false;
  }
});

// 5. CARREGA DADOS DEPOIS DO LOGIN
async function loadData(){
  const catSnap = await getDocs(collection(db,'categorias'));
  allCategories = [];
  catSnap.forEach(d=>allCategories.push({id:d.id,...d.data()}));

  const prodSnap = await getDocs(collection(db,'produtos'));
  allProducts = [];
  prodSnap.forEach(d=>allProducts.push({id:d.id,...d.data()}));

  renderHome();
  renderCategorias();
}

// 6. RENDER HOME
function renderHome(){
  document.getElementById('catGrid').innerHTML = allCategories.slice(0,6).map(cat=>`
    <div class="cat-item" onclick="openSubcat('${cat.id}')">
      <div class="cat-icon">
        <svg width="28" height="28" fill="#a855f7" viewBox="0 0 24 24">
          <path d="M21.58 7.19c-.23-.86-.9-1.54-1.76-1.77C18.25 5 12 5 12 5s-6.26 0-7.82.42c-.86.23-1.53.91-1.76 1.77C2 8.75 2 12 2 12s0 3.26.42 4.81c.23.86.9 1.54 1.76 1.77C5.74 19 12 19 12 19s6.26 0 7.82-.42c.86-.23 1.53-.91 1.76-1.77C22 15.26 22 12 22 12s0-3.25-.42-4.81zM10 15V9l5.2 3-5.2 3z"/>
        </svg>
      </div>
      <span>${cat.nome}</span>
    </div>
  `).join('');

  document.getElementById('prodGrid').innerHTML = allProducts.slice(0,4).map(prod=>`
    <div class="prod-item" onclick="openDetail('${prod.id}')">
      <img src="${prod.img}" onerror="this.src='https://via.placeholder.com/200'">
      <div class="prod-info">
        <h4>${prod.nome}</h4>
        <p>${prod.subcat || ''}</p>
        <div class="prod-price">R$ ${prod.preco}</div>
      </div>
    </div>
  `).join('');
}

// 7. NAVEGAÇÃO
window.showScreen = (screen) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${screen}`).classList.add('active');
  clearAlerts();
}

window.goTo = (screen) => {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`screen-${screen}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  if(screen==='home') document.querySelectorAll('.nav-item')[0].classList.add('active');
  if(screen==='categorias') document.querySelectorAll('.nav-item')[1].classList.add('active');
  if(screen==='cart') document.querySelectorAll('.nav-item')[2].classList.add('active');
}

window.logout = async () => {
  await auth.signOut();
}
</script>
