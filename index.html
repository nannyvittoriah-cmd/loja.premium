<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>PREMIUM STORE</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --roxo:#8B5CF6;--roxo2:#7C3AED;--verde:#10B981;--vermelho:#EF4444;--amarelo:#F59E0B;
  --preto:#0F0F0F;--cinza:#1A1A1A;--cinza2:#2A2A2A;--branco:#FFF;--cinza-txt:#9CA3AF
}
body{background:var(--preto);color:var(--branco);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:11px;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;background:var(--preto);min-height:100vh;padding-bottom:70px}
.topo{background:linear-gradient(135deg,var(--roxo),var(--roxo2));padding:16px;text-align:center;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;justify-content:center;gap:8px;font-size:16px;font-weight:800;letter-spacing:1px}
.logo i{width:20px;height:20px}
.conteudo{padding:16px}
.tela{display:none}
.tela.ativa{display:block;animation:fadeIn.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.titulo{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.titulo i{width:18px;height:18px;color:var(--roxo)}
.input,.textarea,.select{width:100%;background:var(--cinza);border:1px solid var(--cinza2);color:var(--branco);padding:12px;border-radius:8px;font-size:11px;margin-bottom:10px;font-family:inherit}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--roxo)}
.textarea{min-height:80px;resize:vertical}
.btn{width:100%;background:linear-gradient(135deg,var(--roxo),var(--roxo2));color:var(--branco);border:none;padding:12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn:active{transform:scale(.98)}
.btn-sec{background:var(--cinza);border:1px solid var(--cinza2)}
.btn i{width:16px;height:16px}
.card{background:var(--cinza);border:1px solid var(--cinza2);border-radius:12px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.produto{background:var(--cinza);border:1px solid var(--cinza2);border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s}
.produto:active{transform:scale(.97)}
.produto-img{width:100%;height:120px;object-fit:cover;background:var(--cinza2)}
.produto-info{padding:10px}
.produto-nome{font-size:11px;font-weight:700;margin-bottom:4px}
.produto-preco{font-size:14px;font-weight:800;color:var(--roxo)}
.produto-cat{font-size:9px;color:var(--cinza-txt);margin-top:4px}
.lista-item{background:var(--cinza);border:1px solid var(--cinza2);border-radius:10px;padding:12px;margin-bottom:10px}
.lista-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.lista-nome{font-size:12px;font-weight:700}
.lista-acoes{display:flex;gap:6px}
.btn-mini{padding:6px 10px;font-size:9px;border-radius:6px;border:none;font-weight:700;cursor:pointer}
.btn-edit{background:var(--roxo);color:var(--branco)}
.btn-del{background:var(--vermelho);color:var(--branco)}
.lista-info{font-size:10px;color:var(--cinza-txt);line-height:1.6}
.badge{padding:4px 8px;border-radius:6px;font-size:9px;font-weight:700}
.badge-pendente{background:rgba(245,158,11,.2);color:var(--amarelo)}
.badge-confirmado{background:rgba(16,185,129,.2);color:var(--verde)}
.badge-cancelado{background:rgba(239,68,68,.2);color:var(--vermelho)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;overflow-y:auto}
.modal.ativo{display:block}
.modal-conteudo{background:var(--preto);max-width:480px;margin:0 auto;min-height:100vh;padding:16px}
.modal-topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-titulo{font-size:16px;font-weight:800}
.modal-fechar{background:var(--cinza);border:none;color:var(--branco);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--cinza);border-top:1px solid var(--cinza2);display:flex;justify-content:space-around;padding:8px 0;z-index:90;max-width:480px;margin:0 auto}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--cinza-txt);font-size:9px;cursor:pointer;padding:4px 12px;border-radius:8px;transition:.2s}
.nav-item.ativo{color:var(--roxo)}
.nav-item i{width:20px;height:20px}
.empty{text-align:center;padding:40px 20px;color:var(--cinza-txt);font-size:11px}
.empty i{width:48px;height:48px;margin-bottom:12px;opacity:.3}
.search-bar{background:var(--cinza);border:1px solid var(--cinza2);border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px;margin-bottom:16px}
.search-bar input{background:none;border:none;color:var(--branco);flex:1;font-size:11px;outline:none}
.search-bar i{width:16px;height:16px;color:var(--cinza-txt)}
.carrinho-item{display:flex;gap:10px;padding:10px;background:var(--cinza2);border-radius:8px;margin-bottom:8px}
.carrinho-img{width:60px;height:60px;object-fit:cover;border-radius:6px}
.carrinho-info{flex:1}
.carrinho-nome{font-size:11px;font-weight:700;margin-bottom:4px}
.carrinho-preco{font-size:12px;color:var(--roxo);font-weight:800}
.carrinho-del{background:var(--vermelho);border:none;color:var(--branco);width:28px;height:28px;border-radius:6px;cursor:pointer}
.total-box{background:var(--cinza);border:2px solid var(--roxo);border-radius:10px;padding:14px;margin:16px 0}
.total-linha{display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px}
.total-linha.final{font-size:16px;font-weight:800;color:var(--roxo);border-top:1px solid var(--cinza2);padding-top:8px;margin-top:8px}
.label{font-size:10px;color:var(--cinza-txt);margin-bottom:6px;display:block}
.upload{border:2px dashed var(--cinza2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;position:relative}
.upload input{display:none}
.upload-text{font-size:10px;color:var(--cinza-txt)}
.upload img{max-width:100%;max-height:200px;border-radius:8px;margin-top:10px}
.indicacao-card{background:linear-gradient(135deg,var(--roxo),var(--roxo2));border-radius:12px;padding:16px;margin-bottom:16px}
.indicacao-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.indicacao-tit{font-size:14px;font-weight:800}
.codigo-box{background:rgba(0,0,0,.3);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.codigo-text{font-size:18px;font-weight:900;letter-spacing:2px}
.btn-copiar{background:var(--branco);color:var(--roxo);border:none;padding:8px 16px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-item{background:rgba(0,0,0,.3);border-radius:8px;padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:900;margin-bottom:4px}
.stat-label{font-size:9px;opacity:.8}
.progress-bar{background:rgba(0,0,0,.3);border-radius:8px;height:8px;overflow:hidden;margin-bottom:12px}
.progress-fill{background:var(--branco);height:100%;transition:.3s}
.recompensa-item{background:var(--cinza2);border-radius:8px;padding:10px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.recompensa-icon{width:32px;height:32px;background:var(--roxo);border-radius:6px;display:flex;align-items:center;justify-content:center}
.recompensa-icon i{width:18px;height:18px}
.recompensa-info{flex:1}
.recompensa-tit{font-size:11px;font-weight:700;margin-bottom:2px}
.recompensa-desc{font-size:9px;color:var(--cinza-txt)}
.indicacao-historico{max-height:300px;overflow-y:auto}
.indicacao-item{background:var(--cinza2);border-radius:8px;padding:10px;margin-bottom:8px}
.indicacao-item-top{display:flex;justify-content:space-between;margin-bottom:6px}
.indicacao-codigo{font-size:11px;font-weight:700}
.indicacao-status{font-size:9px;padding:3px 8px;border-radius:4px}
.indicacao-status.confirmada{background:rgba(16,185,129,.2);color:var(--verde)}
.indicacao-status.pendente{background:rgba(245,158,11,.2);color:var(--amarelo)}
.indicacao-valor{font-size:10px;color:var(--cinza-txt)}
.comprovante-card{background:var(--cinza);border:2px solid var(--roxo);border-radius:12px;padding:16px;margin-bottom:16px}
.comprovante-topo{text-align:center;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--cinza2)}
.comprovante-titulo{font-size:14px;font-weight:900;color:var(--roxo);display:flex;align-items:center;justify-content:center;gap:8px}
.comprovante-linha{display:flex;align-items:center;gap:10px;padding:10px;background:var(--cinza2);border-radius:8px;margin-bottom:8px}
.comprovante-icon{width:32px;height:32px;background:var(--roxo);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comprovante-icon i{width:18px;height:18px}
.comprovante-info-wrap{flex:1}
.comprovante-label{font-size:9px;color:var(--cinza-txt);margin-bottom:2px}
.comprovante-valor{font-size:11px;font-weight:700}
.comprovante-valor.roxo{color:var(--roxo)}
.comprovante-valor.verde{color:var(--verde)}
.comprovante-status{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:10px;font-weight:700}
.comprovante-status.confirmado{background:rgba(16,185,129,.2);color:var(--verde)}
.comprovante-status.cancelado{background:rgba(239,68,68,.2);color:var(--vermelho)}
.comprovante-footer{text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--cinza2)}
.comprovante-footer-logo{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;font-weight:800;margin-bottom:8px}
.comprovante-footer-texto{font-size:9px;color:var(--cinza-txt);margin-bottom:8px}
.comprovante-footer-heart{font-size:20px}
.loading{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:9999}
.loading.ativo{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--cinza2);border-top-color:var(--roxo);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="topo">
    <div class="logo"><i data-lucide="gem"></i><span>PREMIUM STORE</span></div>
  </div>

  <div class="conteudo">
    <div id="home" class="tela ativa">
      <div class="search-bar">
        <i data-lucide="search"></i>
        <input type="text" id="busca" placeholder="Buscar jogos, serviços...">
      </div>
      <div class="titulo"><i data-lucide="flame"></i>CATEGORIAS</div>
      <div id="categorias" class="grid"></div>
    </div>

    <div id="servicos" class="tela">
      <div class="titulo" id="catTit"></div>
      <div id="listaServicos" class="grid"></div>
      <button class="btn btn-sec" onclick="ir('home')">VOLTAR</button>
    </div>

    <div id="produto" class="tela">
      <img id="prodImg" class="produto-img" style="height:200px;margin-bottom:16px;border-radius:12px">
      <div class="card">
        <div id="prodNome" style="font-size:16px;font-weight:800;margin-bottom:8px"></div>
        <div id="prodDesc" style="font-size:11px;color:var(--cinza-txt);margin-bottom:12px;line-height:1.6"></div>
        <div id="prodPreco" style="font-size:24px;font-weight:900;color:var(--roxo);margin-bottom:16px"></div>
        <input type="text" class="input" id="idJogo" placeholder="ID da conta no jogo">
        <input type="text" class="input" id="codigoInd" placeholder="Código de indicação (opcional)">
        <button class="btn" onclick="addCarrinho()"><i data-lucide="shopping-cart"></i>ADICIONAR AO CARRINHO</button>
      </div>
      <button class="btn btn-sec" onclick="voltarServs()">VOLTAR</button>
    </div>

    <div id="carrinho" class="tela">
      <div class="titulo"><i data-lucide="shopping-cart"></i>MEU CARRINHO</div>
      <div id="itensCarrinho"></div>
      <div class="total-box">
        <div class="total-linha"><span>Subtotal</span><span id="subtotal">R$ 0,00</span></div>
        <div class="total-linha final"><span>TOTAL</span><span id="total">R$ 0,00</span></div>
      </div>
      <input type="email" class="input" id="emailCli" placeholder="Seu email">
      <input type="text" class="input" id="nomeCli" placeholder="Seu nome completo">
      <button class="btn" onclick="finalizar()"><i data-lucide="check"></i>FINALIZAR COMPRA</button>
    </div>

    <div id="comprovantes" class="tela">
      <div class="titulo"><i data-lucide="file-text"></i>MEUS COMPROVANTES</div>
      <div id="comprovantesBody"></div>
    </div>

    <div id="indicacoes" class="tela">
      <div class="titulo"><i data-lucide="users"></i>MINHAS INDICAÇÕES</div>
      <div id="indicacoesBody"></div>
    </div>

    <div id="faq" class="tela">
      <div class="titulo"><i data-lucide="help-circle"></i>DÚVIDAS FREQUENTES</div>
      <div class="card" id="faqBody" style="white-space:pre-wrap;line-height:1.6"></div>
    </div>

    <div id="termos" class="tela">
      <div class="titulo"><i data-lucide="file-text"></i>TERMOS DO SITE</div>
      <div class="card" id="termosBody" style="white-space:pre-wrap;line-height:1.6"></div>
    </div>

    <div id="premiacao" class="tela">
      <div class="titulo"><i data-lucide="trophy"></i>PREMIAÇÃO</div>
      <div class="card">
        <img id="premImg" style="width:100%;border-radius:8px;margin-bottom:12px;display:none">
        <div id="premTxt" style="line-height:1.6"></div>
      </div>
    </div>

    <div id="admin" class="tela">
      <div class="titulo"><i data-lucide="shield"></i>PAINEL ADMIN</div>
      <div id="adminBody"></div>
    </div>

    <div id="login" class="tela">
      <div class="card">
        <div class="titulo"><i data-lucide="log-in"></i>LOGIN</div>
        <input type="email" class="input" id="loginEmail" placeholder="Email">
        <input type="password" class="input" id="loginSenha" placeholder="Senha">
        <button class="btn" onclick="fazerLogin()">ENTRAR</button>
        <button class="btn btn-sec" onclick="ir('cadastro')">CRIAR CONTA</button>
      </div>
    </div>

    <div id="cadastro" class="tela">
      <div class="card">
        <div class="titulo"><i data-lucide="user-plus"></i>CADASTRO</div>
        <input type="text" class="input" id="cadNome" placeholder="Nome completo">
        <input type="email" class="input" id="cadEmail" placeholder="Email">
        <input type="password" class="input" id="cadSenha" placeholder="Senha">
        <button class="btn" onclick="fazerCadastro()">CRIAR CONTA</button>
        <button class="btn btn-sec" onclick="ir('login')">JÁ TENHO CONTA</button>
      </div>
    </div>

    <div id="pedidos" class="tela">
      <div class="titulo"><i data-lucide="package"></i>GERENCIAR PEDIDOS</div>
      <div id="pedidosBody"></div>
    </div>

    <div id="adminIndicacoes" class="tela">
      <div class="titulo"><i data-lucide="users"></i>INDICAÇÕES</div>
      <div id="adminIndicacoesBody"></div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item ativo" onclick="ir('home')"><i data-lucide="home"></i><span>INÍCIO</span></div>
    <div class="nav-item" onclick="ir('carrinho')"><i data-lucide="shopping-cart"></i><span>CARRINHO</span></div>
    <div class="nav-item" onclick="ir('comprovantes')"><i data-lucide="file-text"></i><span>COMPRA</span></div>
    <div class="nav-item" onclick="ir('indicacoes')"><i data-lucide="users"></i><span>INDICAR</span></div>
    <div class="nav-item" onclick="abrirMenu()"><i data-lucide="menu"></i><span>MENU</span></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-conteudo">
    <div class="modal-topo">
      <div class="modal-titulo" id="modalTit"></div>
      <button class="modal-fechar" onclick="fecharModal()"><i data-lucide="x"></i></button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div></div>

<script>
const WPP='5599999999999';
let db={cat:[],serv:[],carrinho:[],pedidos:[],usuarios:{},indicacoes:[],config:{faq:'Bem-vindo!\\n\\n1. Como comprar?\\nEscolha o serviço, adicione ao carrinho e finalize.\\n\\n2. Quanto tempo demora?\\nAté 24h após confirmação.\\n\\n3. Como indicar?\\nCompartilhe seu código na aba Indicar.',termos:'Termos de uso:\\n\\n1. Entrega em até 24h\\n2. Sem reembolso após entrega\\n3. Dados corretos são responsabilidade do cliente',premiacao:{img:null,texto:'Indique 5 amigos e ganhe:\\n\\n🎁 100 Diamantes Free Fire\\nOU\\n🎁 400 Robux'}}};
let usuarioAtual=null;
let catAtual=null;
let servAtual=null;

function init(){
  const salvo=localStorage.getItem('premiumstore');
  if(salvo)db=JSON.parse(salvo);
  if(!db.usuarios.admin){
    db.usuarios.admin={nome:'Admin',email:'admin@store.com',senha:'admin123',admin:true,codigo:'ADMIN',indicacoesValidas:0,totalIndicacoes:0};
  }
  if(db.cat.length===0){
    db.cat=[
      {k:'ff',nome:'Free Fire',img:'https://i.imgur.com/8QZqZ0G.jpg'},
      {k:'rb',nome:'Roblox',img:'https://i.imgur.com/VqJqZ0G.jpg'},
      {k:'lol',nome:'League of Legends',img:'https://i.imgur.com/LqJqZ0G.jpg'}
    ];
    db.serv=[
      {k:'ff1',cat:'ff',nome:'1000 Diamantes',desc:'Entrega rápida em até 24h',preco:19.90,estoque:999,img:'https://i.imgur.com/diamantes.jpg'},
      {k:'rb1',cat:'rb',nome:'400 Robux',desc:'Entrega automática',preco:19.90,estoque:999,img:'https://i.imgur.com/robux.jpg'},
      {k:'lol1',cat:'lol',nome:'1380 RP',desc:'Riot Points',preco:29.90,estoque:999,img:'https://i.imgur.com/rp.jpg'}
    ];
    save();
  }
  const userSalvo=localStorage.getItem('usuarioAtual');
  if(userSalvo){
    usuarioAtual=JSON.parse(userSalvo);
    if(usuarioAtual&&!usuarioAtual.codigo){
      usuarioAtual.codigo=gerarCodigo(usuarioAtual.email);
      db.usuarios[usuarioAtual.uid]=usuarioAtual;
      save();
    }
  }
  renderCategorias();
  renderCarrinho();
  lucide.createIcons();
}

function save(){localStorage.setItem('premiumstore',JSON.stringify(db))}
function showLoad(s){document.getElementById('loading').classList[s?'add':'remove']('ativo')}

function gerarCodigo(email){
  const hash=email.split('').reduce((a,b)=>{a=((a<<5)-a)+b.charCodeAt(0);return a&a},0);
  return 'PS'+Math.abs(hash).toString(36).toUpperCase().slice(0,6);
}

function ir(tela){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.getElementById(tela).classList.add('ativa');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('ativo'));
  const navs=['home','carrinho','comprovantes','indicacoes'];
  const idx=navs.indexOf(tela);
  if(idx>=0)document.querySelectorAll('.nav-item')[idx].classList.add('ativo');
  if(tela==='comprovantes')renderComprovantes();
  if(tela==='indicacoes')renderIndicacoes();
  if(tela==='faq')document.getElementById('faqBody').textContent=db.config.faq;
  if(tela==='termos')document.getElementById('termosBody').textContent=db.config.termos;
  if(tela==='premiacao'){
    if(db.config.premiacao.img){
      document.getElementById('premImg').src=db.config.premiacao.img;
      document.getElementById('premImg').style.display='block';
    }
    document.getElementById('premTxt').textContent=db.config.premiacao.texto;
  }
  if(tela==='pedidos')renderPedidos();
  if(tela==='adminIndicacoes')renderAdminIndicacoes();
  lucide.createIcons();
}

function renderCategorias(){
  const cats=db.cat.map(c=>`
    <div class="produto" onclick="abrirCat('${c.k}')">
      <img src="${c.img||'https://via.placeholder.com/200x120/1A1A1A/8B5CF6?text='+c.nome}" class="produto-img">
      <div class="produto-info">
        <div class="produto-nome">${c.nome}</div>
        <div class="produto-cat">${db.serv.filter(s=>s.cat===c.k).length} serviços</div>
      </div>
    </div>
  `).join('');
  document.getElementById('categorias').innerHTML=cats||'<div class="empty">Nenhuma categoria</div>';
}

function abrirCat(k){
  catAtual=k;
  const cat=db.cat.find(c=>c.k===k);

function finalizar(){
  if(!usuarioAtual){alert('Faça login');ir('login');return}
  if(db.carrinho.length===0){alert('Carrinho vazio');return}
  const email=document.getElementById('emailCli').value.trim();
  const nome=document.getElementById('nomeCli').value.trim();
  if(!email||!nome){alert('Preencha email e nome');return}
  showLoad(true);
  setTimeout(()=>{
    const pedidoId='#'+Math.floor(Math.random()*90000+10000);
    const cat=db.cat.find(c=>c.k===db.serv.find(s=>s.k===db.carrinho[0].servK).cat);
    db.carrinho.forEach(item=>{
      const pedido={
        id:pedidoId+'-'+Math.random().toString(36).substr(2,4),
        uid:usuarioAtual.uid,
        email,
        nome,
        servico:item.nome,
        jogo:cat.nome,
        valor:item.preco,
        id_conta:item.idJogo,
        codigoIndicacao:item.codigoInd,
        status:'pendente',
        data:new Date().toISOString(),
        mensagemAdmin:null
      };
      db.pedidos.push(pedido);
      if(item.codigoInd){
        const indicador=Object.values(db.usuarios).find(u=>u.codigo===item.codigoInd);
        if(indicador){
          db.indicacoes.push({
            id:'ind'+Date.now()+Math.random(),
            uidIndicador:indicador.uid||indicador.email,
            codigo:item.codigoInd,
            pedidoId:pedido.id,
            nomeIndicado:nome,
            valor:item.preco,
            status:'pendente',
            data:new Date().toISOString()
          });
          indicador.totalIndicacoes=(indicador.totalIndicacoes||0)+1;
        }
      }
    });
    db.carrinho=[];
    save();
    showLoad(false);
    alert(`Pedido ${pedidoId} criado!\\n\\nEnvie no WhatsApp para confirmar.`);
    window.open(`https://wa.me/${WPP}?text=Olá! Fiz o pedido ${pedidoId}`);
    renderCarrinho();
    ir('comprovantes');
  },1000);
}

  const pedido=db.pedidos.find(p=>p.id===id);
  if(!pedido)return;
  
  abrirModal('CONFIRMAR PEDIDO',`
    <div style="font-size:10px;margin-bottom:12px;color:var(--cinza-txt)">
      <b>Pedido:</b> ${pedido.id}<br>

      <b>Serviço:</b> ${pedido.servico}<br>
      <b>ID:</b> ${pedido.id_conta}
    </div>
    <div class="label">💬 Mensagem para o cliente:</div>
    <textarea class="textarea" id="msgAdmin" placeholder="Ex: Obrigado pela compra! Aqui está seu acesso:\nLogin: exemplo@email.com\nSenha: 123456" style="min-height:100px"></textarea>
    <button class="btn" onclick="salvarConfirmacao('${id}')">CONFIRMAR E ENVIAR</button>
    <button class="btn btn-sec" onclick="fecharModal()">CANCELAR</button>
  `);
}

function salvarConfirmacao(id){
  const msgAdmin = document.getElementById('msgAdmin').value.trim();
  const pedido=db.pedidos.find(p=>p.id===id);
  if(pedido){
    pedido.status='confirmado';
    pedido.mensagemAdmin = msgAdmin || null;
    
    const indicacao=db.indicacoes.find(i=>i.pedidoId===id);
    if(indicacao && indicacao.status==='pendente'){
      indicacao.status='confirmada';
      if(db.usuarios[indicacao.uidIndicador]){
        db.usuarios[indicacao.uidIndicador].indicacoesValidas=(db.usuarios[indicacao.uidIndicador].indicacoesValidas||0)+1;
      }
    }
    save();
    fecharModal();
    renderPedidos();
    alert('✅ Pedido confirmado!\n\nMensagem enviada ao cliente.');
  }
}

function cancelarPedido(id){
  if(confirm('Cancelar este pedido?')){
    const pedido=db.pedidos.find(p=>p.id===id);
    if(pedido){
      pedido.status='cancelado';
      const indicacao=db.indicacoes.find(i=>i.pedidoId===id);
      if(indicacao && indicacao.status==='pendente'){
        indicacao.status='invalida';
      }
      save();
      renderPedidos();
    }
  }
}

function fazerLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const senha=document.getElementById('loginSenha').value;
  const user=Object.values(db.usuarios).find(u=>u.email===email&&u.senha===senha);
  if(user){
    usuarioAtual={...user,uid:user.email};
    localStorage.setItem('usuarioAtual',JSON.stringify(usuarioAtual));
    alert('Login feito!');
    if(user.admin)ir('admin');
    else ir('home');
  }else alert('Email ou senha inválidos');
}

function fazerCadastro(){
  const nome=document.getElementById('cadNome').value.trim();
  const email=document.getElementById('cadEmail').value.trim();
  const senha=document.getElementById('cadSenha').value;
  if(!nome||!email||!senha){alert('Preencha tudo');return}
  if(db.usuarios[email]){alert('Email já cadastrado');return}
  const codigo=gerarCodigo(email);
  db.usuarios[email]={uid:email,nome,email,senha,admin:false,codigo,indicacoesValidas:0,totalIndicacoes:0};
  save();
  usuarioAtual={...db.usuarios[email]};
  localStorage.setItem('usuarioAtual',JSON.stringify(usuarioAtual));
  alert('Conta criada!\n\nSeu código de indicação: '+codigo);
  ir('home');
}

  const newK=k||'cat'+Date.now();
  const cat={k:newK,nome,img};
  if(k){db.cat[db.cat.findIndex(x=>x.k===k)]=cat;}

function editServ(k){
  const s=db.serv.find(x=>x.k===k);
  const cats=db.cat.map(c=>`<option value="${c.k}" ${c.k===s.cat?'selected':''}>${c.nome}</option>`).join('');
  abrirModal('EDITAR SERVIÇO',`
  <select class="select" id="sCat">${cats}</select>
  <input type="text" class="input" id="sNome" value="${s.nome}">
  <textarea class="textarea" id="sDesc">${s.desc||''}</textarea>
  <input type="number" class="input" id="sPreco" value="${s.preco}" step="0.01">
  <input type="number" class="input" id="sEstoque" value="${s.estoque||0}">
  <div class="label">Imagem:</div>
  <div class="upload" onclick="document.getElementById('sImg').click()">
    <img id="sImgPrev" src="${s.img||''}" style="${s.img?'display:block':'display:none'}">
    <input type="file" id="sImg" accept="image/*" onchange="prevImg(this,'sImgPrev')">
  </div>
  <button class="btn" onclick="salvarServ('${k}')">ATUALIZAR</button>
  `);
}

async function salvarServ(k=null){
  const cat=document.getElementById('sCat').value;
  const nome=document.getElementById('sNome').value.trim();
  const desc=document.getElementById('sDesc').value.trim();
  const preco=parseFloat(document.getElementById('sPreco').value);
  const estoque=parseInt(document.getElementById('sEstoque').value)||0;
  if(!cat||!nome||isNaN(preco)){alert('Preencha tudo');return}
  showLoad(true);
  let img=null;
  const file=document.getElementById('sImg').files[0];
  if(file)img=await toBase64(file);
  else if(k)img=db.serv.find(x=>x.k===k)?.img||null;
  const newK=k||'serv'+Date.now();
  const serv={k:newK,cat,nome,desc,preco,estoque,img};
  if(k){db.serv[db.serv.findIndex(x=>x.k===k)]=serv;}
  else{db.serv.push(serv);}
  save();
  showLoad(false);
  fecharModal();
  abrirServs();
}

function delServ(k){
  if(confirm('Excluir serviço?')){
    db.serv=db.serv.filter(x=>x.k!==k);
    save();
    renderServs();
  }
}

function renderIndicacoes(){
  if(!usuarioAtual || !usuarioAtual.codigo){
    document.getElementById('indicacoesBody').innerHTML='<div class="empty">Faça login</div>';
    return;
  }
  const userData=db.usuarios[usuarioAtual.uid]||{indicacoesValidas:0,totalIndicacoes:0};
  const minhasIndicacoes=db.indicacoes.filter(i=>i.uidIndicador===usuarioAtual.uid);
  const validas=userData.indicacoesValidas||0;
  const total=userData.totalIndicacoes||0;
  const progresso=Math.min((validas/5)*100,100);
  
  const historico=minhasIndicacoes.slice().reverse().map(i=>{
    const statusClass=i.status==='confirmada'?'confirmada':i.status==='pendente'?'pendente':'cancelado';
    const statusTxt=i.status==='confirmada'?'CONFIRMADA':i.status==='pendente'?'PENDENTE':'INVÁLIDA';
    return `
    <div class="indicacao-item">
      <div class="indicacao-item-top">
        <div class="indicacao-codigo">Pedido: ${i.pedidoId}</div>
        <span class="indicacao-status ${statusClass}">${statusTxt}</span>
      </div>
      <div class="indicacao-valor">
        Indicado: ${i.nomeIndicado}<br>
        Valor: R$ ${i.valor.toFixed(2).replace('.',',')}<br>
        Data: ${new Date(i.data).toLocaleDateString('pt-BR')}
      </div>
    </div>
  `}).join('');

  document.getElementById('indicacoesBody').innerHTML=`
    <div class="indicacao-card">
      <div class="indicacao-header">
        <div class="indicacao-tit">💎 SEU CÓDIGO</div>
      </div>
      <div class="codigo-box">
        <div class="codigo-text">${usuarioAtual.codigo}</div>
        <button class="btn-copiar" onclick="copiarCodigo()">COPIAR</button>
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num">${total}</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${validas}</div>
          <div class="stat-label">Válidas</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${5-validas>0?5-validas:0}</div>
          <div class="stat-label">Faltam</div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progresso}%"></div>
      </div>
      <div style="font-size:9px;color:var(--cinza-txt);text-align:center;margin-bottom:12px">
        ${validas>=5?'🎉 Meta atingida!':'${5-validas} indicações para próxima recompensa'}
      </div>
      <div class="recompensa-item">
        <div class="recompensa-icon"><i data-lucide="gift"></i></div>
        <div class="recompensa-info">
          <div class="recompensa-tit">Recompensa 5 Indicações</div>
          <div class="recompensa-desc">100 Diamantes FF ou 400 Robux</div>
        </div>
      </div>
    </div>
    <div class="titulo">HISTÓRICO</div>
    <div class="indicacao-historico">
      ${historico||'<div class="empty">Nenhuma indicação ainda</div>'}
    </div>
  `;
  lucide.createIcons();
}

function copiarCodigo(){
  navigator.clipboard.writeText(usuarioAtual.codigo);
  alert('✅ Código copiado!');
}

function renderAdminIndicacoes(){
  if(!usuarioAtual.admin)return;
  const todas=db.indicacoes.slice().reverse();
  if(todas.length===0){
    document.getElementById('adminIndicacoesBody').innerHTML='<div class="empty">Nenhuma indicação</div>';
    return;
  }
  const lista=todas.map(i=>{
    const statusClass=i.status==='confirmada'?'badge-confirmado':i.status==='pendente'?'badge-pendente':'badge-cancelado';
    const statusTxt=i.status==='confirmada'?'CONFIRMADA':i.status==='pendente'?'PENDENTE':'INVÁLIDA';
    return `
    <div class="lista-item">
      <div class="lista-top">
        <div class="lista-nome">Código: ${i.codigo}</div>
        <span class="badge ${statusClass}">${statusTxt}</span>
      </div>
      <div class="lista-info">
        Pedido: ${i.pedidoId}<br>
        Indicado: ${i.nomeIndicado}<br>
        Valor: R$ ${i.valor.toFixed(2).replace('.',',')}<br>
        Data: ${new Date(i.data).toLocaleString('pt-BR')}
      </div>
    </div>
  `}).join('');
  document.getElementById('adminIndicacoesBody').innerHTML=lista;
}

function formPremiacao(){
  abrirModal('EDITAR PREMIAÇÃO',`
  <div class="label">Imagem:</div>
  <div class="upload" onclick="document.getElementById('premImg').click()">
    <img id="premImgPrev" src="${db.config.premiacao.img||''}" style="${db.config.premiacao.img?'display:block':'display:none'}">
    <input type="file" id="premImg" accept="image/*" onchange="prevImg(this,'premImgPrev')">
  </div>
  <textarea class="textarea" id="premTxt" style="min-height:150px">${db.config.premiacao.texto}</textarea>
  <button class="btn" onclick="salvarPremiacao()">SALVAR</button>
  `);
}

async function salvarPremiacao(){
  showLoad(true);
  let img=db.config.premiacao.img;
  const file=document.getElementById('premImg').files[0];
  if(file)img=await toBase64(file);
  db.config.premiacao={img,texto:document.getElementById('premTxt').value};
  save();
  showLoad(false);
  fecharModal();
  alert('Premiação atualizada!');
}

function abrirModal(tit,body){
  document.getElementById('modalTit').textContent=tit;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modal').classList.add('ativo');
  lucide.createIcons();
}

function fecharModal(){document.getElementById('modal').classList.remove('ativo')}

function prevImg(input,prevId){
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{
      document.getElementById(prevId).src=e.target.result;
      document.getElementById(prevId).style.display='block';
      input.parentElement.querySelector('.upload-text')?.remove();
    };
    r.readAsDataURL(input.files[0]);
  }
}

function toBase64(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.readAsDataURL(file);r.onload=()=>resolve(r.result);r.onerror=reject;})}

function logout(){
  localStorage.removeItem('usuarioAtual');
  usuarioAtual=null;
  alert('Saiu da conta');
  ir('home');
}

init();
lucide.createIcons();
</script>
