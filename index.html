<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prime Store Vz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--card:#15151d;--card-2:#1e1e28;--purple:#7c3aed;--purple-light:#a78bfa;
  --neon:#a855f7;--text:#fff;--text-2:#9ca3af;--text-3:#6b7280;--error:#ef4444;
  --success:#10b981;--warning:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;overflow-x:hidden;}
.screen{display:none;}
.screen.active{display:block;}
.hidden{display:none;}
.btn{width:100%;height:38px;background:var(--purple);border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;box-shadow:0 0 15px rgba(124,58,237,0.4);}
.btn:active{transform:scale(0.98);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.btn-secondary{background:var(--card-2);border:1px solid #2a2a35;}
.btn-danger{background:var(--error);}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;}
.login-card{width:100%;max-width:300px;background:var(--card);border-radius:14px;padding:20px 18px;box-shadow:0 0 20px rgba(168,85,247,0.2);}
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;}
.logo svg{width:32px;height:32px;margin-bottom:5px;filter:drop-shadow(0 0 8px var(--neon));}
.logo h1{font-size:13px;font-weight:700;letter-spacing:1px;}
.logo span{font-size:8px;color:var(--purple-light);letter-spacing:2px;margin-top:-2px;}
.input-group{margin-bottom:12px;}
.input-group label{display:block;font-size:9px;color:var(--text-2);margin-bottom:5px;font-weight:500;}
.input-box{position:relative;display:flex;align-items:center;background:var(--card-2);border:1px solid #2a2a35;border-radius:9px;padding:0 10px;height:38px;}
.input-box:focus-within{border-color:var(--neon);box-shadow:0 0 8px rgba(168,85,247,0.3);}
.input-box input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:11px;}
.error{background:rgba(239,68,68,0.1);border:1px solid var(--error);color:var(--error);padding:7px;border-radius:7px;font-size:9px;margin-bottom:10px;display:none;}

/* HOME */
.home-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;}
.menu-btn{width:20px;height:20px;cursor:pointer;}
.greeting{display:flex;flex-direction:column;gap:2px;font-size:13px;font-weight:500;text-align:center;}
.greeting span{font-size:11px;color:var(--purple-light);font-weight:600;}
.search-box{padding:0 14px;margin-bottom:14px;}
.search-box input{width:100%;height:36px;background:var(--card);border:1px solid #2a2a35;border-radius:9px;padding:0 10px;color:var(--text);font-size:11px;outline:none;}
.section{padding:0 14px;margin-bottom:18px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.section-header h3{font-size:13px;font-weight:600;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cat-item{text-align:center;cursor:pointer;}
.cat-item img{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;margin-bottom:5px;border:1px solid var(--neon);box-shadow:0 0 10px rgba(168,85,247,0.3);}
.cat-item span{font-size:9px;color:var(--text-2);display:block;}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.prod-item{background:var(--card);border:1px solid #2a2a35;border-radius:10px;overflow:hidden;cursor:pointer;}
.prod-item img{width:100%;aspect-ratio:1;object-fit:cover;}
.prod-info{padding:6px;}
.prod-info h4{font-size:10px;font-weight:600;margin-bottom:2px;}
.prod-price{font-size:11px;font-weight:700;color:var(--purple-light);}

/* DRAWER */
.drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:99;opacity:0;pointer-events:none;transition:0.3s;}
.drawer-overlay.active{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--bg);border-right:1px solid var(--neon);box-shadow:0 0 20px rgba(168,85,247,0.4);z-index:100;transition:0.3s;display:flex;flex-direction:column;}
.drawer.active{left:0;}
.drawer-header{display:flex;justify-content:space-between;align-items:center;padding:16px 14px;border-bottom:1px solid #222;}
.drawer-menu{flex:1;overflow-y:auto;padding:8px 0;}
.drawer-item{display:flex;align-items:center;gap:12px;padding:12px 16px;color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;}
.drawer-item:hover{background:rgba(124,58,237,0.1);color:var(--purple-light);}
.drawer-item.admin{color:var(--warning);}

/* ADMIN */
.admin-wrap{position:fixed;top:0;left:0;width:100%;height:100vh;background:#0a0a0f;z-index:200;}
.admin-sidebar{position:fixed;top:0;left:-250px;width:250px;height:100vh;background:#0a0a0f;border-right:1px solid #7c3aed;transition:0.3s;z-index:201;overflow-y:auto;}
.admin-sidebar.active{left:0;}
.admin-overlay{position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:0.3s;z-index:200;}
.admin-overlay.active{opacity:1;pointer-events:all;}
.admin-logo{text-align:center;margin-bottom:20px;padding-top:16px;}
.admin-logo h1{font-size:14px;font-weight:700;color:#fff;}
.admin-label{font-size:8px;color:#6b7280;padding:0 16px;margin-bottom:8px;letter-spacing:1px;}
.admin-menu{display:flex;flex-direction:column;gap:2px;}
.admin-menu-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#9ca3af;font-size:11px;cursor:pointer;}
.admin-menu-item:hover{background:rgba(124,58,237,0.1);color:#fff;}
.admin-menu-item.active{background:#7c3aed;color:#fff;border-radius:6px;margin:0 8px;padding:10px 8px;}
.admin-content{width:100%;height:100vh;padding:20px;overflow-y:auto;position:relative;}
.admin-close{position:absolute;top:16px;right:16px;width:22px;height:22px;color:#9ca3af;cursor:pointer;background:#15151d;border:1px solid #2a2a35;border-radius:6px;padding:4px;}
.table{width:100%;border-collapse:collapse;margin-top:12px;}
.table th,.table td{padding:8px;text-align:left;border-bottom:1px solid #2a2a35;font-size:11px;}
.table th{color:var(--text-2);font-weight:600;}
.badge{padding:3px 8px;border-radius:12px;font-size:9px;font-weight:600;}
.badge-success{background:rgba(16,185,129,0.2);color:var(--success);}
.badge-warning{background:rgba(245,158,11,0.2);color:var(--warning);}
.badge-danger{background:rgba(239,68,68,0.2);color:var(--error);}
.modal{position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:300;display:none;}
.modal.active{display:flex;}
.modal-content{background:var(--card);border-radius:12px;padding:16px;width:90%;max-width:400px;}
.dash-card{background:#15151d;border:1px solid #2a2a35;border-radius:10px;padding:12px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
</style>
</head>
<body>

<!-- DRAWER USUARIO -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header"><h3>MENU</h3></div>
  <div class="drawer-menu">
    <div class="drawer-item" onclick="goHome();closeDrawer()">Inicio</div>
    <div class="drawer-item" onclick="openLoja();closeDrawer()">Loja</div>
    <div class="drawer-item" onclick="openPedidos();closeDrawer()">Meus Pedidos</div>
    <div class="drawer-item admin hidden" id="menuAdm" onclick="openAdmin();closeDrawer()">Adm</div>
    <div class="drawer-item" onclick="logout()">Sair</div>
  </div>
</div>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="#7c3aed"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>
        <h1>PRIME</h1><span>STORE</span>
      </div>
      <div class="error" id="errorMsg"></div>
      <div class="input-group">
        <label>E-mail</label>
        <div class="input-box"><input type="email" id="loginEmail"></div>
      </div>
      <div class="input-group">
        <label>Senha</label>
        <div class="input-box"><input type="password" id="loginPassword"></div>
      </div>
      <button class="btn" id="loginBtn">Entrar</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
  <div class="home-header">
    <svg class="menu-btn" onclick="openDrawer()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    <div class="greeting">Olá, <span id="userName">Usuário</span></div>
    <div style="width:20px;"></div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Buscar produtos..." onkeyup="searchProducts()">
  </div>
  <div class="section">
    <div class="section-header"><h3>Categorias</h3></div>
    <div class="cat-grid" id="catGrid"></div>
  </div>
  <div class="section">
    <div class="section-header"><h3>Destaques</h3></div>
    <div class="prod-grid" id="prodGrid"></div>
  </div>
</div>

<!-- LOJA -->
<div class="screen" id="screen-loja">
  <div class="home-header">
    <svg class="menu-btn" onclick="goBack()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    <h3 id="lojaTitle">Loja</h3>
    <svg class="menu-btn" onclick="openCart()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
  </div>
  <div class="prod-grid" id="lojaGrid" style="padding:14px;"></div>
</div>

<!-- CARRINHO -->
<div class="screen" id="screen-cart">
  <div class="home-header">
    <svg class="menu-btn" onclick="goBack()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    <h3>Carrinho</h3>
    <div style="width:20px;"></div>
  </div>
  <div id="cartItems" style="padding:14px;"></div>
  <div style="padding:14px;">
    <button class="btn" onclick="finalizarPedido()">Finalizar Pedido</button>
  </div>
</div>

<!-- PEDIDOS -->
<div class="screen" id="screen-pedidos">
  <div class="home-header">
    <svg class="menu-btn" onclick="goBack()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    <h3>Meus Pedidos</h3>
    <div style="width:20px;"></div>
  </div>
  <div id="orderList" style="padding:14px;"></div>
</div>

<!-- ADMIN -->
<div class="screen" id="screen-admin">
  <div class="admin-wrap">
    <div class="admin-overlay" id="adminOverlay" onclick="closeAdminMenu()"></div>
    <div class="admin-sidebar" id="adminSidebar">
      <div class="admin-logo"><h1>PRIME</h1><span>STORE</span></div>
      <div class="admin-label">PAINEL ADMIN</div>
      <div class="admin-menu">
        <div class="admin-menu-item active" onclick="adminDashboard()">Dashboard</div>
        <div class="admin-menu-item" onclick="adminProdutos()">Produtos</div>
        <div class="admin-menu-item" onclick="adminCategorias()">Categorias</div>
        <div class="admin-menu-item" onclick="adminPedidos()">Pedidos</div>
        <div class="admin-menu-item" onclick="adminUsuarios()">Usuários</div>
        <div class="admin-menu-item" onclick="logout()">Sair</div>
      </div>
    </div>
    <div class="admin-content" id="adminContent"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SEU_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const ADMIN_EMAIL = 'admin@admin.com';

let currentUser = null;
let cart = [];
let allProducts = [];
let allCategories = [];
let allOrders = [];
let allUsers = [];

// AUTH
onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-home').classList.add('active');
    document.getElementById('userName').innerText = user.email.split('@')[0];
    if(user.email === ADMIN_EMAIL){
      document.getElementById('menuAdm').classList.remove('hidden');
    }
    await loadData();
  }else{
    currentUser = null;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-login').classList.add('active');
    document.getElementById('menuAdm').classList.add('hidden');
  }
});

document.getElementById('loginBtn').onclick = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!email ||!password){showError('Preencha todos os campos');return;}
  this.disabled = true;
  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch(e){
    showError('Email ou senha incorretos');
    this.disabled = false;
  }
}

function showError(msg){
  document.getElementById('errorMsg').innerText = msg;
  document.getElementById('errorMsg').style.display = 'block';
}

window.logout = async function(){
  await signOut(auth);
}

// DATA LOAD
async function loadData(){
  const catSnap = await getDocs(collection(db, 'categorias'));
  allCategories = [];
  catSnap.forEach(doc => allCategories.push({id:doc.id,...doc.data()}));

  const prodSnap = await getDocs(collection(db, 'produtos'));
  allProducts = [];
  prodSnap.forEach(doc => allProducts.push({id:doc.id,...doc.data()}));

  renderHome();
  loadOrders();
}

function renderHome(){
  document.getElementById('catGrid').innerHTML = allCategories.map(cat => `
    <div class="cat-item" onclick="openCategoria('${cat.id}')">
      <img src="${cat.img || 'https://via.placeholder.com/100'}">
      <span>${cat.nome}</span>
    </div>
  `).join('');

  document.getElementById('prodGrid').innerHTML = allProducts.slice(0,6).map(prod => `
    <div class="prod-item" onclick="addToCart('${prod.id}')">
      <img src="${prod.img || 'https://via.placeholder.com/100'}">
      <div class="prod-info">
        <h4>${prod.nome}</h4>
        <div class="prod-price">R$ ${prod.preco}</div>
      </div>
    </div>
  `).join('');
}

window.searchProducts = function(){
  const term = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(p => p.nome.toLowerCase().includes(term));
  document.getElementById('prodGrid').innerHTML = filtered.map(prod => `
    <div class="prod-item" onclick="addToCart('${prod.id}')">
      <img src="${prod.img || 'https://via.placeholder.com/100'}">
      <div class="prod-info">
        <h4>${prod.nome}</h4>
        <div class="prod-price">R$ ${prod.preco}</div>
      </div>
    </div>
  `).join('');
}

// LOJA
window.openLoja = function(){
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-loja').classList.add('active');
  document.getElementById('lojaTitle').innerText = 'Todos Produtos';
  renderLoja(allProducts);
}

window.openCategoria = function(catId){
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-loja').classList.add('active');
  const cat = allCategories.find(c => c.id === catId);
  document.getElementById('lojaTitle').innerText = cat.nome;
  const filtered = allProducts.filter(p => p.categoriaId === catId);
  renderLoja(filtered);
}

function renderLoja(products){
  document.getElementById('lojaGrid').innerHTML = products.map(prod => `
    <div class="prod-item" onclick="addToCart('${prod.id}')">
      <img src="${prod.img || 'https://via.placeholder.com/100'}">
      <div class="prod-info">
        <h4>${prod.nome}</h4>
        <div class="prod-price">R$ ${prod.preco}</div>
      </div>
    </div>
  `).join('');
}

// CARRINHO
window.addToCart = function(prodId){
  const prod = allProducts.find(p => p.id === prodId);
  cart.push(prod);
  alert('Produto adicionado ao carrinho!');
}

window.openCart = function(){
  document.getElementById('screen-loja').classList.remove('active');
  document.getElementById('screen-cart').classList.add('active');
  renderCart();
}

function renderCart(){
  if(cart.length === 0){
    document.getElementById('cartItems').innerHTML = '<p style="text-align:center;color:var(--text-2);">Carrinho vazio</p>';
    return;
  }
  let total = 0;
  document.getElementById('cartItems').innerHTML = cart.map((item,i) => {
    total += parseFloat(item.preco);
    return `
      <div style="display:flex;gap:10px;margin-bottom:10px;background:var(--card);padding:10px;border-radius:8px;">
        <img src="${item.img}" style="width:50px;height:50px;border-radius:6px;">
        <div style="flex:1;">
          <h4 style="font-size:12px;">${item.nome}</h4>
          <p style="color:var(--purple-light);font-weight:600;">R$ ${item.preco}</p>
        </div>
        <button onclick="removeFromCart(${i})" style="background:none;border:none;color:var(--error);cursor:pointer;">X</button>
      </div>
    `;
  }).join('') + `<h3 style="text-align:right;margin-top:12px;">Total: R$ ${total.toFixed(2)}</h3>`;
}

window.removeFromCart = function(index){
  cart.splice(index,1);
  renderCart();
}

window.finalizarPedido = async function(){
  if(cart.length === 0) return;
  const total = cart.reduce((sum,i) => sum + parseFloat(i.preco), 0);
  await addDoc(collection(db, 'pedidos'), {
    userId: currentUser.uid,
    userEmail: currentUser.email,
    itens: cart,
    total: total.toFixed(2),
    status: 'aguardando',
    createdAt: new Date()
  });
  cart = [];
  alert('Pedido realizado!');
  openPedidos();
}

// PEDIDOS
function loadOrders(){
  if(!currentUser) return;
  const q = query(collection(db, 'pedidos'), where('userId','==',currentUser.uid), orderBy('createdAt','desc'));
  onSnapshot(q, (snap) => {
    allOrders = [];
    snap.forEach(doc => allOrders.push({id:doc.id,...doc.data()}));
    renderOrders();
  });
}

function renderOrders(){
  if(allOrders.length === 0){
    document.getElementById('orderList').innerHTML = '<p style="text-align:center;color:var(--text-2);">Nenhum pedido</p>';
    return;
  }
  document.getElementById('orderList').innerHTML = allOrders.map(o => `
    <div style="background:var(--card);padding:12px;border-radius:10px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span>#${o.id.slice(-5)}</span>
        <span class="badge badge-${o.status === 'concluido'? 'success' : o.status === 'aguardando'? 'warning' : 'danger'}">${o.status}</span>
      </div>
      <p style="font-size:11px;color:var(--text-2);">Total: R$ ${o.total}</p>
    </div>
  `).join('');
}

window.openPedidos = function(){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-pedidos').classList.add('active');
}

window.goHome = function(){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
}

window.goBack = function(){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
}

// DRAWER
window.openDrawer = function(){
  document.getElementById('drawer').classList.add('active');
  document.getElementById('drawerOverlay').classList.add('active');
}
window.closeDrawer = function(){
  document.getElementById('drawer').classList.remove('active');
  document.getElementById('drawerOverlay').classList.remove('active');
}

// ADMIN
window.openAdmin = function(){
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-admin').classList.add('active');
  openAdminMenu();
  adminDashboard();
}

function openAdminMenu(){
  document.getElementById('adminSidebar').classList.add('active');
  document.getElementById('adminOverlay').classList.add('active');
}

function closeAdminMenu(){
  document.getElementById('adminSidebar').classList.remove('active');
  document.getElementById('adminOverlay').classList.remove('active');
}

window.adminDashboard = function(){
  closeAdminMenu();
  const totalVendas = allOrders.filter(o => o.status === 'concluido').reduce((s,o) => s + parseFloat(o.total), 0);
  document.getElementById('adminContent').innerHTML = `
    <svg class="admin-close" onclick="goBackFromAdmin()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
    <h2 style="margin-bottom:16px;">Dashboard</h2>
    <div class="dash-grid">
      <div class="dash-card"><p style="font-size:9px;color:var(--text-2);">PRODUTOS</p><h3>${allProducts.length}</h3></div>
      <div class="dash-card"><p style="font-size:9px;color:var(--text-2);">PEDIDOS</p><h3>${allOrders.length}</h3></div>
      <div class="dash-card"><p style="font-size:9px;color:var(--text-2);">FATURAMENTO</p><h3>R$ ${totalVendas.toFixed(2)}</h3></div>
      <div class="dash-card"><p style="font-size:9px;color:var(--text-2);">USUÁRIOS</p><h3>${allUsers.length}</h3></div>
    </div>
  `;
}

window.adminProdutos = function(){
  closeAdminMenu();
  document.getElementById('adminContent').innerHTML = `
    <svg class="admin-close" onclick="goBackFromAdmin()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>Produtos</h2>
      <button class="btn" style="width:auto;padding:0 16px;" onclick="openProdutoModal()">+ Novo</button>
    </div>
    <table class="table">
      <thead><tr><th>Nome</th><th>Preço</th><th>Ações</th></tr></thead>
      <tbody>${allProducts.map(p => `<tr>
        <td>${p.nome}</td>
        <td>R$ ${p.preco}</td>
        <td>
          <button class="btn-secondary" style="padding:4px 8px;font-size:10px;" onclick="openProdutoModal('${p.id}')">Editar</button>
          <button class="btn-danger" style="padding:4px 8px;font-size:10px;" onclick="deleteProduto('${p.id}')">Del</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>
  `;
}

window.openProdutoModal = function(id=null){
  const prod = id? allProducts.find(p => p.id === id) : {};
  document.getElementById('modal').classList.add('active');
  document.getElementById('modalContent').innerHTML = `
    <h3 style="margin-bottom:12px;">${id? 'Editar' : 'Novo'} Produto</h3>
    <input type="text" id="prodNome" placeholder="Nome" value="${prod.nome || ''}" style="width:100%;margin-bottom:8px;padding:8px;background:var(--card-2);border:1px solid #2a2a35;border-radius:6px;color:#fff;">
    <input type="text" id="prodPreco" placeholder="Preço" value="${prod.preco || ''}" style="width:100%;margin-bottom:8px;padding:8px;background:var(--card-2);border:1px solid #2a2a35;border-radius:6px;color:#fff;">
    <input type="text" id="prodImg" placeholder="URL Imagem" value="${prod.img || ''}" style="width:100%;margin-bottom:12px;padding:8px;background:var(--card-2);border:1px solid #2a2a35;border-radius:6px;color:#fff;">
    <select id="prodCat" style="width:100%;margin-bottom:12px;padding:8px;background:var(--card-2);border:1px solid #2a2a35;border-radius:6px;color:#fff;">
      ${allCategories.map(c => `<option value="${c.id}" ${prod.categoriaId === c.id? 'selected' : ''}>${c.nome}</option>`).join('')}
    </select>
    <div style="display:flex;gap:8px;">
      <button class="btn" onclick="saveProduto('${id || ''}')">Salvar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
  `;
}

window.saveProduto = async function(id){
  const data = {
    nome: document.getElementById('prodNome').value,
    preco: document.getElementById('prodPreco').value,
    img: document.getElementById('prodImg').value,
    categoriaId: document.getElementById('prodCat').value
  };
  if(id){
    await updateDoc(doc(db,'produtos',id),data);
  }else{
    await addDoc(collection(db,'produtos'),data);
  }
  closeModal();
  await loadData();
  adminProdutos();
}

window.deleteProduto = async function(id){
  if(confirm('Deletar produto?')){
    await deleteDoc(doc(db,'produtos',id));
    await loadData();
    adminProdutos();
  }
}

window.adminCategorias = function(){
  closeAdminMenu();
  document.getElementById('adminContent').innerHTML = `
    <svg class="admin-close" onclick="goBackFromAdmin()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>Categorias</h2>
      <button class="btn" style="width:auto;padding:0 16px;" onclick="openCategoriaModal()">+ Nova</button>
    </div>
    <table class="table">
      <thead><tr><th>Nome</th><th>Ações</th></tr></thead>
      <tbody>${allCategories.map(c => `<tr>
        <td>${c.nome}</td>
        <td>
          <button class="btn-danger" style="padding:4px 8px;font-size:10px;" onclick="deleteCategoria('${c.id}')">Del</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>
  `;
}

window.openCategoriaModal = function(){
  document.getElementById('modal').classList.add('active');
  document.getElementById('modalContent').innerHTML = `
    <h3 style="margin-bottom:12px;">Nova Categoria</h3>
    <input type="text" id="catNome" placeholder="Nome" style="width:100%;margin-bottom:8px;padding:8px;background:var(--card-2);border:1px solid #2a2a35;border-radius:6px;color:#fff;">
    <input type="text" id="catImg" placeholder="URL Imagem" style="width:100%;margin-bottom:12px;padding:8px;background:var(--card-2);border:1px solid #2a2a35;border-radius:6px;color:#fff;">
    <div style="display:flex;gap:8px;">
      <button class="btn" onclick="saveCategoria()">Salvar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
  `;
}

window.saveCategoria = async function(){
  const data = {
    nome: document.getElementById('catNome').value,
    img: document.getElementById('catImg').value
  };
  await addDoc(collection(db,'categorias'),data);
  closeModal();
  await loadData();
  adminCategorias();
}

window.deleteCategoria = async function(id){
  if(confirm('Deletar categoria?')){
    await deleteDoc(doc(db,'categorias',id));
    await loadData();
    adminCategorias();
  }
}

window.adminPedidos = function(){
  closeAdminMenu();
  document.getElementById('adminContent').innerHTML = `
    <svg class="admin-close" onclick="goBackFromAdmin()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
    <h2 style="margin-bottom:16px;">Pedidos</h2>
    <table class="table">
      <thead><tr><th>Cliente</th><th>Total</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>${allOrders.map(o => `<tr>
        <td>${o.userEmail}</td>
        <td>R$ ${o.total}</td>
        <td><span class="badge badge-${o'warning' : 'danger'}">${o.status}</span></td>
        <td>
          <select onchange="updatePedidoStatus('${o.id}', this.value)" style="background:var(--card-2);border:1px solid #2a2a35;border-radius:6px;color:#fff;padding:4px;font-size:10px;">
            <option value="aguardando" ${o.status==='aguardando'?'selected':''}>Aguardando</option>
            <option value="concluido" ${o.status==='concluido'?'selected':''}>Concluído</option>
            <option value="cancelado" ${o.status==='cancelado'?'selected':''}>Cancelado</option>
          </select>
        </td>
      </tr>`).join('')}</tbody>
    </table>
  `;
}

window.updatePedidoStatus = async function(id, status){
  await updateDoc(doc(db,'pedidos',id), {status: status});
  await loadData();
  adminPedidos();
}

window.adminUsuarios = function(){
  closeAdminMenu();
  document.getElementById('adminContent').innerHTML = `
    <svg class="admin-close" onclick="goBackFromAdmin()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
    <h2 style="margin-bottom:16px;">Usuários</h2>
    <table class="table">
      <thead><tr><th>Email</th><th>UID</th></tr></thead>
      <tbody>${allUsers.length > 0 ? allUsers.map(u => `<tr>
        <td>${u.email}</td>
        <td style="font-size:9px;color:var(--text-2);">${u.uid}</td>
      </tr>`).join('') : '<tr><td colspan="2" style="text-align:center;color:var(--text-2);">Nenhum usuário</td></tr>'}</tbody>
    </table>
  `;
}

window.closeModal = function(){
  document.getElementById('modal').classList.remove('active');
}

window.goBackFromAdmin = function(){
  document.getElementById('screen-admin').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
}
</script>
</body>
</html>
