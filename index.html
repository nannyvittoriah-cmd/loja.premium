<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prime Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
color:#fff;
overflow-x:hidden;
}

:root{
--roxo:#b026ff;
--border:rgba(176,38,255,.18);
--card:#111;
}

.page{display:none;max-width:430px;margin:auto;min-height:100vh;padding:12px;padding-bottom:85px}
.page.active{display:block}

.topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

.logo{font-weight:800}
.logo span{color:var(--roxo)}

.top-btn{width:34px;height:34px;background:#111;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;border-radius:10px}

/* resto do seu CSS mantido */
input,select,textarea{
background:#111;border:1px solid var(--border);
color:#fff;padding:10px;border-radius:10px;width:100%;
}

button{
cursor:pointer;
}

/* ADM ITEM */
.item{
display:flex;
justify-content:space-between;
gap:10px;
background:#111;
padding:10px;
border-radius:12px;
border:1px solid var(--border);
}

</style>
</head>

<body>

<!-- ================= MENU ================= -->
<div class="menu-overlay" id="overlay" onclick="closeMenu()"></div>

<div class="side-menu" id="sideMenu">
<div class="menu-item" onclick="showPage('home')">Home</div>
<div class="menu-item" onclick="showPage('store')">Loja</div>
<div class="menu-item" onclick="showPage('cart')">Carrinho</div>
<div class="menu-item" onclick="showPage('loginAdm')">ADM</div>
</div>

<!-- ================= HOME ================= -->
<section class="page active" id="home">
<div class="topo">
<div class="top-btn" onclick="openMenu()">☰</div>
<div class="logo">PRIME <span>STORE</span></div>
</div>

<div id="homeProdutos"></div>
</section>

<!-- ================= LOJA ================= -->
<section class="page" id="store">
<div class="topo">
<div class="top-btn" onclick="showPage('home')">←</div>
<div class="logo">LOJA</div>
</div>

<div id="storeList"></div>
</section>

<!-- ================= CARRINHO ================= -->
<section class="page" id="cart">
<div class="topo">
<div class="top-btn" onclick="showPage('store')">←</div>
<div class="logo">CARRINHO</div>
</div>

<div id="cartList"></div>
<h3 id="totalPrice">Total: R$ 0</h3>
</section>

<!-- ================= LOGIN ADM ================= -->
<section class="page" id="loginAdm">

<div class="topo">
<div class="logo">ADM</div>
</div>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="loginAdm()">Entrar</button>

</section>

<!-- ================= ADM PRODUTOS ================= -->
<section class="page" id="admProdutos">

<div class="topo">
<div class="logo">PRODUTOS</div>
<div class="top-btn" onclick="showPage('addProduto')">+</div>
</div>

<div id="listaProdutosAdm"></div>

</section>

<!-- ================= ADD PRODUTO ================= -->
<section class="page" id="addProduto">

<div class="topo">
<div class="top-btn" onclick="showPage('admProdutos')">←</div>
<div class="logo">PRODUTO</div>
</div>

<input id="produtoNome" placeholder="Nome">
<select id="produtoCategoria">
<option>Diamantes</option>
<option>Contas</option>
<option>Premium</option>
</select>

<select id="produtoSub">
<option>Free Fire</option>
<option>Netflix</option>
<option>Mobile</option>
</select>

<input id="produtoPreco" type="number" placeholder="Preço">
<input id="produtoPromo" type="number" placeholder="Promoção">
<input id="produtoEstoque" type="number" placeholder="Estoque">

<label>
<input type="checkbox" id="produtoIlimitado">
Ilimitado
</label>

<textarea id="produtoDesc"></textarea>

<select id="produtoEntrega">
<option>Manual</option>
<option>Automático</option>
</select>

<select id="produtoStatus">
<option>Ativo</option>
<option>Inativo</option>
</select>

<input type="file" id="produtoImagem">

<button onclick="salvarProduto()">Salvar</button>

</section>

<!-- ================= SCRIPT ================= -->
<script>

let produtos = JSON.parse(localStorage.getItem("produtosAdm")) || [];
let carrinho = [];
let editIndex = null;

function renderProdutosAdm(){

const area = document.getElementById("listaProdutosAdm");
area.innerHTML = "";

produtos.forEach((p,index)=>{

area.innerHTML += `
<div class="item" style="flex-direction:column">

<img src="${p.imagem}" style="width:100%;border-radius:10px">

<h3>${p.nome}</h3>

<p>${p.categoria} - ${p.sub}</p>

<span>R$ ${p.preco}</span>

<button onclick="editar(${index})">Editar</button>
<button onclick="remover(${index})" style="background:red;color:#fff">Remover</button>

</div>
`;

});

}

function editar(i){

editIndex = i;

const p = produtos[i];

produtoNome.value = p.nome;
produtoCategoria.value = p.categoria;
produtoSub.value = p.sub;
produtoPreco.value = p.preco;
produtoPromo.value = p.promo;
produtoEstoque.value = p.estoque;
produtoIlimitado.checked = p.ilimitado;
produtoDesc.value = p.desc;
produtoEntrega.value = p.entrega;
produtoStatus.value = p.status;

showPage("addProduto");

}

function salvarProduto(){

const novo = {
nome:produtoNome.value,
categoria:produtoCategoria.value,
sub:produtoSub.value,
preco:produtoPreco.value,
promo:produtoPromo.value,
estoque:produtoEstoque.value,
ilimitado:produtoIlimitado.checked,
desc:produtoDesc.value,
entrega:produtoEntrega.value,
status:produtoStatus.value,
imagem:"https://i.postimg.cc/C5KWcT5z/be50f798-9fdd-49a3-99aa-7b4abaf24030.jpg"
};

if(editIndex !== null){
produtos[editIndex] = novo;
editIndex = null;
}else{
produtos.push(novo);
}

localStorage.setItem("produtosAdm", JSON.stringify(produtos));

renderProdutosAdm();
showPage("admProdutos");
}

function remover(i){

produtos.splice(i,1);
localStorage.setItem("produtosAdm", JSON.stringify(produtos));
renderProdutosAdm();

}

function loginAdm(){

if(user.value=="admin" && pass.value=="123"){
showPage("admProdutos");
}else{
alert("erro");
}

}

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

}

function openMenu(){sideMenu.classList.add("active")}
function closeMenu(){sideMenu.classList.remove("active")}

renderProdutosAdm();

</script>

</body>
</html>
