<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
:root{
--border:#00c3ff;
--border2:#ffd400;
}

body{
margin:0;
font-family:Arial;
transition:0.3s;
background:#000;
color:#fff;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
font-size:28px;
font-weight:bold;
background:#0b0f2a;
border-bottom:2px solid var(--border);
}

/* MENU */
.menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
z-index:999;
border-left:2px solid var(--border);
}

.menu button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
cursor:pointer;
background:#222;
color:#fff;
border-radius:6px;
}

/* PRODUTOS 2 COLUNAS */
.container{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:12px;
padding:15px;
}

.card{
background:#111;
border:2px solid var(--border);
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

/* BOTÕES */
.buyBtn{
width:100%;
padding:10px;
margin-top:5px;
background:#00ff66;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:6px;
}

.detailBtn{
width:100%;
padding:10px;
margin-top:5px;
background:#f5f5dc;
border:none;
cursor:pointer;
color:#000;
font-weight:bold;
border:2px solid var(--border2);
border-radius:6px;
}

/* CHECKOUT */
.checkout{display:none;padding:15px;}
.box{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
border:2px solid var(--border);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.modalBox{
background:#111;
padding:20px;
max-width:450px;
border-radius:10px;
border:2px solid var(--border2);
}

/* ADM */
.admin{display:none;padding:15px;}

.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
border:2px solid var(--border);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border-radius:6px;
border:1px solid #555;
}

.item{
border:1px solid #333;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<div class="topbar">
<div>BONY STORE</div>
<div onclick="toggleMenu()" style="cursor:pointer;font-size:26px">☰</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">

<h3>MENU</h3>

<button onclick="home()">🏠 Home</button>
<button onclick="openAdmin()">⚙ ADM</button>

<h4>🌙 TEMAS ESCUROS</h4>
<button onclick="theme('azul')">🔵 Azul</button>
<button onclick="theme('amarelo')">🟡 Amarelo</button>

<h4>📂 CATEGORIAS</h4>
<button onclick="render('todos')">Todos</button>
<button onclick="render('passe')">Passes</button>
<button onclick="render('tokens')">Tokens</button>

</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout">
<div class="box">

<h3>COMPROVANTE</h3>

<input id="nome" placeholder="Nome">
<input id="whats" placeholder="WhatsApp">
<input id="produto" readonly>
<input id="link" placeholder="Link comprovante">

<button onclick="enviar()">ENVIAR</button>

</div>
</div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADMIN</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>📊 DASHBOARD</h3>

<div class="item">Total vendas: <span id="vendas"></span></div>
<div class="item">Mais vendidos: <span id="maisvendido"></span></div>
<div class="item">Status loja: 🟢 ONLINE</div>

<hr>

<h3>📦 PRODUTOS</h3>

<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<input id="pestoque" placeholder="Estoque">
<input id="pcat" placeholder="Categoria">
<button onclick="add()">Adicionar</button>

<hr>

<div id="produtosADM"></div>

<hr>

<h3>📩 COMPROVANTES (SIMULADO)</h3>
<div id="hist"></div>

</div>
</div>
</div>

<script>

let selected="";

/* LOGIN ADMIN */
const ADMIN_USER="Lorrannyh.170";
const ADMIN_PASS="Lorrannyh.170";

/* PRODUTOS */
let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png","Acesso básico",10,"passe"],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png","Mais recursos",5,"passe"],
["100 Tokens","25","https://i.imgur.com/3Q9Z1ZQ.png","Moeda interna",10,"tokens"]
];

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function render(cat="todos"){
loja.innerHTML="";

produtos.forEach((p,i)=>{
if(cat!=="todos" && p[5]!==cat) return;

let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>
<p>${p[3]}</p>
<p>Estoque: ${p[4]}</p>

<button class="detailBtn" onclick="detalhe(${i})">DETALHES</button>
<button class="buyBtn" onclick="buy(${i})">COMPRAR</button>
`;

loja.appendChild(d);
});
}

/* MENU */
function toggleMenu(){
menu.style.right = menu.style.right==="0px"?"-260px":"0px";
}

/* TEMAS ESCUROS */
function theme(t){

if(t==="azul"){
document.documentElement.style.setProperty("--border","#00c3ff");
document.documentElement.style.setProperty("--border2","#ffd400");
document.body.style.background="#000";
document.body.style.color="#fff";
}

if(t==="amarelo"){
document.documentElement.style.setProperty("--border","#ffd400");
document.documentElement.style.setProperty("--border2","#00c3ff");
document.body.style.background="#1a1a00";
document.body.style.color="#fff";
}
}

/* HOME */
function home(){
loja.style.display="grid";
checkout.style.display="none";
admin.style.display="none";
render();
}

/* COMPRA */
function buy(i){
if(produtos[i][4]<=0){alert("Sem estoque");return;}

produtos[i][4]--;
save();
render();

selected=produtos[i][0];

loja.style.display="none";
checkout.style.display="block";

produto.value=selected;

/* vendas */
let v=Number(localStorage.getItem("vendas")||0);
localStorage.setItem("vendas",v+1);
}

/* ENVIO */
function enviar(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
nome:nome.value,
produto:selected,
link:link.value
});

localStorage.setItem("dados",JSON.stringify(dados));

alert("Enviado!");
home();
}

/* ADM LOGIN */
function login(){
if(u.value===ADMIN_USER && p.value===ADMIN_PASS){
painel.style.display="block";
loadADM();
loadHist();
stats();
}else alert("erro login");
}

/* ADD PRODUTO */
function add(){
produtos.push([
pnome.value,
ppreco.value,
pimg.value,
pdesc.value,
Number(pestoque.value),
pcat.value
]);

save();
render();
loadADM();
}

/* ADM PRODUTOS */
function loadADM(){
produtosADM.innerHTML="";
produtos.forEach(p=>{
produtosADM.innerHTML+=`<div class="item">${p[0]} - R$ ${p[1]}</div>`;
});
}

/* HISTÓRICO */
function loadHist(){
let d=JSON.parse(localStorage.getItem("dados")||"[]");

hist.innerHTML="";
d.forEach(x=>{
hist.innerHTML+=`<div class="item">${x.nome} - ${x.produto}</div>`;
});
}

/* STATS */
function stats(){
vendas.innerText=localStorage.getItem("vendas")||0;

/* mais vendido simples */
let count={};
produtos.forEach(p=>count[p[0]]=0);

let d=JSON.parse(localStorage.getItem("dados")||"[]");
d.forEach(x=>{
if(count[x.produto]!=undefined) count[x.produto]++;
});

let top="";
let max=0;

for(let k in count){
if(count[k]>max){
max=count[k];
top=k;
}
}

maisvendido.innerText=top||"Nenhum";
}

/* INICIAR */
home();

</script>

</body>
</html>
