<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bonys Story</title>

<style>

body{
    margin:0;
    font-family:Arial;
    color:white;
    font-size:18px; /* AUMENTO GLOBAL */
}

.fundo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("https://i.imgur.com/iWGitub.jpeg") no-repeat center;
    background-size:cover;
    z-index:-2;
}

/* AVISO */
#avisoTela{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.avisoBox{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:400px;
}

.bemvindo{
    margin-top:15px;
    font-size:18px; /* AUMENTADO */
    white-space:pre-line;
}

/* BOTÃO */
.neonBtn{
    margin-top:15px;
    padding:15px;
    width:240px;
    border:none;
    border-radius:10px;
    background:#ff4da6;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:16px; /* AUMENTADO */
}

/* CATEGORIAS */
#categorias{
    display:none;
    padding:20px;
}

.topo{
    text-align:center;
    font-size:36px; /* AUMENTADO */
    color:#ff4da6;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:20px;
}

.card{
    background:#0f1438;
    border:2px solid #ff4da6;
    border-radius:16px;
    padding:15px;
    text-align:center;
    cursor:pointer;
}

.card img{
    width:100%;
    height:120px;
    object-fit:contain;
    background:black;
    border-radius:12px;
}

.nome{
    margin-top:10px;
    font-weight:bold;
    font-size:18px; /* AUMENTADO */
}

/* SUB */
.sub{
    display:none;
    margin-top:20px;
}

.grid2{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
}

.item{
    background:#0f1438;
    border:2px solid #ff4da6;
    border-radius:14px;
    padding:10px;
    text-align:center;
}

.item img{
    width:100%;
    height:90px;
    object-fit:contain;
    background:black;
    border-radius:10px;
}

.itemNome{
    font-weight:bold;
    margin-top:8px;
    font-size:17px; /* AUMENTADO */
}

.itemDesc{
    font-size:14px; /* AUMENTADO */
    opacity:0.85;
}

.itemPrice{
    font-size:16px; /* AUMENTADO */
    color:#ff4da6;
    font-weight:bold;
    margin-top:2px;
}

.buyDirect{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:10px;
    background:#25d366;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:14px; /* AUMENTADO */
}

/* TOPO BOTÕES */
.topBtns{
    position:fixed;
    top:10px;
    left:10px;
    display:none;
    gap:10px;
}

.topBtn{
    padding:10px;
    border-radius:10px;
    border:2px solid #ff4da6;
    background:#111;
    color:#ff4da6;
    cursor:pointer;
    font-size:14px; /* AUMENTADO */
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#25d366;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.whatsapp img{
    width:40px;
}

</style>
</head>

<body>
