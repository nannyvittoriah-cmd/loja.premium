<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja FF Rosa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#1a0b13;color:#fff;min-height:100vh}
input{width:100%;padding:12px;margin:8px 0;background:#2d1520;border:1px solid #FF2D95;border-radius:8px;color:white}
#login-screen{display:flex;justify-content:center;align-items:center;height:100vh;background:#0d0609}
.login-box{background:#1a0b13;border:1px solid #FF2D95;border-radius:12px;padding:30px;width:90%;max-width:350px;text-align:center}
.login-box h2{color:#FF2D95;margin-bottom:25px}
.btn-pink{width:100%;padding:12px;background:#FF2D95;border:none;border-radius:8px;color:white;font-weight:bold;margin:10px 0;cursor:pointer}
#store-screen{display:none}
.header{background:#1a0b13;padding:15px;border-bottom:1px solid #FF2D95;display:flex;justify-content:space-between;align-items:center}
.header span{color:#FF2D95;cursor:pointer}
.products{display:grid;grid-template-columns:1fr 1fr;gap:15px;padding:15px}
.card{background:#2d1520;border:1px solid #FF2D95;border-radius:12px;padding:15px;text-align:center;position:relative}
.card img{width:100%;height:80px;object-fit:cover;border-radius:8px;margin:8px 0}
.card .price{color:#FF2D95;font-weight:bold;margin:8px 0}
.admin-actions{position:absolute;top:5px;right:5px;display:none;gap:5px}
.admin-mode .admin-actions{display:flex}
.icon-btn{background:#FF2D95;border:none;width:28px;height:28px;border-radius:6px;cursor:pointer}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:999}
.modal-box{background:#1a0b13;border:1px solid #FF2D95;border-radius:12px;padding:25px;width:90%;max-width:400px}
.erro{color:#FF4D6D;font-size:13px;margin-top:8px;display:none}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>⚡ LOGIN</h2>
    <input type="text" placeholder="Usuário" id="user">
    <input type="password" placeholder="Senha" id="senha">
    <p class="erro" id="erro-login">Usuário ou senha incorretos</p>
    <button class="btn-pink" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<div id="store-screen">
  <div class="header">
    <span id="user-logado"></span>
    <span onclick="logout()">Sair</span>
  </div>
  <div class="products admin-mode" id="lista-produtos"></div>
</div>

<script>
let tipoUser = '';
let produtos = [
  {id: 1, nome: "100 Diamantes FF", preco: 5, emoji: "💎", estoque: 50},
  {id: 2, nome: "310 Diamantes FF", preco: 15, emoji: "💎", estoque: 30}
];

function renderizarProdutos() {
  const lista = document.getElementById('lista-produtos');
  lista.innerHTML = '';
  produtos.forEach(p => {
    lista.innerHTML += `
      <div class="card">
        <div class="admin-actions">
          <button class="icon-btn" onclick="alert('Editar ${p.id}')">✏️</button>
          <button class="icon-btn" onclick="alert('Excluir ${p.id}')">🗑️</button>
        </div>
        <div style="font-size:40px;margin:10px 0;">${p.emoji}</div>
        <h4>${p.nome}</h4>
        <div class="price">R$ ${p.preco}</div>
        <button class="btn-pink" onclick="alert('Add ${p.nome}')">Add ao carrinho</button>
      </div>
    `;
  });
}

function fazerLogin() {
  let user = document.getElementById('user').value;
  let senha = document.getElementById('senha').value;
  
  if(user === "Lorrannyh.16" && senha === "Lorrannyh.16") {
    tipoUser = 'admin';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('store-screen').style.display = 'block';
    document.getElementById('user-logado').innerText = 'Lorrannyh.16';
    renderizarProdutos();
  } else {
    document.getElementById('erro-login').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('store-screen').style.display = 'none';
}

renderizarProdutos();
</script>
</body>
</html>
