<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prime Store VZ - Auth</title>
<style>
:root{
  --bg:#0a0a0f;
  --card:#15151d;
  --input:#1e1e2a;
  --border:#2a2a35;
  --purple:#7c3aed;
  --purple-light:#a855f7;
  --text:#fff;
  --text-dim:#9ca3af;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.screen{display:none;width:100%;max-width:380px;}
.screen.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;}
h2{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px;}
.subtitle{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:24px;}
.logo{font-size:20px;font-weight:700;color:var(--purple-light);text-align:center;margin-bottom:4px;}
.logo-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:20px;}
.input-group{margin-bottom:16px;}
.input-box{width:100%;height:48px;background:var(--input);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;padding:0 14px;}
.input-box input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;}
.input-box input::placeholder{color:#6b7280;}
.input-box .toggle{cursor:pointer;color:#6b7280;}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:13px;}
.row label{display:flex;align-items:center;gap:8px;color:var(--text-dim);cursor:pointer;}
.row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--purple);}
.row a{color:var(--purple-light);text-decoration:none;}
.btn{width:100%;height:48px;background:var(--purple);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text-dim);}
.footer-link a{color:var(--purple-light);text-decoration:none;font-weight:600;}
.checkbox-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:20px;font-size:12px;color:var(--text-dim);}
.checkbox-row input{margin-top:2px;accent-color:var(--purple);}
.checkbox-row a{color:var(--purple-light);text-decoration:none;}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
.alert.error{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;}
.alert.success{background:rgba(16,185,129,0.1);border:1px solid #10b981;color:#10b981;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="card">
    <div class="logo">LOGIN - E-MAIL</div>
    <div class="logo-sub">Prime Store VZ</div>
    <div class="subtitle">Entre na sua conta</div>

    <div class="alert error" id="loginError"></div>
    <div class="alert success" id="loginSuccess"></div>

    <div class="input-group">
      <div class="input-box"><input type="email" id="loginEmail" placeholder="E-mail"></div>
    </div>

    <div class="input-group">
      <div class="input-box">
        <input type="password" id="loginPassword" placeholder="Senha">
        <span class="toggle" onclick="togglePass('loginPassword', this)">👁️</span>
      </div>
    </div>

    <div class="row">
      <label><input type="checkbox" id="remember"> Lembrar-me</label>
      <a href="#" onclick="showScreen('forgot', event)">Esqueceu a senha?</a>
    </div>

    <button class="btn" id="btnLogin" onclick="login()">ENTRAR</button>

    <div class="footer-link">
      Não tem uma conta? <a href="#" onclick="showScreen('register', event)">Cadastre-se</a>
    </div>
  </div>
</div>

<!-- CADASTRO -->
<div class="screen" id="screen-register">
  <div class="card">
    <div class="logo">CADASTRO</div>
    <div class="logo-sub">Prime Store VZ</div>
    <div class="subtitle">Crie sua conta</div>

    <div class="alert error" id="registerError"></div>
    <div class="alert success" id="registerSuccess"></div>

    <div class="input-group"><div class="input-box"><input type="text" id="regName" placeholder="Nome completo"></div></div>
    <div class="input-group"><div class="input-box"><input type="email" id="regEmail" placeholder="Email"></div></div>
    <div class="input-group"><div class="input-box"><input type="tel" id="regPhone" placeholder="Telefone"></div></div>
    <div class="input-group">
      <div class="input-box">
        <input type="password" id="regPassword" placeholder="Senha">
        <span class="toggle" onclick="togglePass('regPassword', this)">👁️</span>
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="terms">
      <label for="terms">Li e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a></label>
    </div>

    <button class="btn" id="btnRegister" onclick="register()">CADASTRAR</button>

    <div class="footer-link">
      Já tem uma conta? <a href="#" onclick="showScreen('login', event)">Entrar</a>
    </div>
  </div>
</div>

<!-- ESQUECEU SENHA -->
<div class="screen" id="screen-forgot">
  <div class="card">
    <div class="logo">ESQUECEU A SENHA</div>
    <div class="logo-sub">Prime Store VZ</div>
    <div class="subtitle">Informe seu e-mail ou telefone para receber o código de recuperação</div>

    <div class="alert error" id="forgotError"></div>
    <div class="alert success" id="forgotSuccess"></div>

    <div class="input-group"><div class="input-box"><input type="text" id="forgotEmail" placeholder="E-mail ou telefone"></div></div>

    <button class="btn" id="btnForgot" onclick="forgotPassword()">ENVIAR CÓDIGO</button>

    <div class="footer-link">
      <a href="#" onclick="showScreen('login', event)">Voltar para o login</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  setPersistence, 
  browserLocalPersistence, 
  browserSessionPersistence,
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword, 
  sendPasswordResetEmail,
  updateProfile 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.showScreen = (screen, e) => {
  if(e) e.preventDefault();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${screen}`).classList.add('active');
  hideAllAlerts();
}

window.togglePass = (id, el) => {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  el.textContent = input.type === 'password' ? '👁️' : '🙈';
}

// LOGIN
window.login = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('remember').checked;
  const btn = document.getElementById('btnLogin');

  if(!email || !password) return showAlert('loginError', 'Preencha e-mail e senha');

  btn.disabled = true;
  try{
    await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
    await signInWithEmailAndPassword(auth, email, password);
    showAlert('loginSuccess', 'Login realizado! Redirecionando...');
    setTimeout(() => {
      alert('Aqui você redireciona para a home. Ex: window.location.href = "home.html"');
    }, 1200);
  }catch(e){
    let msg = 'Erro ao fazer login';
    if(e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') msg = 'E-mail ou senha incorretos';
    if(e.code === 'auth/invalid-email') msg = 'E-mail inválido';
    showAlert('loginError', msg);
  }finally{
    btn.disabled = false;
  }
}

// CADASTRO
window.register = async () => {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPassword').value;
  const terms = document.getElementById('terms').checked;
  const btn = document.getElementById('btnRegister');

  if(!name || !email || !password) return showAlert('registerError', 'Preencha nome, e-mail e senha');
  if(!terms) return showAlert('registerError', 'Aceite os termos de uso');
  if(password.length < 6) return showAlert('registerError', 'Senha deve ter no mínimo 6 caracteres');

  btn.disabled = true;
  try{
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(userCred.user, {displayName: name});
    
    // Aqui você pode salvar telefone no Firestore/Realtime DB se quiser
    // await setDoc(doc(db, "users", userCred.user.uid), {name, email, phone});

    showAlert('registerSuccess', 'Conta criada com sucesso!');
    setTimeout(() => showScreen('login'), 1500);
  }catch(e){
    let msg = 'Erro ao criar conta';
    if(e.code === 'auth/email-already-in-use') msg = 'Este e-mail já está em uso';
    if(e.code === 'auth/invalid-email') msg = 'E-mail inválido';
    showAlert('registerError', msg);
  }finally{
    btn.disabled = false;
  }
}

// ESQUECEU SENHA
window.forgotPassword = async () => {
  const email = document.getElementById('forgotEmail').value.trim();
  const btn = document.getElementById('btnForgot');

  if(!email) return showAlert('forgotError', 'Digite seu e-mail');

  btn.disabled = true;
  try{
    await sendPasswordResetEmail(auth, email);
    showAlert('forgotSuccess', 'Link de recuperação enviado! Verifique seu e-mail.');
  }catch(e){
    let msg = 'Erro ao enviar código';
    if(e.code === 'auth/user-not-found') msg = 'E-mail não encontrado';
    if(e.code === 'auth/invalid-email') msg = 'E-mail inválido';
    showAlert('forgotError', msg);
  }finally{
    btn.disabled = false;
  }
}

function showAlert(id, msg){
  hideAllAlerts();
  const el = document.getElementById(id);
  el.innerText = msg;
  el.style.display = 'block';
}

function hideAllAlerts(){
  document.querySelectorAll('.alert').forEach(a => a.style.display='none');
}
</script>
</body>
</html>
