<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prime Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"/>

<style>

/* ===== SEU CSS ORIGINAL ===== */

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#050505;color:#fff;overflow-x:hidden}
:root{--roxo:#b026ff;--border:rgba(176,38,255,.18);--card:#111}

.page{display:none;max-width:430px;margin:auto;min-height:100vh;padding:12px;padding-bottom:85px}
.page.active{display:block}

.topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:20px;font-weight:800}
.logo span{color:var(--roxo)}

.top-btn{width:34px;height:34px;background:#111;border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center}

.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;z-index:999}
.menu-overlay.active{display:block}

.side-menu{position:fixed;top:0;left:-280px;width:280px;height:100%;background:#080808;border-right:1px solid var(--border);padding:16px;transition:.3s}
.side-menu.active{left:0}

.menu-item{height:46px;background:#111;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:10px;padding:0 14px;font-size:12px;cursor:pointer}

/* ADM CARDS */

.list-card{
background:#111;
border:1px solid var(--border);
padding:10px;
border-radius:12px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.small{font-size:10px;color:#999}

.input,select,textarea{
width:100%;
background:#111;
border:1px solid var(--border);
padding:10px;
border-radius:10px;
color:#fff;
margin-bottom:8px;
font-size:11px;
}

.btn{
background:linear-gradient(90deg,#7a00ff,#d000ff);
border:none;
padding:10px;
border-radius:10px;
color:#fff;
font-weight:700;
font-size:11px;
width:100%;
cursor:pointer;
}

</style>

</head>

<body>

<div class="menu-overlay" id="overlay" onclick="closeMenu()"></div>

<!-- DASHBOARD -->
<section class="page active" id="dashboardAdm">

<div class="list-card">
<div><strong>PAINEL ADM</strong></div>
</div>

<button class="btn" onclick="showPage('admProdutos')">Produtos</button>

</section>

<!-- PRODUTOS ADM -->
<section class="page" id="admProdutos">

<div class="list-card">
<strong>PRODUTOS</strong>
</div>

<input class="input" id="buscarProduto" placeholder="Buscar..." onkeyup="buscarProdutoAdm()">

<button class="btn" onclick="abrirAddProduto()">+ ADICIONAR</button>

<div id="listaProdutosAdm"></div>

</section>

<!-- ADD PRODUTO -->
<section class="page" id="addProduto">

<div class="list-card"><strong>PRODUTO</strong></div>

<input class="input" id="produtoNome" placeholder="Nome">
<select id="produtoCategoria" class="input">
<option>Diamantes</option>
<option>Contas</option>
<option>Premium</option>
</select>

<select id="produtoSub" class="input">
<option>Free Fire</option>
<option>Roblox</option>
<option>Mobile</option>
</select>

<input class="input" id="produtoPreco" type="number" placeholder="Preço">

<input class="input" id="produtoPromo" type="number" placeholder="Promo">

<input class="input" id="produtoEstoque" type="number" placeholder="Estoque">

<label style="font-size:11px">
<input type="checkbox" id="produtoIlimitado"> Ilimitado
</label>

<textarea class="input" id="produtoDesc" placeholder="Descrição"></textarea>

<select id="produtoEntrega" class="input">
<option>Manual</option>
<option>Automático</option>
</select>

<select id="produtoStatus" class="input">
<option>Ativo</option>
<option>Inativo</option>
</select>

<button class="btn" onclick="salvarProduto()">SALVAR</button>

</section>

<script>

let produtosAdm = JSON.parse(localStorage.getItem("produtosAdm")) || [];
let editIndex = null;

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function abrirAddProduto(){

editIndex = null;

document.getElementById("produtoNome").value = "";
document.getElementById("produtoPreco").value = "";
document.getElementById("produtoPromo").value = "";
document.getElementById("produtoEstoque").value = "";
document.getElementById("produtoDesc").value = "";

showPage("addProduto");
}

function salvarProduto(){

const novo = {
nome: document.getElementById("produtoNome").value,
categoria: document.getElementById("produtoCategoria").value,
sub: document.getElementById("produtoSub").value,
preco: document.getElementById("produtoPreco").value,
promo: document.getElementById("produtoPromo").value,
estoque: document.getElementById("produtoEstoque").value,
ilimitado: document.getElementById("produtoIlimitado").checked,
desc: document.getElementById("produtoDesc").value,
entrega: document.getElementById("produtoEntrega").value,
status: document.getElementById("produtoStatus").value,
imagem: ""
};

if(editIndex !== null){
produtosAdm[editIndex] = novo;
editIndex = null;
}else{
produtosAdm.push(novo);
}

localStorage.setItem("produtosAdm", JSON.stringify(produtosAdm));

renderProdutosAdm();
showPage("admProdutos");
}

function renderProdutosAdm(){

const area = document.getElementById("listaProdutosAdm");
area.innerHTML = "";

produtosAdm.forEach((p,i)=>{

area.innerHTML += `
<div class="list-card">

<div>
<strong>${p.nome}</strong>
<div class="small">${p.categoria} • ${p.sub}</div>
<div class="small">R$ ${p.preco}</div>
</div>

<div style="display:flex;gap:8px">
<span onclick="editarProduto(${i})">✏️</span>
</div>

</div>`;
});

}

function editarProduto(i){

const p = produtosAdm[i];
editIndex = i;

showPage("addProduto");

document.getElementById("produtoNome").value = p.nome;
document.getElementById("produtoCategoria").value = p.categoria;
document.getElementById("produtoSub").value = p.sub;
document.getElementById("produtoPreco").value = p.preco;
document.getElementById("produtoPromo").value = p.promo;
document.getElementById("produtoEstoque").value = p.estoque;
document.getElementById("produtoDesc").value = p.desc;
document.getElementById("produtoEntrega").value = p.entrega;
document.getElementById("produtoStatus").value = p.status;
document.getElementById("produtoIlimitado").checked = p.ilimitado;

}

function buscarProdutoAdm(){

const v = document.getElementById("buscarProduto").value.toLowerCase();

const area = document.getElementById("listaProdutosAdm");
area.innerHTML = "";

produtosAdm
.filter(p=>p.nome.toLowerCase().includes(v))
.forEach((p,i)=>{

area.innerHTML += `
<div class="list-card">
<div>
<strong>${p.nome}</strong>
<div class="small">${p.categoria}</div>
</div>
</div>`;
});

}

renderProdutosAdm();

</script>

</body>
</html>
