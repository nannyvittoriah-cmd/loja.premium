<style>
:root{
  --bg:#0A0A0F;
  --roxo:#A855F7;
  --roxo-neon:#C084FC;
  --roxo-escuro:#7E22CE;
  --roxo-glow:rgba(168,85,247,.6);
  --branco:#FFFFFF;
  --cinza:#9CA3AF;
  --card:rgba(20,20,30,.7);
  --borda:rgba(168,85,247,.3);
  --verde:#10B981;
  --amarelo:#F59E0B;
  --vermelho:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--branco);
  font-size:11px;
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed;
  top:-30%;
  left:50%;
  transform:translateX(-50%);
  width:600px;
  height:600px;
  background:radial-gradient(circle,var(--roxo-escuro) 0%,transparent 70%);
  opacity:.3;
  z-index:-1;
  pointer-events:none;
  filter:blur(100px);
}
.tela{display:none;min-height:100vh}
.tela.ativa{display:block}

.header-gg{
  background:rgba(10,10,15,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--borda);
  padding:12px 10px;
  position:sticky;
  top:0;
  z-index:100;
}
.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.logo-gg{
  font-size:16px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:5px;
  text-shadow:0 0 20px var(--roxo-glow);
}
.logo-gg i{width:18px;height:18px;stroke:var(--roxo-neon);fill:var(--roxo-neon)}
.header-actions{
  display:flex;
  gap:8px;
}
.btn-icon-header{
  width:32px;
  height:32px;
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;
}
.btn-icon-header i{width:16px;height:16px}
.carrinho-badge{
  position:absolute;
  top:-4px;
  right:-4px;
  background:var(--vermelho);
  color:var(--branco);
  font-size:6px;
  font-weight:700;
  width:14px;
  height:14px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.btn-login-header{
  background:linear-gradient(135deg,var(--roxo),var(--roxo-neon));
  border:none;
  border-radius:8px;
  padding:6px 12px;
  font-size:8px;
  font-weight:700;
  color:var(--branco);
  cursor:pointer;
  box-shadow:0 0 20px var(--roxo-glow);
}
.search-bar{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:10px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.search-bar i{width:16px;height:16px;stroke:var(--cinza)}
.search-bar input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--branco);
  font-size:9px;
}

.banner{
  background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo));
  border-radius:12px;
  padding:20px;
  margin:12px 10px;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 32px var(--roxo-glow);
}
.banner::before{
  content:'';
  position:absolute;
  top:-50%;
  right:-20%;
  width:300px;
  height:300px;
  background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);
  filter:blur(60px);
}
.banner-tit{
  font-size:14px;
  font-weight:900;
  margin-bottom:4px;
  position:relative;
}
.banner-sub{
  font-size:8px;
  opacity:.9;
  position:relative;
}

.filtros{
  padding:0 10px;
  margin-bottom:12px;
  display:flex;
  gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
}
.filtros::-webkit-scrollbar{display:none}
.filtro-btn{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:20px;
  padding:7px 14px;
  font-size:8px;
  font-weight:600;
  color:var(--cinza);
  white-space:nowrap;
  cursor:pointer;
  transition:all.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.filtro-btn.ativo{
  background:linear-gradient(135deg,var(--roxo),var(--roxo-neon));
  color:var(--branco);
  border-color:var(--roxo);
  box-shadow:0 0 20px var(--roxo-glow);
}
.filtro-btn i{width:12px;height:12px}

.container{padding:0 10px 80px}
.produtos-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.card-produto{
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:all.2s;
  position:relative;
}
.card-produto:active{transform:scale(.97)}
.produto-img{
  width:100%;
  height:110px;
  background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo));
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.produto-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.produto-img i{width:32px;height:32px;fill:rgba(255,255,255,.3)}
.produto-badge{
  position:absolute;
  top:6px;
  left:6px;
  background:var(--verde);
  color:var(--branco);
  font-size:6px;
  font-weight:700;
  padding:3px 6px;
  border-radius:4px;
  text-transform:uppercase;
}
.produto-badge.promo{background:var(--amarelo)}
.produto-badge.esgotado{background:var(--vermelho)}
.produto-info{
  padding:10px;
}
.produto-cat{

  color:var(--roxo-neon);
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:4px;
}
.produto-nome{
  font-size:9px;
  font-weight:700;
  margin-bottom:6px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  line-height:1.3;
  min-height:24px;
}
.produto-preco{
  display:flex;
  align-items:baseline;
  gap:4px;
  margin-bottom:6px;
}
.preco-atual{
  font-size:12px;
  font-weight:900;
  color:var(--roxo-neon);
  text-shadow:0 0 15px var(--roxo-glow);
}
.preco-antigo{
  font-size:7px;
  color:var(--cinza);
  text-decoration:line-through;
}
.produto-stats{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:6px;
  color:var(--cinza);
}
.stat-item{
  display:flex;
  align-items:center;
  gap:2px;
}
.stat-item i{width:10px;height:10px}

.nav-bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(10,10,15,.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--borda);
  padding:8px 0 12px;
  display:flex;
  justify-content:space-around;
  z-index:100;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  cursor:pointer;
  color:var(--cinza);
  transition:all.2s;
}
.nav-item.ativo{color:var(--roxo-neon)}
.nav-item i{width:20px;height:20px}
.nav-item span{font-size:6px;font-weight:600}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.9);
  backdrop-filter:blur(20px);

.modal-header{

.btn-fechar{

.tabs-modal{

  gap:6px;

}
.tab-modal{

  background:transparent;
  border:none;

  color:var(--cinza);

  font-weight:600;

.tab-modal.ativo{

.input-modal{
  background:rgba(0,0,0,.5);

}
.btn-modal{

  border-radius:10px;
  padding:12px;

}

.produto-detalhes-img{
  width:100%;
  height:200px;
  background:linear-gradient(135deg,var(--roxo-escuro),var(--roxo));
  border-radius:12px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.produto-detalhes-img img{
  width:100%;
  height:100%;
  object-fit:cover;

}
.produto-detalhes-img i{width:48px;height:48px;fill:rgba(255,255,255,.3)}
.detalhes-cat{

}
.detalhes-nome{
  font-size:16px;
  font-weight:900;

}
.detalhes-desc{

}
.detalhes-preco{

}
.detalhes-preco-atual{

}
.btn-comprar{

  color:var(--branco);
  border:none;

  font-weight:900;
  font-size:10px;

  box-shadow:0 4px 25px rgba(16,185,129,.5);

</style>
</head>
<body>
<!-- TELA PRINCIPAL -->
<div id="home" class="tela ativa">
  <div class="header-gg">
    <div class="header-top">
      <div class="logo-gg"><i data-lucide="gamepad-2"></i> Prime<span style="color:var(--roxo-neon)">Game</span></div>
      <div class="header-actions">
        <div class="btn-icon-header" onclick="abrirCarrinho()">

    <button class="filtro-btn" onclick="filtrarCategoria('roblox')">

    </button>
    <button class="filtro-btn" onclick="filtrarCategoria('valorant')">

    </button>
    <button class="filtro-btn" onclick="filtrarCategoria('lol')">
      <i data-lucide="sword"></i> LoL
    </button>
    <button class="filtro-btn" onclick="filtrarCategoria('servicos')">

<!-- MODAL LOGIN -->
<div id="modalLogin" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-tit">Entrar</div>
      <div class="btn-fechar" onclick="fecharLogin()"><i data-lucide="x"></i></div>
    </div>

    <div class="tabs-modal">
      <button class="tab-modal ativo" onclick="mudarTabLogin('login')">Login</button>
      <button class="tab-modal" onclick="mudarTabLogin('cadastro')">Cadastro</button>

    <div id="tabLoginContent">
      <input type="email" class="input-modal" id="loginEmail" placeholder="E-mail">
      <input type="password" class="input-modal" id="loginSenha" placeholder="Senha">
      <button class="btn-modal" onclick="fazerLogin()">ENTRAR</button>

      <input type="text" class="input-modal" id="cadNome" placeholder="Nome completo">

      <input type="password" class="input-modal" id="cadSenha" placeholder="Senha - mín 6 caracteres">

<!-- MODAL PRODUTO -->
<div id="modalProduto" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-tit">Detalhes</div>
      <div class="btn-fechar" onclick="fecharProduto()"><i data-lucide="x"></i></div>
    </div>
    <div id="produtoDetalhesContent"></div>
  </div>
</div>

<script>
let userId = null;
let userNome = null;
let produtos = [];
let categoriaAtual = 'todos';
let carrinho = [];
let produtoAtual = null;

window.addEventListener('load',()=>{
  lucide.createIcons();
  const { auth, onAuthStateChanged } = window.fb;

  onAuthStateChanged(auth, (user) => {
    if(user){
      userId = user.uid;
      userNome = user.displayName || user.email.split('@')[0];
      document.getElementById('btnLoginHeader').textContent = 'SAIR';
      document.getElementById('btnLoginHeader').onclick = fazerLogout;
    }else{
      userId = null;
      document.getElementById('btnLoginHeader').textContent = 'ENTRAR';
      document.getElementById('btnLoginHeader').onclick = abrirLogin;
    }
  });

  carregarProdutos();
  carregarCarrinho();
});

function carregarProdutos(){
  const { db, ref, onValue } = window.fb;

  onValue(ref(db, 'produtos'), (snapshot) => {
    const prods = snapshot.val() || {};
    produtos = Object.entries(prods).map(([id, p]) => ({id,...p}));
    renderizarProdutos();
  });
}

function renderizarProdutos(){
  const grid = document.getElementById('produtosGrid');
  const filtrados = categoriaAtual === 'todos'? produtos : produtos.filter(p => p.categoria === categoriaAtual);

  if(filtrados.length === 0){
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--cinza);font-size:8px">Nenhum produto encontrado</div>';
    return;
  }

  grid.innerHTML = filtrados.map(p => `
    <div class="card-produto" onclick="verProduto('${p.id}')">
      <div class="produto-img">
        ${p.imagem? `<img src="${p.imagem}" alt="${p.nome}">` : `<i data-lucide="${p.icone || 'package'}"></i>`}
        ${p.badge? `<div class="produto-badge ${p.badge === 'PROMO'? 'promo' : p.badge === 'ESGOTADO'? 'esgotado' : ''}">${p.badge}</div>` : ''}
      </div>
      <div class="produto-info">
        <div class="produto-cat">${p.categoria.toUpperCase()}</div>
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco">
          <div class="preco-atual">R$ ${p.preco.toFixed(2)}</div>
          ${p.precoAntigo? `<div class="preco-antigo">R$ ${p.precoAntigo.toFixed(2)}</div>` : ''}
        </div>
        <div class="produto-stats">
          <div class="stat-item"><i data-lucide="eye"></i> ${p.views || 0}</div>
          <div class="stat-item"><i data-lucide="shopping-bag"></i> ${p.vendas || 0}</div>
        </div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function filtrarCategoria(cat){
  categoriaAtual = cat;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  event.target.classList.add('ativo');
  renderizarProdutos();
}

function filtrarProdutos(termo){
  const grid = document.getElementById('produtosGrid');
  const filtrados = produtos.filter(p =>
    p.nome.toLowerCase().includes(termo.toLowerCase()) ||
    p.categoria.toLowerCase().includes(termo.toLowerCase())
  );

  if(filtrados.length === 0){
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--cinza);font-size:8px">Nenhum produto encontrado</div>';
    return;
  }

  grid.innerHTML = filtrados.map(p => `
    <div class="card-produto" onclick="verProduto('${p.id}')">
      <div class="produto-img">
        ${p.imagem? `<img src="${p.imagem}" alt="${p.nome}">` : `<i data-lucide="${p.icone || 'package'}"></i>`}
        ${p.badge? `<div class="produto-badge ${p.badge === 'PROMO'? 'promo' : p.badge === 'ESGOTADO'? 'esgotado' : ''}">${p.badge}</div>` : ''}
      </div>
      <div class="produto-info">
        <div class="produto-cat">${p.categoria.toUpperCase()}</div>
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco">
          <div class="preco-atual">R$ ${p.preco.toFixed(2)}</div>
          ${p.precoAntigo? `<div class="preco-antigo">R$ ${p.precoAntigo.toFixed(2)}</div>` : ''}
        </div>
        <div class="produto-stats">
          <div class="stat-item"><i data-lucide="eye"></i> ${p.views || 0}</div>
          <div class="stat-item"><i data-lucide="shopping-bag"></i> ${p.vendas || 0}</div>
        </div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function verProduto(id){
  produtoAtual = produtos.find(p => p.id === id);
  if(!produtoAtual) return;

  const { db, ref, update } = window.fb;
  update(ref(db, `produtos/${id}`), {views: (produtoAtual.views || 0) + 1});

  document.getElementById('produtoDetalhesContent').innerHTML = `
    <div class="produto-detalhes-img">
      ${produtoAtual.imagem? `<img src="${produtoAtual.imagem}" alt="${produtoAtual.nome}">` : `<i data-lucide="${produtoAtual.icone || 'package'}"></i>`}
    </div>
    <div class="detalhes-cat">${produtoAtual.categoria.toUpperCase()}</div>
    <div class="detalhes-nome">${produtoAtual.nome}</div>
    <div class="detalhes-desc">${produtoAtual.descricao || 'Sem descrição disponível'}</div>
    <div class="detalhes-preco">
      <div class="detalhes-preco-atual">R$ ${produtoAtual.preco.toFixed(2)}</div>
      ${produtoAtual.precoAntigo? `<div class="detalhes-preco-antigo">R$ ${produtoAtual.precoAntigo.toFixed(2)}</div>` : ''}
    </div>
    <button class="btn-comprar" onclick="comprarAgora()" ${produtoAtual.badge === 'ESGOTADO'? 'disabled style="opacity:.5;cursor:not-allowed"' : ''}>
      <i data-lucide="zap"></i> COMPRAR AGORA
    </button>
    <button class="btn-add-carrinho" onclick="addCarrinho()" ${produtoAtual.badge === 'ESGOTADO'? 'disabled style="opacity:.5;cursor:not-allowed"' : ''}>
      <i data-lucide="shopping-cart"></i> ADICIONAR AO CARRINHO
    </button>
  `;
  document.getElementById('modalProduto').classList.add('ativo');
  lucide.createIcons();
}

function fecharProduto(){
  document.getElementById('modalProduto').classList.remove('ativo');
}

function comprarAgora(){
  if(!userId){
    alert('Faça login para comprar');
    fecharProduto();
    abrirLogin();
    return;
  }
  if(produtoAtual.badge === 'ESGOTADO'){
    alert('Produto esgotado');
    return;
  }
  alert(`Compra iniciada!\n\nProduto: ${produtoAtual.nome}\nValor: R$ ${produtoAtual.preco.toFixed(2)}\n\nEm breve: integração com pagamento`);
  fecharProduto();
}

function addCarrinho(){
  if(!userId){
    alert('Faça login para adicionar ao carrinho');
    fecharProduto();
    abrirLogin();
    return;
  }
  if(produtoAtual.badge === 'ESGOTADO'){
    alert('Produto esgotado');
    return;
  }

  const existe = carrinho.find(item => item.id === produtoAtual.id);
  if(existe){
    existe.qtd++;
  }else{
    carrinho.push({...produtoAtual, qtd: 1});
  }

  salvarCarrinho();
  atualizarBadgeCarrinho();
  alert('Produto adicionado ao carrinho!');
  fecharProduto();
}

function salvarCarrinho(){
  localStorage.setItem('carrinho', JSON.stringify(carrinho));
}

function carregarCarrinho(){
  const salvo = localStorage.getItem('carrinho');
  if(salvo){
    carrinho = JSON.parse(salvo);
    atualizarBadgeCarrinho();
  }
}

function atualizarBadgeCarrinho(){
  const badge = document.getElementById('carrinhoBadge');
  const total = carrinho.reduce((sum, item) => sum + item.qtd, 0);
  if(total > 0){
    badge.textContent = total;
    badge.style.display = 'flex';
  }else{
    badge.style.display = 'none';
  }
}

function abrirCarrinho(){
  if(carrinho.length === 0){
    alert('Carrinho vazio');
    return;
  }
  let msg = 'SEU CARRINHO:\n\n';
  let total = 0;
  carrinho.forEach(item => {
    msg += `${item.nome}\nQtd: ${item.qtd} x R$ ${item.preco.toFixed(2)} = R$ ${(item.qtd * item.preco).toFixed(2)}\n\n`;
    total += item.qtd * item.preco;
  });
  msg += `TOTAL: R$ ${total.toFixed(2)}`;
  alert(msg);
}

function abrirPerfil(){
  if(!userId){
    abrirLogin();
  }else{
    alert(`Perfil:\n\nNome: ${userNome}\nUID: ${userId}`);
  }
}

function abrirLogin(){
  document.getElementById('modalLogin').classList.add('ativo');
}

function fecharLogin(){
  document.getElementById('modalLogin').classList.remove('ativo');
}

function mudarTabLogin(t){
  document.querySelectorAll('.tab-modal').forEach(e=>e.classList.remove('ativo'));
  event.target.classList.add('ativo');
  document.getElementById('tabLoginContent').style.display=t==='login'?'block':'none';
  document.getElementById('tabCadastroContent').style.display=t==='cadastro'?'block':'none';
}

async function fazerLogin(){
  const { auth, signInWithEmailAndPassword } = window.fb;
  const email=document.getElementById('loginEmail').value.trim();
  const senha=document.getElementById('loginSenha').value;
  if(!email||!senha){alert('Preencha todos os campos');return}
  try{
    await signInWithEmailAndPassword(auth,email,senha);
    fecharLogin();
  }catch(e){
    alert('Erro: '+e.message);
  }
}

async function fazerCadastro(){
  const { auth, createUserWithEmailAndPassword, updateProfile } = window.fb;
  const nome=document.getElementById('cadNome').value.trim();
  const email=document.getElementById('cadEmail').value.trim();
  const senha=document.getElementById('cadSenha').value;
  if(!nome||!email||!senha){alert('Preencha todos os campos');return}
  if(senha.length<6){alert('Senha deve ter no mínimo 6 caracteres');return}
  try{
    const cred = await createUserWithEmailAndPassword(auth,email,senha);
    await updateProfile(cred.user, {displayName: nome});
    fecharLogin();
    alert('Conta criada com sucesso!');
  }catch(e){
    alert('Erro: '+e.message);
  }
}

async function fazerLogout(){
  const { auth, signOut } = window.fb;
  if(confirm('Deseja sair?')){
    await signOut(auth);
    carrinho = [];
    salvarCarrinho();
    atualizarBadgeCarrinho();
  }
}

lucide.createIcons();
</script>
</body>
</html>
