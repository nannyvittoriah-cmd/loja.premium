<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Gamer</title>

<!-- FIREBASE (VERSÃO CORRETA) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0a0014,#1a0033);
    color:white;
}

.tela{ display:none; padding:20px; }
.ativa{ display:block; }

input{
    width:90%;
    padding:12px;
    margin:5px;
    border-radius:10px;
    border:1px solid #ff00aa;
    background:transparent;
    color:white;
}

button{
    background:#ff00aa;
    border:none;
    padding:12px;
    width:95%;
    border-radius:10px;
    color:white;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="tela ativa">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">ENTRAR</button>
    <button onclick="loginGoogle()">Entrar com Google</button>

    <p onclick="trocarTela('cadastro')" style="color:#ff00aa;cursor:pointer;">
        Criar conta
    </p>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="tela">
    <h2>Cadastro</h2>

    <input id="novoEmail" placeholder="Email">
    <input id="novaSenha" type="password" placeholder="Senha">

    <button onclick="cadastrar()">Cadastrar</button>
</div>

<!-- LOJA -->
<div id="loja" class="tela">
    <h2>Login realizado com sucesso 🔥</h2>
</div>

<script>
// 🔥 COLOCA SUA CONFIG REAL DO FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
};

// INICIAR FIREBASE
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN EMAIL
function login(){
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    auth.signInWithEmailAndPassword(email, senha)
    .then(() => trocarTela("loja"))
    .catch(err => alert(err.message));
}

// CADASTRO
function cadastrar(){
    let email = document.getElementById("novoEmail").value;
    let senha = document.getElementById("novaSenha").value;

    auth.createUserWithEmailAndPassword(email, senha)
    .then(() => {
        alert("Conta criada com sucesso!");
        trocarTela("login");
    })
    .catch(err => alert(err.message));
}

// GOOGLE LOGIN
function loginGoogle(){
    let provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(() => trocarTela("loja"))
    .catch(err => alert(err.message));
}

// TROCAR TELA
function trocarTela(tela){
    document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
    document.getElementById(tela).classList.add("ativa");
}
</script>

</body>
</html>
