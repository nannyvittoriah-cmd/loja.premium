<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonyx Store - Painel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #fff;
      --verde: #00ff88;
      --bg-card: #13131a;
      --borda: #2a2a35;
    }
    .hidden { display: none !important; }
    
    /* LOGIN */
    .login-box {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a1a22 0%, #0a0a0f 100%);
    }
    .login-card {
      background: var(--bg-card);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--borda);
      width: 100%;
      max-width: 400px;
    }
    .login-card h1 {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-card h1 span { color: var(--verde); }
    .login-card p { text-align: center; color: #888; margin-bottom: 30px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #ccc; }
    .input-group input {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid var(--borda);
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
    }
    .input-group input:focus { outline: none; border-color: var(--verde); }
    .btn-login {
      width: 100%;
      background: var(--verde);
      color: #0a0a0f;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
    }
    .erro { color: #ff4757; text-align: center; margin-top: 16px; font-size: 0.9rem; }

    /* PAINEL */
    .app {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 250px;
      background: var(--bg-card);
      border-right: 1px solid var(--borda);
      padding: 24px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 40px;
    }
    .logo span { color: var(--verde); }
    .menu-item {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      color: #888;
    }
    .menu-item.active, .menu-item:hover {
      background: #1a1a22;
      color: #fff;
    }
    .user-box {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      background: #1a1a22;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .user-box button {
      background: none;
      border: none;
      color: #ff4757;
      cursor: pointer;
      margin-top: 8px;
      font-size: 0.8rem;
    }

    .content {
      flex: 1;
      padding: 30px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .topbar h2 { font-size: 1.8rem; }
    .saldo {
      background: #1a1a22;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--borda);
    }
    .saldo span { color: var(--verde); font-weight: 700; }

    /* GRID PRODUTOS */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--borda);
      display: flex;
      flex-direction: column;
    }
    .card.invertido { flex-direction: row-reverse; }
    .card.invertido .img-box { width: 40%; }
    .card.invertido .info { width: 60%; }
    .img-box {
      position: relative;
      height: 180px;
    }
    .card.invertido .img-box { height: auto; }
    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .jogo {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 0.7rem;
      color: var(--verde);
      background: #0a0a0fcc;
      padding: 5px 10px;
      border-radius: 5px;
      font-weight: 700;
    }
    .info {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .info h3 { font-size: 1.1rem; margin-bottom: 6px; }
    .desc { color: #888; font-size: 0.85rem; flex: 1; margin-bottom: 12px; }
    .compra {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .preco { font-size: 1.4rem; font-weight: 900; color: var(--verde); }
    .btn-comprar {
      background: var(--verde);
      color: #0a0a0f;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .card.invertido { flex-direction: column; }
      .card.invertido .img-box, .card.invertido .info { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- TELA DE LOGIN -->
  <div id="login" class="login-box">
    <div class="login-card">
      <h1>BONYX <span>STORE</span></h1>
      <p>Acesse seu painel de compras</p>
      <div class="input-group">
        <label>Usuário</label>
        <input type="text" id="usuario" placeholder="admin">
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="123456">
      </div>
      <button class="btn-login" onclick="fazerLogin()">Entrar</button>
      <p class="erro hidden" id="erro-login">Usuário ou senha incorretos</p>
      <p style="text-align: center; color: #555; font-size: 0.8rem; margin-top: 20px;">
        Use: admin / 123456
      </p>
    </div>
  </div>

  <!-- PAINEL PRINCIPAL -->
  <div id="painel" class="app hidden">
    <div class="sidebar">
      <div class="logo">BONYX <span>STORE</span></div>
      <div class="menu-item active">🏠 Loja</div>
      <div class="menu-item">📦 Meus Pedidos</div>
      <div class="menu-item">💰 Adicionar Saldo</div>
      <div class="menu-item">💬 Suporte</div>
      
      <div class="user-box">
        <div>Logado como: <strong id="user-nome">admin</strong></div>
        <button onclick="sair()">Sair</button>
      </div>
    </div>

    <div class="content">
      <div class="topbar">
        <h2>Loja de Itens</h2>
        <div class="saldo">Saldo: <span>R$ 0,00</span></div>
      </div>

      <div class="grid" id="grid-produtos"></div>
    </div>
  </div>

  <script type="module">
    import React from 'https://esm.sh/react@18.2.0'
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client'

    const WHATSAPP = 'https://wa.me/5511999999999?text=Quero%20comprar%20'

    const produtos = [
      { id: 1, nome: "Passe de Batalha", jogo: "Free Fire", preco: "R$ 29,90", img: "https://i.imgur.com/8Q1Z3yL.png", desc: "Entrega via ID em até 10min", invertido: true },
      { id: 2, nome: "3200 Diamantes", jogo: "Mobile Legends", preco: "R$ 99,90", img: "https://i.imgur.com/k2oWj7P.png", desc: "Top-up oficial Moonton", invertido: false },
      { id: 3, nome: "Mythic Skin Crate", jogo: "COD Mobile", preco: "R$ 89,90", img: "https://i.imgur.com/Xt7Q2qF.png", desc: "Caixa com skin lendária", invertido: true },
      { id: 4, nome: "18000 UC", jogo: "PUBG Mobile", preco: "R$ 299,90", img: "https://i.imgur.com/p5b3K8m.png", desc: "Maior pacote com bônus", invertido: false },
      { id: 5, nome: "5000 Robux", jogo: "Roblox", preco: "R$ 149,90", img: "https://i.imgur.com/3vJ8N9Q.png", desc: "Entrega por gift card", invertido: true },
      { id: 6, nome: "Conta NV 80", jogo: "Standoff 2", preco: "R$ 79,90", img: "https://i.imgur.com/7xY1Z2A.png", desc: "Com facas e luvas", invertido: false }
    ]

    // LOGIN SIMPLES
    window.fazerLogin = () => {
      const user = document.getElementById('usuario').value
      const senha = document.getElementById('senha').value
      if (user === 'admin' && senha === '123456') {
        localStorage.setItem('bonyx_logado', 'true')
        localStorage.setItem('bonyx_user', user)
        mostrarPainel()
      } else {
        document.getElementById('erro-login').classList.remove('hidden')
      }
    }

    window.sair = () => {
      localStorage.removeItem('bonyx_logado')
      location.reload()
    }

    function mostrarPainel() {
      document.getElementById('login').classList.add('hidden')
      document.getElementById('painel').classList.remove('hidden')
      document.getElementById('user-nome').innerText = localStorage.getItem('bonyx_user')
      renderProdutos()
    }

    function renderProdutos() {
      const grid = document.getElementById('grid-produtos')
      grid.innerHTML = ''
      produtos.forEach(item => {
        const card = document.createElement('div')
        card.className = `card ${item.invertido ? 'invertido' : ''}`
        card.innerHTML = `
          <div class="img-box">
            <img src="${item.img}" alt="${item.nome}">
            <span class="jogo">${item.jogo}</span>
          </div>
          <div class="info">
            <h3>${item.nome}</h3>
            <p class="desc">${item.desc}</p>
            <div class="compra">
              <p class="preco">${item.preco}</p>
              <button class="btn-comprar" onclick="window.open('${WHATSAPP}${item.nome}%20-%20${item.jogo}')">Comprar</button>
            </div>
          </div>
        `
        grid.appendChild(card)
      })
    }

    // CHECA SE JÁ TÁ LOGADO
    if (localStorage.getItem('bonyx_logado') === 'true') {
      mostrarPainel()
    }
  </script>
</body>
</html>
