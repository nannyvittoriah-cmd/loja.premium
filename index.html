<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Gamer</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: #fff;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 25px;
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff;
}

.categorias {
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    background: #111;
    border: 2px solid #ff00ff;
    color: #ff00ff;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #ff00ff;
    color: black;
}

.produtos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.card {
    background: #111;
    border: 2px solid #ff00ff;
    border-radius: 10px;
    padding: 10px;
    margin: 10px;
    width: 200px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.admin-panel {
    display: none;
    position: fixed;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    border: 2px solid #ff00ff;
    padding: 20px;
    border-radius: 10px;
}
</style>

</head>
<body>

<header>🔥 LOJA GAMER 🔥</header>

<div class="categorias">
    <button onclick="mostrar('ff')">Free Fire</button>
    <button onclick="mostrar('fortnite')">Fortnite</button>
    <button onclick="mostrar('caixa')">Caixas</button>
</div>

<div class="produtos" id="produtos"></div>

<br><br>
<center>
<button onclick="loginAdmin()">Painel Admin</button>
</center>

<div class="admin-panel" id="admin">
    <h3>Painel Admin</h3>
    <input id="nome" placeholder="Nome"><br><br>
    <input id="preco" placeholder="Preço"><br><br>
    <input id="img" placeholder="URL da imagem"><br><br>
    <select id="categoria">
        <option value="ff">Free Fire</option>
        <option value="fortnite">Fortnite</option>
        <option value="caixa">Caixa</option>
    </select><br><br>
    <button onclick="addProduto()">Adicionar</button>
</div>

<script>

let numeroWhatsApp = "5598984853563";

let produtos = [
    {nome:"100 Diamantes FF", preco:5, img:"https://i.imgur.com/3ZQ3Z6k.png", cat:"ff"},
    {nome:"500 V-Bucks Fortnite", preco:20, img:"https://i.imgur.com/Jn1XxYb.png", cat:"fortnite"},
    {nome:"Caixa Misteriosa", preco:10, img:"https://i.imgur.com/zYIlgBl.png", cat:"caixa"}
];

function mostrar(cat) {
    let area = document.getElementById("produtos");
    area.innerHTML = "";

    produtos.filter(p => p.cat == cat).forEach(p => {
        area.innerHTML += `
        <div class="card">
            <img src="${p.img}">
            <h4>${p.nome}</h4>
            <p>R$ ${p.preco}</p>
            <input type="number" value="1" min="1" id="qtd">
            <button onclick="comprar('${p.nome}', ${p.preco})">Comprar</button>
        </div>`;
    });
}

function comprar(nome, preco) {
    let msg = `Quero comprar: ${nome}`;
    let link = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(msg)}`;
    window.open(link);
}

function loginAdmin() {
    let senha = prompt("Digite a senha admin:");
    if(senha === "Lorrannyh.170") {
        document.getElementById("admin").style.display = "block";
    } else {
        alert("Senha errada!");
    }
}

function addProduto() {
    let nome = document.getElementById("nome").value;
    let preco = document.getElementById("preco").value;
    let img = document.getElementById("img").value;
    let cat = document.getElementById("categoria").value;

    produtos.push({nome, preco, img, cat});
    alert("Produto adicionado!");
}

</script>

</body>
</html>
