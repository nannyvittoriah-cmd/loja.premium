<!-- LOGIN -->
<section class="page active" id="login">
  <div class="login-wrap">
    <div class="glow"></div>
    <div class="login-card">
      
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#grad1)"/>
            <path d="M2 17L12 22L22 17" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
            <path d="M2 12L12 17L22 12" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#d4af37"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1>PRIME</h1>
          <span>STORE</span>
        </div>
      </div>

      <div id="loginForm">
        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Acesse sua conta premium</p>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">mail</span>
          <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">lock</span>
          <input type="password" id="loginPass" placeholder="Senha">
          <span class="material-symbols-outlined toggle" onclick="togglePass('loginPass',this)">visibility_off</span>
        </div>

        <div class="forgot">
          <a href="#">Esqueci minha senha</a>
        </div>

        <p class="error" id="loginError"></p>
        
        <button class="btn-primary" onclick="login()">
          <span>Entrar</span>
          <div class="btn-shine"></div>
        </button>

        <div class="divider">
          <span>ou</span>
        </div>

        <button class="btn-ghost" onclick="toggleForm()">Criar conta</button>
      </div>

      <div id="registerForm" class="hidden">
        <h2>Criar conta</h2>
        <p class="subtitle">Junte-se à Prime Store</p>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">person</span>
          <input type="text" id="regName" placeholder="Seu nome">
        </div>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">mail</span>
          <input type="email" id="regEmail" placeholder="seu@email.com">
        </div>
        
        <div class="input-group">
          <span class="material-symbols-outlined icon">lock</span>
          <input type="password" id="regPass" placeholder="Senha">
          <span class="material-symbols-outlined toggle" onclick="togglePass('regPass',this)">visibility_off</span>
        </div>

        <p class="error" id="regError"></p>
        
        <button class="btn-primary" onclick="register()">
          <span>Cadastrar</span>
          <div class="btn-shine"></div>
        </button>

        <div class="divider">
          <span>ou</span>
        </div>

        <button class="btn-ghost" onclick="toggleForm()">Fazer login</button>
      </div>
    </div>
  </div>
</section>

<style>
.login-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:#060609;
  position:relative;
  overflow:hidden;
}
.login-wrap .glow{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(124,58,237,0.25) 0%, transparent 70%);
  top:-200px;
  left:50%;
  transform:translateX(-50%);
  filter:blur(80px);
  animation:float 8s ease-in-out infinite;
}
@keyframes float{
 0%,100%{transform:translateX(-50%) translateY(0);}
 50%{transform:translateX(-50%) translateY(20px);}
}

.login-card{
  width:100%;
  max-width:360px;
  background:rgba(19,19,25,0.7);
  backdrop-filter:blur(24px);
  border:1px solid rgba(124,58,237,0.2);
  border-radius:24px;
  padding:36px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  position:relative;
  z-index:2;
  animation:slideUp 0.6s ease;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:32px;
}
.logo-icon{
  width:44px;
  height:44px;
  background:linear-gradient(135deg, rgba(212,175,55,0.2), rgba(124,58,237,0.2));
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(212,175,55,0.3);
  box-shadow:0 0 20px rgba(124,58,237,0.3);
}
.logo-icon svg{width:24px;height:24px;}
.logo h1{
  font-size:22px;
  font-weight:700;
  background:linear-gradient(90deg, #d4af37, #7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:1px;
}
.logo span{
  font-size:10px;
  color:var(--text2);
  letter-spacing:3px;
  display:block;
  margin-top:-2px;
}

h2{
  font-size:20px;
  font-weight:600;
  margin-bottom:6px;
  text-align:center;
}
.subtitle{
  font-size:12px;
  color:var(--text2);
  margin-bottom:28px;
  text-align:center;
}

.input-group{
  position:relative;
  margin-bottom:16px;
}
.input-group input{
  width:100%;
  height:48px;
  background:rgba(26,26,33,0.8);
  border:1px solid var(--border);
  border-radius:14px;
  padding:0 44px 0 44px;
  color:var(--text);
  font-size:13px;
  outline:none;
  transition:all 0.3s;
}
.input-group input:focus{
  border-color:#7c3aed;
  box-shadow:0 0 0 3px rgba(124,58,237,0.15);
  background:rgba(26,26,33,1);
}
.input-group .icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text2);
  font-size:20px;
}
.input-group .toggle{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text2);
  cursor:pointer;
  font-size:20px;
  transition:0.2s;
}
.input-group .toggle:hover{color:#7c3aed;}

.forgot{
  text-align:right;
  margin:-8px 0 20px;
}
.forgot a{
  font-size:11px;
  color:#7c3aed;
  text-decoration:none;
  transition:0.2s;
}
.forgot a:hover{color:#d4af37;}

.btn-primary{
  width:100%;
  height:48px;
  background:linear-gradient(135deg, #7c3aed, #5b21b6);
  border:none;
  border-radius:14px;
  color:#fff;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.3s;
  box-shadow:0 8px 24px rgba(124,58,237,0.4);
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(124,58,237,0.6);
}
.btn-primary:active{transform:translateY(0);}
.btn-shine{
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition:0.5s;
}
.btn-primary:hover .btn-shine{left:100%;}

.btn-ghost{
  width:100%;
  height:48px;
  background:transparent;
  border:1px solid rgba(124,58,237,0.4);
  border-radius:14px;
  color:#7c3aed;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
}
.btn-ghost:hover{
  background:rgba(124,58,237,0.1);
  border-color:#7c3aed;
  box-shadow:0 0 20px rgba(124,58,237,0.2);
}

.divider{
  display:flex;
  align-items:center;
  margin:20px 0;
  color:var(--text2);
  font-size:11px;
}
.divider::before,
.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}
.divider span{padding:0 12px;}

.error{
  color:#ef4444;
  font-size:11px;
  margin:-12px 0 16px;
  display:none;
  text-align:center;
}

.hidden{display:none;}
</style>
