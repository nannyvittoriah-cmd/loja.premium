<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Prime Store Vz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#05010a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
color:white;
}

/* CARD */

.login-box{
width:100%;
max-width:340px;
background:#0d0616;
border:1px solid rgba(128,0,255,0.2);
border-radius:28px;
padding:22px;
box-shadow:0 0 25px rgba(128,0,255,0.15);
}

/* LOGO */

.logo-area{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:28px;
}

.logo{
width:70px;
height:70px;
border-radius:20px;
background:linear-gradient(135deg,#6800ff,#b700ff);
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
font-weight:700;
box-shadow:0 0 20px #7a00ff;
margin-bottom:15px;
}

.logo-text{
font-size:26px;
font-weight:700;
}

.logo-text span{
color:#b700ff;
}

.sub{
font-size:11px;
color:#8d8d8d;
margin-top:4px;
}

/* TABS */

.tabs{
display:flex;
gap:8px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:11px;
border-radius:13px;
background:#14091f;
text-align:center;
font-size:11px;
color:#a6a6a6;
border:1px solid #241035;
}

.active{
background:linear-gradient(135deg,#7300ff,#bf00ff);
color:white;
font-weight:600;
}

/* TITLES */

.title{
font-size:24px;
font-weight:600;
margin-bottom:4px;
}

.desc{
font-size:11px;
color:#8b8b8b;
margin-bottom:22px;
}

/* INPUT */

.input-box{
margin-bottom:14px;
}

.label{
font-size:11px;
margin-bottom:7px;
color:#cfcfcf;
display:block;
}

.input{
width:100%;
height:48px;
background:#14091f;
border:none;
outline:none;
border-radius:15px;
padding:0 15px;
font-size:12px;
color:white;
border:1px solid #251138;
}

/* OPTIONS */

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:5px;
margin-bottom:18px;
font-size:10px;
color:#9e9e9e;
}

.options a{
color:#ba00ff;
text-decoration:none;
}

/* BUTTON */

.btn{
width:100%;
height:50px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#6d00ff,#c100ff);
color:white;
font-size:13px;
font-weight:600;
box-shadow:0 0 15px rgba(128,0,255,0.3);
}

/* FOOT */

.footer{
margin-top:20px;
display:flex;
justify-content:space-between;
gap:8px;
}

.footer-card{
flex:1;
background:#12081c;
padding:10px;
border-radius:14px;
border:1px solid #241035;
font-size:9px;
color:#9b9b9b;
text-align:center;
}

.footer-card b{
display:block;
color:#c700ff;
margin-bottom:4px;
font-size:10px;
}

</style>

</head>

<body>

<div class="login-box">

<!-- LOGO -->

<div class="logo-area">

<div class="logo">
P
</div>

<div class="logo-text">
Prime <span>store Vz</span>
</div>

<div class="sub">
Sua loja gamer premium
</div>

</div>

<!-- TABS -->

<div class="tabs">

<div class="tab active">
Login
</div>

<div class="tab">
Cadastro
</div>

<div class="tab">
Senha
</div>

</div>

<!-- TEXT -->

<div class="title">
Bem-vindo
</div>

<div class="desc">
Faça login para continuar
</div>

<!-- EMAIL -->

<div class="input-box">

<label class="label">
E-mail
</label>

<input
type="email"
class="input"
placeholder="seuemail@gmail.com"
id="email">

</div>

<!-- SENHA -->

<div class="input-box">

<label class="label">
Senha
</label>

<input
type="password"
class="input"
placeholder="Sua senha"
id="senha">

</div>

<!-- OPTIONS -->

<div class="options">

<div>
Lembrar de mim
</div>

<a href="#">
Esqueceu senha?
</a>

</div>

<!-- BUTTON -->

<button class="btn" onclick="login()">
Entrar
</button>

<!-- FOOT -->

<div class="footer">

<div class="footer-card">

<b>
Seguro
</b>

Dados protegidos

</div>

<div class="footer-card">

<b>
Entrega
</b>

Automática

</div>

<div class="footer-card">

<b>
Suporte
</b>

24 horas

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",

authDomain: "premium-store-aa58b.firebaseapp.com",

databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",

projectId: "premium-store-aa58b",

storageBucket: "premium-store-aa58b.firebasestorage.app",

messagingSenderId: "462239500057",

appId: "1:462239500057:web:f1b7cea162ed308a866788",

measurementId: "G-CN88J28WRX"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

try{

await signInWithEmailAndPassword(
auth,
email,
senha
);

alert("Login realizado!");

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html
