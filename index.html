<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* HEADER GRANDE */
.topbar{
background:#0b0f2a;
padding:30px;
font-size:34px;
text-align:center;
font-weight:bold;
border-bottom:2px solid #00c3ff;
letter-spacing:2px;
}

/* LOJA */
.container{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
padding:20px;
}

.card{
width:260px;
background:#111;
border:2px solid #00c3ff;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
background:#00c3ff;
border:none;
cursor:pointer;
}

/* CHECKOUT */
.checkout{display:none;padding:20px;}
.box{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.modalBox{
background:#111;
padding:20px;
max-width:500px;
border-radius:10px;
}

/* ADM */
.admin{display:none;padding:20px;}
.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border:1px solid #555;
border-radius:6px;
}

.item{
border:1px solid #333;
padding:10px;
margin:5px 0;
}

.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#222;
padding:10px;
border-radius:8px;
text-align:center;
}
</style>
</head>

<body>

<div class="topbar">BONY STORE</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout">
<div class="box">
<h3>ENVIO DE COMPROVANTE</h3>

<input id="nome" placeholder="Nome">
<input id="whats" placeholder="WhatsApp">
<input id="produto" readonly>
<input id="link" placeholder="Link do comprovante">

<button onclick="enviar()">ENVIAR</button>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modalBox">
<h3 id="mTitulo"></h3>
<p id="mPreco"></p>
<p id="mDesc" style="white-space:pre-line"></p>
<p id="mEstoque"></p>
<button onclick="fechar()">FECHAR</button>
</div>
</div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>➕ PRODUTOS</h3>

<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<input id="pestoque" placeholder="Estoque">
<button onclick="add()">Adicionar</button>

<hr>

<div id="produtosADM"></div>

<hr>

<h3>📊 STATS</h3>
<div class="stats">
<div class="stat">Vendas<br><span id="vendas"></span></div>
<div class="stat">Pedidos<br><span id="pedidos"></span></div>
</div>

<hr>

<div id="hist"></div>

</div>
</div>
</div>

<script>

let selected="";
let indexSelected=null;

/* PRODUTOS */
let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png","Acesso básico ao sistema",10],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png","Mais recursos e suporte",5],
["Passe Elite","80","https://i.imgur.com/3Q9Z1ZQ.png","Acesso completo ao sistema",3]
];

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function render(){
loja.innerHTML="";

produtos.forEach((p,i)=>{
let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>
<p style="font-size:12px;opacity:0.8">${p[3]}</p>
<p>Estoque: ${p[4]}</p>

<button onclick="detalhe(${i})">DETALHES</button>
<button onclick="buy(${i})" ${p[4]<=0?'disabled':''}>COMPRAR</button>
`;

loja.appendChild(d);
});
}
render();

/* DETALHES */
function detalhe(i){
modal.style.display="flex";
mTitulo.innerText=produtos[i][0];
mPreco.innerText="R$ "+produtos[i][1];
mDesc.innerText=produtos[i][3];
mEstoque.innerText="Estoque: "+produtos[i][4];
}

/* FECHAR */
function fechar(){modal.style.display="none";}

/* COMPRA */
function buy(i){

if(produtos[i][4]<=0){
alert("Sem estoque!");
return;
}

indexSelected=i;
selected=produtos[i][0];

produtos[i][4]--;
save();
render();

loja.style.display="none";
checkout.style.display="block";

produto.value=selected;
}

/* ENVIO */
function enviar(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
nome:nome.value,
produto:selected,
link:link.value
});

localStorage.setItem("dados",JSON.stringify(dados));

let v=Number(localStorage.getItem("vendas")||0);
localStorage.setItem("vendas",v+1);

alert("Enviado!");
home();
}

/* HOME */
function home(){
loja.style.display="flex";
checkout.style.display="none";
admin.style.display="none";
}

/* ADM */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

/* LOGIN */
function login(){
if(u.value==="admin" && p.value==="123"){
painel.style.display="block";
loadADM();
loadHist();
stats();
}else alert("erro login");
}

/* ADD */
function add(){
produtos.push([
pnome.value,
ppreco.value,
pimg.value,
pdesc.value,
Number(pestoque.value)
]);

save();
render();
loadADM();
}

/* ADM PRODUTOS */
function loadADM(){
produtosADM.innerHTML="";

produtos.forEach((p,i)=>{
let d=document.createElement("div");
d.className="item";

d.innerHTML=`
<input value="${p[0]}" onchange="produtos[${i}][0]=this.value;save();render()">
<input value="${p[1]}" onchange="produtos[${i}][1]=this.value;save();render()">
<input value="${p[2]}" onchange="produtos[${i}][2]=this.value;save();render()">
<textarea onchange="produtos[${i}][3]=this.value;save();render()">${p[3]}</textarea>
<input value="${p[4]}" onchange="produtos[${i}][4]=Number(this.value);save();render()">
<button onclick="produtos.splice(${i},1);save();render();loadADM()">Excluir</button>
`;

produtosADM.appendChild(d);
});
}

/* HISTÓRICO */
function loadHist(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

hist.innerHTML="";

dados.forEach(d=>{
hist.innerHTML+=`
<div class="item">
<b>${d.nome}</b><br>
${d.produto}<br>
<a href="${d.link}" target="_blank">ver comprovante</a>
</div>
`;
});
}

/* STATS */
function stats(){
vendas.innerText=localStorage.getItem("vendas")||0;
pedidos.innerText=(JSON.parse(localStorage.getItem("dados")||"[]")).length;
}

setInterval(stats,1000);

</script>

</body>
</html>
