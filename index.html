<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bonys Story</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0b1a4a;
    color: white;
}

/* ================= AVISO ================= */
#aviso {
    position: fixed;
    width: 100%;
    height: 100%;
    background-color: #0b1a4a;
    display: flex;
    justify-content: center;
    align-items: center;
}

.caixa-aviso {
    background-color: #0b1a4a;
    border: 3px solid #ff4da6;
    border-radius: 15px;
    padding: 30px;
    width: 80%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 20px #ff4da6;
}

.caixa-aviso h1 {
    color: #ff4da6;
}

.botao {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #ff4da6;
    color: white;
    cursor: pointer;
}

/* ================= SITE ================= */
.tela {
    display: none;
    padding: 30px;
    min-height: 100vh;
}

.ativa {
    display: block;
}

/* LINHA */
.linha {
    width: 80%;
    height: 2px;
    background: #ff4da6;
    margin: 30px auto;
}

/* TITULO */
.titulo-categorias {
    margin: 20px 0;
    font-size: 22px;
    color: #ff4da6;
}

/* GRID */
.categorias {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.categoria {
    background-color: #0b1a4a;
    border: 2px solid #ff4da6;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
}

.categoria img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
}

/* BOTÃO VOLTAR */
.voltar {
    margin-bottom: 20px;
    background: #ff4da6;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* RESPONSIVO */
@media (max-width: 700px) {
    .categorias {
        grid-template-columns: repeat(2, 1fr);
    }
}

</style>
</head>

<body>

<!-- AVISO -->
<div id="aviso">
    <div class="caixa-aviso">
        <h1>Aviso Importante</h1>
        <p>Sem login/cadastro por enquanto.</p>
        <button class="botao" onclick="entrar()">Entrar no site</button>
    </div>
</div>

<!-- HOME -->
<div id="home" class="tela">
    <h1>Bem-vindo 💖</h1>

    <div class="linha"></div>

    <h2 class="titulo-categorias">CATEGORIAS</h2>

    <div class="categorias">
        <div class="categoria" onclick="abrir('roupas')">
            <img src="https://i.imgur.com/8Km9tLL.jpg">
            <p>Roupas</p>
        </div>

        <div class="categoria" onclick="abrir('acessorios')">
            <img src="https://i.imgur.com/jTqVY9C.jpg">
            <p>Acessórios</p>
        </div>

        <div class="categoria" onclick="abrir('make')">
            <img src="https://i.imgur.com/3ZQ3Z6L.jpg">
            <p>Maquiagem</p>
        </div>

        <div class="categoria" onclick="abrir('perfume')">
            <img src="https://i.imgur.com/6Iej2c3.jpg">
            <p>Perfumes</p>
        </div>

        <div class="categoria" onclick="abrir('calcados')">
            <img src="https://i.imgur.com/5tj6S7Ol.jpg">
            <p>Calçados</p>
        </div>

        <div class="categoria" onclick="abrir('bolsas')">
            <img src="https://i.imgur.com/XR4f5QZ.jpg">
            <p>Bolsas</p>
        </div>

        <div class="categoria" onclick="abrir('promo')">
            <img src="https://i.imgur.com/0y0y0y0.jpg">
            <p>Promoções</p>
        </div>
    </div>
</div>

<!-- EXEMPLO DE CATEGORIA -->
<div id="roupas" class="tela">
    <button class="voltar" onclick="voltar()">← Voltar</button>
    <h1>Roupas</h1>
    <p>Aqui vão seus produtos de roupas 👕</p>
</div>

<div id="acessorios" class="tela">
    <button class="voltar" onclick="voltar()">← Voltar</button>
    <h1>Acessórios</h1>
</div>

<div id="make" class="tela">
    <button class="voltar" onclick="voltar()">← Voltar</button>
    <h1>Maquiagem</h1>
</div>

<div id="perfume" class="tela">
    <button class="voltar" onclick="voltar()">← Voltar</button>
    <h1>Perfumes</h1>
</div>

<div id="calcados" class="tela">
    <button class="voltar" onclick="voltar()">← Voltar</button>
    <h1>Calçados</h1>
</div>

<div id="bolsas" class="tela">
    <button class="voltar" onclick="voltar()">← Voltar</button>
    <h1>Bolsas</h1>
</div>

<div id="promo" class="tela">
    <button class="voltar" onclick="voltar()">← Voltar</button>
    <h1>Promoções</h1>
</div>

<script>
function entrar() {
    document.getElementById("aviso").style.display = "none";
    document.getElementById("home").classList.add("ativa");
}

function abrir(id) {
    document.getElementById("home").classList.remove("ativa");
    document.getElementById(id).classList.add("ativa");
}

function voltar() {
    let telas = document.querySelectorAll(".tela");
    telas.forEach(t => t.classList.remove("ativa"));
    document.getElementById("home").classList.add("ativa");
}
</script>

</body>
</html>
