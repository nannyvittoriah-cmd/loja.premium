<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #0a0a0a;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 0 30px rgba(255, 0, 150, 0.6), 0 0 60px rgba(255, 0, 150, 0.3);
      border: 1px solid rgba(255, 0, 150, 0.2);
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 32px;
      color: #ff0080;
      letter-spacing: 1px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      color: #333;
      outline: none;
      margin-bottom: 16px;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #ff0080;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin: 20px 0 16px;
    }
    .divider {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin: 16px 0;
    }
    .btn-google {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .signup {
      text-align: center;
      margin-top: 24px;
      color: #aaa;
      font-size: 14px;
    }
    .signup a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">⚡ LOGIN</h1>
    <form>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Senha" required>
      <button type="submit" class="btn-primary">Entrar</button>
      <div class="divider">OU</div>
      <button type="button" class="btn-google">Entrar com Google</button>
      <div class="signup">
        <a href="#">Criar conta</a>
      </div>
    </form>
  </div>
</body>
</html>
