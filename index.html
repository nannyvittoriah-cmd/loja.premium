<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonys Story</title>

<style>
:root{
--bg:#0b0f2a;
--card:#11162f;
--pink:#ff2fb3;
--text:#fff;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.hidden{display:none;}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

input,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
cursor:pointer;
background:var(--pink);
color:#fff;
font-weight:bold;
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#070a1a;
}

.container{
padding:15px;
}

.card{
background:var(--card);
padding:10px;
border-radius:10px;
margin:10px 0;
}

.flex{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.badge{
background:var(--pink);
padding:3px 8px;
border-radius:5px;
font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<h2>Bonys Story</h2>
<input id="user" placeholder="usuário">
<input id="pass" type="password" placeholder="senha">
<button onclick="login()">Entrar</button>
<button onclick="register()">Cadastrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="topbar">
<div>Bonys Story</div>
<div>
<span id="userTag"></span>
<button onclick="logout()">Sair</button>
</div>
</div>

<div class="container">

<!-- PRODUTOS -->
<div class="card">
<h3>Produtos</h3>
<div id="products"></div>
</div>

<!-- CARRINHO -->
<div class="card">
<h3>Carrinho</h3>
<div id="cart"></div>
<button onclick="buy()">Finalizar compra (PIX)</button>
</div>

<!-- FAVORITOS -->
<div class="card">
<h3>Favoritos</h3>
<div id="fav"></div>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="card hidden">
<h3>ADM Painel</h3>
<p>Adicionar produto</p>
<input id="pname" placeholder="nome">
<input id="pprice" placeholder="preço">
<button onclick="addProduct()">Adicionar</button>
</div>

<!-- PIX -->
<div id="pixBox" class="card hidden">
<h3>Pagamento PIX</h3>
<p>Chave PIX: 000.000.000-00</p>
<p>Envie o comprovante para liberação manual</p>
</div>

</div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")||"[]");
let products = JSON.parse(localStorage.getItem("products")||"[]");
let cart = [];
let fav = [];
let currentUser = null;

/* LOGIN */
function login(){
let u = user.value;
let p = pass.value;

let found = users.find(x=>x.user===u && x.pass===p);

if(found){
currentUser = found;
enterApp();
}else{
alert("erro login");
}
}

/* REGISTER */
function register(){
users.push({user:user.value, pass:pass.value, role:"user"});
localStorage.setItem("users",JSON.stringify(users));
alert("criado");
}

/* APP */
function enterApp(){
loginPage.classList.add("hidden");
app.classList.remove("hidden");

userTag.innerText = currentUser.user;

if(currentUser.user === "admin"){
adminPanel.classList.remove("hidden");
}

renderProducts();
}

/* LOGOUT */
function logout(){
location.reload();
}

/* PRODUCTS */
function renderProducts(){
productsDiv.innerHTML = "";

products.forEach((p,i)=>{
productsDiv.innerHTML += `
<div class="card">
<b>${p.name}</b> - R$ ${p.price}
<br>
<button onclick="addCart(${i})">Comprar</button>
<button onclick="addFav(${i})">❤️</button>
</div>`;
});
}

function addProduct(){
products.push({name:pname.value, price:pprice.value});
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
}

/* CART */
function addCart(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
cartDiv.innerHTML = cart.map(c=>`<p>${c.name} - R$ ${c.price}</p>`).join("");
}

/* FAVORITES */
function addFav(i){
fav.push(products[i]);
renderFav();
}

function renderFav(){
favDiv.innerHTML = fav.map(f=>`<p>❤️ ${f.name}</p>`).join("");
}

/* BUY */
function buy(){
pixBox.classList.remove("hidden");
alert("Abra o PIX e envie comprovante");
}
</script>

</body>
</html>
