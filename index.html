<!-- LOGIN -->
<section class="page active" id="login">
  <div class="login-wrap">
    <div class="login-card">
      
      <div class="logo">
        <div class="mark">P</div>
        <div>
          <h1>PRIME</h1>
          <span>STORE</span>
        </div>
      </div>

      <div id="loginForm">
        <h2>Entrar</h2>
        
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="loginEmail" autocomplete="email">
        </div>
        
        <div class="field">
          <label>Senha</label>
          <div class="input-wrap">
            <input type="password" id="loginPass" autocomplete="current-password">
            <span class="material-symbols-outlined toggle" onclick="togglePass('loginPass',this)">visibility_off</span>
          </div>
        </div>

        <div class="row">
          <label class="check">
            <input type="checkbox">
            <span>Lembrar-me</span>
          </label>
          <a href="#" class="link">Esqueceu a senha?</a>
        </div>

        <p class="error" id="loginError"></p>
        
        <button class="btn" onclick="login()">Continuar</button>

        <p class="alt">Não tem conta? <a href="#" onclick="toggleForm()">Criar conta</a></p>
      </div>

      <div id="registerForm" class="hidden">
        <h2>Criar conta</h2>
        
        <div class="field">
          <label>Nome</label>
          <input type="text" id="regName">
        </div>

        <div class="field">
          <label>E-mail</label>
          <input type="email" id="regEmail">
        </div>
        
        <div class="field">
          <label>Senha</label>
          <div class="input-wrap">
            <input type="password" id="regPass">
            <span class="material-symbols-outlined toggle" onclick="togglePass('regPass',this)">visibility_off</span>
          </div>
        </div>

        <p class="error" id="regError"></p>
        
        <button class="btn" onclick="register()">Cadastrar</button>

        <p class="alt">Já tem conta? <a href="#" onclick="toggleForm()">Entrar</a></p>
      </div>
    </div>
  </div>
</section>
