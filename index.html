<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Prime Game Vz</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getDatabase, ref, onValue, push, set, serverTimestamp, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
    authDomain: "premium-store-aa58b.firebaseapp.com",
    databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
    projectId: "premium-store-aa58b",
    storageBucket: "premium-store-aa58b.firebasestorage.app",
    messagingSenderId: "462239500057",
    appId: "1:462239500057:web:f1b7cea162ed308a866788"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  window.fb = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, ref, onValue, push, set, serverTimestamp, update };
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg:#000000;
  --roxo:#9333EA;
  --roxo-forte:#7C3AED;
  --roxo-neon:#A855F7;
  --roxo-glow:rgba(147,51,234,.8);
  --branco:#FFFFFF;
  --cinza:#9CA3AF;
  --card:rgba(20,20,30,.6);
  --borda:rgba(147,51,234,.3);
  --glass:rgba(147,51,234,.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--branco);
  font-size:11px;
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed;
  top:-30%;
  left:50%;
  transform:translateX(-50%);
  width:500px;
  height:500px;
  background:radial-gradient(circle,var(--roxo-forte) 0%,transparent 70%);
  opacity:.4;
  z-index:-1;
  pointer-events:none;
  filter:blur(120px);
}

/* HEADER */
.header-gg{
  padding:12px 16px 0;
}
.header-icons{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.logo-gg{
  width:32px;
  height:32px;
  background:linear-gradient(135deg,var(--roxo-forte),var(--roxo-neon));
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 25px var(--roxo-glow);
}
.logo-gg i{width:18px;height:18px;fill:var(--branco)}
.header-btns{
  display:flex;
  gap:8px;
}
.btn-circle{
  width:36px;
  height:36px;
  background:var(--glass);
  backdrop-filter:blur(10px);
  border:1px solid var(--borda);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1);
}
.btn-circle i{width:16px;height:16px;stroke:var(--branco)}
.notif-badge{
  position:absolute;
  top:-2px;
  right:-2px;
  background:linear-gradient(135deg,var(--roxo-forte),var(--roxo-neon));
  color:var(--branco);
  font-size:7px;
  font-weight:700;
  width:16px;
  height:16px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px var(--roxo-glow);
}

/* BANNER */
.banner-gg{
  text-align:center;
  padding:30px 20px 40px;
}
.banner-tit{
  font-size:18px;
  font-weight:900;
  margin-bottom:12px;
  letter-spacing:.5px;
  text-shadow:0 0 30px var(--roxo-glow);
}
.banner-sub{
  display:inline-block;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--borda);
  border-radius:20px;
  padding:10px 18px;
  font-size:8px;
  color:var(--roxo-neon);
  margin-bottom:20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 8px 32px rgba(147,51,234,.2);
  cursor:pointer;
}
.btn-como-funciona{
  background:linear-gradient(135deg,var(--roxo-forte),var(--roxo-neon));
  color:var(--branco);
  border:none;
  border-radius:25px;
  padding:12px 32px;
  font-size:9px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 4px 30px var(--roxo-glow);
  text-transform:uppercase;
}

/* SEÇÕES */
.secao{
  padding:0 16px;
  margin-bottom:24px;
}
.secao-tit{
  font-size:13px;
  font-weight:700;
  margin-bottom:12px;
}
.secao-tit-center{
  text-align:center;
  color:var(--cinza);
  font-size:8px;
  font-weight:600;
  margin:16px 0;
  position:relative;
}
.secao-tit-center::before,
.secao-tit-center::after{
  content:'';
  position:absolute;
  top:50%;
  width:30%;
  height:1px;
  background:var(--borda);
}
.secao-tit-center::before{left:0}
.secao-tit-center::after{right:0}

/* CATEGORIAS - MENORES */
.categorias-scroll{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  padding-bottom:4px;
}
.categorias-scroll::-webkit-scrollbar{display:none}
.card-categoria{
  min-width:90px;
  height:120px;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  flex-shrink:0;
  border:1px solid var(--borda);
  box-shadow:0 4px 20px rgba(147,51,234,.3);
}
.card-categoria img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.card-categoria-overlay{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.95));
  padding:10px 6px 6px;
}
.card-categoria-nome{
  font-size:8px;
  font-weight:900;
  text-transform:uppercase;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
}

/* PRODUTOS */
.produtos-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.card-produto{
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid var(--borda);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  box-shadow:0 8px 32px rgba(147,51,234,.2);
}
.produto-img{
  width:100%;
  height:100px;
  position:relative;
}
.produto-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.produto-fav{
  position:absolute;
  top:6px;
  right:6px;
  width:24px;
  height:24px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:1px solid var(--borda);
}
.produto-fav i{width:12px;height:12px;stroke:var(--branco);fill:transparent}
.produto-info{
  padding:10px;
}
.produto-nome{
  font-size:8px;
  font-weight:600;
  margin-bottom:6px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  line-height:1.3;
  min-height:22px;
  color:var(--cinza);
}
.produto-preco{
  margin-bottom:6px;
}
.preco-box{
  display:inline-block;
  background:var(--glass);
  backdrop-filter:blur(10px);
  border:1px solid var(--roxo);
  border-radius:6px;
  padding:4px 8px;
  font-size:11px;
  font-weight:900;
  color:var(--roxo-neon);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 0 20px var(--roxo-glow);
}
.produto-vendedor{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:7px;
  color:var(--cinza);
}
.vendedor-avatar{
  width:14px;
  height:14px;
  background:linear-gradient(135deg,var(--roxo-forte),var(--roxo-neon));
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:6px;
  font-weight:700;
  box-shadow:0 0 15px var(--roxo-glow);
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.95);
  backdrop-filter:blur(20px);
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal.ativo{display:flex}
.modal-content{
  width:100%;
  max-width:400px;
  background:var(--card);
  backdrop-filter:blur(30px);
  border:1.5px solid var(--borda);
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 10px 60px var(--roxo-glow);
  max-height:90vh;
  overflow-y:auto;
}
.modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.modal-tit{
  font-size:16px;
  font-weight:900;
  text-shadow:0 0 25px var(--roxo-glow);
}
.btn-fechar{
  width:28px;
  height:28px;
  background:var(--glass);
  backdrop-filter:blur(10px);
  border:1px solid var(--borda);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.btn-fechar i{width:16px;height:16px}
.tabs-modal{
  display:flex;
  gap:6px;
  margin-bottom:16px;
  background:rgba(0,0,0,.5);
  padding:5px;
  border-radius:10px;
}
.tab-modal{
  flex:1;
  padding:8px;
  background:transparent;
  border:none;
  border-radius:7px;
  color:var(--cinza);
  font-size:8px;
  font-weight:600;
  cursor:pointer;
}
.tab-modal.ativo{
  background:linear-gradient(135deg,var(--roxo-forte),var(--roxo-neon));
  color:var(--branco);
  box-shadow:0 0 20px var(--roxo-glow);
}
.input-modal{
  background:rgba(0,0,0,.5);
  border:1px solid var(--borda);
  border-radius:10px;
  padding:12px;
  font-size:16px;
  color:var(--branco);
  width:100%;
  outline:none;
  margin-bottom:10px;
}
.input-modal:focus{
  border-color:var(--roxo);
  box-shadow:0 0 25px var(--roxo-glow);
}
.btn-modal{
  width:100%;
  background:linear-gradient(135deg,var(--roxo-forte),var(--roxo-neon));
  color:var(--branco);
  border:none;
  border-radius:10px;
  padding:12px;
  font-weight:700;
  font-size:9px;
  cursor:pointer;
  box-shadow:0 4px 30px var(--roxo-glow);
  margin-top:6px;
}
</style>
</head>
<body>
<div class="header-gg">
  <div class="header-icons">
    <div class="logo-gg"><i data-lucide="gamepad-2"></i></div>
    <div class="header-btns">
      <div class="btn-circle"><i data-lucide="search"></i></div>
      <div class="btn-circle">
        <i data-lucide="bell"></i>
        <div class="notif-badge">1</div>
      </div>
      <div class="btn-circle"><i data-lucide="bookmark"></i></div>
      <div class="btn-circle" onclick="abrirLogin()"><i data-lucide="menu"></i></div>
    </div>
  </div>
</div>

<div class="banner-gg">
  <div class="banner-tit">[ serviços digitais ]</div>
  <div class="banner-sub">contas, jogos, gift cards, gold, itens digitais e mais!</div>
  <button class="btn-como-funciona" onclick="alert('Em breve: tutorial')">COMO FUNCIONA?</button>
</div>

<div class="secao">
  <div class="secao-tit">Categorias Populares</div>
  <div class="categorias-scroll">
    <div class="card-categoria" onclick="filtrarCategoria('minecraft')">
      <img src="https://images.unsplash.com/photo-1607853202273-797f1c22a38e?w=400" alt="Minecraft">
      <div class="card-categoria-overlay">
        <div class="card-categoria-nome">MINECRAFT</div>
      </div>
    </div>
    <div class="card-categoria" onclick="filtrarCategoria('freefire')">
      <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400" alt="Free Fire">
      <div class="card-categoria-overlay">
        <div class="card-categoria-nome">FREE FIRE</div>
      </div>
    </div>
    <div class="card-categoria" onclick="filtrarCategoria('valorant')">
      <img src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400" alt="Valorant">
      <div class="card-categoria-overlay">
        <div class="card-categoria-nome">VALORANT</div>
      </div>
    </div>
    <div class="card-categoria" onclick="filtrarCategoria('roblox')">
      <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?w=400" alt="Roblox">
      <div class="card-categoria-overlay">
        <div class="card-categoria-nome">ROBLOX</div>
      </div>
    </div>
  </div>
  <div class="secao-tit-center">VER TODAS CATEGORIAS</div>
</div>

<div class="secao">
  <div class="secao-tit">Assinaturas e Premium</div>
  <div class="produtos-grid" id="produtosGrid"></div>
</div>

<!-- MODAL LOGIN -->
<div id="modalLogin" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-tit">Entrar</div>
      <div class="btn-fechar" onclick="fecharLogin()"><i data-lucide="x"></i></div>
    </div>

    <div class="tabs-modal">
      <button class="tab-modal ativo" onclick="mudarTabLogin('login')">Login</button>
      <button class="tab-modal" onclick="mudarTabLogin('cadastro')">Cadastro</button>
    </div>

    <div id="tabLoginContent">
      <input type="email" class="input-modal" id="loginEmail" placeholder="E-mail">
      <input type="password" class="input-modal" id="loginSenha" placeholder="Senha">
      <button class="btn-modal" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="tabCadastroContent" style="display:none">
      <input type="text" class="input-modal" id="cadNome" placeholder="Nome completo">
      <input type="email" class="input-modal" id="cadEmail" placeholder="E-mail">
      <input type="password" class="input-modal" id="cadSenha" placeholder="Senha - mín 6 caracteres">
      <button class="btn-modal" onclick="fazerCadastro()">CRIAR CONTA</button>
    </div>
  </div>
</div>

<script>
let userId = null;
let userNome = null;
let produtos = [
  {
    id: '1',
    nome: 'YOUTUBE PREMIUM + MUSIC LINK / FAMÍLIA 30 DIAS',
    categoria: 'premium',
    preco: 4.20,
    imagem: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400',
  },
  {
    id: '2',
    nome: 'BRAVE VPN + BRAVE LEO AI + BRAVE TALK 7 DIAS | CONTA EXCLUSIVA',
    categoria: 'premium',
    preco: 9.99,
    imagem: 'https://images.unsplash.com/photo-1563986768609-322da168b6f1?w=400',
  },
  {
    id: '3',
    nome: 'SPOTIFY PREMIUM 30 DIAS | FAMÍLIA',
    categoria: 'premium',
    preco: 3.50,
    imagem: 'https://images.unsplash.com/photo-1611339556316-e607c835dd28?w=400',
  },
  {
    id: '4',
    nome: 'DISNEY+ PREMIUM 30 DIAS | CONTA COMPARTILHADA',
    categoria: 'premium',
    preco: 5.00,
    imagem: 'https://images.unsplash.com/photo-1603181601493-a4ea7ff75c23?w=400',
  }
];

window.addEventListener('load',()=>{
  lucide.createIcons();
  const { auth, onAuthStateChanged } = window.fb;

  onAuthStateChanged(auth, (user) => {
    if(user){
      userId = user.uid;
      userNome = user.displayName || user.email.split('@')[0];
    }else{
      userId = null;
    }
  });

  renderizarProdutos();
});

function renderizarProdutos(){
  const grid = document.getElementById('produtosGrid');
  grid.innerHTML = produtos.map(p => `
    <div class="card-produto" onclick="verProduto('${p.id}')">
      <div class="produto-img">
        <img src="${p.imagem}" alt="${p.nome}">
        <div class="produto-fav" onclick="event.stopPropagation();toggleFav('${p.id}')">
          <i data-lucide="heart"></i>
        </div>
      </div>
      <div class="produto-info">
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco">
          <div class="preco-box">R$ ${p.preco.toFixed(2)}</div>
        </div>
        <div class="produto-vendedor">
          <div class="vendedor-avatar">L</div>
          <span>L. Vz</span>
        </div>
      </div>
    </div>
  `).join('');
  lucide.createIcons();
}

function filtrarCategoria(cat){
  alert('Filtro: '+cat+' - Em breve');
}

function verProduto(id){
  const p = produtos.find(prod => prod.id === id);
  if(!p) return;
  alert(`Produto: ${p.nome}\n\nPreço: R$ ${p.preco.toFixed(2)}\nVendedor: L. Vz\n\nEm breve: página de compra`);
}

function toggleFav(id){
  alert('Favoritado! Em breve: lista de favoritos');
}

function abrirLogin(){
  document.getElementById('modalLogin').classList.add('ativo');
}

function fecharLogin(){
  document.getElementById('modalLogin').classList.remove('ativo');
}

function mudarTabLogin(t){
  document.querySelectorAll('.tab-modal').forEach(e=>e.classList.remove('ativo'));
  event.target.classList.add('ativo');
  document.getElementById('tabLoginContent').style.display=t==='login'?'block':'none';
  document.getElementById('tabCadastroContent').style.display=t==='cadastro'?'block':'none';
}

async function fazerLogin(){
  const { auth, signInWithEmailAndPassword } = window.fb;
  const email=document.getElementById('loginEmail').value.trim();
  const senha=document.getElementById('loginSenha').value;
  if(!email||!senha){alert('Preencha todos os campos');return}
  try{
    await signInWithEmailAndPassword(auth,email,senha);
    fecharLogin();
  }catch(e){
    alert('Erro: '+e.message);
  }
}

async function fazerCadastro(){
  const { auth, createUserWithEmailAndPassword, updateProfile } = window.fb;
  const nome=document.getElementById('cadNome').value.trim();
  const email=document.getElementById('cadEmail').value.trim();
  const senha=document.getElementById('cadSenha').value;
  if(!nome||!email||!senha){alert('Preencha todos os campos');return}
  if(senha.length<6){alert('Senha deve ter no mínimo 6 caracteres');return}
  try{
    const cred = await createUserWithEmailAndPassword(auth,email,senha);
    await updateProfile(cred.user, {displayName: nome});
    fecharLogin();
    alert('Conta criada com sucesso!');
  }catch(e){
    alert('Erro: '+e.message);
  }
}

lucide.createIcons();
</script>
</body>
</html>
