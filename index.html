<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisionCode AI PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
padding:12px;
}

.topo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:18px;
}

.logo{
width:50px;
height:50px;
border-radius:16px;
background:linear-gradient(135deg,#6a00ff,#24003b);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

.nome{
font-size:20px;
font-weight:bold;
}

.card{
background:#111;
border:1px solid #2f1146;
padding:14px;
border-radius:18px;
margin-bottom:15px;
}

.label{
font-size:12px;
color:#999;
margin-bottom:10px;
}

.uploadBox{
width:100%;
min-height:140px;
border:2px dashed #6a00ff;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
background:#0c0c0c;
}

.uploadBox input{
position:absolute;
width:100%;
height:100%;
opacity:0;
}

.uploadText{
font-size:13px;
color:#aaa;
}

.galeria{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:15px;
}

.fotoCard{
background:#0c0c0c;
border-radius:16px;
overflow:hidden;
border:1px solid #2f1146;
padding:8px;
}

.fotoCard img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.controles{
margin-top:10px;
}

.controles label{
font-size:11px;
color:#aaa;
display:block;
margin-bottom:4px;
}

.controles input{
width:100%;
}

textarea{
width:100%;
height:100px;
background:#0c0c0c;
border:none;
outline:none;
border-radius:14px;
padding:12px;
color:white;
font-size:13px;
margin-top:10px;
resize:none;
}

button{
width:100%;
height:50px;
border:none;
border-radius:14px;
background:#6a00ff;
color:white;
font-weight:bold;
font-size:14px;
margin-top:12px;
}

.previewArea{
margin-top:18px;
}

iframe{
width:100%;
height:700px;
border:none;
border-radius:18px;
background:white;
}

.codigo{
background:#0c0c0c;
padding:14px;
border-radius:14px;
margin-top:14px;
overflow:auto;
font-size:11px;
color:#76ffb2;
max-height:400px;
}

.loading{
display:none;
text-align:center;
font-size:12px;
color:#aaa;
margin-top:10px;
}

</style>
</head>

<body>

<div class="topo">
<div class="logo">V</div>
<div class="nome">VisionCode AI PRO</div>
</div>

<div class="card">

<div class="label">
ADICIONE ATÉ 1000 FOTOS
</div>

<label class="uploadBox">

<input type="file" id="multiUpload" multiple accept="image/*">

<div class="uploadText">
📷 Clique para adicionar imagens
</div>

</label>

<div class="galeria" id="galeria"></div>

</div>

<div class="card">

<div class="label">
EXPLIQUE O SITE
</div>

<textarea id="descricao"
placeholder="Ex: Quero um site luxuoso estilo loja gamer premium roxo e preto mobile..."></textarea>

<button onclick="gerarSite()">
GERAR SITE COMPLETO
</button>

<div class="loading" id="loading">
Gerando site premium...
</div>

</div>

<div class="previewArea">

<div class="card">

<div class="label">PREVIEW MOBILE</div>

<iframe id="preview"></iframe>

</div>

<div class="card">

<div class="label">CÓDIGO HTML</div>

<pre class="codigo" id="codigo"></pre>

</div>

</div>

<script>

const upload = document.getElementById("multiUpload");
const galeria = document.getElementById("galeria");

let imagens = [];

upload.addEventListener("change", function(){

const files = [...this.files];

files.forEach((file,index)=>{

if(imagens.length >= 1000){
alert("Limite máximo atingido");
return;
}

const reader = new FileReader();

reader.onload = function(e){

const imagemObj = {
src:e.target.result,
altura:180
};

imagens.push(imagemObj);

renderGaleria();

}

reader.readAsDataURL(file);

});

});

function renderGaleria(){

galeria.innerHTML = "";

imagens.forEach((img,index)=>{

const card = document.createElement("div");

card.className = "fotoCard";

card.innerHTML = `

<img 
src="${img.src}" 
style="height:${img.altura}px"
>

<div class="controles">

<label>
Altura da imagem
</label>

<input 
type="range"
min="100"
max="500"
value="${img.altura}"

oninput="
imagens[${index}].altura=this.value;
renderGaleria();
"
>

<button onclick="removerImagem(${index})">
REMOVER
</button>

</div>

`;

galeria.appendChild(card);

});

}

function removerImagem(index){

imagens.splice(index,1);

renderGaleria();

}

function gerarSite(){

document.getElementById("loading").style.display = "block";

const descricao = document.getElementById("descricao").value;

setTimeout(()=>{

let imagensHTML = "";

imagens.forEach((img)=>{

imagensHTML += `

<div class="imagemCard">

<img src="${img.src}">

</div>

`;

});

const html = `

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
padding:14px;
color:white;
}

.topo{
background:linear-gradient(135deg,#6a00ff,#24003b);
padding:22px;
border-radius:24px;
margin-bottom:20px;
}

.topo h1{
font-size:26px;
}

.topo p{
font-size:13px;
margin-top:10px;
color:#ddd;
}

.grid{
display:grid;
gap:16px;
}

.imagemCard{
background:#111;
padding:10px;
border-radius:22px;
border:1px solid #3f1166;
overflow:hidden;
}

.imagemCard img{
width:100%;
border-radius:18px;
object-fit:cover;
display:block;
}

.botao{
width:100%;
height:55px;
border:none;
border-radius:18px;
background:#6a00ff;
color:white;
font-weight:bold;
margin-top:20px;
font-size:15px;
}

</style>

</head>

<body>

<div class="topo">

<h1>
VISION STORE
</h1>

<p>
${descricao}
</p>

</div>

<div class="grid">

${imagensHTML}

</div>

<button class="botao">
COMPRAR AGORA
</button>

</body>
</html>

`;

document.getElementById("preview").srcdoc = html;

document.getElementById("codigo").textContent = html;

document.getElementById("loading").style.display = "none";

},1000);

}

</script>

</body>
</html>
