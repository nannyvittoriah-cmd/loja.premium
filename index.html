<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BONYS.SH</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{background:#0a0f2c;color:white;font-family:Arial}
button{background:#ff00ff;color:white;padding:10px;border:none}
.card{background:#111a44;padding:10px;margin:10px;border-radius:10px}
</style>

</head>

<body>

<h1>BONYS.SH 🔥</h1>

<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="app"></div>

<script>

// 🔥 COLE SUA CONFIG AQUI
const firebaseConfig = {
  apiKey: "COLOCA_AQUI",
  authDomain: "COLOCA_AQUI",
  projectId: "COLOCA_AQUI",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
  .catch(()=> {
    auth.createUserWithEmailAndPassword(email, senha);
  });
}

// USUÁRIO LOGADO
auth.onAuthStateChanged(user=>{
  if(user){
    carregar(user.email);
  }
});

// CARREGAR
function carregar(email){

  document.getElementById("app").innerHTML = `
    <h2>Bem-vinda ${email}</h2>
    <div id="produtos"></div>

    <input id="nome">
    <input id="preco">
    <button onclick="add()">Adicionar Produto</button>
  `;

  db.collection("produtos").onSnapshot(snapshot=>{
    let div = document.getElementById("produtos");
    div.innerHTML="";

    snapshot.forEach(doc=>{
      let p = doc.data();

      div.innerHTML += `
        <div class="card">
          ${p.nome} - R$ ${p.preco}
          <button onclick="comprar('${p.nome}')">Comprar</button>
        </div>
      `;
    });
  });
}

// ADD PRODUTO
function add(){
  db.collection("produtos").add({
    nome:document.getElementById("nome").value,
    preco:document.getElementById("preco").value
  });
}

// COMPRAR
function comprar(nome){
  db.collection("pedidos").add({
    produto:nome,
    status:"aguardando pix"
  });

  alert("PIX: (98) 98485-3563");
}

</script>

</body>
</html>
