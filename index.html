<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile App Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
height:100vh;
display:flex;
overflow:hidden;
}

/* PAINEL */

.editor{
width:370px;
background:#0d0d0d;
border-right:1px solid #2b1042;
padding:14px;
overflow:auto;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:18px;
color:#9f55ff;
}

.card{
background:#141414;
border:1px solid #2d1047;
padding:14px;
border-radius:18px;
margin-bottom:15px;
}

.label{
font-size:12px;
color:#999;
margin-bottom:10px;
}

input,
textarea,
select{
width:100%;
background:#090909;
border:none;
outline:none;
padding:12px;
border-radius:14px;
color:white;
font-size:13px;
margin-top:10px;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
height:50px;
border:none;
border-radius:14px;
background:#7b1fff;
color:white;
font-weight:bold;
margin-top:12px;
font-size:14px;
}

.lista{
display:flex;
flex-direction:column;
gap:12px;
margin-top:14px;
}

.item{
background:#0a0a0a;
padding:12px;
border-radius:14px;
border:1px solid #252525;
}

.item img{
width:100%;
border-radius:12px;
margin-top:10px;
}

/* CELULAR */

.previewArea{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
padding:20px;
}

.phone{
width:360px;
height:740px;
background:white;
border-radius:40px;
overflow:hidden;
border:8px solid #181818;
box-shadow:0 0 40px rgba(0,0,0,0.5);
position:relative;
}

.notch{
width:140px;
height:26px;
background:#181818;
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
border-radius:0 0 20px 20px;
z-index:10;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* MODAL CÓDIGO */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modalBox{
width:100%;
max-width:900px;
height:90%;
background:#0d0d0d;
border-radius:20px;
padding:18px;
display:flex;
flex-direction:column;
}

.modal textarea{
flex:1;
background:#050505;
color:#6eff97;
font-size:12px;
margin-top:14px;
}

/* MOBILE */

@media(max-width:900px){

body{
flex-direction:column;
height:auto;
overflow:auto;
}

.editor{
width:100%;
border-right:none;
border-bottom:1px solid #2b1042;
}

.previewArea{
padding:14px;
}

.phone{
width:100%;
max-width:390px;
height:700px;
}

}

</style>

</head>

<body>

<!-- EDITOR -->

<div class="editor">

<div class="logo">
Mobile App Builder
</div>

<div class="card">

<div class="label">
TIPO DE ELEMENTO
</div>

<select id="tipo">

<option value="titulo">
Título
</option>

<option value="texto">
Texto
</option>

<option value="botao">
Botão
</option>

<option value="imagem">
Imagem
</option>

<option value="card">
Card
</option>

</select>

<textarea
id="texto"
placeholder="Digite o conteúdo..."
></textarea>

<input
type="file"
id="imagem"
accept="image/*"
>

<button onclick="adicionar()">
ADICIONAR ELEMENTO
</button>

</div>

<div class="card">

<div class="label">
ESTRUTURA
</div>

<div class="lista" id="lista"></div>

<button onclick="gerarSite()">
ATUALIZAR PREVIEW
</button>

<button onclick="abrirCodigo()">
GERAR CÓDIGO
</button>

</div>

</div>

<!-- PREVIEW -->

<div class="previewArea">

<div class="phone">

<div class="notch"></div>

<iframe id="preview"></iframe>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modalBox">

<button onclick="fecharCodigo()">
FECHAR
</button>

<textarea id="codigoFinal"></textarea>

</div>

</div>

<script>

let elementos = [];

function adicionar(){

const tipo = document.getElementById("tipo").value;

const texto = document.getElementById("texto").value;

const imagemInput = document.getElementById("imagem");

if(tipo === "imagem"){

const file = imagemInput.files[0];

if(!file){
alert("Selecione uma imagem");
return;
}

const reader = new FileReader();

reader.onload = function(e){

elementos.push({
tipo,
texto,
imagem:e.target.result
});

render();

}

reader.readAsDataURL(file);

}else{

elementos.push({
tipo,
texto
});

render();

}

}

function render(){

const lista = document.getElementById("lista");

lista.innerHTML = "";

elementos.forEach((item,index)=>{

const div = document.createElement("div");

div.className = "item";

div.innerHTML = `

<b>
${item.tipo.toUpperCase()}
</b>

<p style="font-size:12px;margin-top:8px;color:#aaa;">
${item.texto}
</p>

${item.imagem ? `<img src="${item.imagem}">` : ""}

<button onclick="remover(${index})">
REMOVER
</button>

`;

lista.appendChild(div);

});

}

function remover(index){

elementos.splice(index,1);

render();

}

function gerarHTML(){

let estrutura = "";

elementos.forEach(item=>{

if(item.tipo === "titulo"){

estrutura += `
<h1 class="titulo">
${item.texto}
</h1>
`;

}

if(item.tipo === "texto"){

estrutura += `
<p class="texto">
${item.texto}
</p>
`;

}

if(item.tipo === "botao"){

estrutura += `
<button class="botao">
${item.texto}
</button>
`;

}

if(item.tipo === "imagem"){

estrutura += `
<img class="imagem" src="${item.imagem}">
`;

}

if(item.tipo === "card"){

estrutura += `
<div class="cardItem">
<h2>${item.texto}</h2>
</div>
`;

}

});

return `

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
padding:14px;
color:white;
}

.titulo{
font-size:28px;
margin-bottom:16px;
}

.texto{
font-size:14px;
line-height:1.5;
color:#ccc;
margin-bottom:16px;
}

.botao{
width:100%;
height:52px;
background:#7b1fff;
border:none;
border-radius:16px;
color:white;
font-weight:bold;
margin-bottom:16px;
}

.imagem{
width:100%;
border-radius:18px;
margin-bottom:16px;
display:block;
}

.cardItem{
background:#111;
padding:18px;
border-radius:20px;
border:1px solid #341051;
margin-bottom:16px;
}

</style>

</head>

<body>

${estrutura}

</body>

</html>

`;

}

function gerarSite(){

const html = gerarHTML();

document.getElementById("preview").srcdoc = html;

}

function abrirCodigo(){

const html = gerarHTML();

document.getElementById("codigoFinal").value = html;

document.getElementById("modal").style.display = "flex";

}

function fecharCodigo(){

document.getElementById("modal").style.display = "none";

}

</script>

</body>
</html>
