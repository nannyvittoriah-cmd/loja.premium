<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bony Store</title>

<style>
:root{
--border:#00c3ff;
--border2:#ffd400;
}

body{
margin:0;
font-family:Arial;
transition:0.3s;
background:#000;
color:#fff;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
font-size:28px;
font-weight:bold;
background:#0b0f2a;
border-bottom:2px solid var(--border);
}

/* MENU */
.menu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
z-index:999;
border-left:2px solid var(--border);
}

.menu button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
cursor:pointer;
background:#222;
color:#fff;
border-radius:6px;
}

/* PRODUTOS (2 COLUNAS) */
.container{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:12px;
padding:15px;
}

.card{
background:#111;
border:2px solid var(--border);
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

/* BOTÕES */
.buyBtn{
width:100%;
padding:10px;
margin-top:5px;
background:#00ff66;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:6px;
}

.detailBtn{
width:100%;
padding:10px;
margin-top:5px;
background:#f5f5dc;
border:none;
cursor:pointer;
color:#000;
font-weight:bold;
border:2px solid var(--border2);
border-radius:6px;
}

/* CHECKOUT */
.checkout{display:none;padding:15px;}
.box{
max-width:500px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
border:2px solid var(--border);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
}

.modalBox{
background:#111;
padding:20px;
max-width:450px;
border-radius:10px;
border:2px solid var(--border2);
}

/* ADM */
.admin{display:none;padding:15px;}

.adminBox{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border-radius:10px;
border:2px solid var(--border);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
color:#fff;
border-radius:6px;
border:1px solid #555;
}

/* ITEM ADM */
.item{
border:1px solid #333;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div>BONY STORE</div>
<div onclick="toggleMenu()" style="cursor:pointer;font-size:26px">☰</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">

<h3>MENU</h3>

<button onclick="home()">🏠 Home</button>
<button onclick="openAdmin()">⚙ ADM</button>

<h4>🎨 Temas Claros</h4>
<button onclick="theme('rosa')">🌸 Rosa</button>
<button onclick="theme('lilas')">💜 Lilás</button>

<h4>🌙 Temas Escuros</h4>
<button onclick="theme('azul')">🔵 Azul</button>
<button onclick="theme('amarelo')">🟡 Amarelo</button>

<h4>📂 Categorias</h4>
<button onclick="render('todos')">Todos</button>
<button onclick="render('passe')">Passes</button>
<button onclick="render('tokens')">Tokens</button>

</div>

<!-- LOJA -->
<div id="loja" class="container"></div>

<!-- CHECKOUT -->
<div id="checkout" class="checkout">
<div class="box">

<h3>COMPROVANTE</h3>

<input id="nome" placeholder="Nome">
<input id="whats" placeholder="WhatsApp">
<input id="produto" readonly>
<input id="link" placeholder="Link comprovante">

<button onclick="enviar()">ENVIAR</button>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modalBox">
<h3 id="mTitulo"></h3>
<p id="mPreco"></p>
<p id="mDesc"></p>
<p id="mEstoque"></p>
<button onclick="fechar()">FECHAR</button>
</div>
</div>

<!-- ADM -->
<div id="admin" class="admin">
<div class="adminBox">

<h2>PAINEL ADM</h2>

<input id="u" placeholder="Usuário">
<input id="p" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>➕ PRODUTOS</h3>

<input id="pnome" placeholder="Nome">
<input id="ppreco" placeholder="Preço">
<input id="pimg" placeholder="Imagem URL">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<input id="pestoque" placeholder="Estoque">
<input id="pcat" placeholder="Categoria">
<button onclick="add()">Adicionar</button>

<hr>

<div id="produtosADM"></div>

</div>
</div>
</div>

<script>

let selected="";

/* PRODUTOS */
let produtos=JSON.parse(localStorage.getItem("produtos")||"null")||[
["Passe Básico","20","https://i.imgur.com/1Q9Z1ZQ.png","Acesso básico",10,"passe"],
["Passe Premium","50","https://i.imgur.com/2Q9Z1ZQ.png","Mais recursos",5,"passe"],
["100 Tokens","25","https://i.imgur.com/3Q9Z1ZQ.png","Moeda interna",10,"tokens"]
];

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos));
}

/* LOJA */
function render(cat="todos"){
loja.innerHTML="";

produtos.forEach((p,i)=>{
if(cat!=="todos" && p[5]!==cat) return;

let d=document.createElement("div");
d.className="card";

d.innerHTML=`
<img src="${p[2]}">
<h3>${p[0]}</h3>
<p>R$ ${p[1]}</p>
<p style="font-size:12px">${p[3]}</p>
<p>Estoque: ${p[4]}</p>

<button class="detailBtn" onclick="detalhe(${i})">DETALHES</button>
<button class="buyBtn" onclick="buy(${i})" ${p[4]<=0?'disabled':''}>COMPRAR</button>
`;

loja.appendChild(d);
});
}

/* MENU */
function toggleMenu(){
menu.style.right = menu.style.right==="0px"?"-260px":"0px";
}

/* FECHAR MENU AO CLICAR FORA */
document.addEventListener("click",function(e){
let menu=document.getElementById("menu");
let btn=document.querySelector(".topbar div:last-child");

if(!menu.contains(e.target) && !btn.contains(e.target)){
menu.style.right="-260px";
}
});

/* TEMAS */
function theme(t){

if(t==="rosa"){
document.documentElement.style.setProperty("--border","#ff4fd8");
document.documentElement.style.setProperty("--border2","#b26bff");
document.body.style.background="#ffe6f2";
document.body.style.color="#000";
}

if(t==="lilas"){
document.documentElement.style.setProperty("--border","#b26bff");
document.documentElement.style.setProperty("--border2","#ff4fd8");
document.body.style.background="#f3e6ff";
document.body.style.color="#000";
}

if(t==="azul"){
document.documentElement.style.setProperty("--border","#00c3ff");
document.documentElement.style.setProperty("--border2","#ffd400");
document.body.style.background="#000";
document.body.style.color="#fff";
}

if(t==="amarelo"){
document.documentElement.style.setProperty("--border","#ffd400");
document.documentElement.style.setProperty("--border2","#00c3ff");
document.body.style.background="#1a1a00";
document.body.style.color="#fff";
}
}

/* HOME */
function home(){
loja.style.display="grid";
checkout.style.display="none";
admin.style.display="none";
render();
}

/* DETALHES */
function detalhe(i){
modal.style.display="flex";
mTitulo.innerText=produtos[i][0];
mPreco.innerText="R$ "+produtos[i][1];
mDesc.innerText=produtos[i][3];
mEstoque.innerText="Estoque: "+produtos[i][4];
}

function fechar(){modal.style.display="none";}

/* COMPRA */
function buy(i){
if(produtos[i][4]<=0){alert("Sem estoque");return;}

produtos[i][4]--;
save();
render();

selected=produtos[i][0];

loja.style.display="none";
checkout.style.display="block";

produto.value=selected;
}

/* ENVIO */
function enviar(){
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
nome:nome.value,
produto:selected,
link:link.value
});

localStorage.setItem("dados",JSON.stringify(dados));

alert("Enviado!");
home();
}

/* ADM */
function openAdmin(){
admin.style.display="block";
loja.style.display="none";
}

/* LOGIN */
function login(){
if(u.value==="admin" && p.value==="123"){
painel.style.display="block";
loadADM();
}else alert("erro login");
}

/* ADD */
function add(){
produtos.push([
pnome.value,
ppreco.value,
pimg.value,
pdesc.value,
Number(pestoque.value),
pcat.value
]);

save();
render();
loadADM();
}

/* ADM LIST */
function loadADM(){
produtosADM.innerHTML="";
produtos.forEach(p=>{
produtosADM.innerHTML+=`<div class="item">${p[0]} - R$ ${p[1]}</div>`;
});
}

/* INICIAR */
home();

</script>

</body>
</html>
