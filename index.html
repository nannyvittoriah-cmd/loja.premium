<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// 🔥 FIREBASE (SEU PROJETO)
const firebaseConfig = {
  apiKey: "AIzaSyDo8baLqLDPTKTajoC-kl_6P_w3VMO0414",
  authDomain: "bonyx-sh.firebaseapp.com",
  projectId: "bonyx-sh",
  storageBucket: "bonyx-sh.firebasestorage.app",
  messagingSenderId: "379347082201",
  appId: "1:379347082201:web:842b31bf3e9df3c12fd7c8"
};


// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


/* =========================
   🔐 CADASTRO
========================= */
window.register = async () => {
try {

const email = document.getElementById("email")?.value;
const password = document.getElementById("password")?.value;

if(!email || !password){
alert("Preencha email e senha");
return;
}

const user = await createUserWithEmailAndPassword(auth, email, password);

// salva no Firestore
await setDoc(doc(db,"users",user.user.uid),{
email
});

showUser(user.user);

} catch (e) {
alert(e.message);
}
};


/* =========================
   🔑 LOGIN
========================= */
window.login = async () => {
try {

const email = document.getElementById("email")?.value;
const password = document.getElementById("password")?.value;

if(!email || !password){
alert("Preencha email e senha");
return;
}

const user = await signInWithEmailAndPassword(auth, email, password);

showUser(user.user);

} catch (e) {
alert("Email ou senha inválidos");
}
};


/* =========================
   🔄 AUTO LOGIN
========================= */
onAuthStateChanged(auth,(user)=>{
if(user){
showUser(user);
}
});


/* =========================
   🟣 PAINEL (SEM MEXER NO DESIGN)
========================= */
function showUser(user){

const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");
const info = document.getElementById("userInfo");

if(loginBox) loginBox.style.display = "none";
if(dashboard) dashboard.style.display = "block";
if(info) info.innerText = user.email;

}


/* =========================
   🚪 LOGOUT
========================= */
window.logout = async () => {
await signOut(auth);
location.reload();
};
</script>
