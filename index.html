<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ShopVZ - Marketplace</title>
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"
  }
}
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --laranja:#EE4D2D;
  --laranja-escuro:#D73211;
  --verde:#00BFA5;
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --txt:#333333;
  --txt-sec:#757575;
  --borda:#E8E8E8;
  --sombra:rgba(0,0,0,.08)
}
[data-theme="dark"]{
  --bg:#121212;
  --card:#1E1E1E;
  --txt:#FFFFFF;
  --txt-sec:#AAAAAA;
  --borda:#2C2C2C;
  --sombra:rgba(0,0,0,.3)
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:60px;overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--laranja),var(--laranja-escuro));padding:10px 12px}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{font-size:18px;font-weight:900;color:#FFF}
.busca-box{flex:1;display:flex;background:#FFF;border-radius:4px;overflow:hidden}
.busca-box input{flex:1;border:none;padding:8px 10px;font-size:13px;outline:none}
.busca-btn{background:#FFF;border:none;padding:0 12px;cursor:pointer}
.busca-btn i{width:18px;height:18px;stroke:var(--laranja)}
.header-icons{display:flex;gap:16px}
.header-icon{position:relative;cursor:pointer}
.header-icon i{width:24px;height:24px;stroke:#FFF}
.badge{position:absolute;top:-6px;right:-6px;background:#FFF;color:var(--laranja);font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}

.categorias-scroll{display:flex;gap:8px;overflow-x:auto;padding:12px;scrollbar-width:none}
.categorias-scroll::-webkit-scrollbar{display:none}
.cat-item{min-width:70px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.cat-icone{width:50px;height:50px;background:var(--card);border:1px solid var(--borda);border-radius:8px;display:flex;align-items:center;justify-content:center}
.cat-icone i{width:24px;height:24px;stroke:var(--laranja)}
.cat-nome{font-size:10px;text-align:center;color:var(--txt-sec);line-height:1.2}

.banner{margin:0 12px 12px;height:120px;background:linear-gradient(135deg,var(--laranja),var(--laranja-escuro));border-radius:8px;position:relative;overflow:hidden}
.banner img{width:100%;height:100%;object-fit:cover}

.secao{margin:0 12px 16px}
.secao-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.secao-tit{font-size:15px;font-weight:700;color:var(--laranja);display:flex;align-items:center;gap:6px}
.secao-ver{font-size:12px;color:var(--txt-sec);cursor:pointer}

.produtos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.produto-card{background:var(--card);border-radius:4px;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px var(--sombra)}
.produto-img{width:100%;aspect-ratio:1;background:var(--borda);position:relative}
.produto-img img{width:100%;height:100%;object-fit:cover}
.produto-desconto{position:absolute;top:0;right:0;background:var(--laranja);color:#FFF;font-size:10px;font-weight:700;padding:2px 6px;border-radius:0 0 0 4px}
.produto-info{padding:8px}
.produto-nome{font-size:12px;line-height:1.3;margin-bottom:4px;height:32px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.produto-preco{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.preco-atual{font-size:16px;font-weight:700;color:var(--laranja)}
.preco-antigo{font-size:11px;color:var(--txt-sec);text-decoration:line-through}
.produto-stats{display:flex;justify-content:space-between;font-size:10px;color:var(--txt-sec)}
.produto-vendas{display:flex;align-items:center;gap:3px}
.produto-loja{display:flex;align-items:center;gap:3px}

.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--borda);display:flex;justify-content:space-around;padding:6px 0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 12px}
.nav-item i{width:22px;height:22px;stroke:var(--txt-sec)}
.nav-item.ativo i{stroke:var(--laranja)}
.nav-item span{font-size:10px;color:var(--txt-sec)}
.nav-item.ativo span{color:var(--laranja);font-weight:600}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.modal.ativo{display:flex}
.modal-conteudo{background:var(--card);width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto}
.modal-header{position:sticky;top:0;background:var(--card);padding:16px;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center;z-index:10}
.modal-tit{font-size:16px;font-weight:700}
.modal-fechar{width:32px;height:32px;background:var(--borda);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}

.btn-primario{width:100%;background:var(--laranja);border:none;border-radius:4px;padding:12px;color:#FFF;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px}
.btn-secundario{background:var(--card);border:1.5px solid var(--laranja);color:var(--laranja)}

.pagina{display:none;padding:12px}
.pagina.ativa{display:block}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--card);border:1px solid var(--borda);padding:10px 16px;border-radius:8px;box-shadow:0 4px 12px var(--sombra);z-index:300;font-size:12px;transition:.3s}
.toast.mostrar{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">ShopVZ</div>
    <div class="busca-box">
      <input type="text" placeholder="Buscar produtos..." id="buscaInput">
      <button class="busca-btn" onclick="buscar()"><i data-lucide="search"></i></button>
    </div>
    <div class="header-icons">
      <div class="header-icon" onclick="abrirCarrinho()">
        <i data-lucide="shopping-cart"></i>
        <div class="badge" id="badgeCarrinho" style="display:none">0</div>
      </div>
      <div class="header-icon" onclick="abrirPerfil()">
        <i data-lucide="user"></i>
      </div>
    </div>
  </div>
</div>

<div id="paginaHome" class="pagina ativa">
  <div class="categorias-scroll" id="categoriasScroll"></div>
  
  <div class="banner">
    <img src="https://picsum.photos/800/240?random=1" alt="Banner">
  </div>

  <div class="secao">
    <div class="secao-header">
      <div class="secao-tit"><i data-lucide="flame"></i>Ofertas Relâmpago</div>
      <div class="secao-ver">Ver todos</div>
    </div>
    <div class="produtos-grid" id="produtosGrid"></div>
  </div>

  <div class="secao">
    <div class="secao-header">
      <div class="secao-tit"><i data-lucide="trending-up"></i>Mais Vendidos</div>
      <div class="secao-ver">Ver todos</div>
    </div>
    <div class="produtos-grid" id="maisVendidosGrid"></div>
  </div>
</div>

<div id="paginaProduto" class="pagina">
  <div id="produtoDetalhes"></div>
</div>

<div id="paginaCarrinho" class="pagina">
  <h2 style="font-size:18px;margin-bottom:16px">Carrinho de Compras</h2>
  <div id="carrinhoLista"></div>
  <div id="carrinhoTotal" style="margin-top:16px;padding:16px;background:var(--card);border-radius:8px"></div>
</div>

<nav class="nav-bottom">
  <div class="nav-item ativo" onclick="trocarPagina('home')">
    <i data-lucide="home"></i>
    <span>Início</span>
  </div>
  <div class="nav-item" onclick="trocarPagina('categorias')">
    <i data-lucide="grid-3x3"></i>
    <span>Categorias</span>
  </div>
  <div class="nav-item" onclick="trocarPagina('live')">
    <i data-lucide="video"></i>
    <span>Live</span>
  </div>
  <div class="nav-item" onclick="trocarPagina('notificacoes')">
    <i data-lucide="bell"></i>
    <span>Notificações</span>
  </div>
  <div class="nav-item" onclick="trocarPagina('eu')">
    <i data-lucide="user"></i>
    <span>Eu</span>
  </div>
</nav>

<div class="modal" id="modalLogin">
  <div class="modal-conteudo">
    <div class="modal-header">
      <div class="modal-tit">Entrar na ShopVZ</div>
      <button class="modal-fechar" onclick="fecharModal('modalLogin')"><i data-lucide="x"></i></button>
    </div>
    <div style="padding:16px">
      <input type="email" id="loginEmail" placeholder="Email" style="width:100%;padding:12px;border:1.5px solid var(--borda);border-radius:4px;margin-bottom:10px;font-size:14px">
      <input type="password" id="loginSenha" placeholder="Senha" style="width:100%;padding:12px;border:1.5px solid var(--borda);border-radius:4px;margin-bottom:10px;font-size:14px">
      <button class="btn-primario" onclick="fazerLogin()">ENTRAR</button>
      <button class="btn-primario btn-secundario" onclick="fazerCadastro()">CRIAR CONTA</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'firebase/app';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
import { getDatabase, ref, set, get, onValue, push, update } from 'firebase/database';

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  databaseURL: "SUA_DATABASE_URL",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_STORAGE_BUCKET",
  messagingSenderId: "SEU_MESSAGING_SENDER_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let usuarioAtual = null;
let carrinho = [];
let produtos = [];
let categorias = [
  {id:'1',nome:'Celulares',icone:'smartphone'},
  {id:'2',nome:'Moda',icone:'shirt'},
  {id:'3',nome:'Casa',icone:'home'},
  {id:'4',nome:'Beleza',icone:'sparkles'},
  {id:'5',nome:'Eletrônicos',icone:'laptop'},
  {id:'6',nome:'Esportes',icone:'dumbbell'},
  {id:'7',nome:'Brinquedos',icone:'gamepad-2'},
  {id:'8',nome:'Ver Tudo',icone:'grid-3x3'}
];

window.trocarPagina = trocarPagina;
window.abrirCarrinho = abrirCarrinho;
window.abrirPerfil = abrirPerfil;
window.abrirProduto = abrirProduto;
window.addCarrinho = addCarrinho;
window.fazerLogin = fazerLogin;
window.fazerCadastro = fazerCadastro;
window.fecharModal = fecharModal;

function mostrarToast(tit, msg){
  const toast = document.getElementById('toast');
  toast.innerHTML = `<b>${tit}</b><br>${msg}`;
  toast.classList.add('mostrar');
  setTimeout(()=>toast.classList.remove('mostrar'), 3000);
}

function trocarPagina(pag){
  document.querySelectorAll('.pagina').forEach(p => p.classList.remove('ativa'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('ativo'));
  
  if(pag === 'home') document.getElementById('paginaHome').classList.add('ativa');
  if(pag === 'carrinho') document.getElementById('paginaCarrinho').classList.add('ativa');
  
  event?.target.closest('.nav-item')?.classList.add('ativo');
}

function renderizarCategorias(){
  document.getElementById('categoriasScroll').innerHTML = categorias.map(c => `
    <div class="cat-item" onclick="filtrarCategoria('${c.id}')">
      <div class="cat-icone"><i data-lucide="${c.icone}"></i></div>
      <div class="cat-nome">${c.nome}</div>
    </div>
  `).join('');
  lucide.createIcons();
}

function carregarProdutos(){
  const produtosRef = ref(db, 'produtos');
  onValue(produtosRef, (snapshot) => {
    const data = snapshot.val();
    produtos = data? Object.values(data) : mockProdutos();
    renderizarProdutos();
  });
}

function mockProdutos(){
  return [
    {id:'1',nome:'Fone Bluetooth TWS Pro Cancelamento Ruído',preco:89.90,precoAntigo:199.90,vendas:1243,imagem:'https://picsum.photos/300/300?random=2',loja:'TechStore',desconto:55},
    {id:'2',nome:'Smartwatch D20 Relógio Inteligente Android iOS',preco:59.90,precoAntigo:149.90,vendas:3421,imagem:'https://picsum.photos/300/300?random=3',loja:'GadgetWorld',desconto:60},
    {id:'3',nome:'Tênis Esportivo Corrida Academia Masculino',preco:129.90,precoAntigo:249.90,vendas:892,imagem:'https://picsum.photos/300/300?random=4',loja:'SportMax',desconto:48},
    {id:'4',nome:'Câmera Segurança WiFi 1080p Visão Noturna',preco:99.90,precoAntigo:179.90,vendas:2103,imagem:'https://picsum.photos/300/300?random=5',loja:'SecurityPro',desconto:44}
  ];
}

function renderizarProdutos(){
  document.getElementById('produtosGrid').innerHTML = produtos.map(p => `
    <div class="produto-card" onclick="abrirProduto('${p.id}')">
      <div class="produto-img">
        <img src="${p.imagem}" alt="${p.nome}">
        ${p.desconto? `<div class="produto-desconto">-${p.desconto}%</div>` : ''}
      </div>
      <div class="produto-info">
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco">
          <div class="preco-atual">R$ ${p.preco.toFixed(2)}</div>
          ${p.precoAntigo? `<div class="preco-antigo">R$ ${p.precoAntigo.toFixed(2)}</div>` : ''}
        </div>
        <div class="produto-stats">
          <div class="produto-vendas"><i data-lucide="trending-up" style="width:12px;height:12px"></i>${p.vendas}</div>
          <div class="produto-loja"><i data-lucide="store" style="width:12px;height:12px"></i>${p.loja}</div>
        </div>
      </div>
    </div>
  `).join('');
  
  document.getElementById('maisVendidosGrid').innerHTML = [...produtos].sort((a,b) => b.vendas - a.vendas).slice(0,4).map(p => `
    <div class="produto-card" onclick="abrirProduto('${p.id}')">
      <div class="produto-img">
        <img src="${p.imagem}" alt="${p.nome}">
      </div>
      <div class="produto-info">
        <div class="produto-nome">${p.nome}</div>
        <div class="produto-preco">
          <div class="preco-atual">R$ ${p.preco.toFixed(2)}</div>
        </div>
        <div class="produto-stats">
          <div class="produto-vendas"><i data-lucide="trending-up" style="width:12px;height:12px"></i>${p.vendas}</div>
        </div>
      </div>
    </div>
  `).join('');
  
  lucide.createIcons();
}

function abrirProduto(id){
  const p = produtos.find(prod => prod.id === id);
  if(!p) return;
  document.querySelectorAll('.pagina').forEach(pg => pg.classList.remove('ativa'));
  document.getElementById('paginaProduto').classList.add('ativa');
  
  document.getElementById('produtoDetalhes').innerHTML = `
    <img src="${p.imagem}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;margin-bottom:12px">
    <div style="font-size:16px;font-weight:600;margin-bottom:8px">${p.nome}</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px">
      <div style="font-size:24px;font-weight:900;color:var(--laranja)">R$ ${p.preco.toFixed(2)}</div>
      ${p.precoAntigo? `<div style="font-size:14px;color:var(--txt-sec);text-decoration:line-through">R$ ${p.precoAntigo.toFixed(2)}</div>` : ''}
    </div>
    <div style="font-size:12px;color:var(--txt-sec);margin-bottom:16px;display:flex;gap:16px">
      <span><i data-lucide="trending-up" style="width:14px;height:14px"></i> ${p.vendas} vendidos</span>
      <span><i data-lucide="store" style="width:14px;height:14px"></i> ${p.loja}</span>
    </div>
    <button class="btn-primario" onclick="addCarrinho('${p.id}')">ADICIONAR AO CARRINHO</button>
    <button class="btn-primario btn-secundario" onclick="comprarAgora('${p.id}')">COMPRAR AGORA</button>
  `;
  lucide.createIcons();
}

function addCarrinho(id){
  const p = produtos.find(prod => prod.id === id);
  if(!p) return;
  carrinho.push(p);
  atualizarBadgeCarrinho();
  mostrarToast('Adicionado!', p.nome + ' no carrinho');
}

function atualizarBadgeCarrinho(){
  const badge = document.getElementById('badgeCarrinho');
  badge.textContent = carrinho.length;
  badge.style.display = carrinho.length > 0? 'flex' : 'none';
}

function abrirCarrinho(){
  trocarPagina('carrinho');
  renderizarCarrinho();
}

function renderizarCarrinho(){
  const lista = document.getElementById('carrinhoLista');
  if(carrinho.length === 0){
    lista.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txt-sec)">Carrinho vazio</div>';
    document.getElementById('carrinhoTotal').innerHTML = '';
  }else{
    lista.innerHTML = carrinho.map((p,i) => `
      <div style="display:flex;gap:10px;background:var(--card);padding:10px;border-radius:8px;margin-bottom:8px">
        <img src="${p.imagem}" style="width:60px;height:60px;object-fit:cover;border-radius:4px">
        <div style="flex:1">
          <div style="font-size:12px;margin-bottom:4px">${p.nome}</div>
          <div style="font-size:14px;font-weight:700;color:var(--laranja)">R$ ${p.preco.toFixed(2)}</div>
        </div>
        <button onclick="removerCarrinho(${i})" style="background:none;border:none;cursor:pointer"><i data-lucide="trash-2" style="width:18px;height:18px;stroke:var(--laranja)"></i></button>
      </div>
    `).join('');
    const total = carrinho.reduce((sum, p) => sum + p.preco, 0);
    document.getElementById('carrinhoTotal').innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:14px">Total:</span>
        <span style="font-size:18px;font-weight:900;color:var(--laranja)">R$ ${total.toFixed(2)}</span>
      </div>
      <button class="btn-primario" onclick="finalizarCompra()">FINALIZAR COMPRA</button>
    `;
  }
  lucide.createIcons();
}

function abrirPerfil(){
  if(!usuarioAtual){
    document.getElementById('modalLogin').classList.add('ativo');
  }else{
    mostrarToast('Perfil', 'Logado como ' + usuarioAtual.email);
  }
}

async function fazerLogin(){
  const email = document.getElementById('loginEmail').value;
  const senha = document.getElementById('loginSenha').value;
  try{
    await signInWithEmailAndPassword(auth, email, senha);
    fecharModal('modalLogin');
    mostrarToast('Bem-vindo!', 'Login realizado');
  }catch(err){
    mostrarToast('Erro', 'Email ou senha inválidos');
  }
}

async function fazerCadastro(){
  const email = document.getElementById('loginEmail').value;
  const senha = document.getElementById('loginSenha').value;
  try{
    await createUserWithEmailAndPassword(auth, email, senha);
    fecharModal('modalLogin');
    mostrarToast('Conta criada!', 'Bem-vindo à ShopVZ');
  }catch(err){
    mostrarToast('Erro', 'Não foi possível criar conta');
  }
}

function fecharModal(id){
  document.getElementById(id).classList.remove('ativo');
}

onAuthStateChanged(auth, (user) => {
  usuarioAtual = user;
  if(user){
    carregarCarrinho();
  }
});

function carregarCarrinho(){
  if(!usuarioAtual) return;
  const carrinhoRef = ref(db, 'users/' + usuarioAtual.uid + '/carrinho');
  onValue(carrinhoRef, (snapshot) => {
    const data = snapshot.val();
    carrinho = data? Object.values(data) : [];
    atualizarBadgeCarrinho();
  });
}

// INICIALIZAR
renderizarCategorias();
carregarProdutos();
lucide.createIcons();
</script>
</body>
</html>
