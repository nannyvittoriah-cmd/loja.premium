<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Gamer</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0a0014,#1a0033);
    color:white;
}

/* TELAS */
.tela{ display:none; padding:20px; }
.ativa{ display:block; }

/* INPUT */
input{
    width:90%;
    padding:12px;
    margin:5px;
    border-radius:10px;
    border:1px solid #ff00aa;
    background:transparent;
    color:white;
}

/* BOTÃO */
button{
    background:#ff00aa;
    border:none;
    padding:12px;
    width:95%;
    border-radius:10px;
    color:white;
    font-weight:bold;
    margin-top:10px;
}

/* CATEGORIAS */
.categorias{
    display:flex;
    gap:10px;
    overflow:auto;
}

.cat{
    padding:10px;
    border:1px solid #ff00aa;
    border-radius:10px;
    cursor:pointer;
}

/* PRODUTOS */
.produto{
    border:1px solid #ff00aa;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

/* PIX */
.pix-box{
    border:1px solid #00ffcc;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="tela ativa">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">ENTRAR</button>

    <p onclick="mostrarCadastro()" style="color:#ff00aa;cursor:pointer;">
        Criar conta
    </p>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="tela">
    <h2>Cadastro</h2>

    <input id="novoEmail" placeholder="Email">
    <input id="novaSenha" type="password" placeholder="Senha">

    <button onclick="cadastrar()">Cadastrar</button>
</div>

<!-- LOJA -->
<div id="loja" class="tela">

    <h2>Categorias</h2>

    <div class="categorias">
        <div class="cat" onclick="mostrar('ff')">Free Fire</div>
        <div class="cat" onclick="mostrar('fortnite')">Fortnite</div>
    </div>

    <!-- PRODUTOS -->
    <div id="produtos"></div>

</div>

<script>
let usuario = null;

// CADASTRO
function cadastrar(){
    let email = document.getElementById('novoEmail').value;
    let senha = document.getElementById('novaSenha').value;

    localStorage.setItem(email, senha);
    alert("Conta criada!");
    trocarTela('login');
}

// LOGIN
function login(){
    let email = document.getElementById('email').value;
    let senha = document.getElementById('senha').value;

    let senhaSalva = localStorage.getItem(email);

    if(senhaSalva === senha){
        usuario = email;
        trocarTela('loja');
    } else {
        alert("Login inválido!");
    }
}

// TROCAR TELA
function trocarTela(tela){
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(tela).classList.add('ativa');
}

function mostrarCadastro(){
    trocarTela('cadastro');
}

// MOSTRAR PRODUTOS
function mostrar(cat){
    let div = document.getElementById('produtos');
    div.innerHTML = "";

    if(cat === "ff"){
        div.innerHTML += produtoHTML("Dimas FF 110", "R$ 10");
        div.innerHTML += produtoHTML("Dimas FF 310", "R$ 25");
    }

    if(cat === "fortnite"){
        div.innerHTML += produtoHTML("V-Bucks 1000", "R$ 30");
    }
}

// TEMPLATE PRODUTO
function produtoHTML(nome, preco){
    return `
    <div class="produto">
        <h3>${nome}</h3>
        <p>${preco}</p>

        <button onclick="comprar('${nome}', '${preco}')">
            COMPRAR
        </button>
    </div>
    `;
}

// COMPRA
function comprar(nome, preco){
    let div = document.getElementById('produtos');

    div.innerHTML += `
    <div class="pix-box">
        <h3>Pagamento via PIX</h3>
        <p>Chave: (98) 984853563</p>

        <a href="https://wa.me/5598984853563?text=Comprei ${nome} - ${preco}">
            <button>Enviar comprovante no WhatsApp</button>
        </a>
    </div>
    `;
}
</script>

</body>
</html>
