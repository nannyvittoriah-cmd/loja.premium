<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --card:#15151d;
  --input:#1e1e28;
  --purple:#7c3aed;
  --purple-light:#a78bfa;
  --text:#fff;
  --text-2:#9ca3af;
  --text-3:#6b7280;
  --error:#ef4444;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.login-wrap{
  width:100%;
  max-width:320px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.logo{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:24px;
}

.logo svg{
  width:36px;
  height:36px;
  margin-bottom:6px;
}

.logo h1{
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
}

.logo span{
  font-size:9px;
  color:var(--purple-light);
  letter-spacing:2px;
  margin-top:-2px;
}

h2{
  font-size:16px;
  font-weight:600;
  margin-bottom:4px;
}

.subtitle{
  font-size:11px;
  color:var(--text-2);
  margin-bottom:20px;
}

.input-group{
  margin-bottom:14px;
  position:relative;
}

.input-group label{
  display:block;
  font-size:10px;
  color:var(--text-2);
  margin-bottom:6px;
  font-weight:500;
}

.input-box{
  position:relative;
  display:flex;
  align-items:center;
  background:var(--input);
  border-radius:10px;
  padding:0 12px;
  height:42px;
}

.input-box svg{
  width:14px;
  height:14px;
  color:var(--text-3);
  margin-right:8px;
  flex-shrink:0;
}

.input-box input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-size:12px;
}

.input-box input::placeholder{
  color:var(--text-3);
  font-size:12px;
}

.toggle-pass{
  cursor:pointer;
  margin-left:8px;
}

.forgot{
  text-align:right;
  margin-bottom:18px;
}

.forgot a{
  font-size:10px;
  color:var(--purple-light);
  text-decoration:none;
}

.btn{
  width:100%;
  height:42px;
  background:var(--purple);
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.btn:active{
  transform:scale(0.98);
}

.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.error{
  background:rgba(239,68,68,0.1);
  border:1px solid var(--error);
  color:var(--error);
  padding:8px;
  border-radius:8px;
  font-size:10px;
  margin-bottom:12px;
  display:none;
}

.error.success{
  background:rgba(16,185,129,0.1);
  border-color:#10b981;
  color:#10b981;
}

.footer-text{
  text-align:center;
  margin-top:16px;
  font-size:11px;
  color:var(--text-2);
}

.footer-text a{
  color:var(--purple-light);
  text-decoration:none;
  font-weight:600;
  cursor:pointer;
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="#7c3aed">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <h1>NEXUS</h1>
      <span>STORE</span>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <h2>Bem-vindo de volta!</h2>
      <p class="subtitle">Faça login para continuar</p>

      <div class="error" id="errorMsg"></div>

      <div class="input-group">
        <label>E-mail</label>
        <div class="input-box">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2.9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <div class="input-box">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="loginPassword" placeholder="••••••••">
          <svg class="toggle-pass" id="toggleLoginPass" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>

      <div class="forgot">
        <a href="#" onclick="resetPassword()">Esqueci minha senha</a>
      </div>

      <button class="btn" id="loginBtn">Entrar</button>

      <p class="footer-text">
        Ainda não tem conta? <a onclick="showRegister()">Criar conta</a>
      </p>
    </div>

    <!-- CADASTRO -->
    <div id="registerForm" class="hidden">
      <h2>Criar conta</h2>
      <p class="subtitle">Preencha os dados para começar</p>

      <div class="error" id="errorMsgReg"></div>

      <div class="input-group">
        <label>Nome</label>
        <div class="input-box">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="regName" placeholder="Seu nome">
        </div>
      </div>

      <div class="input-group">
        <label>E-mail</label>
        <div class="input-box">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2.9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="regEmail" placeholder="seu@email.com">
        </div>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <div class="input-box">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
          <svg class="toggle-pass" id="toggleRegPass" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>

      <button class="btn" id="registerBtn">Criar conta</button>

      <p class="footer-text">
        Já tem conta? <a onclick="showLogin()">Fazer login</a>
      </p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Trocar telas
window.showRegister = function(){
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('registerForm').classList.remove('hidden');
  hideError();
}

window.showLogin = function(){
  document.getElementById('registerForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
  hideError();
}

// Mostrar/ocultar senha
document.getElementById('toggleLoginPass').onclick = function(){
  const pass = document.getElementById('loginPassword');
  pass.type = pass.type === 'password'? 'text' : 'password';
}

document.getElementById('toggleRegPass').onclick = function(){
  const pass = document.getElementById('regPassword');
  pass.type = pass.type === 'password'? 'text' : 'password';
}

// Login
document.getElementById('loginBtn').onclick = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if(!email ||!password){
    showError('Preencha todos os campos', 'login');
    return;
  }

  this.disabled = true;
  this.innerText = 'Entrando...';

  try{
    await signInWithEmailAndPassword(auth, email, password);
    showError('Login realizado com sucesso!', 'login', 'success');
    setTimeout(() => {
      alert('Login OK! Agora redireciona pra home da loja');
      // window.location.href = '/home';
    }, 1000);
  }catch(e){
    showError(getErrorMessage(e.code), 'login');
    this.disabled = false;
    this.innerText = 'Entrar';
  }
}

// Cadastro
document.getElementById('registerBtn').onclick = async function(){
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;

  if(!name ||!email ||!password){
    showError('Preencha todos os campos', 'register');
    return;
  }

  if(password.length < 6){
    showError('A senha deve ter pelo menos 6 caracteres', 'register');
    return;
  }

  this.disabled = true;
  this.innerText = 'Criando...';

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(userCredential.user, {displayName: name});
    showError('Conta criada com sucesso!', 'register', 'success');
    setTimeout(() => {
      alert('Conta criada! Agora redireciona pra home da loja');
      // window.location.href = '/home';
    }, 1000);
  }catch(e){
    showError(getErrorMessage(e.code), 'register');
    this.disabled = false;
    this.innerText = 'Criar conta';
  }
}

// Reset senha
window.resetPassword = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  if(!email){
    showError('Digite seu e-mail primeiro', 'login');
    return;
  }

  try{
    await sendPasswordResetEmail(auth, email);
    showError('E-mail de recuperação enviado!', 'login', 'success');
  }catch(e){
    showError(getErrorMessage(e.code), 'login');
  }
}

function showError(msg, form, type='error'){
  const el = form === 'login'? document.getElementById('errorMsg') : document.getElementById('errorMsgReg');
  el.innerText = msg;
  el.className = 'error' + (type === 'success'? ' success' : '');
  el.style.display = 'block';
}

function hideError(){
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('errorMsgReg').style.display = 'none';
}

function getErrorMessage(code){
  const messages = {
    'auth/invalid-email': 'E-mail inválido',
    'auth/user-not-found': 'Usuário não encontrado',
    'auth/wrong-password': 'Senha incorreta',
    'auth/email-already-in-use': 'Este e-mail já está em uso',
    'auth/weak-password': 'Senha muito fraca',
    'auth/too-many-requests': 'Muitas tentativas. Tente novamente mais tarde'
  };
  return messages[code] || 'Erro ao autenticar. Tente novamente';
}
</script>
</body>
</html>
