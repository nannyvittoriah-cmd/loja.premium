<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANEL STORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0e1a;
            font-family: 'Arial', sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #00d4ff;
            letter-spacing: 2px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .badge-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
        }
        
        h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        
        h1 .highlight {
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #8b92a8;
            font-size: 16px;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stats {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .hero-image {
            width: 400px;
            height: 400px;
            margin: 0 auto;
            background: radial-gradient(circle, rgba(255, 0, 80, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 0, 80, 0.4);
            box-shadow: 0 0 60px rgba(255, 0, 80, 0.3);
            overflow: hidden;
        }
        
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .hero-image { width: 280px; height: 280px; }
            .buttons { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">CHANEL STORE</div>
        <div>☰</div>
    </header>
    
    <div class="container">
        <div class="badge">
            <div class="badge-dot"></div>
            SISTEMA ONLINE
        </div>
        
        <h1>
            Compras <span class="highlight">manualmente</span><br>
            e com segurança
        </h1>
        
        <p class="subtitle">
            100% seguro - sem precisar de nem um acesso
        </p>
        
        <div class="buttons">
            <button class="btn btn-primary">CADASTRAR</button>
            <button class="btn btn-secondary">ENTRAR</button>
        </div>
        
        <div class="stats">
            <div class="stat">👥 1.4k+ Usuários</div>
            <div class="stat">❤️ 100% seguro</div>
            <div class="stat">⚡ Envio instantâneos</div>
        </div>
        
        <div class="hero-image">
            <img src="chanel-foto.png" alt="Chanel Store">
        </div>
    </div>
</body>
</html>
