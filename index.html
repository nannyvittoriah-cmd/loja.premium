<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bonys Story</title>

<style>

body{
    margin:0;
    font-family:Arial;
    color:white;
    font-size:18px; /* AUMENTO GLOBAL */
}

.fundo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("https://i.imgur.com/iWGitub.jpeg") no-repeat center;
    background-size:cover;
    z-index:-2;
}

/* AVISO */
#avisoTela{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.avisoBox{
    background:white;
    color:black;
    padding:25px;
    border-radius:12px;
    max-width:400px;
    font-size:18px;
}

.bemvindo{
    margin-top:15px;
    font-size:18px;
    white-space:pre-line;
}

.neonBtn{
    margin-top:15px;
    padding:18px;
    width:260px;
    border:none;
    border-radius:10px;
    background:#ff4da6;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:18px;
}

/* CATEGORIAS */
#categorias{
    display:none;
    padding:20px;
}

.topo{
    text-align:center;
    font-size:36px;
    color:#ff4da6;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:20px;
}

.card{
    background:#0f1438;
    border:2px solid #ff4da6;
    border-radius:16px;
    padding:15px;
    text-align:center;
    cursor:pointer;
}

.card img{
    width:100%;
    height:130px;
    object-fit:contain;
    background:black;
    border-radius:12px;
}

.nome{
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
}

/* SUB */
.sub{
    display:none;
    margin-top:20px;
}

.grid2{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:15px;
}

.item{
    background:#0f1438;
    border:2px solid #ff4da6;
    border-radius:14px;
    padding:12px;
    text-align:center;
}

.item img{
    width:100%;
    height:110px;
    object-fit:contain;
    background:black;
    border-radius:10px;
}

.itemNome{
    font-weight:bold;
    margin-top:8px;
    font-size:16px;
}

.itemDesc{
    font-size:14px;
    opacity:0.9;
}

.itemPrice{
    font-size:15px;
    color:#ff4da6;
    font-weight:bold;
    margin-top:2px;
}

.buyDirect{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#25d366;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
}

/* BOTÕES TOPO */
.topBtns{
    position:fixed;
    top:10px;
    left:10px;
    display:none;
    gap:10px;
    z-index:999;
}

.topBtn{
    padding:12px;
    border-radius:10px;
    border:2px solid #ff4da6;
    background:#111;
    color:#ff4da6;
    cursor:pointer;
    font-size:15px;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    background:#25d366;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.whatsapp img{
    width:42px;
}

</style>
</head>

<body>

<div class="fundo"></div>

<!-- BOTÕES TOPO -->
<div class="topBtns" id="topBtns">
<button class="topBtn" onclick="voltarTela()">⬅ Voltar</button>
<button class="topBtn" onclick="irInicio()">🏠 Início</button>
</div>

<!-- AVISO -->
<div id="avisoTela">

<div class="avisoBox">
<h2>⚠️ Aviso</h2>
<p>Compra direta • Sem cadastro</p>
</div>

<div class="bemvindo">
👋 Bem-vindo ao Bonys Story!

Ofertas digitais com entrega rápida e compra direta pelo WhatsApp.

🔥 Aproveite agora!
</div>

<button class="neonBtn" onclick="irCategorias()">CONTINUAR</button>
</div>

<!-- CATEGORIAS -->
<div id="categorias">

<div class="topo">Bonys Story</div>

<div class="grid">

<div class="card" onclick="abrir('redes')">
<img src="https://i.imgur.com/XF6wb2O.jpeg">
<div class="nome">📸 Instagram</div>
</div>

<div class="card" onclick="abrir('ff')">
<img src="https://i.imgur.com/tm2T0RM.jpeg">
<div class="nome">🔥 Free Fire</div>
</div>

<div class="card" onclick="abrir('caixa')">
<img src="https://i.imgur.com/31BewwU.jpeg">
<div class="nome">🎁 Caixa</div>
</div>

<div class="card" onclick="abrir('tokens')">
<img src="https://i.imgur.com/Nb0Ba33.jpeg">
<div class="nome">💎 Tokens</div>
</div>

</div>

<!-- SUBS permanecem IGUAIS -->

</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://api.whatsapp.com/send?phone=5598984853563" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

/* FUNÇÕES ORIGINAIS */
function irCategorias(){
    document.getElementById("avisoTela").style.display="none";
    document.getElementById("categorias").style.display="block";
    document.getElementById("topBtns").style.display="flex";
}

function abrir(tipo){
    document.querySelector(".grid").style.display="none";
    document.querySelectorAll(".sub").forEach(s=>s.style.display="none");
    document.getElementById("sub-"+tipo).style.display="block";
}

function voltarTela(){
    document.querySelectorAll(".sub").forEach(s=>s.style.display="none");
    document.querySelector(".grid").style.display="grid";
}

function irInicio(){
    document.getElementById("categorias").style.display="none";
    document.getElementById("avisoTela").style.display="flex";
    document.getElementById("topBtns").style.display="none";
    document.querySelectorAll(".sub").forEach(s=>s.style.display="none");
}

function comprar(produto){
    let numero="5598984853563";
    let msg="Olá! Quero comprar: "+produto;
    let url="https://api.whatsapp.com/send?phone="+numero+"&text="+encodeURIComponent(msg);
    window.open(url,"_blank");
}

</script>

</body>
</html>
