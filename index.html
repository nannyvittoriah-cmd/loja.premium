<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prime Store Vz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--card:#15151d;--card-2:#1e1e28;--purple:#7c3aed;--purple-light:#a78bfa;
  --neon:#a855f7;--text:#fff;--text-2:#9ca3af;--error:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-size:11px;overflow-x:hidden;}
.screen{display:none;}.screen.active{display:block;}
.hidden{display:none;} button{cursor:pointer;}
.btn{width:100%;height:42px;background:var(--purple);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:600;}

/* Auth */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:100%;max-width:340px;background:var(--card);border-radius:16px;padding:24px;}
.logo{display:flex;gap:10px;align-items:center;margin-bottom:24px;}
.logo svg{width:32px;height:32px;}
.logo h1{font-size:14px;font-weight:700;}
.logo span{font-size:9px;color:var(--purple-light);}
.input-group{margin-bottom:14px;}
.input-box{display:flex;align-items:center;background:var(--card-2);border:1px solid #2a2a35;border-radius:10px;padding:0 12px;height:44px;}
.input-box input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12px;}
.input-box svg{width:16px;height:16px;margin-right:8px;color:var(--text-2);}
.error{background:rgba(239,68,68,0.1);border:1px solid var(--error);color:var(--error);padding:8px;border-radius:8px;font-size:10px;margin-bottom:12px;display:none;}
.auth-switch{text-align:center;margin-top:14px;font-size:10px;color:var(--text-2);}
.auth-switch a{color:var(--purple-light);cursor:pointer;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.header-left{display:flex;flex-direction:column;gap:2px;}
.greeting{font-size:11px;color:var(--text-2);}
.username{font-size:13px;font-weight:600;color:#fff;}
.header svg{width:20px;height:20px;cursor:pointer;}
.search-box{padding:0 16px;margin-bottom:12px;}
.search-box input{width:100%;height:38px;background:var(--card);border:1px solid #2a2a35;border-radius:10px;padding:0 12px;color:var(--text);font-size:11px;outline:none;}

/* Home */
.section{padding:0 16px;margin-bottom:18px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.section-header h3{font-size:12px;font-weight:600;}
.section-header a{font-size:10px;color:var(--purple-light);cursor:pointer;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cat-item{text-align:center;cursor:pointer;}
.cat-item.icon-box{width:100%;aspect-ratio:1;border-radius:12px;background:var(--card);border:1px solid var(--neon);display:flex;align-items:center;justify-content:center;margin-bottom:5px;}
.cat-item.icon-box img{width:60%;height:60%;object-fit:contain;}
.cat-item span{font-size:9px;color:var(--text-2);display:block;}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.prod-item{background:var(--card);border:1px solid #2a2a35;border-radius:10px;overflow:hidden;cursor:pointer;}
.prod-item img{width:100%;aspect-ratio:1;object-fit:cover;border-bottom:1px solid var(--neon);}
.prod-info{padding:6px;}
.prod-info h4{font-size:9px;font-weight:600;margin-bottom:2px;}
.prod-info p{font-size:8px;color:var(--text-2);}
.prod-price{font-size:10px;font-weight:700;color:var(--purple-light);margin-top:3px;}

/* Tabs e Listas */
.tabs{display:flex;background:var(--card-2);border-radius:10px;padding:4px;margin:0 16px 16px;}
.tab{flex:1;text-align:center;padding:8px;font-size:10px;border-radius:8px;cursor:pointer;color:var(--text-2);}
.tab.active{background:var(--purple);color:#fff;}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border-radius:10px;margin-bottom:8px;cursor:pointer;border:1px solid #2a2a35;}
.list-item img{width:36px;height:36px;border-radius:8px;border:1px solid var(--neon);}
.list-item-info{flex:1;}
.list-item-info h4{font-size:11px;font-weight:600;margin-bottom:2px;}
.list-item-info p{font-size:9px;color:var(--text-2);}
.list-item svg{width:16px;height:16px;color:var(--text-2);}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-2);font-size:9px;cursor:pointer;}
.nav-item svg{width:20px;height:20px;}
.nav-item.active{color:var(--purple-light);}
.pb-nav{padding-bottom:60px;}
</style>
</head>
<body>

<!-- Auth -->
<div class="screen active" id="screen-auth">
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="#7c3aed"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>
        <div><h1>PRIME</h1><span>STORE</span></div>
      </div>
      <h2 style="font-size:14px;margin-bottom:4px;">Bem-vindo de volta!</h2>
      <p style="font-size:10px;color:var(--text-2);margin-bottom:20px;">Faça login para continuar</p>
      <div class="error" id="loginError"></div>
      <div class="input-group">
        <div class="input-box">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2.9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/></svg>
          <input type="email" id="loginEmail" placeholder="E-mail">
        </div>
      </div>
      <div class="input-group">
        <div class="input-box">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/></svg>
          <input type="password" id="loginPassword" placeholder="Senha">
        </div>
      </div>
      <button class="btn" id="loginBtn">Entrar</button>
      <div class="auth-switch">Ainda não tem conta? <a onclick="alert('Criar conta')">Criar conta</a></div>
    </div>
  </div>
</div>

<!-- Home -->
<div class="screen pb-nav" id="screen-home">
  <div class="header">
    <svg onclick="alert('Menu')" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    <div class="header-left">
      <span class="greeting">Olá,</span>
      <span class="username" id="userName">Usuário</span>
    </div>
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
  </div>
  <div class="search-box"><input type="text" placeholder="Buscar produtos..."></div>

  <div class="section">
    <div class="section-header"><h3>Categorias</h3><a onclick="openCategorias()">Ver todas</a></div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div class="section">
    <div class="section-header"><h3>Destaques</h3></div>
    <div class="prod-grid" id="prodGrid"></div>
  </div>
</div>

<!-- Categorias -->
<div class="screen pb-nav" id="screen-categorias">
  <div class="header">
    <svg onclick="goHome()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    <div style="font-size:13px;font-weight:600;">Categorias</div>
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('categorias')">Categorias</div>
    <div class="tab" onclick="switchTab('subcategorias')">Subcategorias</div>
  </div>
  <div id="categoriasList" style="padding:0 16px;"></div>
  <div id="subcategoriasList" style="padding:0 16px;display:none;"></div>
</div>

<!-- Subcategorias/Produtos -->
<div class="screen pb-nav" id="screen-subcat">
  <div class="header">
    <svg onclick="openCategorias()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    <div style="font-size:13px;font-weight:600;" id="subcatTitle">Games</div>
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchSubTab('subcat')">Subcategorias</div>
    <div class="tab" onclick="switchSubTab('produtos')">Produtos</div>
  </div>
  <div id="subcatItems" style="padding:0 16px;"></div>
  <div id="produtosItems" style="padding:0 16px;display:none;"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="goHome()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Home
  </div>
  <div class="nav-item" onclick="openCategorias()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    Loja
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Carrinho
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Pedidos
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    Perfil
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  projectId: "premium-store-aa58b",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allCategories = [];
let allProducts = [];
let currentCat = null;

// Login
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch(e){
    document.getElementById('loginError').innerText='Email ou senha inválidos';
    document.getElementById('loginError').style.display='block';
  }
});

// Fluxo pós login
onAuthStateChanged(auth, async (user) => {
  if(user){
    const nome = user.displayName || user.email.split('@')[0];
    document.getElementById('userName').innerText = nome;
    document.getElementById('screen-auth').classList.remove('active');
    document.getElementById('screen-home').classList.add('active');
    await loadData();
  }
});

async function loadData(){
  const catSnap = await getDocs(collection(db,'categorias'));
  allCategories = []; catSnap.forEach(d=>allCategories.push({id:d.id,...d.data()}));
  const prodSnap = await getDocs(collection(db,'produtos'));
  allProducts = []; prodSnap.forEach(d=>allProducts.push({id:d.id,...d.data()}));

  renderHome();
  renderCategorias();
}

function renderHome(){
  document.getElementById('catGrid').innerHTML = allCategories.slice(0,4).map(cat=>`
    <div class="cat-item" onclick="openSubcat('${cat.id}')">
      <div class="icon-box"><img src="${cat.img}" onerror="this.src='https://via.placeholder.com/100'"></div>
      <span>${cat.nome}</span>
    </div>
  `).join('');

  document.getElementById('prodGrid').innerHTML = allProducts.slice(0,3).map(prod=>`
    <div class="prod-item">
      <img src="${prod.img}" onerror="this.src='https://via.placeholder.com/100'">
      <div class="prod-info">
        <h4>${prod.nome}</h4>
        <p>${prod.desc || ''}</p>
        <div class="prod-price">R$ ${prod.preco}</div>
      </div>
    </div>
  `).join('');
}

function renderCategorias(){
  document.getElementById('categoriasList').innerHTML = allCategories.map(cat=>`
    <div class="list-item" onclick="openSubcat('${cat.id}')">
      <img src="${cat.img}" onerror="this.src='https://via.placeholder.com/100'">
      <div class="list-item-info">
        <h4>${cat.nome}</h4>
        <p>${cat.desc || ''}</p>
      </div>
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
    </div>
  `).join('');
}

window.openCategorias = () => {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-categorias').classList.add('active');
  switchTab('categorias');
}

window.goHome = () => {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
}

window.switchTab = (tab) => {
  document.querySelectorAll('#screen-categorias.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('categoriasList').style.display = tab==='categorias'?'block':'none';
  document.getElementById('subcategoriasList').style.display = tab==='subcategorias'?'block':'none';
}

window.openSubcat = (catId) => {
  currentCat = allCategories.find(c=>c.id===catId);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-subcat').classList.add('active');
  document.getElementById('subcatTitle').innerText = currentCat.nome;

  const subcats = [...new Set(allProducts.filter(p=>p.categoriaId===catId).map(p=>p.subcat).filter(Boolean))];

  document.getElementById('subcatItems').innerHTML = subcats.map(s=>`
    <div class="list-item" onclick="filterProdutos('${s}')">
      <img src="${currentCat.img}">
      <div class="list-item-info"><h4>${s}</h4></div>
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
    </div>
  `).join('');

  filterProdutos();
}

window.switchSubTab = (tab) => {
  document.querySelectorAll('#screen-subcat.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('subcatItems').style.display = tab==='subcat'?'block':'none';
  document.getElementById('produtosItems').style.display = tab==='produtos'?'block':'none';
}

window.filterProdutos = (subcat=null) => {
  let prods = allProducts.filter(p=>p.categoriaId===currentCat.id);
  if(subcat) prods = prods.filter(p=>p.subcat===subcat);
  document.getElementById('produtosItems').innerHTML = prods.map(prod=>`
    <div class="list-item">
      <img src="${prod.img}" onerror="this.src='https://via.placeholder.com/100'">
      <div class="list-item-info">
        <h4>${prod.nome}</h4>
        <p>${prod.desc || ''}</p>
        <p style="color:var(--purple-light);font-weight:600;">R$ ${prod.preco}</p>
      </div>
    </div>
  `).join('');
  switchSubTab('produtos');
}
</script>
</body>
</html>
