<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Vz</title>
<style>
  :root{
    --fundo:#0a0613;
    --fundo-card:#1a0f2e;
    --rosa-neon:#ff2ea6;
    --roxo-neon:#9d4edd;
    --dourado:#ffd60a;
    --texto:#f1f1f1;
    --texto-sec:#a1a1aa;
    --borda:#3c1a5b;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
  body{background:var(--fundo);color:var(--texto);font-size:13px;background-image:radial-gradient(circle at 20% 50%,rgba(157,78,221,.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(255,46,166,.1) 0%,transparent 50%)}
 .header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(26,15,46,.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--rosa-neon);box-shadow:0 0 20px rgba(255,46,166,.2)}
 .menu-btn{font-size:20px;background:none;border:none;color:var(--rosa-neon);cursor:pointer}
 .heart{color:var(--rosa-neon);font-size:22px;filter:drop-shadow(0 0 8px var(--rosa-neon))}
 .container{padding:16px;max-width:1200px;margin:auto}
 .top-info h2{color:var(--dourado);font-size:14px;margin-bottom:4px;text-shadow:0 0 10px rgba(255,214,10,.5)}
 .top-info p{font-size:12px;margin-bottom:2px;color:var(--texto-sec)}
 .saudacao{margin:16px 0;padding:12px;background:var(--fundo-card);border:1px solid var(--borda);border-radius:8px;box-shadow:0 0 15px rgba(157,78,221,.2)}
 .saudacao h3{font-size:13px;color:var(--rosa-neon)}
 .saudacao p{font-size:12px;opacity:.9}
 .btn-impulsionar{background:var(--fundo-card);color:#6b7280;border:1px solid var(--borda);padding:10px;width:100%;border-radius:8px;margin-bottom:20px;cursor:not-allowed}
 .secao-titulo{font-size:16px;margin:20px 0 12px;color:var(--texto);font-weight:600}
 .grid-categorias{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
 .cat-card{background:var(--fundo-card);border:2px solid var(--borda);border-radius:12px;overflow:hidden;cursor:pointer;transition:.3s}
 .cat-card:hover{border-color:var(--rosa-neon);box-shadow:0 0 20px rgba(255,46,166,.4);transform:translateY(-2px)}
 .cat-card img{width:100%;height:90px;object-fit:cover}
 .cat-card p{padding:8px;text-align:center;font-size:11px;font-weight:bold}
 .produtos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
 .card{background:var(--fundo-card);border:1px solid var(--rosa-neon);border-radius:12px;padding:14px;box-shadow:0 0 15px rgba(255,46,166,.15)}
 .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
 .card h4{font-size:14px;color:var(--texto)}
 .card-select{background:var(--fundo);border:1px solid var(--borda);color:var(--texto);padding:4px 8px;border-radius:6px;font-size:12px}
 .card-info{font-size:11px;color:var(--texto-sec);margin-bottom:12px;display:flex;align-items:center;gap:6px}
 .btn-comprar{width:100%;background:var(--rosa-neon);color:white;border:none;padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:12px;box-shadow:0 0 15px rgba(255,46,166,.4)}
 .btn-comprar:hover{filter:brightness(1.2)}
 .btn-fav{width:100%;background:transparent;color:var(--rosa-neon);border:1px solid var(--rosa-neon);padding:8px;border-radius:8px;font-size:11px;margin-top:8px;cursor:pointer}
 .feedback-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px}
 .feedback-card{background:var(--fundo-card);border:1px solid var(--borda);border-radius:10px;padding:12px}
 .feedback-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
 .feedback-avatar{width:32px;height:32px;border-radius:50%;background:var(--roxo-neon)}
 .feedback-nome{font-size:12px;font-weight:bold}
 .stars{color:var(--dourado);font-size:11px}
 .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:50;align
