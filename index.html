<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bonys Story</title>

<style>

/* FUNDO */
.fundo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("https://i.imgur.com/iWGitub.jpeg") no-repeat center center;
    background-size: cover;
    z-index: -1;
}

/* CONTEÚDO */
body {
    margin: 0;
    font-family: Arial;
    color: white;
}

/* CATEGORIAS */
.container {
    padding: 20px;
}

.categoria {
    margin-bottom: 15px;
}

.cat-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: linear-gradient(90deg, #ff2fa0, #7a00ff);
    color: white;
    border: none;
    font-size: 16px;
    box-shadow: 0 0 12px rgba(255, 47, 160, 0.6);
    cursor: pointer;
}

/* SUBCATEGORIAS ANIMAÇÃO */
.subcategorias {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    margin-top: 8px;
}

.subcategorias button {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: #fff;
    box-shadow: 0 0 8px rgba(0,0,0,0.5);
}

/* BOTÃO WHATSAPP FLUTUANTE */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    color: white;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<div class="fundo"></div>

<div class="container">

    <h2>Bonys Story</h2>

    <!-- CATEGORIA 1 -->
    <div class="categoria">
        <button class="cat-btn" onclick="toggleSub('cat1')">
            Seguidores & Curtidas
        </button>

        <div id="cat1" class="subcategorias">
            <button>Sem seguidores por R$6,00</button>
            <button>Curtidas básicas</button>
            <button>Visualizações FF 33 toques R$10,99</button>
        </div>
    </div>

    <!-- CATEGORIA 2 -->
    <div class="categoria">
        <button class="cat-btn" onclick="toggleSub('cat2')">
            Free Fire Serviços
        </button>

        <div id="cat2" class="subcategorias">
            <button>Skin básica FF</button>
            <button>Diamantes teste</button>
            <button>Passe elite</button>
        </div>
    </div>

</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5598984843563" target="_blank">
    💬
</a>

<script>

function toggleSub(id) {

    const all = document.querySelectorAll('.subcategorias');

    all.forEach(el => {
        if (el.id !== id) {
            el.style.maxHeight = null;
        }
    });

    const el = document.getElementById(id);

    if (el.style.maxHeight) {
        el.style.maxHeight = null;
    } else {
        el.style.maxHeight = el.scrollHeight + "px";
    }
}

</script>

</body>
</html>
