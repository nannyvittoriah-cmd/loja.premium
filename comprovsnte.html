<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Store VZ - Comprovante</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#141414;--input:#1e1e1e;--text:#fff;--muted:#888;--purple:#8b5cf6;--purple2:#7c3aed;--border:#2a2a2a;--green:#4ade80}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:420px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center}
.check-icon{width:72px;height:72px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.check-icon svg{width:36px;height:36px;stroke:#fff;stroke-width:3}
.titulo{font-size:24px;font-weight:800;margin-bottom:24px}
.info-box{background:var(--input);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;text-align:left}
.info-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.info-valor{font-size:14px;font-weight:600}
.info-valor.id{font-size:13px;font-family:monospace;color:var(--purple)}
.status{font-size:13px;font-weight:700;color:var(--green)}
.divider{height:1px;background:var(--border);margin:20px 0}
.section-title{font-size:14px;font-weight:700;margin-bottom:12px;text-align:left}
.item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-info{display:flex;align-items:center;gap:10px;flex:1}
.item-icon{width:40px;height:40px;background:var(--input);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.item-nome{font-size:14px;font-weight:600}
.item-preco{font-size:14px;font-weight:700;color:var(--purple)}
.total-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:2px solid var(--border)}
.total-label{font-size:16px;font-weight:700}
.total-valor{font-size:24px;font-weight:800;color:var(--purple)}
.btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border:none;padding:16px;border-radius:14px;font-weight:700;cursor:pointer;font-size:15px;margin-top:20px}
.btn-outline{width:100%;background:transparent;color:var(--purple);border:2px solid var(--purple);padding:14px;border-radius:14px;font-weight:700;cursor:pointer;font-size:15px;margin-top:12px}
</style>
</head>
<body>
<div class="container">
  <div class="card" id="conteudo">
    <div style="text-align:center;padding:40px;color:var(--muted)">Carregando...</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAuAANdCDgT1pMucdYMdeHMPMsto-EUDAU",
  authDomain: "premium-store-aa58b.firebaseapp.com",
  databaseURL: "https://premium-store-aa58b-default-rtdb.firebaseio.com",
  projectId: "premium-store-aa58b",
  storageBucket: "premium-store-aa58b.firebasestorage.app",
  messagingSenderId: "462239500057",
  appId: "1:462239500057:web:f1b7cea162ed308a866788",
  measurementId: "G-CN88J28WRX"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href='index.html';
  }else{
    carregarPedido();
  }
});

function carregarPedido(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  
  if(!id){
    window.location.href='home.html';
    return;
  }
  
  db.ref('pedidos/'+id).once('value',snap=>{
    if(!snap.exists()){
      window.location.href='home.html';
      return;
    }
    
    const p=snap.val();
    const data=new Date(p.criadoEm).toLocaleString('pt-BR');
    
    let itensHtml='';
    p.itens.forEach(item=>{
      const img=item.imagem?`<img src="${item.imagem}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`:'🎁';
      itensHtml+=`
        <div class="item">
          <div class="item-info">
            <div class="item-icon">${img}</div>
            <div class="item-nome">${item.nome}</div>
          </div>
          <div class="item-preco">R$ ${parseFloat(item.preco).toFixed(2).replace('.',',')}</div>
        </div>
      `;
    });
    
    document.getElementById('conteudo').innerHTML=`
      <div class="check-icon">
        <svg fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
        </svg>
      </div>
      <div class="titulo">Pedido realizado!</div>
      
      <div class="info-box">
        <div class="info-label">ID do pedido</div>
        <div class="info-valor id">#${p.id}</div>
      </div>
      
      <div class="info-box">
        <div class="info-label">Data</div>
        <div class="info-valor">${data}</div>
      </div>
      
      <div class="info-box">
        <div class="info-label">Status</div>
        <div class="info-valor status">Pagamento aprovado</div>
      </div>
      
      <div class="divider"></div>
      
      <div class="section-title">Itens do pedido</div>
      ${itensHtml}
      
      <div class="total-row">
        <div class="total-label">Total pago</div>
        <div class="total-valor">R$ ${parseFloat(p.total).toFixed(2).replace('.',',')}</div>
      </div>
      
      <button class="btn" onclick="window.location.href='pedidos.html'">VER MEUS PEDIDOS</button>
      <button class="btn-outline" onclick="enviarComprovante()">ENVIAR COMPROVANTE</button>
    `;
  });
}

function enviarComprovante(){
  alert('Comprovante enviado para o email cadastrado!');
}
</script>
</body>
</html>
